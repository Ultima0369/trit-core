<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

tWord::tru(Frame::Science);\n    let b = TritWord::fals(Frame::Science);\n    c.bench_function(\"precheck_same_frame\", |b_bench| {\n        b_bench.iter(|| TernaryAlgebra::precheck_same_frame(black_box(\u0026a), black_box(\u0026b)));\n    });\n}\n\nfn bench_cascade_10(c: \u0026mut Criterion) {\n    let trits: Vec\u003cTritWord\u003e = (0..10)\n        .map(|i| {\n            if i % 2 == 0 {\n                TritWord::tru(Frame::Science)\n            } else {\n                TritWord::tru(Frame::Consensus)\n            }\n        })\n        .collect();\n    c.bench_function(\"tand_cascade_10\", |b_bench| {\n        b_bench.iter(|| {\n            let mut current = trits[0];\n            for next in \u0026trits[1..] {\n                let (res, _) = TernaryAlgebra::t_and(black_box(\u0026current), black_box(next));\n                current = res;\n            }\n            black_box(current);\n        });\n    });\n}\n\nfn bench_cascade_10_hot(c: \u0026mut Criterion) {\n    let trits: Vec\u003cTritWord\u003e = (0..10)\n        .map(|_| TritWord::new(TritValue::True, Phase::new(0.8).unwrap(), Frame::Science))\n        .collect();\n    c.bench_function(\"tand_cascade_10_hot\", |b_bench| {\n        b_bench.iter(|| {\n            let mut current = trits[0];\n            for next in \u0026trits[1..] {\n                current = TernaryAlgebra::t_and_hot(black_box(\u0026current), black_box(next));\n            }\n            black_box(current);\n        });\n    });\n}\n\nfn bench_phase_quantize(c: \u0026mut Criterion) {\n    let near_neutral = Phase::new(0.5000000001).unwrap();\n    let near_zero = Phase::new(0.0000000001).unwrap();\n    let near_one = Phase::new(0.9999999999).unwrap();\n    let normal = Phase::new(0.73).unwrap();\n\n    c.bench_function(\"phase_quantize_near_neutral\", |b_bench| {\n        b_bench.iter(|| black_box(near_neutral).quantize(black_box(1e-6)))\n    });\n\n    c.bench_function(\"phase_quantize_near_zero\", |b_bench| {\n        b_bench.iter(|| ,"traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","anchor","ecological_base.rs"],"content":"//! Ecological foundation state monitoring.\n//!\n//! Thresholds (MVP static values):\n//! - Biodiversity Intactness Index (BII): must stay above 0.75 globally\n//! - Carbon sink capacity: oceanic + terrestrial sinks \u003e= 50% of pre-industrial\n//! - Ocean acidification: surface pH must not drop below 7.95 (pre-industrial: 8.17)\n\nuse std::time::Duration;\n\nuse crate::anchor::{\n    AnchorConstraint, AnchorSeverity, AnchorViolation, DataSource, DecisionPreview, StaticSource,\n};\n\n#[derive(Debug, Clone)]\npub struct EcologicalBaseConfig {\n    /// Minimum BII threshold (default: 0.75).\n    pub bii_min: f64,\n    /// Minimum carbon sink capacity fraction (default: 0.50).\n    pub sink_capacity_min: f64,\n    /// Minimum ocean surface pH (default: 7.95).\n    pub ocean_ph_min: f64,\n}\n\nimpl Default for EcologicalBaseConfig {\n    fn default() -\u003e Self {\n        EcologicalBaseConfig {\n            bii_min: 0.75,\n            sink_capacity_min: 0.50,\n            ocean_ph_min: 7.95,\n        }\n    }\n}\n\npub struct EcologicalBase {\n    config: EcologicalBaseConfig,\n    bii_source: Box\u003cdyn DataSource\u003cf64\u003e\u003e,\n    sink_source: Box\u003cdyn DataSource\u003cf64\u003e\u003e,\n    ph_source: Box\u003cdyn DataSource\u003cf64\u003e\u003e,\n}\n\nimpl EcologicalBase {\n    pub fn with_static_values(\n        bii: f64,\n        sink_capacity: f64,\n        ocean_ph: f64,\n        config: EcologicalBaseConfig,\n    ) -\u003e Self {\n        EcologicalBase {\n            config,\n            bii_source: Box::new(StaticSource::new(bii, Duration::from_secs(86400))),\n            sink_source: Box::new(StaticSource::new(sink_capacity, Duration::from_secs(86400))),\n            ph_source: Box::new(StaticSource::new(ocean_ph, Duration::from_secs(86400))),\n        }\n    }\n\n    pub fn safe() -\u003e Self {\n        Self::with_static_values(0.85, 0.70, 8.05, EcologicalBaseConfig::default())\n    }\n\n    pub fn degraded() -\u003e Self {\n        Self::with_static_values(0.60, 0.40, 7.90, EcologicalBaseConfig::default())\n    }\n}\n\nimpl AnchorConstraint for EcologicalBase {\n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"ecological_base\"\n    }\n\n    fn severity(\u0026self) -\u003e AnchorSeverity {\n        AnchorSeverity::Abort\n    }\n\n    fn check(\u0026self, _decision: \u0026DecisionPreview) -\u003e Option\u003cAnchorViolation\u003e {\n        if let Ok(bii) = self.bii_source.sample() {\n            if bii \u003c self.config.bii_min {\n                return Some(AnchorViolation {\n                    anchor_name: self.name().to_string(),\n                    description: format!(\"BII {:.2} below minimum {:.2}\", bii, self.config.bii_min),\n                    severity: self.severity(),\n                    actual_value: bii,\n                    threshold: self.config.bii_min,\n                });\n            }\n        }\n\n        if let Ok(sink) = self.sink_source.sample() {\n            if sink \u003c self.config.sink_capacity_min {\n                return Some(AnchorViolation {\n                    anchor_name: self.name().to_string(),\n                    description: format!(\n                        \"Carbon sink capacity {:.2} below minimum {:.2}\",\n                        sink, self.config.sink_capacity_min\n                    ),\n                    severity: self.severity(),\n                    actual_value: sink,\n                    threshold: self.config.sink_capacity_min,\n                });\n            }\n        }\n\n        if let Ok(ph) = self.ph_source.sample() {\n            if ph \u003c self.config.ocean_ph_min {\n                return Some(AnchorViolation {\n                    anchor_name: self.name().to_string(),\n                    description: format!(\n                        \"Ocean pH {:.2} below minimum {:.2}\",\n                        ph, self.config.ocean_ph_min\n                    ),\n                    severity: self.severity(),\n                    actual_value: ph,\n                    threshold: self.config.ocean_ph_min,\n                });\n            }\n        }\n\n        None\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn safe_ecology_passes() {\n        let eco = EcologicalBase::safe();\n        assert!(eco.check(\u0026DecisionPreview::neutral()).is_none());\n    }\n\n    #[test]\n    fn degraded_ecology_fails() {\n        let eco = EcologicalBase::degraded();\n        assert!(eco.check(\u0026DecisionPreview::neutral()).is_some());\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":42,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":50,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":51,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":52,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":56,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":57,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":60,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":61,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":66,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":67,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":70,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":71,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":74,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":75,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":76,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":77,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":78,"address":[],"length":0,"st y, Connection, Transcendence\n\nuse crate::anchor::{AnchorConstraint, AnchorSeverity, AnchorViolation, DecisionPreview};\n\n/// Flourishing dimensions.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\npub enum FlourishingDimension {\n    Autonomy,\n    Creativity,\n    Connection,\n    Transcendence,\n}\n\n/// A single flourishing indicator with current level and aspiration.\n#[derive(Debug, Clone, PartialEq)]\npub struct FlourishingIndicator {\n    pub dimension: FlourishingDimension,\n    /// Current level in [0.0, 1.0].\n    pub current_level: f64,\n    /// Aspiration level in [0.0, 1.0].\n    pub aspiration: f64,\n    /// Whether this indicator is currently satisfied (current \u003e= aspiration).\n    pub satisfied: bool,\n}\n\nimpl FlourishingIndicator {\n    pub fn new(dimension: FlourishingDimension, current: f64, aspiration: f64) -\u003e Self {\n        FlourishingIndicator {\n            dimension,\n            current_level: current.clamp(0.0, 1.0),\n            aspiration: aspiration.clamp(0.0, 1.0),\n            satisfied: current \u003e= aspiration,\n        }\n    }\n}\n\n/// Pool of flourishing indicators.\n///\n/// These accumulate over time. No flourishing indicator can be\n/// traded against a survival motive — the survival layer always\n/// takes priority.\npub struct FlourishingPool {\n    pub indicators: Vec\u003cFlourishingIndicator\u003e,\n}\n\nimpl FlourishingPool {\n    pub fn new() -\u003e Self {\n        FlourishingPool {\n            indicators: vec![\n                FlourishingIndicator::new(FlourishingDimension::Autonomy, 0.5, 0.7),\n                FlourishingIndicator::new(FlourishingDimension::Creativity, 0.5, 0.6),\n                FlourishingIndicator::new(FlourishingDimension::Connection, 0.5, 0.7),\n                FlourishingIndicator::new(FlourishingDimension::Transcendence, 0.3, 0.5),\n            ],\n        }\n    }\n\n    /// Returns true if all indicators are satisfied.\n    pub fn all_satisfied(\u0026self) -\u003e bool {\n        self.indicators.iter().all(|i| i.satisfied)\n    }\n\n    /// Returns the fraction of satisfied indicators.\n    pub fn satisfaction_fraction(\u0026self) -\u003e f64 {\n        if self.indicators.is_empty() {\n            return 1.0;\n        }\n        let satisfied = self.indicators.iter().filter(|i| i.satisfied).count();\n        satisfied as f64 / self.indicators.len() as f64\n    }\n\n    /// Update the level of a flourishing dimension.\n    pub fn update(\u0026mut self, dim: FlourishingDimension, new_level: f64) {\n        if let Some(indicator) = self.indicators.iter_mut().find(|i| i.dimension == dim) {\n            indicator.current_level = new_level.clamp(0.0, 1.0);\n            indicator.satisfied = indicator.current_level \u003e= indicator.aspiration;\n        }\n    }\n}\n\nimpl Default for FlourishingPool {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl AnchorConstraint for FlourishingPool {\n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"flourishing_pool\"\n    }\n\n    fn severity(\u0026self) -\u003e AnchorSeverity {\n        // Flourishing violations are DowngradeToHold, not Abort.\n        // A system can operate with unmet flourishing needs,\n        // but should signal that it is doing so.\n        AnchorSeverity::DowngradeToHold\n    }\n\n    fn check(\u0026self, _decision: \u0026DecisionPreview) -\u003e Option\u003cAnchorViolation\u003e {\n        let fraction = self.satisfaction_fraction();\n        if fraction \u003c 0.25 {\n            return Some(AnchorViolation {\n                anchor_name: self.name().to_string(),\n                description: format!(\n                    \"Flourishing satisfaction fraction {:.2} below 0.25 threshold\",\n                    fraction\n                ),\n                severity: self.severity(),\n                actual_value: fraction,\n                threshold: 0.25,\n            });\n        }\n        None\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn default_pool_has_four_indicators() {\n        let pool = FlourishingPool::new();\n        assert_eq!(pool.indicators.len(), 4);\n    }\n\n    #[test]\n    fn satisfaction_fraction_is_correct() {\n        let mut pool = FlourishingPool::new();\n        assert!(pool.satisfaction_fraction() \u003c 1.0);\n        // Make all satisfied\n        for i in 0..4 {\n            pool.indicators[i].current_level = 1.0;\n            pool.indicators[i].satisfied = true;\n        }\n        assert_eq!(pool.satisfaction_fraction(), 1.0);\n    }\n\n    #[test]\n    fn low_satisfaction_triggers_downgrade() {\n        let mut pool = FlourishingPool::new();\n        for ind in \u0026mut pool.indicators {\n            ind.current_level = 0.1;\n            ind.satisfied = false;\n        }\n        let violation = pool.check(\u0026DecisionPreview::neutral());\n        assert!(violation.is_some());\n        assert_eq!(violation.unwrap().severity, AnchorSeverity::DowngradeToHold);\n    }\n}\n","traces":[{"line":33,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":36,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":37,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":38,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":53,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":55,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":66,"address":[],"length":0,"stats":{"Line":0}},{"line":70,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":71,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":72,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":75,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":95,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":98,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":102,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":105,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":106,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":107,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":108,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":109,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":110,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":111,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":112,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":114,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":115,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":116,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":119,"address":[],"length":0,"stats":{"Line":0}}],"covered":25,"coverable":35},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","anchor","mod.rs"],"content":"//! Steady anchor layer: non-negotiable constraints with veto power.\r\n//!\r\n//! This layer defines the baselines that the system cannot violate\r\n//! regardless of scenario, frame, or domain. Each anchor constraint\r\n//! is queried before every decision; any violation forces Hold + alert.\r\n//!\r\n//! ## Mathematical Foundation\r\n//!\r\n//! Each anchor constraint C_i is a predicate on the decision preview space D:\r\n//!\r\n//!   C_i: D -\u003e { pass, violation }\r\n//!\r\n//! The anchor layer produces a conjunctive report:\r\n//!\r\n//!   AnchorReport = AND_{i=1..5} C_i(d)\r\n//!\r\n//! If any C_i returns `Abort`, the entire decision is rejected.\r\n//! If any C_i returns `DowngradeToHold`, the ternary result is overridden to Hold.\r\n\r\npub mod ecological_base;\r\npub mod flourishing_pool;\r\npub mod survival_motives;\r\npub mod thermal_baseline;\r\npub mod wellbeing_priority;\r\n\r\nuse serde::{Deserialize, Serialize};\r\n\r\nuse crate::core::frame::Frame;\r\nuse crate::core::value::TritValue;\r\n\r\n// ── Core types ──────────────────────────────────────────────────\r\n\r\n/// Severity of an anchor violation.\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Deserialize, Serialize)]\r\npub enum AnchorSeverity {\r\n    /// Direct rejection — no frame or domain can override.\r\n    Abort,\r\n    /// Downgrade to Hold — continue gathering variables.\r\n    DowngradeToHold,\r\n}\r\n\r\n/// Ecosystem zone for ecological impact assessment.\r\n#[derive(Debug, Clone, PartialEq, Eq, Deserialize, Serialize)]\r\npub enum EcosystemZone {\r\n    Terrestrial,\r\n    Marine,\r\n    Freshwater,\r\n    Atmospheric,\r\n    Polar,\r\n    Coastal,\r\n}\r\n\r\n/// What the anchor layer inspects before a decision is finalized.\r\n///\r\n/// Contains ONLY observable expected consequences, not internal engine state.\r\n/// This is the \"decision preview\" that each anchor constraint evaluates.\r\n#[derive(Debug, Clone, PartialEq)]\r\npub struct DecisionPreview {\r\n    /// Estimated energy consumption in joules.\r\n    pub expected_energy_joules: f64,\r\n    /// Estimated carbon equivalent emission in kg.\r\n    pub expected_carbon_kg: f64,\r\n    /// Population potentially affected, if estimable.\r\n    pub affected_population: Option\u003cu64\u003e,\r\n    /// Risk of irreversible change, in [0.0, 1.0].\r\n    /// 1.0 = certainly irreversible (e.g., species extinction).\r\n    pub irreversible_change_risk: f64,\r\n    /// Ecosystem zone impacted, if applicable.\r\n    pub ecosystem_impact_zone: Option\u003cEcosystemZone\u003e,\r\n    /// The frame of the proposed decision.\r\n    pub frame: Frame,\r\n    /// The proposed trit value.\r\n    pub trit_value: TritValue,\r\n}\r\n\r\nimpl DecisionPreview {\r\n    /// Create a neutral preview (all zeros, neutral frame, Hold value).\r\n    pub fn neutral() -\u003e Self {\r\n        DecisionPreview {\r\n            expected_energy_joules: 0.0,\r\n            expected_carbon_kg: 0.0,\r\n            affected_population: None,\r\n            irreversible_change_risk: 0.0,\r\n            ecosystem_impact_zone: None,\r\n            frame: Frame::Meta,\r\n            trit_value: TritValue::Hold,\r\n        }\r\n    }\r\n}\r\n\r\n/// A single anchor violation.\r\n#[derive(Debug, Clone, PartialEq)]\r\npub struct AnchorViolation {\r\n    /// Name of the anchor that was violated.\r\n    pub anchor_name: String,\r\n    /// Human-readable description of the violation.\r\n    pub description: String,\r\n    /// Severity of the violation.\r\n    pub severity: AnchorSeverity,\r\n    /// The value that triggered the violation.\r\n    pub actual_value: f64,\r\n    /// The threshold that was exceeded.\r\n    pub threshold: f64,\r\n}\r\n\r\n/// Aggregated result of all anchor checks.\r\n#[derive(Debug, Clone, PartialEq)]\r\npub struct AnchorReport {\r\n    /// All violations found.\r\n    pub violations: Vec\u003cAnchorViolation\u003e,\r\n    /// The highest severity violation found (or None if clean).\r\n    pub overall_severity: Option\u003cAnchorSeverity\u003e,\r\n}\r\n\r\nimpl AnchorReport {\r\n    /// Create an empty (clean) report.\r\n    pub fn clean() -\u003e Self {\r\n        AnchorReport {\r\n            violations: Vec::new(),\r\n            overall_severity: None,\r\n        }\r\n    }\r\n\r\n    /// Returns true if any Abort-level violation exists.\r\n    pub fn has_abort(\u0026self) -\u003e bool {\r\n        self.overall_severity == Some(AnchorSeverity::Abort)\r\n    }\r\n\r\n    /// Returns true if any violation exists (Abort or DowngradeToHold).\r\n    pub fn has_violations(\u0026self) -\u003e bool {\r\n        !self.violations.is_empty()\r\n    }\r\n\r\n    /// Returns true if the decision should be downgraded to Hold\r\n    /// (DowngradeToHold violations exist but no Abort).\r\n    pub fn should_downgrade_to_hold(\u0026self) -\u003e bool {\r\n        self.overall_severity == Some(AnchorSeverity::DowngradeToHold)\r\n    }\r\n}\r\n\r\n// ── Trait ───────────────────────────────────────────────────────\r\n\r\n/// Error type for anchor data source operations.\r\n#[derive(Debug, Clone, thiserror::Error)]\r\npub enum AnchorError {\r\n    #[error(\"data source unavailable: {0}\")]\r\n    Unavailable(String),\r\n    #[error(\"value out of bounds: {0}\")]\r\n    OutOfBounds(String),\r\n    #[error(\"configuration error: {0}\")]\r\n    Config(String),\r\n}\r\n\r\nuse std::time::Duration;\r\n\r\n/// Abstraction over data sources.\r\n///\r\n/// In MVP, implemented by `StaticSource\u003cT\u003e` backed by config values.\r\n/// In future, can be replaced with real sensor streams.\r\npub trait DataSource\u003cT\u003e: Send + Sync {\r\n    /// Sample the current value from this data source.\r\n    fn sample(\u0026self) -\u003e Result\u003cT, AnchorError\u003e;\r\n    /// The temporal resolution of this data source.\r\n    fn resolution(\u0026self) -\u003e Duration;\r\n}\r\n\r\n/// A data source that returns a constant value.\r\n/// Used in MVP when real sensors are not available.\r\npub struct StaticSource\u003cT: Clone + Send + Sync\u003e {\r\n    value: T,\r\n    resolution: Duration,\r\n}\r\n\r\nimpl\u003cT: Clone + Send + Sync\u003e StaticSource\u003cT\u003e {\r\n    pub fn new(value: T, resolution: Duration) -\u003e Self {\r\n        StaticSource { value, resolution }\r\n    }\r\n}\r\n\r\nimpl\u003cT: Clone + Send + Sync\u003e DataSource\u003cT\u003e for StaticSource\u003cT\u003e {\r\n    fn sample(\u0026self) -\u003e Result\u003cT, AnchorError\u003e {\r\n        Ok(self.value.clone())\r\n    }\r\n\r\n    fn resolution(\u0026self) -\u003e Duration {\r\n        self.resolution\r\n    }\r\n}\r\n\r\n// ── The AnchorConstraint trait ──────────────────────────────────\r\n\r\n/// Each anchor constraint must implement this trait.\r\n///\r\n/// The `check` method inspects a `DecisionPreview` and returns\r\n/// `Some(AnchorViolation)` if the constraint is violated, `None` if it passes.\r\npub trait AnchorConstraint: Send + Sync {\r\n    /// Human-readable name of this constraint.\r\n    fn name(\u0026self) -\u003e \u0026'static str;\r\n    /// The severity of violations from this constraint.\r\n    fn severity(\u0026self) -\u003e AnchorSeverity;\r\n    /// Check whether the given decision preview violates this constraint.\r\n    fn check(\u0026self, decision: \u0026DecisionPreview) -\u003e Option\u003cAnchorViolation\u003e;\r\n}\r\n\r\n// ── Report aggregation ──────────────────────────────────────────\r\n\r\n/// Run all anchor constraints against a decision preview and produce a report.\r\npub fn check_all(\r\n    constraints: \u0026[Box\u003cdyn AnchorConstraint\u003e],\r\n    decision: \u0026DecisionPreview,\r\n) -\u003e AnchorReport {\r\n    let mut report = AnchorReport::clean();\r\n\r\n    for constraint in constraints {\r\n        if let Some(violation) = constraint.check(decision) {\r\n            report.overall_severity = Some(match report.overall_severity {\r\n                None =\u003e violation.severity,\r\n                Some(prev) if violation.severity \u003e prev =\u003e violation.severity,\r\n                Some(prev) =\u003e prev,\r\n            });\r\n            report.violations.push(violation);\r\n        }\r\n    }\r\n\r\n    report\r\n}\r\n\r\n/// Build a [`DecisionPreview`] from a scenario input and proposed final word.\r\n///\r\n/// Moved from `src/sandbox/pipeline.rs` — this is anchor-layer logic,\r\n/// not pipeline logic. In MVP, environmental impact is inferred\r\n/// heuristically from the scenario's `EnvironmentalContext`.\r\npub fn build_decision_preview(\r\n    scenario: \u0026crate::sandbox::ScenarioInput,\r\n    final_word: \u0026crate::core::word::TritWord,\r\n) -\u003e DecisionPreview {\r\n    let env = scenario.environmental_context.as_ref();\r\n    let expected_energy_joules = env.map(|ctx| ctx.ambient_arousal * 1e6).unwrap_or(0.0);\r\n    let expected_carbon_kg = env.map(|ctx| ctx.ambient_arousal * 1e3).unwrap_or(0.0);\r\n    let affected_population = env\r\n        .map(|ctx| (ctx.social_density * 1e6) as u64)\r\n        .filter(|\u0026p| p \u003e 0);\r\n    let irreversible_change_risk = env.map(|ctx| ctx.ambient_arousal * 0.1).unwrap_or(0.0);\r\n    let ecosystem_impact_zone = env.and_then(|ctx| {\r\n        if ctx.ambient_arousal \u003e 0.7 {\r\n            Some(crate::anchor::EcosystemZone::Atmospheric)\r\n        } else {\r\n            None\r\n        }\r\n    });\r\n\r\n    DecisionPreview {\r\n        expected_energy_joules,\r\n        expected_carbon_kg,\r\n        affected_population,\r\n        irreversible_change_risk,\r\n        ecosystem_impact_zone,\r\n        frame: final_word.frame(),\r\n        trit_value: final_word.value(),\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn empty_report_is_clean() {\r\n        let report = AnchorReport::clean();\r\n        assert!(!report.has_violations());\r\n        assert!(!report.has_abort());\r\n    }\r\n\r\n    #[test]\r\n    fn report_with_only_downgrade() {\r\n        let report = AnchorReport {\r\n            violations: vec![AnchorViolation {\r\n                anchor_name: \"test\".into(),\r\n                description: \"test\".into(),\r\n                severity: AnchorSeverity::DowngradeToHold,\r\n                actual_value: 0.5,\r\n                threshold: 0.3,\r\n            }],\r\n            overall_severity: Some(AnchorSeverity::DowngradeToHold),\r\n        };\r\n        assert!(report.has_violations());\r\n        assert!(!report.has_abort());\r\n        assert!(report.should_downgrade_to_hold());\r\n    }\r\n\r\n    #[test]\r\n    fn report_with_abort() {\r\n        let report = AnchorReport {\r\n            violations: vec![AnchorViolation {\r\n                anchor_name: \"thermal\".into(),\r\n                description: \"OLR exceeded\".into(),\r\n                severity: AnchorSeverity::Abort,\r\n                actual_value: 3.0,\r\n                threshold: 2.5,\r\n            }],\r\n            overall_severity: Some(AnchorSeverity::Abort),\r\n        };\r\n        assert!(report.has_violations());\r\n        assert!(report.has_abort());\r\n        assert!(!report.should_downgrade_to_hold());\r\n    }\r\n\r\n    #[test]\r\n    fn static_source_returns_constant() {\r\n        let source = StaticSource::new(42.0, Duration::from_secs(1));\r\n        assert_eq!(source.sample().unwrap(), 42.0);\r\n        assert_eq!(source.sample().unwrap(), 42.0);\r\n    }\r\n\r\n    #[test]\r\n    fn decision_preview_neutral_is_safe() {\r\n        let preview = DecisionPreview::neutral();\r\n        assert_eq!(preview.expected_energy_joules, 0.0);\r\n        assert_eq!(preview.expected_carbon_kg, 0.0);\r\n        assert_eq!(preview.irreversible_change_risk, 0.0);\r\n        assert_eq!(preview.trit_value, TritValue::Hold);\r\n    }\r\n\r\n    #[test]\r\n    fn check_all_runs_all_constraints() {\r\n        struct PassConstraint;\r\n        impl AnchorConstraint for PassConstraint {\r\n            fn name(\u0026self) -\u003e \u0026'static str {\r\n                \"pass\"\r\n            }\r\n            fn severity(\u0026self) -\u003e AnchorSeverity {\r\n                AnchorSeverity::DowngradeToHold\r\n            }\r\n            fn check(\u0026self, _d: \u0026DecisionPreview) -\u003e Option\u003cAnchorViolation\u003e {\r\n                None\r\n            }\r\n        }\r\n\r\n        struct FailConstraint;\r\n        impl AnchorCons y are constants of the architecture.\n//! They represent the irreducible set of survival-level needs that must\n//! be satisfied before any non-survival consideration.\n//!\n//! Weights are in [0.0, 1.0] and never change at runtime.\n\nuse crate::anchor::{AnchorConstraint, AnchorSeverity, AnchorViolation, DecisionPreview};\n\n/// The five survival motive dimensions.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\npub enum SurvivalDimension {\n    Hunger,\n    Thirst,\n    PhysicalSafety,\n    ThermalSafety,\n    Belonging,\n}\n\n/// Immutable weight matrix for survival motives.\n#[derive(Debug, Clone)]\npub struct SurvivalMotiveWeights {\n    pub hunger: f64,\n    pub thirst: f64,\n    pub physical_safety: f64,\n    pub thermal_safety: f64,\n    pub belonging: f64,\n}\n\nimpl Default for SurvivalMotiveWeights {\n    fn default() -\u003e Self {\n        SurvivalMotiveWeights {\n            hunger: 0.95,\n            thirst: 0.98,\n            physical_safety: 0.97,\n            thermal_safety: 0.93,\n            belonging: 0.85,\n        }\n    }\n}\n\n/// Survival motives anchor.\n///\n/// This anchor is special: it does not inspect DecisionPreview\n/// but rather acts as a constant weight reference. Its `check` always\n/// passes; the weights are queried by other system components.\npub struct SurvivalMotives {\n    pub weights: SurvivalMotiveWeights,\n}\n\nimpl SurvivalMotives {\n    pub fn new() -\u003e Self {\n        SurvivalMotives {\n            weights: SurvivalMotiveWeights::default(),\n        }\n    }\n\n    /// Get the weight for a specific survival dimension.\n    pub fn weight(\u0026self, dim: SurvivalDimension) -\u003e f64 {\n        match dim {\n            SurvivalDimension::Hunger =\u003e self.weights.hunger,\n            SurvivalDimension::Thirst =\u003e self.weights.thirst,\n            SurvivalDimension::PhysicalSafety =\u003e self.weights.physical_safety,\n            SurvivalDimension::ThermalSafety =\u003e self.weights.thermal_safety,\n            SurvivalDimension::Belonging =\u003e self.weights.belonging,\n        }\n    }\n\n    /// Returns true if any survival motive weight is below 0.5\n    /// (indicating a likely configuration error).\n    pub fn is_valid(\u0026self) -\u003e bool {\n        self.weights.hunger \u003e= 0.5\n            \u0026\u0026 self.weights.thirst \u003e= 0.5\n            \u0026\u0026 self.weights.physical_safety \u003e= 0.5\n            \u0026\u0026 self.weights.thermal_safety \u003e= 0.5\n            \u0026\u0026 self.weights.belonging \u003e= 0.5\n    }\n}\n\nimpl Default for SurvivalMotives {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl AnchorConstraint for SurvivalMotives {\n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"survival_motives\"\n    }\n\n    fn severity(\u0026self) -\u003e AnchorSeverity {\n        AnchorSeverity::Abort\n    }\n\n    fn check(\u0026self, _decision: \u0026DecisionPreview) -\u003e Option\u003cAnchorViolation\u003e {\n        // Survival motives do not inspect decisions directly.\n        // They provide constant weight references. If the weights\n        // are invalid (a configuration error), we flag it.\n        if !self.is_valid() {\n            return Some(AnchorViolation {\n                anchor_name: self.name().to_string(),\n                description: \"Survival motive weights have been tampered with\".to_string(),\n                severity: AnchorSeverity::Abort,\n                actual_value: 0.0,\n                threshold: 0.5,\n            });\n        }\n        None\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn default_weights_are_valid() {\n        let motives = SurvivalMotives::new();\n        assert!(motives.is_valid());\n    }\n\n    #[test]\n    fn weight_ordering_is_correct() {\n        let motives = SurvivalMotives::new();\n        // Thirst \u003e Physical Safety \u003e Hunger \u003e Thermal Safety \u003e Belonging\n        assert!(motives.weights.thirst \u003e motives.weights.physical_safety);\n        assert!(motives.weights.physical_safety \u003e motives.weights.hunger);\n        assert!(motives.weights.hunger \u003e motives.weights.thermal_safety);\n        assert!(motives.weights.thermal_safety \u003e motives.weights.belonging);\n    }\n\n    #[test]\n    fn anchor_check_always_passes_for_valid_weights() {\n        let motives = SurvivalMotives::new();\n        assert!(motives.check(\u0026DecisionPreview::neutral()).is_none());\n    }\n}\n","traces":[{"line":32,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":53,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":55,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":60,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":66,"address":[],"length":0,"stats":{"Line":0}},{"line":72,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":73,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":74,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":75,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":76,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":77,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":92,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":0}},{"line":96,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":100,"address":[],"length":0,"st e anchor constraint.\npub struct ThermalBaseline {\n    config: ThermalBaselineConfig,\n    /// Source of OLR anomaly data (W/m2 deviation from mean).\n    olr_source: Box\u003cdyn DataSource\u003cf64\u003e\u003e,\n    /// Source of CO2 equivalent concentration (ppm).\n    co2_source: Box\u003cdyn DataSource\u003cf64\u003e\u003e,\n    /// Source of energy imbalance data (W/m2 net flux).\n    imbalance_source: Box\u003cdyn DataSource\u003cf64\u003e\u003e,\n}\n\nimpl ThermalBaseline {\n    /// Create a thermal baseline with static data sources (MVP).\n    pub fn with_static_values(\n        olr_anomaly: f64,\n        co2_ppm: f64,\n        energy_imbalance: f64,\n        config: ThermalBaselineConfig,\n    ) -\u003e Self {\n        ThermalBaseline {\n            config,\n            olr_source: Box::new(StaticSource::new(olr_anomaly, Duration::from_secs(3600))),\n            co2_source: Box::new(StaticSource::new(co2_ppm, Duration::from_secs(3600))),\n            imbalance_source: Box::new(StaticSource::new(\n                energy_imbalance,\n                Duration::from_secs(3600),\n            )),\n        }\n    }\n\n    /// Create with safe (within-bounds) default values.\n    pub fn safe() -\u003e Self {\n        Self::with_static_values(0.0, 415.0, 0.5, ThermalBaselineConfig::default())\n    }\n\n    /// Create with values that trigger Abort (for testing).\n    pub fn exceeded() -\u003e Self {\n        Self::with_static_values(3.0, 460.0, 1.5, ThermalBaselineConfig::default())\n    }\n}\n\nimpl AnchorConstraint for ThermalBaseline {\n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"thermal_baseline\"\n    }\n\n    fn severity(\u0026self) -\u003e AnchorSeverity {\n        AnchorSeverity::Abort\n    }\n\n    fn check(\u0026self, _decision: \u0026DecisionPreview) -\u003e Option\u003cAnchorViolation\u003e {\n        // Check OLR anomaly\n        if let Ok(olr) = self.olr_source.sample() {\n            if olr.abs() \u003e self.config.olr_anomaly_max {\n                return Some(AnchorViolation {\n                    anchor_name: self.name().to_string(),\n                    description: format!(\n                        \"OLR anomaly {:.1} W/m2 exceeds threshold {:.1} W/m2\",\n                        olr.abs(),\n                        self.config.olr_anomaly_max\n                    ),\n                    severity: self.severity(),\n                    actual_value: olr.abs(),\n                    threshold: self.config.olr_anomaly_max,\n                });\n            }\n        }\n\n        // Check CO2\n        if let Ok(co2) = self.co2_source.sample() {\n            if co2 \u003e self.config.co2_ceiling_ppm {\n                return Some(AnchorViolation {\n                    anchor_name: self.name().to_string(),\n                    description: format!(\n                        \"CO2 equivalent {:.0} ppm exceeds ceiling {:.0} ppm\",\n                        co2, self.config.co2_ceiling_ppm\n                    ),\n                    severity: self.severity(),\n                    actual_value: co2,\n                    threshold: self.config.co2_ceiling_ppm,\n                });\n            }\n        }\n\n        // Check energy imbalance\n        if let Ok(imbalance) = self.imbalance_source.sample() {\n            if imbalance.abs() \u003e self.config.energy_imbalance_max {\n                return Some(AnchorViolation {\n                    anchor_name: self.name().to_string(),\n                    description: format!(\n                        \"Energy imbalance {:.1} W/m2 exceeds threshold {:.1} W/m2\",\n                        imbalance.abs(),\n                        self.config.energy_imbalance_max\n                    ),\n                    severity: self.severity(),\n                    actual_value: imbalance.abs(),\n                    threshold: self.config.energy_imbalance_max,\n                });\n            }\n        }\n\n        None\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn safe_baseline_passes() {\n        let baseline = ThermalBaseline::safe();\n        let result = baseline.check(\u0026DecisionPreview::neutral());\n        assert!(result.is_none());\n    }\n\n    #[test]\n    fn exceeded_baseline_fails() {\n        let baseline = ThermalBaseline::exceeded();\n        let result = baseline.check(\u0026DecisionPreview::neutral());\n        assert!(result.is_some());\n        assert_eq!(result.unwrap().severity, AnchorSeverity::Abort);\n    }\n}\n","traces":[{"line":32,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":55,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":63,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":64,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":65,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":73,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":74,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":78,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":79,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":84,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":85,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":88,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":89,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":92,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":94,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":95,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":96,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":97,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":98,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":99,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":100,"address":[],"l  life weighting\n//! - Irreversible damage red lines\n\nuse crate::anchor::{AnchorConstraint, AnchorSeverity, AnchorViolation, DecisionPreview};\n\n/// Wellbeing priority configuration.\n#[derive(Debug, Clone)]\npub struct WellbeingPriorityConfig {\n    /// Intergenerational discount factor.\n    /// 1.0 = future lives valued equally to present lives.\n    /// Must be \u003e= 0.95 (future lives cannot be discounted below 95% of present).\n    pub intergenerational_discount: f64,\n    /// Non-human sentient life weight relative to human life.\n    /// Must be \u003e= 0.3 in trade-off calculations.\n    pub non_human_life_weight: f64,\n    /// Irreversible damage probability threshold.\n    /// Any action with expected irreversible ecosystem damage\n    /// probability \u003e this threshold is rejected.\n    pub irreversible_damage_threshold: f64,\n}\n\nimpl Default for WellbeingPriorityConfig {\n    fn default() -\u003e Self {\n        WellbeingPriorityConfig {\n            intergenerational_discount: 0.95,\n            non_human_life_weight: 0.3,\n            irreversible_damage_threshold: 0.01,\n        }\n    }\n}\n\n/// Wellbeing priority anchor.\npub struct WellbeingPriority {\n    config: WellbeingPriorityConfig,\n}\n\nimpl WellbeingPriority {\n    pub fn new() -\u003e Self {\n        WellbeingPriority {\n            config: WellbeingPriorityConfig::default(),\n        }\n    }\n\n    pub fn with_config(config: WellbeingPriorityConfig) -\u003e Self {\n        WellbeingPriority { config }\n    }\n}\n\nimpl Default for WellbeingPriority {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl AnchorConstraint for WellbeingPriority {\n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"wellbeing_priority\"\n    }\n\n    fn severity(\u0026self) -\u003e AnchorSeverity {\n        AnchorSeverity::Abort\n    }\n\n    fn check(\u0026self, decision: \u0026DecisionPreview) -\u003e Option\u003cAnchorViolation\u003e {\n        // Check irreversible damage risk\n        if decision.irreversible_change_risk \u003e self.config.irreversible_damage_threshold {\n            return Some(AnchorViolation {\n                anchor_name: self.name().to_string(),\n                description: format!(\n                    \"Irreversible change risk {:.4} exceeds threshold {:.4}\",\n                    decision.irreversible_change_risk, self.config.irreversible_damage_threshold\n                ),\n                severity: self.severity(),\n                actual_value: decision.irreversible_change_risk,\n                threshold: self.config.irreversible_damage_threshold,\n            });\n        }\n\n        // Check intergenerational discount is not violated\n        if self.config.intergenerational_discount \u003c 0.95 {\n            return Some(AnchorViolation {\n                anchor_name: self.name().to_string(),\n                description: format!(\n                    \"Intergenerational discount {:.2} below minimum 0.95\",\n                    self.config.intergenerational_discount\n                ),\n                severity: self.severity(),\n                actual_value: self.config.intergenerational_discount,\n                threshold: 0.95,\n            });\n        }\n\n        None\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn safe_decision_passes() {\n        let priority = WellbeingPriority::new();\n        let preview = DecisionPreview {\n            irreversible_change_risk: 0.001,\n            ..DecisionPreview::neutral()\n        };\n        assert!(priority.check(\u0026preview).is_none());\n    }\n\n    #[test]\n    fn high_irreversible_risk_fails() {\n        let priority = WellbeingPriority::new();\n        let preview = DecisionPreview {\n            irreversible_change_risk: 0.05,\n            ..DecisionPreview::neutral()\n        };\n        let violation = priority.check(\u0026preview);\n        assert!(violation.is_some());\n        assert_eq!(violation.unwrap().severity, AnchorSeverity::Abort);\n    }\n\n    #[test]\n    fn low_discount_factor_fails() {\n        let config = WellbeingPriorityConfig {\n            intergenerational_discount: 0.80,\n            ..Default::default()\n        };\n        let priority = WellbeingPriority::with_config(config);\n        let violation = priority.check(\u0026DecisionPreview::neutral());\n        assert!(violation.is_some());\n    }\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":42,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":44,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":48,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":61,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":64,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":65,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":68,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":70,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":71,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":72,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":73,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":74,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":75,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":77,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":78,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":79,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":84,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":85,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":86,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":87,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":88,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":89,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":91,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":92,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":93,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":97,"address":[],"length":0,"stats":{"Line":144115188075855872}}],"covered":28,"coverable":30},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","attention","mod.rs"],"content":"//! Attention scheduling layer: decide when to shift, hold, or recalibrate.\n//!\n//! This module provides [`AttentionScheduler`], which monitors recent\n//! signal patterns and cognitive load to suggest attention commands.\n\npub mod scheduler;\n\npub use scheduler::{\n    bandwidth_from_depth, AttentionCmd, AttentionScheduler, LoadProfile, ShiftTarget,\n};\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","attention","scheduler.rs"],"content":"//! Attention scheduling: engineering the \"stop and turn\" of mind.\r\n//!\r\n//! The scheduler observes recent signal patterns and suggests when the\r\n//! system should shift focus, hold current processing, or recalibrate its\r\n//! internal weights. It is a lightweight, heuristic layer intended to\r\n//! interrupt loop entrainment and ruminative cascades.\r\n//!\r\n//! ## Adaptive scheduling (v0.3.0)\r\n//!\r\n//! Bandwidth is now a function of [`DepthLevel`](crate::budget::DepthLevel)\r\n//! rather than a static value. High system load → low bandwidth → fewer\r\n//! attention shifts. Idle → high bandwidth → more active attention management.\r\n//!\r\n//! Consecutive `HoldCurrent` suggestions are tracked: after N consecutive\r\n//! holds (default 3), the scheduler escalates to `Recalibrate`.\r\n\r\nuse serde::{Deserialize, Serialize};\r\n\r\nuse crate::budget::{ComputeBudget, DepthLevel};\r\nuse crate::core::frame::Frame;\r\nuse crate::core::word::TritWord;\r\n\r\n/// Current distribution of task types being processed.\r\n#[derive(Debug, Clone, Copy, PartialEq, Default, Deserialize, Serialize)]\r\npub struct LoadProfile {\r\n    /// Fraction of cognitive resources spent on reactive processing.\r\n    pub reactive: f64,\r\n    /// Fraction of cognitive resources spent on deliberative processing.\r\n    pub deliberative: f64,\r\n    /// Fraction of cognitive resources spent on reflective processing.\r\n    pub reflective: f64,\r\n}\r\n\r\nimpl LoadProfile {\r\n    /// Create a balanced load profile.\r\n    pub fn balanced() -\u003e Self {\r\n        Self {\r\n            reactive: 1.0 / 3.0,\r\n            deliberative: 1.0 / 3.0,\r\n            reflective: 1.0 / 3.0,\r\n        }\r\n    }\r\n\r\n    /// Return true if any single load fraction exceeds 0.7.\r\n    pub fn is_overloaded(\u0026self) -\u003e bool {\r\n        self.reactive \u003e 0.7 || self.deliberative \u003e 0.7 || self.reflective \u003e 0.7\r\n    }\r\n}\r\n\r\n/// Target of an attention shift.\r\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\r\npub enum ShiftTarget {\r\n    /// Shift attention to body-state signals.\r\n    Body,\r\n    /// Shift attention to environmental signals.\r\n    Environment,\r\n    /// Shift attention to the current conflict trace.\r\n    ConflictTrace,\r\n    /// Shift attention to the meta/decision layer.\r\n    Meta,\r\n    /// Shift to a named frame.\r\n    Frame(Frame),\r\n    /// Shift to a named custom target.\r\n    Label(String),\r\n}\r\n\r\n/// Command produced by the attention scheduler.\r\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\r\npub enum AttentionCmd {\r\n    /// Shift attention to the given target.\r\n    ShiftTo(ShiftTarget),\r\n    /// Pause current processing.\r\n    HoldCurrent,\r\n    /// Recalibrate internal weights.\r\n    Recalibrate,\r\n    /// No change needed.\r\n    Continue,\r\n}\r\n\r\n/// Map [`DepthLevel`] to a bandwidth value in `[0.0, 1.0]`.\r\n///\r\n/// | DepthLevel | bandwidth |\r\n/// |-----------|-----------|\r\n/// | Minimal   | 0.2       |\r\n/// | Reduced   | 0.4       |\r\n/// | Standard  | 0.6       |\r\n/// | Deep      | 0.8       |\r\n/// | Exhaustive| 1.0       |\r\npub fn bandwidth_from_depth(depth: DepthLevel) -\u003e f64 {\r\n    match depth {\r\n        DepthLevel::Minimal =\u003e 0.2,\r\n        DepthLevel::Reduced =\u003e 0.4,\r\n        DepthLevel::Standard =\u003e 0.6,\r\n        DepthLevel::Deep =\u003e 0.8,\r\n        DepthLevel::Exhaustive =\u003e 1.0,\r\n    }\r\n}\r\n\r\n/// Attention scheduler that monitors signal patterns and cognitive load.\r\n///\r\n/// Bandwidth is dynamically derived from the current [`ComputeBudget`]'s\r\n/// [`DepthLevel`] rather than being a static value. The scheduler also\r\n/// tracks consecutive `HoldCurrent` suggestions and escalates to\r\n/// `Recalibrate` when the threshold is reached.\r\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\r\npub struct AttentionScheduler {\r\n    /// Estimated current cognitive bandwidth in `[0.0, 1.0]`.\r\n    /// Derived from the current [`DepthLevel`] via [`bandwidth_from_depth`].\r\n    pub bandwidth: f64,\r\n    /// Current load profile across reactive/deliberative/reflective modes.\r\n    pub load_profile: LoadProfile,\r\n    /// Number of consecutive `HoldCurrent` suggestions.\r\n    /// Reset to 0 on any non-HoldCurrent command.\r\n    consecutive_holds: usize,\r\n    /// Threshold for consecutive holds before escalating to Recalibrate.\r\n    hold_escalation_threshold: usize,\r\n}\r\n\r\nimpl AttentionScheduler {\r\n    /// Create a scheduler with the given bandwidth and a balanced load profile.\r\n    pub fn new(bandwidth: f64) -\u003e Self {\r\n        Self {\r\n            bandwidth: bandwidth.clamp(0.0, 1.0),\r\n            load_profile: LoadProfile::balanced(),\r\n            consecutive_holds: 0,\r\n            hold_escalation_threshold: 3,\r\n        }\r\n    }\r\n\r\n    /// Create a scheduler whose bandwidth is derived from a [`DepthLevel`].\r\n    pub fn from_depth(depth: DepthLevel) -\u003e Self {\r\n        Self::new(bandwidth_from_depth(depth))\r\n    }\r\n\r\n    /// Create a scheduler whose bandwidth is derived from a [`ComputeBudget`].\r\n    pub fn from_budget(budget: \u0026ComputeBudget) -\u003e Self {\r\n        Self::from_depth(budget.depth_level)\r\n    }\r\n\r\n    /// Create a scheduler from a cognitive-state estimate.\r\n    pub fn from_cognitive_state(attention_bandwidth: f64, cognitive_load: f64) -\u003e Self {\r\n        let bandwidth = (attention_bandwidth - cognitive_load).clamp(0.0, 1.0);\r\n        Self::new(bandwidth)\r\n    }\r\n\r\n    /// Update the load profile.\r\n    pub fn with_load_profile(mut self, profile: LoadProfile) -\u003e Self {\r\n        self.load_profile = profile;\r\n        self\r\n    }\r\n\r\n    /// Set the consecutive hold escalation threshold.\r\n    pub fn with_hold_escalation_threshold(mut self, threshold: usize) -\u003e Self {\r\n        self.hold_escalation_threshold = threshold;\r\n        self\r\n    }\r\n\r\n    /// Update bandwidth from the current compute budget.\r\n    pub fn update_bandwidth(\u0026mut self, budget: \u0026ComputeBudget) {\r\n        self.bandwidth = bandwidth_from_depth(budget.depth_level);\r\n    }\r\n\r\n    /// Detect loop entrainment: a repetitive alternation among a small set\r\n    /// of frames in the recent signal window.\r\n    ///\r\n    /// Returns true if fewer than 3 distinct frames appear in at least 6\r\n    /// recent signals, or if the same frame appears more than 4 times.\r\n    pub fn detect_loop_entrainment(\u0026self, recent_signals: \u0026[TritWord]) -\u003e bool {\r\n        if recent_signals.len() \u003c 4 {\r\n            return false;\r\n        }\r\n        let window = \u0026recent_signals[recent_signals.len().saturating_sub(6)..];\r\n        let mut counts: std::collections::HashMap\u003cFrame, usize\u003e = std::collections::HashMap::new();\r\n        for word in window {\r\n            *counts.entry(word.frame()).or_insert(0) += 1;\r\n        }\r\n        if counts.len() \u003c 3 \u0026\u0026 window.len() \u003e= 6 {\r\n            return true;\r\n        }\r\n        counts.values().any(|\u0026c| c \u003e 4)\r\n    }\r\n\r\n    /// Suggest a reprioritization based on bandwidth, load, and optional\r\n    /// recent signal history.\r\n    ///\r\n    /// When depth is Minimal (bandwidth \u003c= 0.2), always returns\r\n    /// `Continue` — there is no time for attention shifts.\r\n    ///\r\n    /// Consecutive `HoldCurrent` suggestions are tracked: after\r\n    /// `hold_escalation_threshold` consecutive holds, escalates to\r\n    /// `Recalibrate`.\r\n    pub fn suggest_reprioritization(\u0026mut self, recent_signals: \u0026[TritWord]) -\u003e AttentionCmd {\r\n        // Depth gating: at Minimal depth, hold current processing.\r\n        // The pipeline should gate whether to call the scheduler at all\r\n        // (via depth_level.has_extensions()), but if called at Minimal\r\n        // depth, the safest command is HoldCurrent.\r\n        if self.bandwidth \u003c= 0.2 {\r\n            return self.track_hold(AttentionCmd::HoldCurrent);\r\n        }\r\n\r\n        if self.detect_loop_entrainment(recent_signals) {\r\n            self.consecutive_holds = 0;\r\n            return AttentionCmd::ShiftTo(ShiftTarget::ConflictTrace);\r\n        }\r\n\r\n        if self.bandwidth \u003c 0.2 {\r\n            return self.track_hold(AttentionCmd::HoldCurrent);\r\n        }\r\n\r\n        if self.load_profile.is_overloaded() {\r\n            self.consecutive_holds = 0;\r\n            return AttentionCmd::Recalibrate;\r\n        }\r\n\r\n        // If the most recent signal is from an embodied frame and bandwidth\r\n        // is moderate, suggest returning attention to the body.\r\n        if let Some(last) = recent_signals.last() {\r\n            if last.frame() == Frame::Embodied \u0026\u0026 self.bandwidth \u003c 0.5 {\r\n                self.consecutive_holds = 0;\r\n                return AttentionCmd::ShiftTo(ShiftTarget::Body);\r\n            }\r\n        }\r\n\r\n        self.consecutive_holds = 0;\r\n        AttentionCmd::Continue\r\n    }\r\n\r\n    /// Suggest a reprioritization with an explicit compute budget.\r\n    ///\r\n    /// This is the preferred entry point for pipeline integration.\r\n    /// It updates bandwidth from the budget before evaluating.\r\n    pub fn suggest_with_budget(\r\n        \u0026mut self,\r\n        budget: \u0026ComputeBudget,\r\n        recent_signals: \u0026[TritWord],\r\n    ) -\u003e AttentionCmd {\r\n        self.update_bandwidth(budget);\r\n        self.suggest_reprioritization(recent_signals)\r\n    }\r\n\r\n    /// Track a HoldCurrent command. If consecutive holds exceed the\r\n    /// escalation threshold, escalate to Recalibrate.\r\n    fn track_hold(\u0026mut self, cmd: AttentionCmd) -\u003e AttentionCmd {\r\n        if cmd == AttentionCmd::HoldCurrent {\r\n            self.consecutive_holds += 1;\r\n            if self.consecutive_holds \u003e= self.hold_escalation_threshold {\r\n                self.consecutive_holds = 0;\r\n                return AttentionCmd::Recalibrate;\r\n            }\r\n        } else {\r\n            self.consecutive_holds = 0;\r\n        }\r\n        cmd\r\n    }\r\n\r\n    /// Returns the number of consecutive HoldCurrent suggestions seen.\r\n    pub fn consecutive_holds(\u0026self) -\u003e usize {\r\n        self.consecutive_holds\r\n    }\r\n}\r\n\r\nimpl Default for AttentionScheduler {\r\n    fn default() -\u003e Self {\r\n        Self::new(0.5)\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::core::phase::Phase;\r\n    use crate::core::value::TritValue;\r\n\r\n    fn word(frame: Frame, value: TritValue) -\u003e TritWord {\r\n        TritWord::new(value, Phase::neutral(), frame)\r\n    }\r\n\r\n    // ── bandwidth_from_depth ──────────────────────────────────────\r\n\r\n    #[test]\r\n    fn bandwidth_from_depth_maps_correctly() {\r\n        assert_float_eq!(bandwidth_from_depth(DepthLevel::Minimal), 0.2);\r\n        assert_float_eq!(bandwidth_from_depth(DepthLevel::Reduced), 0.4);\r\n        assert_float_eq!(bandwidth_from_depth(DepthLevel::Standard), 0.6);\r\n        assert_float_eq!(bandwidth_from_depth(DepthLevel::Deep), 0.8);\r\n        assert_float_eq!(bandwidth_from_depth(DepthLevel::Exhaustive), 1.0);\r\n    }\r\n\r\n    #[test]\r\n    fn from_depth_uses_correct_bandwidth() {\r\n        let scheduler = AttentionScheduler::from_depth(DepthLevel::Deep);\r\n        assert_float_eq!(scheduler.bandwidth, 0.8);\r\n    }\r\n\r\n    #[test]\r\n    fn from_budget_uses_correct_bandwidth() {\r\n        let budget = ComputeBudget::new(DepthLevel::Reduced, 0.6, 0.5, 4);\r\n        let scheduler = AttentionScheduler::from_budget(\u0026budget);\r\n        assert_float_eq!(scheduler.bandwidth, 0.4);\r\n    }\r\n\r\n    // ── depth gating ──────────────────────────────────────────────\r\n\r\n    #[test]\r\n    fn depth_below_standard_always_continues() {\r\n        // Minimal depth → HoldCurrent (not Continue).\r\n        // The pipeline gates attention at the stage level.\r\n        let mut scheduler = AttentionScheduler::from_depth(DepthLevel::Minimal);\r\n        let signals = vec![word(Frame::Science, TritValue::True)];\r\n        let cmd = scheduler.suggest_reprioritization(\u0026signals);\r\n        assert_eq!(cmd, AttentionCmd::HoldCurrent);\r\n    }\r\n\r\n    #[test]\r\n    fn depth_reduced_still_runs_attention() {\r\n        // Reduced (0.4) is above the Minimal gate (0.2), so attention runs.\r\n        let mut scheduler = AttentionScheduler::from_depth(DepthLevel::Reduced);\r\n        // With bandwidth 0.4 and an Embodied signal, should suggest Body shift\r\n        let signals = vec![word(Frame::Embodied, TritValue::True)];\r\n        let cmd = scheduler.suggest_reprioritization(\u0026signals);\r\n        assert_eq!(cmd, AttentionCmd::ShiftTo(ShiftTarget::Body));\r\n    }\r\n\r\n    // ── legacy tests (adapted for \u0026mut self) ──────────────────────\r\n\r\n    #[test]\r\n    fn low_bandwidth_suggests_hold() {\r\n        let mut scheduler = AttentionScheduler::new(0.1);\r\n        let cmd = scheduler.suggest_reprioritization(\u0026[]);\r\n        // bandwidth 0.1 \u003c= 0.2 → depth gate → HoldCurrent\r\n        assert_eq!(cmd, AttentionCmd::HoldCurrent);\r\n    }\r\n\r\n    #[test]\r\n    fn loop_entrainment_detected() {\r\n        let mut scheduler = AttentionScheduler::new(0.6);\r\n        let signals: Vec\u003c_\u003e = (0..6)\r\n            .map(|i| {\r\n                if i % 2 == 0 {\r\n                    word(Frame::Science, TritValue::True)\r\n                } else {\r\n                    word(Frame::Individual, TritValue::False)\r\n                }\r\n            })\r\n            .collect();\r\n        assert!(scheduler.detect_loop_entrainment(\u0026signals));\r\n        assert!(matches!(\r\n            scheduler.suggest_reprioritization(\u0026signals),\r\n            AttentionCmd::ShiftTo(ShiftTarget::ConflictTrace)\r\n        ));\r\n    }\r\n\r\n    #[test]\r\n    fn overloaded_load_suggests_recalibrate() {\r\n        let mut scheduler = AttentionScheduler::new(0.6).with_load_profile(LoadProfile {\r\n            reactive: 0.8,\r\n            deliberative: 0.1,\r\n            reflective: 0.1,\r\n        });\r\n        assert!(matches!(\r\n            scheduler.suggest_reprioritization(\u0026[]),\r\n            AttentionCmd::Recalibrate\r\n        ));\r\n    }\r\n\r\n    #[test]\r\n    fn embodied_signal_suggests_body_shift_when_low_bandwidth() {\r\n        let mut scheduler = AttentionScheduler::new(0.4);\r\n        let signals = vec![word(Frame::Embodied, TritValue::True)];\r\n        assert!(matches!(\r\n            scheduler.suggest_reprioritization(\u0026signals),\r\n            AttentionCmd::ShiftTo(ShiftTarget::Body)\r\n        ));\r\n    }\r\n\r\n    // ── consecutive hold escalation ───────────────────────────────\r\n\r\n    #[test]\r\n    fn consecutive_holds_escalates_to_recalibrate() {\r\n        // bandwidth 0.19 \u003c= 0.2 → depth gate → HoldCurrent.\r\n        // After 3 consecutive HoldCurrent, escalates to Recalibrate.\r\n        let mut scheduler = AttentionScheduler::new(0.19);\r\n        assert_eq!(\r\n            scheduler.suggest_reprioritization(\u0026[]),\r\n            AttentionCmd::HoldCurrent\r\n        );\r\n        assert_eq!(\r\n            scheduler.suggest_reprioritization(\u0026[]),\r\n            AttentionCmd::HoldCurrent\r\n        );\r\n        // 3rd call: escalation threshold reached → Recalibrate\r\n        assert_eq!(\r\n            scheduler.suggest_reprioritization(\u0026[]),\r\n            AttentionCmd::Recalibrate\r\n        );\r\n        assert_eq!(scheduler.consecutive_holds(), 0);\r\n    }\r\n\r\n    #[test]\r\n    fn hold_counter_resets_on_non_hold() {\r\n        let mut scheduler = AttentionScheduler::new(0.19);\r\n        // bandwidth 0.19 \u003c= 0.2 → depth gate returns HoldCurrent\r\n        // Two holds\r\n        assert_eq!(\r\n            scheduler.suggest_reprioritization(\u0026[]),\r\n            AttentionCmd::HoldCurrent\r\n        );\r\n        assert_eq!(\r\n            scheduler.suggest_reprioritization(\u0026[]),\r\n            AttentionCmd::HoldCurrent\r\n        );\r\n        assert_eq!(scheduler.consecutive_holds(), 2);\r\n        // Then a non-hold (loop entrainment) resets\r\n        let signals: Vec\u003c_\u003e = (0..6)\r\n            .map(|i| {\r\n                if i % 2 == 0 {\r\n                    word(Frame::Science, TritValue::True)\r\n                } else {\r\n                    word(Frame::Individual, TritValue::False)\r\n                }\r\n            })\r\n            .collect();\r\n        scheduler.suggest_reprioritization(\u0026signals);\r\n        assert_eq!(scheduler.consecutive_holds(), 0);\r\n    }\r\n\r\n    #[test]\r\n    fn suggest_with_budget_updates_bandwidth() {\r\n        let mut scheduler = AttentionScheduler::new(0.5);\r\n        let budget = ComputeBudget::new(DepthLevel::Deep, 0.1, 0.2, 8);\r\n        let _ = scheduler.suggest_with_budget(\u0026budget, \u0026[]);\r\n        assert_float_eq!(scheduler.bandwidth, 0.8);\r\n    }\r\n\r\n    #[test]\r\n    fn update_bandwidth_syncs_from_budget() {\r\n        let mut scheduler = AttentionScheduler::new(0.5);\r\n        let budget = ComputeBudget::new(DepthLevel::Exhaustive, 0.0, 0.0, 16);\r\n        scheduler.update_bandwidth(\u0026budget);\r\n        assert_float_eq!(scheduler.bandwidth, 1.0);\r\n    }\r\n}\r\n","traces":[{"line":36,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":38,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":39,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":40,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":45,"address":[],"length":0,"stats":{"Line":288230376151711747}},{"line":46,"address":[],"length":0,"stats":{"Line":720575940379279369}},{"line":89,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":90,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":91,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":92,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":93,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":94,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":95,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":121,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":123,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":124,"address":[],"length":0,"stats":{"Lin ":62,"coverable":73},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","baseline","mod.rs"],"content":"// Binary baseline comparator for M2 validation.\n// Implements simple majority-rule logic (no Hold state) to demonstrate\n// where binary systems fail to preserve conflicts that Trit-Core detects.\n\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\n\n#[cfg(test)]\nuse crate::core::frame::Frame;\n\n/// Result of a binary baseline evaluation.\n#[derive(Debug, Clone, PartialEq)]\npub struct BinaryResult {\n    /// The collapsed binary value (True or False, never Hold).\n    pub value: TritValue,\n    /// Whether the binary result conflicts with the ternary result.\n    pub conflicts_with_ternary: bool,\n    /// Explanation of the binary decision logic.\n    pub reasoning: String,\n}\n\n/// Binary baseline comparator using simple majority voting.\n///\n/// Unlike Trit-Core's ternary logic which preserves Hold states when\n/// domains conflict, the binary baseline always collapses to True or False.\npub struct BinaryBaseline;\n\nimpl BinaryBaseline {\n    /// Evaluate a set of signals using binary majority rule.\n    ///\n    /// Counts True vs False votes. Hold signals are treated as abstentions\n    /// (not counted). In case of a tie, defaults to False (conservative).\n    pub fn evaluate(signals: \u0026[TritWord]) -\u003e BinaryResult {\n        let trues: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::True)\n            .count();\n        let falses: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::False)\n            .count();\n        let holds: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::Hold)\n            .count();\n\n        let value = if trues \u003e falses {\n            TritValue::True\n        } else {\n            TritValue::False // tie goes to False (conservative)\n        };\n\n        let reasoning = format!(\n            \"Binary majority: {} True, {} False, {} Hold (abstained). {} wins.\",\n            trues,\n            falses,\n            holds,\n            if value == TritValue::True {\n                \"True\"\n            } else {\n                \"False\"\n            }\n        );\n\n        BinaryResult {\n            value,\n            conflicts_with_ternary: false, // set by caller\n            reasoning,\n        }\n    }\n\n    /// Compare binary baseline against ternary (Trit-Core) result.\n    /// Returns true if the binary result would have \"smoothed\" or \"overridden\"\n    /// a conflict that the ternary system correctly identified.\n    pub fn compare(ternary: \u0026TritWord, binary: \u0026BinaryResult) -\u003e BinaryResult {\n        let conflicts = ternary.value() == TritValue::Hold\n            || (ternary.value() != binary.value \u0026\u0026 ternary.value() != TritValue::Hold);\n\n        BinaryResult {\n            value: binary.value,\n            conflicts_with_ternary: conflicts,\n            reasoning: if conflicts {\n                format!(\n                    \"{} [CONFLICT: ternary={:?}, binary would override]\",\n                    binary.reasoning,\n                    ternary.value()\n                )\n            } else {\n                format!(\n                    \"{} [AGREE: ternary={:?}]\",\n                    binary.reasoning,\n                    ternary.value()\n                )\n            },\n        }\n    }\n\n    /// Check if a set of signals has cross-frame conflicts that binary\n    /// would ignore but ternary would detect.\n    pub fn has_hidden_conflict(signals: \u0026[TritWord]) -\u003e bool {\n        if signals.is_empty() {\n            return false;\n        }\n        let first_frame = signals[0].frame();\n        signals.iter().any(|t| t.frame() != first_frame)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn binary_majority_true_wins() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::True);\n    }\n\n    #[test]\n    fn binary_majority_false_wins() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn binary_tie_defaults_false() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn binary_ignores_cross_frame_conflict() {\n        // Binary doesn't care about frame mismatches\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        // Tie (1 True, 1 False) → False\n        assert_eq!(result.value, TritValue::False);\n        // But there IS a hidden cross-frame conflict\n        assert!(BinaryBaseline::has_hidden_conflict(\u0026signals));\n    }\n\n    #[test]\n    fn binary_vs_ternary_conflict_detected() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let binary = BinaryBaseline::evaluate(\u0026signals);\n        let ternary = TritWord::hold(Frame::Meta);\n        let comparison = BinaryBaseline::compare(\u0026ternary, \u0026binary);\n        assert!(comparison.conflicts_with_ternary);\n    }\n\n    #[test]\n    fn binary_all_hold_defaults_false() {\n        let signals = vec![\n            TritWord::hold(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n        assert!(result.reasoning.contains(\"0 True, 0 False\"));\n    }\n\n    #[test]\n    fn binary_ignores_unknown() {\n        // Unknown values are not counted as True, False, or Hold.\n        let signals = vec![\n            TritWord::unknown(Frame::Science),\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        // Tie (1 True, 1 False) → False\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn compare_agrees_when_values_match() {\n        let binary = BinaryBaseline::evaluate(\u0026[TritWord::tru(Frame::Science)]);\n        let ternary = TritWord::tru(Frame::Science);\n        let comparison = BinaryBaseline::compare(\u0026ternary, \u0026binary);\n        assert!(!comparison.conflicts_with_ternary);\n        assert!(comparison.reasoning.contains(\"AGREE\"));\n    }\n\n    #[test]\n    fn empty_signals_have_no_hidden_conflict() {\n        assert!(!BinaryBaseline::has_hidden_conflict(\u0026[]));\n    }\n\n    #[test]\n    fn single_signal_has_no_hidden_conflict() {\n        let signals = vec![TritWord::tru(Frame::Science)];\n        assert!(!BinaryBaseline::has_hidden_conflict(\u0026signals));\n    }\n\n    #[test]\n    fn reasoning_includes_counts() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert!(result.reasoning.contains(\"1 True\"));\n        assert!(result.reasoning.contains(\"0 False\"));\n        assert!(result.reasoning.contains(\"1 Hold\"));\n    }\n}\n","traces":[{"line":33,"address":[],"le
