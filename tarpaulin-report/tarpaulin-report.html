. trust, reciprocity, role).\n    Relational,\n}\n\nimpl std::fmt::Display for Frame {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            Frame::Science =\u003e write!(f, \"Science\"),\n            Frame::Individual =\u003e write!(f, \"Individual\"),\n            Frame::Consensus =\u003e write!(f, \"Consensus\"),\n            Frame::Absolute =\u003e write!(f, \"Absolute\"),\n            Frame::Meta =\u003e write!(f, \"Meta\"),\n            Frame::FirstPerson =\u003e write!(f, \"FirstPerson\"),\n            Frame::Embodied =\u003e write!(f, \"Embodied\"),\n            Frame::Relational =\u003e write!(f, \"Relational\"),\n        }\n    }\n}\n\nimpl FromStr for Frame {\n    type Err = FrameError;\n\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\n        match s {\n            \"Science\" =\u003e Ok(Frame::Science),\n            \"Individual\" =\u003e Ok(Frame::Individual),\n            \"Consensus\" =\u003e Ok(Frame::Consensus),\n            \"Absolute\" =\u003e Ok(Frame::Absolute),\n            \"Meta\" =\u003e Ok(Frame::Meta),\n            \"FirstPerson\" =\u003e Ok(Frame::FirstPerson),\n            \"Embodied\" =\u003e Ok(Frame::Embodied),\n            \"Relational\" =\u003e Ok(Frame::Relational),\n            unknown =\u003e Err(FrameError::Unknown(unknown.to_string())),\n        }\n    }\n}\n\n/// Error returned when a string cannot be parsed as a [`Frame`].\n#[derive(Debug, Clone, PartialEq, thiserror::Error)]\npub enum FrameError {\n    #[error(\"Unknown frame: '{0}'\")]\n    Unknown(String),\n}\n\n/// Registry of active frames in a computation session.\n#[derive(Debug, Clone, Default)]\npub struct FrameRegistry {\n    frames: Vec\u003cFrame\u003e,\n}\n\nimpl FrameRegistry {\n    pub fn new() -\u003e Self {\n        Self { frames: vec![] }\n    }\n\n    pub fn register(\u0026mut self, frame: Frame) {\n        if !self.frames.contains(\u0026frame) {\n            self.frames.push(frame);\n        }\n    }\n\n    pub fn is_registered(\u0026self, frame: \u0026Frame) -\u003e bool {\n        self.frames.contains(frame)\n    }\n\n    pub fn iter(\u0026self) -\u003e impl Iterator\u003cItem = \u0026Frame\u003e {\n        self.frames.iter()\n    }\n\n    /// Register all frames found in a slice of TritWords.\n    pub fn register_from_words(\u0026mut self, words: \u0026[crate::core::word::TritWord]) {\n        for word in words {\n            self.register(word.frame());\n        }\n    }\n\n    /// Validate that all frames in the given words are registered.\n    /// Returns the first unregistered frame found, or Ok(()) if all are registered.\n    pub fn validate_all(\u0026self, words: \u0026[crate::core::word::TritWord]) -\u003e Result\u003c(), Frame\u003e {\n        for word in words {\n            if !self.is_registered(\u0026word.frame()) {\n                return Err(word.frame());\n            }\n        }\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn should_parse_science_from_str() {\n        assert_eq!(Frame::from_str(\"Science\").unwrap(), Frame::Science);\n    }\n\n    #[test]\n    fn should_parse_all_known_frames() {\n        for (input, expected) in [\n            (\"Science\", Frame::Science),\n            (\"Individual\", Frame::Individual),\n            (\"Consensus\", Frame::Consensus),\n            (\"Absolute\", Frame::Absolute),\n            (\"Meta\", Frame::Meta),\n            (\"FirstPerson\", Frame::FirstPerson),\n            (\"Embodied\", Frame::Embodied),\n            (\"Relational\", Frame::Relational),\n        ] {\n            assert_eq!(Frame::from_str(input).unwrap(), expected);\n        }\n    }\n\n    #[test]\n    fn should_reject_unknown_frame() {\n        assert!(Frame::from_str(\"Unknown\").is_err());\n        assert!(Frame::from_str(\"\").is_err());\n    }\n\n    #[test]\n    fn should_display_frame_as_string() {\n        assert_eq!(format!(\"{}\", Frame::Science), \"Science\");\n        assert_eq!(format!(\"{}\", Frame::Individual), \"Individual\");\n    }\n\n    #[test]\n    fn registry_should_track_unique_frames() {\n        let mut reg = FrameRegistry::new();\n        reg.register(Frame::Science);\n        reg.register(Frame::Science); // duplicate\n        reg.register(Frame::Individual);\n        assert!(reg.is_registered(\u0026Frame::Science));\n        assert!(reg.is_registered(\u0026Frame::Individual));\n        assert!(!reg.is_registered(\u0026Frame::Consensus));\n    }\n\n    #[test]\n    fn registry_should_start_empty() {\n        let reg = FrameRegistry::new();\n        assert!(!reg.is_registered(\u0026Frame::Science));\n    }\n\n    #[test]\n    fn registry_iter_yields_registered_frames() {\n        let mut reg = FrameRegistry::new();\n        reg.register(Frame::Science);\n        reg.register(Frame::Individual);\n        let collected: Vec\u003c_\u003e = reg.iter().cloned().collect();\n        assert_eq!(collected.len(), 2);\n        assert!(collected.contains(\u0026Frame::Science));\n        assert!(collected.contains(\u0026Frame::Individual));\n    }\n\n    #[test]\n    fn default_registry_is_empty() {\n        let reg: FrameRegistry = Default::default();\n        assert!(!reg.is_registered(\u0026Frame::Meta));\n    }\n\n    #[test]\n    fn parsing_is_case_sensitive() {\n        assert!(Frame::from_str(\"science\").is_err());\n        assert!(Frame::from_str(\"SCIENCE\").is_err());\n    }\n\n    #[test]\n    fn frame_error_display_is_informative() {\n        let err = Frame::from_str(\"Bogus\").unwrap_err();\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"Bogus\"));\n        assert!(msg.contains(\"Unknown frame\"));\n    }\n\n    #[test]\n    fn display_covers_all_variants() {\n        assert_eq!(format!(\"{}\", Frame::Science), \"Science\");\n        assert_eq!(format!(\"{}\", Frame::Individual), \"Individual\");\n        assert_eq!(format!(\"{}\", Frame::Consensus), \"Consensus\");\n        assert_eq!(format!(\"{}\", Frame::Absolute), \"Absolute\");\n        assert_eq!(format!(\"{}\", Frame::Meta), \"Meta\");\n        assert_eq!(format!(\"{}\", Frame::FirstPerson), \"FirstPerson\");\n        assert_eq!(format!(\"{}\", Frame::Embodied), \"Embodied\");\n        assert_eq!(format!(\"{}\", Frame::Relational), \"Relational\");\n    }\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":22,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":23,"address":[],"length":0,"stats":{"Line":16285016252571713536}},{"line":24,"address":[],"length":0,"stats":{"Line":11961560610296037376}},{"line":25,"address":[],"length":0,"stats":{"Line":6341068275337658366}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":3746994889972252670}},{"line":35,"address":[],"length":0,"stats":{"Line":12826251738751172608}},{"line":36,"address":[],"length":0,"stats":{"Line":12826251738751172608}},{"line":37,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":38,"address":[],"length":0,"stats":{"Line":10736581511651262464}},{"line":39,"address":[],"length":0,"stats":{"Line":5404319552844595200}},{"line":40,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":41,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":42,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":61,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":62,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":65,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":66,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":67,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":71,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":72,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":75,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":76,"address":[],"length":0,"stats":{"Line":72057594037927936}}],"covered":23,"coverable":24},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","mod.rs"],"content":"//! Core ternary algebra layer.\n//!\n//! This module contains the foundational types of Trit-Core:\n//! - [`TritValue`]: the four discrete ternary states.\n//! - [`Phase`]: continuous tendency in `[0.0, 1.0]`.\n//! - [`Frame`]: decision domain / reference frame.\n//! - [`TritWord`]: composite ternary word with enforced invariants.\n//! - [`TernaryAlgebra`]: `t_and`, `t_or`, `t_not`, and hot-path variants.\n\npub mod algebra;\npub mod frame;\npub mod hold;\npub mod phase;\npub mod sensor;\npub mod value;\npub mod word;\n\npub use algebra::TernaryAlgebra;\npub use frame::{Frame, FrameError, FrameRegistry};\npub use hold::{HoldFinality, HoldState, HolderConfig};\npub use phase::{Commitment, Phase, PhaseError};\npub use sensor::{\n    BodyState, CogState, EnvSnapshot, EnvironmentalContext, SensorSignal, TemporalScale, TextInput,\n};\npub use value::TritValue;\npub use word::{Trit, TritWord, WordError};\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","phase.rs"],"content":"use thiserror::Error;\r\n\r\n/// Phase: continuous tendency `0.0..1.0`.\r\n/// `0.5` = perfectly neutral.\r\n/// `\u003e 0.5` = tendency toward True.\r\n/// `\u003c 0.5` = tendency toward False.\r\n///\r\n/// # Invariant\r\n///\r\n/// The wrapped `f64` is always finite and within `[0.0, 1.0]`.\r\n/// Use [`Phase::new`] for strict construction, or [`Phase::new_clamped`]\r\n/// when the caller explicitly wants silent clamping.\r\n#[derive(Clone, Copy, Debug, PartialEq)]\r\npub struct Phase(f64);\r\n\r\nimpl Phase {\r\n    pub const NEUTRAL: f64 = 0.5;\r\n    pub const FULL_TRUE: f64 = 1.0;\r\n    pub const FULL_FALSE: f64 = 0.0;\r\n\r\n    /// Constant neutral phase (0.5).\r\n    pub const fn neutral() -\u003e Self {\r\n        Phase(0.5)\r\n    }\r\n\r\n    /// Constant full-true phase (1.0).\r\n    pub const fn full_true() -\u003e Self {\r\n        Phase(1.0)\r\n    }\r\n\r\n    /// Constant full-false phase (0.0).\r\n    pub const fn full_false() -\u003e Self {\r\n        Phase(0.0)\r\n    }\r\n\r\n    /// Strict constructor: returns `Err` for NaN, infinite, or out-of-range values.\r\n    ///\r\n    /// This is the default way to create a `Phase` in library code, because\r\n    /// invalid phase values usually indicate a programming or input error that\r\n    /// should not be silently hidden.\r\n    pub fn new(v: f64) -\u003e Result\u003cSelf, PhaseError\u003e {\r\n        if v.is_nan() || v.is_infinite() {\r\n            return Err(PhaseError::NotFinite(v));\r\n        }\r\n        if !(0.0..=1.0).contains(\u0026v) {\r\n            return Err(PhaseError::OutOfRange(v));\r\n        }\r\n        Ok(Phase(v))\r\n    }\r\n\r\n    /// Clamping constructor: silently clamps out-of-range values to `[0.0, 1.0]`\r\n    /// and maps NaN/Infinity to `NEUTRAL` (0.5).\r\n    ///\r\n    /// Logs a warning at the tracing layer when clamping occurs.\r\n    /// Prefer [`Phase::new`] unless you explicitly need graceful degradation\r\n    /// for external, untrusted inputs.\r\n    pub fn new_clamped(v: f64) -\u003e Self {\r\n        if v.is_nan() || v.is_infinite() {\r\n            tracing::warn!(value = %v, \"Phase is NaN/Inf, clamping to NEUTRAL (0.5)\");\r\n            return Phase(0.5);\r\n        }\r\n        if !(0.0..=1.0).contains(\u0026v) {\r\n            let clamped = v.clamp(0.0, 1.0);\r\n            tracing::warn!(original = %v, clamped = %clamped, \"Phase out of range, clamped\");\r\n            return Phase(clamped);\r\n        }\r\n        Phase(v)\r\n    }\r\n\r\n    /// Unwrap the underlying finite, in-range `f64`.\r\n    pub fn inner(self) -\u003e f64 {\r\n        self.0\r\n    }\r\n\r\n    /// Arithmetic mean of two phases, auto-quantized to prevent drift.\r\n    pub fn mean(a: Phase, b: Phase) -\u003e Phase {\r\n        // Both values are already validated, so the mean is always valid.\r\n        Phase::new_clamped((a.0 + b.0) / 2.0).quantize(1e-6)\r\n    }\r\n\r\n    /// Complement: 1.0 - phase, auto-quantized.\r\n    pub fn complement(self) -\u003e Phase {\r\n        Phase::new_clamped(1.0 - self.0).quantize(1e-6)\r\n    }\r\n\r\n    /// Quantize to standard values (0.0, 0.5, 1.0) when within epsilon distance.\r\n    /// This prevents phase drift over long cascades where 0.50000001 and\r\n    /// 0.49999999 would be semantically different despite both meaning \"neutral\".\r\n    ///\r\n    /// Anchors are checked in order: 0.5 first (most common), then 0.0, then 1.0.\r\n    ///\r\n    /// If `epsilon` is not a positive finite number, the phase is returned\r\n    /// unchanged. This prevents accidental no-op or nonsensical behavior from\r\n    /// invalid epsilon inputs.\r\n    pub fn quantize(self, epsilon: f64) -\u003e Phase {\r\n        if !epsilon.is_finite() || epsilon \u003c= 0.0 {\r\n            return self;\r\n        }\r\n        let v = self.0;\r\n        if (v - 0.5).abs() \u003c epsilon {\r\n            Phase(0.5)\r\n        } else if v \u003c epsilon {\r\n            Phase(0.0)\r\n        } else if (1.0 - v).abs() \u003c epsilon {\r\n            Phase(1.0)\r\n        } else {\r\n            self\r\n        }\r\n    }\r\n\r\n    /// Determine commitment direction.\r\n    ///\r\n    /// Uses the same epsilon as `quantize` (1e-6) for consistency:\r\n    /// a value that `quantize` considers neutral will also be\r\n    /// classified as `Neutral` by `commitment`.\r\n    pub fn commitment(self) -\u003e Commitment {\r\n        let epsilon = 1e-6;\r\n        if self.0 \u003e 0.5 + epsilon {\r\n            Commitment::TowardTrue\r\n        } else if self.0 \u003c 0.5 - epsilon {\r\n            Commitment::TowardFalse\r\n        } else {\r\n            Commitment::Neutral\r\n        }\r\n    }\r\n}\r\n\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\r\npub enum Commitment {\r\n    TowardTrue,\r\n    TowardFalse,\r\n    Neutral,\r\n}\r\n\r\n/// Error type for strict Phase construction.\r\n#[derive(Debug, Clone, Copy, PartialEq, Error)]\r\npub enum PhaseError {\r\n    #[error(\"Phase must be finite, got: {0}\")]\r\n    NotFinite(f64),\r\n    #[error(\"Phase must be in [0.0, 1.0], got: {0}\")]\r\n    OutOfRange(f64),\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    /// Test helper: create a Phase from a valid f64, panicking on invalid input.\r\n    /// Reduces `Phase::new(x).unwrap()` boilerplate in tests.\r\n    fn p(v: f64) -\u003e Phase {\r\n        Phase::new(v).expect(\"test phase value must be valid\")\r\n    }\r\n\r\n    #[test]\r\n    fn new_rejects_nan() {\r\n        assert!(Phase::new(f64::NAN).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn new_rejects_inf() {\r\n        assert!(Phase::new(f64::INFINITY).is_err());\r\n        assert!(Phase::new(f64::NEG_INFINITY).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn new_rejects_out_of_range() {\r\n        assert!(Phase::new(1.5).is_err());\r\n        assert!(Phase::new(-0.1).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn new_accepts_valid() {\r\n        assert!(Phase::new(0.0).is_ok());\r\n        assert!(Phase::new(0.5).is_ok());\r\n        assert!(Phase::new(1.0).is_ok());\r\n        assert!(Phase::new(0.73).is_ok());\r\n    }\r\n\r\n    #[test]\r\n    fn new_clamped_maps_nan_to_neutral() {\r\n        assert_eq!(Phase::new_clamped(f64::NAN).inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn new_clamped_clamps_out_of_range() {\r\n        assert_eq!(Phase::new_clamped(1.5).inner(), 1.0);\r\n        assert_eq!(Phase::new_clamped(-0.1).inner(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_snaps_near_neutral() {\r\n        let phase = p(0.5000000001);\r\n        let q = phase.quantize(1e-6);\r\n        assert_float_eq!(q.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_snaps_near_zero() {\r\n        let phase = p(0.0000000001);\r\n        let q = phase.quantize(1e-6);\r\n        assert_float_eq!(q.inner(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_snaps_near_one() {\r\n        let phase = p(0.9999999999);\r\n        let q = phase.quantize(1e-6);\r\n        assert_float_eq!(q.inner(), 1.0);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_preserves_normal_value() {\r\n        let phase = p(0.73);\r\n        let q = phase.quantize(1e-6);\r\n        assert_float_eq!(q.inner(), 0.73);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_neutral_priority_over_extremes() {\r\n        // 0.50000001 is closer to 0.5 than 1.0 but we anchor 0.5 first\r\n        let phase = p(0.50000001);\r\n        let q = phase.quantize(1e-3);\r\n        assert_float_eq!(q.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn mean_auto_quantizes() {\r\n        let a = p(0.3);\r\n        let b = p(0.7);\r\n        let m = Phase::mean(a, b);\r\n        // 0.3 + 0.7 = 1.0 / 2 = 0.5 exactly → should be 0.5\r\n        assert_float_eq!(m.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn complement_auto_quantizes() {\r\n        let phase = p(0.5);\r\n        let c = phase.complement();\r\n        // 1.0 - 0.5 = 0.5 → should be 0.5\r\n        assert_float_eq!(c.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_neutral_at_0_5() {\r\n        assert_eq!(p(0.5).commitment(), Commitment::Neutral);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_neutral_near_0_5_within_epsilon() {\r\n        // 0.5 + 5e-7 is within the 1e-6 epsilon → Neutral\r\n        assert_eq!(p(0.5000005).commitment(), Commitment::Neutral);\r\n        assert_eq!(p(0.4999995).commitment(), Commitment::Neutral);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_toward_true_beyond_epsilon() {\r\n        assert_eq!(p(0.500002).commitment(), Commitment::TowardTrue);\r\n        assert_eq!(p(0.8).commitment(), Commitment::TowardTrue);\r\n        assert_eq!(p(1.0).commitment(), Commitment::TowardTrue);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_toward_false_beyond_epsilon() {\r\n        assert_eq!(p(0.499998).commitment(), Commitment::TowardFalse);\r\n        assert_eq!(p(0.2).commitment(), Commitment::TowardFalse);\r\n        assert_eq!(p(0.0).commitment(), Commitment::TowardFalse);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_consistent_with_quantize() {\r\n        // A value quantized to neutral must also be commitment-neutral\r\n        let phase = p(0.5000001).quantize(1e-6);\r\n        assert_float_eq!(phase.inner(), 0.5);\r\n        assert_eq!(phase.commitment(), Commitment::Neutral);\r\n    }\r\n\r\n    #[test]\r\n    fn constants_match_expected_values() {\r\n        assert_eq!(Phase::neutral().inner(), 0.5);\r\n        assert_eq!(Phase::full_true().inner(), 1.0);\r\n        assert_eq!(Phase::full_false().inner(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn new_clamped_maps_infinity_to_neutral() {\r\n        assert_eq!(Phase::new_clamped(f64::INFINITY).inner(), 0.5);\r\n        assert_eq!(Phase::new_clamped(f64::NEG_INFINITY).inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_rejects_invalid_epsilon() {\r\n        let phase = p(0.5000001);\r\n        // Negative, zero, or non-finite epsilon should leave the phase unchanged.\r\n        assert_float_eq!(phase.quantize(-1e-6).inner(), 0.5000001);\r\n        assert_float_eq!(phase.quantize(0.0).inner(), 0.5000001);\r\n        assert_float_eq!(phase.quantize(f64::NAN).inner(), 0.5000001);\r\n        assert_float_eq!(phase.quantize(f64::INFINITY).inner(), 0.5000001);\r\n    }\r\n\r\n    #[test]\r\n    fn mean_of_extremes_is_neutral() {\r\n        let a = Phase::full_false();\r\n        let b = Phase::full_true();\r\n        let m = Phase::mean(a, b);\r\n        assert_float_eq!(m.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn complement_of_extremes() {\r\n        assert_float_eq!(Phase::full_true().complement().inner(), 0.0);\r\n        assert_float_eq!(Phase::full_false().complement().inner(), 1.0);\r\n        assert_float_eq!(Phase::neutral().complement().inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn inner_returns_wrapped_value() {\r\n        let phase = p(0.42);\r\n        assert_eq!(phase.inner(), 0.42);\r\n    }\r\n}\r\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":9079256848778919948}},{"line":23,"address":[],"length":0,"stats":{"Line":9079256848778919948}},{"line":27,"address":[],"length":0,"stats":{"Line":5044031582654955520}},{"line":28,"address":[],"length":0,"stats":{"Line":5044031582654955520}},{"line":32,"address":[],"length":0,"stats":{"Line":2954361355555045378}},{"line":33,"address":[],"length":0,"stats":{"Line":2954361355555045378}},{"line":41,"address":[],"length":0,"stats":{"Line":2305843009213694042}},{"line":42,"address":[],"length":0,"stats":{"Line":8502796096475496808}},{"line":43,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":45,"address":[],"length":0,"stats":{"Line":3746994889972252852}},{"line":46,"address":[],"length":0,"stats":{"Line":9511602413006487642}},{"line":48,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":57,"address":[],"length":0,"stats":{"Line":5332261958806667263}},{"line":58,"address":[],"length":0,"stats":{"Line":2305843009213693948}},{"line":59,"address":[],"length":0,"stats":{"Line":432345564227567708}},{"line":60,"address":[],"length":0,"stats":{"Line":432345564227567708}},{"line":62,"address":[],"length":0,"stats":{"Line":9799832789158199294}},{"line":63,"address":[],"length":0,"stats":{"Line":432345564227567613}},{"line":64,"address":[],"length":0,"stats":{"Line":144115188075855871}},{"line":65,"address":[],"length":0,"stats":{"Line":144115188075855871}},{"line":67,"address":[],"length":0,"stats":{"Line":4755801206503243775}},{"line":71,"address":[],"length":0,"stats":{"Line":10592466323575406604}},{"line":72,"address":[],"length":0,"stats":{"Line":10592466323575406604}},{"line":76,"address":[],"length":0,"stats":{"Line":5044031582654955520}},{"line":78,"address":[],"length":0,"stats":{"Line":15132094747964866560}},{"line":82,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":83,"address":[],"length":0,"stats":{"Line":4107282860161892352}},{"line":95,"address":[],"length":0,"stats":{"Line":7133701809754865668}},{"line":96,"address":[],"length":0,"stats":{"Line":14123288431433875474}},{"line":97,"address":[],"length":0,"stats":{"Line":288230376151711748}},{"line":99,"address":[],"length":0,"stats":{"Line":13690942867206307840}},{"line":100,"address":[],"length":0,"stats":{"Line":13690942867206307840}},{"line":101,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":102,"address":[],"length":0,"stats":{"Line":5476377146882523136}},{"line":103,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":104,"address":[],"length":0,"stats":{"Line":10376293541461622784}},{"line":105,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":107,"address":[],"length":0,"stats":{"Line":4899916394579099648}},{"line":116,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":117,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":118,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":119,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":120,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":121,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":123,"address":[],"length":0,"stats":{"Line":576460752303423488}}],"covered":45,"coverable":45},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","value.rs"],"content":"/// Ternary logic value: the four discrete states of a TritWord.\n///\n/// Three computable states (`True`, `Hold`, `False`) form the core\n/// ternary logic (MVL-3). A fourth state (`Unknown`) represents\n/// out-of-distribution / unknowable inputs that the system cannot\n/// compute on — semantically distinct from `Hold` (chosen suspension\n/// of judgment) and used only for input-gating and safety fallback.\n///\n/// | State     | Ternary role     | Meaning                        |\n/// |-----------|------------------|--------------------------------|\n/// | `True`    | +1               | Affirmative                    |\n/// | `Hold`    | 0 (neutral)      | Suspended judgment (deliberate)|\n/// | `False`   | -1               | Negative                       |\n/// | `Unknown` | ⊥ (not in MVL-3) | Out-of-distribution, unknowable|\nuse serde::{Deserialize, Serialize};\n\n#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash, Default, Deserialize, Serialize)]\npub enum TritValue {\n    True, // +1\n    #[default]\n    Hold, // 0 — undetermined / suspended\n    False, // -1\n    Unknown, // ⊥ — out-of-distribution / unknowable, distinct from Hold\n}\n\nimpl TritValue {\n    /// Internal discriminant for LUT indexing.\n    /// LLVM optimizes this to a single register load.\n    #[inline]\n    const fn disc(self) -\u003e usize {\n        match self {\n            TritValue::True =\u003e 0,\n            TritValue::Hold =\u003e 1,\n            TritValue::False =\u003e 2,\n            TritValue::Unknown =\u003e 3,\n        }\n    }\n\n    /// Branchless negation via lookup table.\n    const NEGATE_LUT: [TritValue; 4] = [\n        TritValue::False,   // True → False\n        TritValue::Hold,    // Hold → Hold\n        TritValue::True,    // False → True\n        TritValue::Unknown, // Unknown → Unknown\n    ];\n\n    /// Branchless to_i8 via lookup table.\n    const TO_I8_LUT: [i8; 4] = [1, 0, -1, 0];\n\n    /// Branchless discriminant LUT.\n    const DISC_LUT: [u8; 4] = [0, 1, 2, 3];\n\n    /// Flip true/false; Hold and Unknown remain unchanged.\n    #[inline]\n    pub fn negate(self) -\u003e Self {\n        Self::NEGATE_LUT[self.disc()]\n    }\n\n    /// Convert to signed integer for arithmetic use.\n    /// Unknown maps to 0 (same as Hold) for arithmetic compatibility.\n    #[inline]\n    pub fn to_i8(self) -\u003e i8 {\n        Self::TO_I8_LUT[self.disc()]\n    }\n\n    /// Returns true if this value is computable (not Unknown).\n    #[inline]\n    pub fn is_computable(self) -\u003e bool {\n        self != TritValue::Unknown\n    }\n\n    /// Returns a unique numeric discriminant for all four states:\n    /// True→0, Hold→1, False→2, Unknown→3.\n    /// Unlike `to_i8()`, this preserves the Hold/Unknown distinction.\n    #[inline]\n    pub fn discriminant(self) -\u003e u8 {\n        Self::DISC_LUT[self.disc()]\n    }\n}\n\nimpl From\u003ci8\u003e for TritValue {\n    /// Convert i8 to TritValue. Unknown cannot be created from i8 —\n    /// use `TritValue::Unknown` directly when the input is out-of-distribution.\n    fn from(v: i8) -\u003e Self {\n        match v {\n            1 =\u003e TritValue::True,\n            -1 =\u003e TritValue::False,\n            _ =\u003e TritValue::Hold,\n        }\n    }\n}\n\nimpl TritValue {\n    /// Strict conversion from i8: only accepts -1, 0, 1.\n    /// Unlike `From\u003ci8\u003e`, this rejects out-of-range values instead of\n    /// silently collapsing to Hold.\n    pub fn from_i8_strict(v: i8) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        match v {\n            1 =\u003e Ok(TritValue::True),\n            0 =\u003e Ok(TritValue::Hold),\n            -1 =\u003e Ok(TritValue::False),\n            _ =\u003e Err(\"TritValue can only be created from -1, 0, or 1\"),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn should_convert_true_to_i8_positive_one() {\n        assert_eq!(TritValue::True.to_i8(), 1);\n    }\n\n    #[test]\n    fn should_convert_hold_to_i8_zero() {\n        assert_eq!(TritValue::Hold.to_i8(), 0);\n    }\n\n    #[test]\n    fn should_convert_false_to_i8_negative_one() {\n        assert_eq!(TritValue::False.to_i8(), -1);\n    }\n\n    #[test]\n    fn should_create_from_i8_positive_one() {\n        assert_eq!(TritValue::from(1), TritValue::True);\n    }\n\n    #[test]\n    fn should_create_from_i8_negative_one() {\n        assert_eq!(TritValue::from(-1), TritValue::False);\n    }\n\n    #[test]\n    fn should_create_hold_from_any_other_i8() {\n        assert_eq!(TritValue::from(0), TritValue::Hold);\n        assert_eq!(TritValue::from(2), TritValue::Hold);\n        assert_eq!(TritValue::from(-2), TritValue::Hold);\n    }\n\n    #[test]\n    fn negate_should_flip_true_to_false() {\n        assert_eq!(TritValue::True.negate(), TritValue::False);\n    }\n\n    #[test]\n    fn negate_should_flip_false_to_true() {\n        assert_eq!(TritValue::False.negate(), TritValue::True);\n    }\n\n    #[test]\n    fn negate_should_keep_hold() {\n        assert_eq!(TritValue::Hold.negate(), TritValue::Hold);\n    }\n\n    #[test]\n    fn default_should_be_hold() {\n        assert_eq!(TritValue::default(), TritValue::Hold);\n    }\n\n    #[test]\n    fn unknown_is_not_hold() {\n        assert_ne!(TritValue::Unknown, TritValue::Hold);\n    }\n\n    #[test]\n    fn unknown_is_not_computable() {\n        assert!(!TritValue::Unknown.is_computable());\n    }\n\n    #[test]\n    fn true_is_computable() {\n        assert!(TritValue::True.is_computable());\n    }\n\n    #[test]\n    fn hold_is_computable() {\n        // Hold means \"undecided\" but still computable — the system CAN decide, it just hasn't\n        assert!(TritValue::Hold.is_computable());\n    }\n\n    #[test]\n    fn unknown_to_i8_is_zero() {\n        assert_eq!(TritValue::Unknown.to_i8(), 0);\n    }\n\n    #[test]\n    fn negate_keeps_unknown() {\n        assert_eq!(TritValue::Unknown.negate(), TritValue::Unknown);\n    }\n\n    #[test]\n    fn unknown_cannot_be_created_from_i8() {\n        // From\u003ci8\u003e never produces Unknown — you must use it directly\n        for v in -10..=10 {\n            assert_ne!(TritValue::from(v), TritValue::Unknown);\n        }\n    }\n\n    #[test]\n    fn from_i8_strict_rejects_out_of_range() {\n        assert!(TritValue::from_i8_strict(2).is_err());\n        assert!(TritValue::from_i8_strict(-2).is_err());\n        assert!(TritValue::from_i8_strict(127).is_err());\n    }\n\n    #[test]\n    fn from_i8_strict_accepts_valid() {\n        assert_eq!(TritValue::from_i8_strict(1).unwrap(), TritValue::True);\n        assert_eq!(TritValue::from_i8_strict(0).unwrap(), TritValue::Hold);\n        assert_eq!(TritValue::from_i8_strict(-1).unwrap(), TritValue::False);\n    }\n\n    #[test]\n    fn from_i8_strict_error_message() {\n        let err = TritValue::from_i8_strict(2).unwrap_err();\n        assert!(err.contains(\"-1, 0, or 1\"));\n    }\n\n    #[test]\n    fn false_is_computable() {\n        assert!(TritValue::False.is_computable());\n    }\n\n    #[test]\n    fn debug_format_contains_variant_name() {\n        let s = format!(\"{:?}\", TritValue::Hold);\n        assert!(s.contains(\"Hold\"));\n    }\n\n    #[test]\n    fn discriminant_distinguishes_all_four_states() {\n        assert_eq!(TritValue::True.discriminant(), 0);\n        assert_eq!(TritValue::Hold.discriminant(), 1);\n        assert_eq!(TritValue::False.discriminant(), 2);\n        assert_eq!(TritValue::Unknown.discriminant(), 3);\n    }\n\n    #[test]\n    fn discriminant_preserves_hold_unknown_distinction() {\n        // to_i8() conflates Hold and Unknown (both → 0)\n        // discriminant() must preserve the distinction\n        assert_eq!(TritValue::Hold.to_i8(), 0);\n        assert_eq!(TritValue::Unknown.to_i8(), 0);\n        assert_ne!(\n            TritValue::Hold.discriminant(),\n            TritValue::Unknown.discriminant()\n        );\n    }\n}\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":10016005571271983104}},{"line":29,"address":[],"length":0,"stats":{"Line":10016005571271983104}},{"line":30,"address":[],"length":0,"stats":{"Line":10232178353385766911}},{"line":31,"address":[],"length":0,"stats":{"Line":158526706883441459  + out-of-distribution {Unknown}\n/// - `phase`: continuous tendency 0.0..1.0 (0.5 = neutral)\n/// - `frame`: the decision domain / context this trit belongs to\n///\n/// # Invariants\n///\n/// - `phase` is always finite and within `[0.0, 1.0]`.\n/// - If `frame == Frame::Absolute`, then `value == TritValue::Hold` and\n///   `phase == Phase(0.5)`.\n///\n/// These invariants are enforced by the constructors. Use the `with_*`\n/// methods to transform a word while preserving invariants.\n#[derive(Clone, Copy, Debug, PartialEq)]\npub struct TritWord {\n    value: TritValue,\n    phase: Phase,\n    frame: Frame,\n}\n\n/// Error type for [`TritWord`] construction and transformation.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum WordError {\n    #[error(\"invalid phase: {0}\")]\n    Phase(#[from] PhaseError),\n    #[error(\"invalid frame: {0}\")]\n    Frame(#[from] FrameError),\n    #[error(\"Frame::Absolute requires TritValue::Hold and Phase(0.5)\")]\n    AbsoluteInvariant,\n}\n\nimpl TritWord {\n    /// Construct a `TritWord` from already-validated components.\n    ///\n    /// # Panics\n    ///\n    /// Panics in debug builds if the `Frame::Absolute` invariant is violated.\n    /// In release builds this is a best-effort assertion; prefer\n    /// [`TritWord::try_new`] when constructing from untrusted `f64` input.\n    pub fn new(value: TritValue, phase: Phase, frame: Frame) -\u003e Self {\n        let word = Self {\n            value,\n            phase,\n            frame,\n        };\n        debug_assert!(\n            word.invariant_holds(),\n            \"TritWord invariant violated: Absolute frame must be Hold + neutral phase\"\n        );\n        word\n    }\n\n    /// Construct a `TritWord` from raw `f64` phase, validating everything.\n    pub fn try_new(value: TritValue, phase: f64, frame: \u0026str) -\u003e Result\u003cSelf, WordError\u003e {\n        let frame = frame.parse::\u003cFrame\u003e()?;\n        let phase = Phase::new(phase)?;\n        Self::from_parts(value, phase, frame)\n    }\n\n    /// Construct from validated parts, enforcing the Absolute invariant.\n    pub fn from_parts(value: TritValue, phase: Phase, frame: Frame) -\u003e Result\u003cSelf, WordError\u003e {\n        let word = Self {\n            value,\n            phase,\n            frame,\n        };\n        if !word.invariant_holds() {\n            return Err(WordError::AbsoluteInvariant);\n        }\n        Ok(word)\n    }\n\n    /// Create a neutral hold-state trit.\n    pub fn hold(frame: Frame) -\u003e Self {\n        // Hold with neutral phase is always valid.\n        Self::new(TritValue::Hold, Phase::neutral(), frame)\n    }\n\n    /// Create a fully committed true trit.\n    pub fn tru(frame: Frame) -\u003e Self {\n        Self::new(TritValue::True, Phase::full_true(), frame)\n    }\n\n    /// Create a fully committed false trit.\n    ///\n    /// Named `fals` rather than `false` to avoid collision with the Rust keyword.\n    pub fn fals(frame: Frame) -\u003e Self {\n        Self::new(TritValue::False, Phase::full_false(), frame)\n    }\n\n    /// Create an out-of-distribution trit (unknowable input).\n    pub fn unknown(frame: Frame) -\u003e Self {\n        Self::new(TritValue::Unknown, Phase::neutral(), frame)\n    }\n\n    /// Create the special `Absolute` frame word: always Hold + neutral.\n    pub fn absolute() -\u003e Self {\n        Self::new(TritValue::Hold, Phase::neutral(), Frame::Absolute)\n    }\n\n    /// Read the ternary value.\n    #[inline]\n    pub fn value(\u0026self) -\u003e TritValue {\n        self.value\n    }\n\n    /// Read the phase tendency.\n    #[inline]\n    pub fn phase(\u0026self) -\u003e Phase {\n        self.phase\n    }\n\n    /// Read the frame.\n    #[inline]\n    pub fn frame(\u0026self) -\u003e Frame {\n        self.frame\n    }\n\n    /// Return a new word with the given value, preserving frame and phase.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the new value is not `Hold`\n    /// when the frame is `Absolute`.\n    pub fn with_value(\u0026self, value: TritValue) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(value, self.phase, self.frame)\n    }\n\n    /// Return a new word with the given phase, preserving value and frame.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the frame is `Absolute` and\n    /// the phase is not neutral.\n    pub fn with_phase(\u0026self, phase: Phase) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(self.value, phase, self.frame)\n    }\n\n    /// Return a new word with the given frame, preserving value and phase.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the target frame is\n    /// `Absolute` but value/phase do not match the required Hold/neutral.\n    pub fn with_frame(\u0026self, frame: Frame) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(self.value, self.phase, frame)\n    }\n\n    /// Check whether this word's invariants hold.\n    #[inline]\n    pub fn invariant_holds(\u0026self) -\u003e bool {\n        if self.frame == Frame::Absolute {\n            self.value == TritValue::Hold \u0026\u0026 (self.phase.inner() - 0.5).abs() \u003c f64::EPSILON\n        } else {\n            true\n        }\n    }\n}\n\n/// Type alias kept for backward naming within the 0.2 refactor.\npub type Trit = TritWord;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn constructors_build_valid_words() {\n        let h = TritWord::hold(Frame::Science);\n        assert_eq!(h.value(), TritValue::Hold);\n        assert_eq!(h.frame(), Frame::Science);\n\n        let t = TritWord::tru(Frame::Individual);\n        assert_eq!(t.value(), TritValue::True);\n        assert_eq!(t.phase().inner(), 1.0);\n\n        let f = TritWord::fals(Frame::Consensus);\n        assert_eq!(f.value(), TritValue::False);\n        assert_eq!(f.phase().inner(), 0.0);\n\n        let u = TritWord::unknown(Frame::Meta);\n        assert_eq!(u.value(), TritValue::Unknown);\n    }\n\n    #[test]\n    fn absolute_factory_is_hold_neutral() {\n        let a = TritWord::absolute();\n        assert_eq!(a.value(), TritValue::Hold);\n        assert_eq!(a.phase().inner(), 0.5);\n        assert_eq!(a.frame(), Frame::Absolute);\n    }\n\n    #[test]\n    fn try_new_valid() {\n        let w = TritWord::try_new(TritValue::True, 0.8, \"Science\").unwrap();\n        assert_eq!(w.value(), TritValue::True);\n        assert_eq!(w.frame(), Frame::Science);\n    }\n\n    #[test]\n    fn try_new_rejects_bad_phase() {\n        assert!(TritWord::try_new(TritValue::True, 1.5, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, -0.1, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, f64::NAN, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, f64::INFINITY, \"Science\").is_err());\n    }\n\n    #[test]\n    fn try_new_rejects_unknown_frame() {\n        assert!(TritWord::try_new(TritValue::True, 0.5, \"Bogus\").is_err());\n        assert!(TritWord::try_new(TritValue::True, 0.5, \"\").is_err());\n    }\n\n    #[test]\n    fn new_and_accessors_roundtrip() {\n        let word = TritWord::new(\n            TritValue::Hold,\n            Phase::new(0.25).unwrap(),\n            Frame::Individual,\n        );\n        assert_eq!(word.value(), TritValue::Hold);\n        assert_eq!(word.phase().inner(), 0.25);\n        assert_eq!(word.frame(), Frame::Individual);\n    }\n\n    #[test]\n    fn from_parts_enforces_absolute_invariant() {\n        let bad = TritWord::from_parts(TritValue::True, Phase::new(0.8).unwrap(), Frame::Absolute);\n        assert!(matches!(bad, Err(WordError::AbsoluteInvariant)));\n    }\n\n    #[test]\n    fn from_parts_succeeds_for_valid_word() {\n        let word = TritWord::from_parts(TritValue::True, Phase::new(0.8).unwrap(), Frame::Science)\n            .unwrap();\n        assert_eq!(word.value(), TritValue::True);\n        assert_eq!(word.frame(), Frame::Science);\n    }\n\n    #[test]\n    fn with_value_preserves_invariant() {\n        let a = TritWord::absolute();\n        assert!(matches!(\n            a.with_value(TritValue::True),\n            Err(WordError::AbsoluteInvariant)\n        ));\n        let ok = a.with_value(TritValue::Hold).unwrap();\n        assert_eq!(ok.value(), TritValue::Hold);\n    }\n\n    #[test]\n    fn with_value_succeeds_for_non_absolute() {\n        let h = TritWord::hold(Frame::Science);\n        let t = h.with_value(TritValue::True).unwrap();\n        assert_eq!(t.value(), TritValue::True);\n        assert_eq!(t.frame(), Frame::Science);\n    }\n\n    #[test]\n    fn with_phase_preserves_invariant() {\n        let a = TritWord::absolute();\n        let bad_phase = Phase::new(0.8).unwrap();\n        assert!(matches!(\n            a.with_phase(bad_phase),\n            Err(WordError::AbsoluteInvariant)\n        ));\n    }\n\n    #[test]\n    fn with_phase_succeeds_for_non_absolute() {\n        let h = TritWord::hold(Frame::Science);\n        let p = h.with_phase(Phase::new(0.9).unwrap()).unwrap();\n        assert_eq!(p.phase().inner(), 0.9);\n    }\n\n    #[test]\n    fn with_frame_enforces_absolute_on_target() {\n        let s = TritWord::tru(Frame::Science);\n        assert!(matches!(\n            s.with_frame(Frame::Absolute),\n            Err(WordError::AbsoluteInvariant)\n        ));\n\n        let a = TritWord::absolute();\n        let s2 = a.with_frame(Frame::Science).unwrap();\n        assert_eq!(s2.frame(), Frame::Science);\n    }\n\n    #[test]\n    fn with_frame_succeeds_for_non_absolute_target() {\n        let s = TritWord::tru(Frame::Science);\n        let i = s.with_frame(Frame::Individual).unwrap();\n        assert_eq!(i.frame(), Frame::Individual);\n    }\n\n    #[test]\n    fn invariant_holds_detects_violation_when_bypassed() {\n        // from_parts is the only public way to build a TritWord from raw parts.\n        // It returns an error, so no invalid word can be observed.\n        let bad = TritWord::from_parts(TritValue::True, Phase::new(0.5).unwrap(), Frame::Absolute);\n        assert!(matches!(bad, Err(WordError::AbsoluteInvariant)));\n    }\n\n    #[test]\n    fn error_display_is_informative() {\n        let err = TritWord::try_new(TritValue::True, 1.5, \"Science\").unwrap_err();\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"1.5\") || msg.contains(\"out of range\") || msg.contains(\"Phase\"));\n    }\n}\n","traces":[{"line":47,"address":[],"length":0,"stats":{"Line":7638104968020361215}},{"line":53,"address":[],"length":0,"stats":{"Line":7638104968020361215}},{"line":54,"address":[],"length":0,"stats":{"Line":15276209936040722430}},{"line":57,"address":[],"length":0,"stats":{"Line":7638104968020361215}},{"line":61,"address":[],"length":0,"stats":{"Line":4899916394579099666}},{"line":62,"address":[],"length":0,"stats":{"Line":14699749183737298998}},{"line":63,"address":[],"length":0,"stats":{"Line":13835058055282163766}},{"line":64,"address":[],"length":0,"stats":{"Line":17005592192950992968}},{"line":68,"address":[],"length":0,"stats":{"Line":12465963768561532928}},{"line":74,"address":[],"length":0,"stats":{"Line":12465963768561532928}},{"line":75,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":77,"address":[],"length":0,"stats":{"Line":11745387828182253568}},{"line":81,"address":[],"length":0,"stats":{"Line":6773413839565225984}},{"line":83,"address":[],"length":0,"stats":{"Line":8646911284551352320}},{"line":87,"address":[],"length":0,"stats":{"Line":4827858800541171798}},{"line":88,"address":[],"length":0,"stats":{"Line":864691128455135576}},{"line":92,"address":[],"length":0,"stats":{"Line":2738188573441261568}},{"line":93,"address":[],"length":0,"stats":{"Line":10952754293765046272}},{"line":97,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":98,"addre on domains are detected.\n//!\n//! # Version\n//!\n//! Current version: **0.3.0**.\n//!\n//! # Safety\n//!\n//! `#![forbid(unsafe_code)]` is enforced crate-wide. Warnings are denied in\n//! CI via `RUSTFLAGS=\"-D warnings\"` rather than in the library crate, to\n//! avoid breaking downstream builds when new Rust versions introduce new\n//! warnings.\n//!\n//! # Modules\n//!\n//! - [`anchor`] — steady-state constraints with veto power (Layer 1).\n//! - [`core`] — ternary algebra and data types: `TritValue`, `Phase`, `Frame`,\n//!   `TritWord`, `TernaryAlgebra`.\n//! - [`meta`] — policy engine: `Domain`, `ResolutionPolicy`, `ArbitrationResult`,\n//!   `MetaInterrupt`, `SafeFallback`, custom rules.\n//! - [`sandbox`] — scenario I/O, validation, pipeline, and expected-behavior\n//!   verification.\n//! - [`attention`] — cognitive attention scheduler with depth-gated bandwidth.\n//! - [`knowledge`] — self-knowledge model with calibration feedback loop.\n//! - [`budget`] — hardware-aware compute budget and depth-level gating.\n//! - [`calibration`] — decision history recording for feedback-driven learning.\n//! - [`clock`] — phase oscillator and time-scale management.\n//! - [`baseline`] — binary baseline comparator for validation.\n//! - [`tracing_init`] — structured logging initialization.\n//!\n//! # Documentation\n//!\n//! See [`docs/INDEX.md`](https://github.com/trit-core/trit-core/blob/main/docs/INDEX.md)\n//! for the full documentation map.\n//!\n//! # Quick Example\n//!\n//! ```rust\n//! use trit_core::core::{Frame, TernaryAlgebra, TritValue, TritWord};\n//!\n//! let science = TritWord::tru(Frame::Science);\n//! let individual = TritWord::fals(Frame::Individual);\n//!\n//! let (result, interrupt) = TernaryAlgebra::t_and(\u0026science, \u0026individual);\n//!\n//! assert_eq!(result.value(), TritValue::Hold);\n//! assert!(interrupt.is_some());\n//! ```\n\n#![forbid(unsafe_code)]\n\n/// Assert that two `f64` values are equal within `f64::EPSILON`.\n///\n/// Replaces the 43-instance pattern `assert!((actual - expected).abs() \u003c f64::EPSILON)`\n/// with a single readable macro. Accepts an optional custom message.\n///\n/// # Examples\n///\n/// ```ignore\n/// assert_float_eq!(result.phase(), 0.55);\n/// assert_float_eq!(clock.omega, 10.0, \"physical clock should have ω=10.0\");\n/// ```\n#[macro_export]\nmacro_rules! assert_float_eq {\n    ($actual:expr, $expected:expr) =\u003e {\n        assert!(\n            ($actual - $expected).abs() \u003c f64::EPSILON,\n            \"assertion failed: `(left == right)`\\n  left: `{}`\\n right: `{}`\",\n            $actual,\n            $expected\n        )\n    };\n    ($actual:expr, $expected:expr, $($arg:tt)+) =\u003e {\n        assert!(\n            ($actual - $expected).abs() \u003c f64::EPSILON,\n            $($arg)+\n        )\n    };\n}\n\npub mod anchor;\npub mod attention;\npub mod baseline;\npub mod budget;\npub mod calibration;\npub mod clock;\npub mod core;\npub mod knowledge;\npub mod meta;\npub mod reflexive;\npub mod sandbox;\npub mod tracing_init;\n\npub use anchor::{\n    check_all as check_all_anchors, AnchorConstraint, AnchorError, AnchorReport, AnchorSeverity,\n    AnchorViolation, DataSource, DecisionPreview, EcosystemZone, StaticSource,\n};\npub use core::{\n    algebra::TernaryAlgebra,\n    frame::{Frame, FrameError, FrameRegistry},\n    hold::{HoldFinality, HoldState, HolderConfig},\n    phase::{Commitment, Phase, PhaseError},\n    sensor::{\n        BodyState, CogState, EnvSnapshot, EnvironmentalContext, SensorSignal, TemporalScale,\n        TextInput,\n    },\n    value::TritValue,\n    word::{Trit, TritWord, WordError},\n};\npub use meta::{\n    ArbitrationResult, ConflictType, CustomRule, Domain, DomainParseError, FallbackBehavior,\n    JsonRuleLoader, MetaInterrupt, MetaMonitor, PolicyError, ResolutionPolicy, RuleError,\n    RuleLoader, SafeFallback,\n};\npub use sandbox::{\n    sanitize_log_field, validate_scenario, ErrorCategory, SandboxDiagnostics, SandboxError,\n    SandboxOutput, SandboxPipeline, ScenarioInput, ScenarioValidator, SignalInput, MAX_JSON_SIZE,\n    MAX_SIGNALS, MAX_STRING_LEN,\n};\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","meta","domain.rs"],"content":"use crate::core::frame::Frame;\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\nuse crate::meta::frame_mask::FrameMask;\nuse crate::meta::rules::{CustomRule, JsonRuleLoader, RuleLoader};\nuse std::str::FromStr;\nuse thiserror::Error;\nuse tracing::{debug, info};\n\n/// Domain rules for conflict resolution.\n/// Each domain defines which frame has priority and whether\n/// forced resolution (hard collapse) is allowed.\n#[derive(Clone, Debug, PartialEq, Eq)]\npub enum Domain {\n    /// Hard science constraints: Science priority, forced collapse.\n    Physical,\n    /// Applied constraints: Science priority, forced collapse.\n    Engineering,\n    /// Soft constraints: Individual priority, no forced collapse.\n    MedicalEthics,\n    /// Incommensurable: no priority, must remain Hold.\n    ValueJudgment,\n    /// Default: attempt negotiation.\n    General,\n    /// Externally loaded domain rules.\n    Custom(String),\n}\n\n/// Error type for policy arbitration failures.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum PolicyError {\n    #[error(\"no inputs provided for arbitration\")]\n    EmptyInputs,\n    #[error(\"custom rule failed to apply: {0}\")]\n    CustomRule(String),\n}\n\n/// Error returned when a string cannot be parsed as a [`Domain`].\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum DomainParseError {\n    #[error(\"unknown domain: '{0}'\")]\n    Unknown(String),\n}\n\nimpl FromStr for Domain {\n    type Err = DomainParseError;\n\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\n        match s {\n            \"Physical\" =\u003e Ok(Domain::Physical),\n            \"Engineering\" =\u003e Ok(Domain::Engineering),\n            \"MedicalEthics\" =\u003e Ok(Domain::MedicalEthics),\n            \"ValueJudgment\" =\u003e Ok(Domain::ValueJudgment),\n            \"General\" =\u003e Ok(Domain::General),\n            d if d.starts_with(\"Custom(\") =\u003e {\n                let name = d\n                    .strip_prefix(\"Custom(\")\n                    .and_then(|s| s.strip_suffix(\")\"))\n                    .unwrap_or(\"\");\n                if name.is_empty() {\n                    return Err(DomainParseError::Unknown(\n                        \"Custom domain name cannot be empty\".to_string(),\n                    ));\n                }\n                Ok(Domain::Custom(name.to_string()))\n            }\n            d =\u003e Err(DomainParseError::Unknown(d.to_string())),\n        }\n    }\n}\n\nimpl std::fmt::Display for Domain {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            Domain::Physical =\u003e write!(f, \"Physical\"),\n            Domain::Engineering =\u003e write!(f, \"Engineering\"),\n            Domain::MedicalEthics =\u003e write!(f, \"MedicalEthics\"),\n            Domain::ValueJudgment =\u003e write!(f, \"ValueJudgment\"),\n            Domain::General =\u003e write!(f, \"General\"),\n            Domain::Custom(name) =\u003e write!(f, \"Custom({})\", name),\n        }\n    }\n}\n\n/// Policy engine that decides how to resolve conflicts.\n#[derive(Debug, Clone)]\npub struct ResolutionPolicy {\n    pub domain: Domain,\n    /// Optional externally loaded rule for `Domain::Custom`.\n    pub custom_rule: Option\u003cCustomRule\u003e,\n}\n\nimpl ResolutionPolicy {\n    pub fn new(domain: Domain) -\u003e Self {\n        debug!(?domain, \"ResolutionPolicy created\");\n        Self {\n            domain,\n            custom_rule: None,\n        }\n    }\n\n    /// Attach a custom rule to this policy.\n    pub fn with_custom_rule(mut self, rule: CustomRule) -\u003e Self {\n        self.custom_rule = Some(rule);\n        self\n    }\n\n    /// Given conflicting inputs, return the arbitration result.\n    /// Uses FrameMask for O(1) frame presence checks.\n    ///\n    /// # Errors\n    ///\n    /// Returns `PolicyError::EmptyInputs` if `inputs` is empty.\n    #[tracing::instrument(skip_all, fields(domain = ?self.domain))]\n    pub fn arbitrate(\u0026self, inputs: \u0026[TritWord]) -\u003e Result\u003cArbitrationResult, PolicyError\u003e {\n        debug!(input_count = inputs.len(), \"arbitration started\");\n        if inputs.is_empty() {\n            return Err(PolicyError::EmptyInputs);\n        }\n        let mask = FrameMask::from_inputs(inputs);\n\n        // Mind-engineering default: first-person experience is preserved when\n        // it conflicts with statistical/scientific frames. This implements the\n        // principle that lived experience should not be silently overridden by\n        // population aggregates.\n        //\n        // SAFETY GATE: FirstPerson priority is skipped for Physical and Engineering\n        // domains where physical reality must override subjective experience.\n        // A patient saying \"I feel fine\" does not override a structural engineer's\n        // load calculation. The domain match below handles these cases correctly.\n        let first_person_applies = !matches!(\u0026self.domain, Domain::Physical | Domain::Engineering);\n        if first_person_applies \u0026\u0026 mask.has(\u0026Frame::FirstPerson) \u0026\u0026 mask.has(\u0026Frame::Science) {\n            return Ok(Self::preserve_frame(inputs, Frame::FirstPerson));\n        }\n\n        let result = match \u0026self.domain {\n            Domain::Physical | Domain::Engineering =\u003e {\n                self.arbitrate_physical_engineering(inputs, \u0026mask)\n            }\n            Domain::MedicalEthics =\u003e self.arbitrate_medical_ethics(inputs, \u0026mask),\n            Domain::ValueJudgment =\u003e ArbitrationResult::Hold,\n            Domain::Custom(name) =\u003e self.arbitrate_custom(name, inputs, \u0026mask),\n            Domain::General =\u003e self.arbitrate_general(inputs, \u0026mask),\n        };\n        info!(?result, \"arbitration completed\");\n        Ok(result)\n    }\n\n    /// Physical/Engineering: Science frame priority, force collapse when absent.\n    fn arbitrate_physical_engineering(\n        \u0026self,\n        inputs: \u0026[TritWord],\n        mask: \u0026FrameMask,\n    ) -\u003e ArbitrationResult {\n        if mask.has(\u0026Frame::Science) {\n            Self::commit_frame(inputs, Frame::Science)\n        } else {\n            ArbitrationResult::ForceCollapse\n        }\n    }\n\n    /// MedicalEthics: Individual frame priority, negotiate when absent.\n    fn arbitrate_medical_ethics(\u0026self, inputs: \u0026[TritWord], mask: \u0026FrameMask) -\u003e ArbitrationResult {\n        if mask.has(\u0026Frame::Individual) {\n            Self::preserve_frame(inputs, Frame::Individual)\n        } else {\n            ArbitrationResult::Negotiate\n        }\n    }\n\n    /// Custom domain: delegate to loaded rule, or default to Negotiate.\n    fn arbitrate_custom(\n        \u0026self,\n        name: \u0026str,\n        inputs: \u0026[TritWord],\n        _mask: \u0026FrameMask,\n    ) -\u003e ArbitrationResult {\n        if let Some(ref rule) = self.custom_rule {\n            info!(custom_domain = %name, rule = %rule.name, \"custom domain arbitration using loaded rule\");\n            return JsonRuleLoader::apply(rule, inputs);\n        }\n        info!(custom_domain = %name, \"custom domain arbitration: no rule loaded, defaulting to Negotiate\");\n        ArbitrationResult::Negotiate\n    }\n\n    /// General: commit when single frame and no Unknown values, negotiate when mixed.\n    fn arbitrate_general(\u0026self, inputs: \u0026[TritWord], mask: \u0026FrameMask) -\u003e ArbitrationResult {\n        if mask.count() == 1 {\n            // Reject Commit if any input is Unknown — \"out of distribution\" must\n            // propagate, not be silently collapsed into the first computable word.\n            if inputs.iter().any(|t| t.value() == TritValue::Unknown) {\n                return ArbitrationResult::Hold;\n            }\n            // Reject Commit if any input is Hold — TAND detected a conflict\n            // (e.g., True ∧ Hold = Hold) that single-frame Commit would mask.\n            if inputs.iter().any(|t| t.value() == TritValue::Hold) {\n                return ArbitrationResult::Negotiate;\n            }\n            // Reject Commit if ALL inputs have near-neutral phase (within 1e-3\n            // of 0.5). A decision where every signal is near-neutral is noise,\n            // not a real commitment. But if any signal has a clear tendency\n            // (phase outside [0.499, 0.501]), the system should commit.\n            let all_near_neutral = inputs\n                .iter()\n                .all(|t| (t.phase().inner() - 0.5).abs() \u003c 1e-3);\n            if all_near_neutral {\n                return ArbitrationResult::Hold;\n            }\n            ArbitrationResult::Commit(inputs[0])\n        } else {\n            ArbitrationResult::Negotiate\n        }\n    }\n\n    /// Find and commit the input with the given frame.\n    /// Returns Hold if the matched input is Unknown (out-of-distribution).\n    fn commit_frame(inputs: \u0026[TritWord], frame: Frame) -\u003e ArbitrationResult {\n        inputs\n            .iter()\n            .find(|t| t.frame() == frame)\n            .map(|t| {\n                if t.value() == TritValue::Unknown {\n                    ArbitrationResult::Hold\n                } else {\n                    ArbitrationResult::Commit(*t)\n                }\n            })\n            .unwrap_or(ArbitrationResult::Hold)\n    }\n\n    /// Find and preserve the input with the given frame.\n    /// Returns Hold if the matched input is Unknown (out-of-distribution).\n    fn preserve_frame(inputs: \u0026[TritWord], frame: Frame) -\u003e ArbitrationResult {\n        inputs\n            .iter()\n            .find(|t| t.frame() == frame)\n            .map(|t| {\n                if t.value() == TritValue::Unknown {\n                    ArbitrationResult::Hold\n                } else {\n                    ArbitrationResult::Preserve(*t)\n                }\n            })\n            .unwrap_or(ArbitrationResult::Hold)\n    }\n}\n\nimpl Default for ResolutionPolicy {\n    fn default() -\u003e Self {\n        Self::new(Domain::General)\n    }\n}\n\n#[derive(Debug, Clone, PartialEq)]\npub enum ArbitrationResult {\n    /// Commit to a specific TritWord as the final decision.\n    Commit(TritWord),\n    /// Preserve a TritWord (MedicalEthics: Individual frame).\n    Preserve(TritWord),\n    /// Force a safe collapse. When this is returned from arbitrate(),\n    /// the caller should invoke SafeFallback::guard() to determine the\n    /// final value — in dangerous domains (Physical, Engineering,\n    /// chemistry, genetics, etc.) this will force False when interrupts\n    /// are present, implementing IEC 61508 fail-safe semantics.\n    ForceCollapse,\n    /// Deliberately hold — incommensurable values, cannot decide.\n    Hold,\n    /// Attempt multi-round negotiation (General domain with mixed frames).\n    Negotiate,\n}\n\nimpl std::fmt::Display for ArbitrationResult {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            ArbitrationResult::Commit(w) =\u003e {\n                write!(\n                    f,\n                    \"Commit({:?}, phase={:.3}, {})\",\n                    w.value(),\n                    w.phase().inner(),\n                    w.frame()\n                )\n            }\n            ArbitrationResult::Preserve(w) =\u003e {\n                write!(\n                    f,\n                    \"Preserve({:?}, phase={:.3}, {})\",\n                    w.value(),\n                    w.phase().inner(),\n                    w.frame()\n                )\n            }\n            ArbitrationResult::ForceCollapse =\u003e write!(f, \"ForceCollapse\"),\n            ArbitrationResult::Hold =\u003e write!(f, \"Hold\"),\n            ArbitrationResult::Negotiate =\u003e write!(f, \"Negotiate\"),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::frame::Frame;\n    use crate::core::word::TritWord;\n    use crate::meta::rules::FallbackBehavior;\n\n    #[test]\n    fn physical_commits_science() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::tru(Frame::Consensus),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn physical_without_science_forces_collapse() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::tru(Frame::Individual),\n            TritWord::fals(Frame::Consensus),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::ForceCollapse);\n    }\n\n    #[test]\n    fn medical_ethics_preserves_individual() {\n        let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Preserve(_)));\n    }\n\n    #[test]\n    fn value_judgment_always_hold() {\n        let policy = ResolutionPolicy::new(Domain::ValueJudgment);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn general_same_frame_commits_first() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn general_mixed_frames_negotiates() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_without_rule_defaults_to_negotiate() {\n        let policy = ResolutionPolicy::new(Domain::Custom(\"chemistry\".into()));\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_with_priority_frame_rule() {\n        let rule = CustomRule {\n            name: \"chem\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: FallbackBehavior::Hold,\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"chemistry\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::fals(Frame::Individual),\n            TritWord::tru(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn arbitrate_rejects_empty_inputs() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        assert!(matches!(\n            policy.arbitrate(\u0026[]).unwrap_err(),\n            PolicyError::EmptyInputs\n        ));\n    }\n\n    #[test]\n    fn engineering_behaves_like_physical() {\n        let policy = ResolutionPolicy::new(Domain::Engineering);\n        let inputs = vec![\n            TritWord::tru(Frame::Consensus),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn medical_ethics_without_individual_negotiates() {\n        let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Consensus),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_rule_fallback_hold() {\n        let rule = CustomRule {\n            name: \"lit\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: FallbackBehavior::Hold,\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"literature\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn custom_rule_fallback_safe_fallback() {\n        let rule = CustomRule {\n            name: \"chem\".into(),\n            priority_frame: None,\n            allow_forced_collapse: true,\n            fallback: FallbackBehavior::SafeFallback,\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"chemistry\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::ForceCollapse);\n    }\n\n    #[test]\n    fn policy_error_display_is_informative() {\n        let err = PolicyError::EmptyInputs;\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"no inputs\"));\n    }\n\n    #[test]\n    fn default_policy_is_general() {\n        let policy: ResolutionPolicy = Default::default();\n        assert_eq!(policy.domain, Domain::General);\n        assert!(policy.custom_rule.is_none());\n    }\n\n    #[test]\n    fn first_person_does_not_override_science_in_physical_domain() {\n        // P0-1 regression: FirstPerson must not override Science in Physical/Engineering.\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        // Physical domain: Science frame wins, FirstPerson is ignored\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n        if let ArbitrationResult::Commit(w) = result {\n            assert_eq!(w.frame(), Frame::Science);\n            assert_eq!(w.value(), TritValue::False);\n        }\n    }\n\n    #[test]\n    fn first_person_does_not_override_science_in_engineering_domain() {\n        let policy = ResolutionPolicy::new(Domain::Engineering);\n        let inputs = vec![\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n        if let ArbitrationResult::Commit(w) = result {\n            assert_eq!(w.frame(), Frame::Science);\n        }\n    }\n\n    #[test]\n    fn first_person_still_preserved_in_medical_ethics() {\n        // FirstPerson priority must still work in non-dangerous domains.\n        let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n        let inputs = vec![\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Preserve(_)));\n    }\n\n    #[test]\n    fn first_person_still_preserved_in_general_domain() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Preserve(_)));\n    }\n\n    #[test]\n    fn unknown_value_in_single_frame_returns_hold() {\n        // P0-2 regression: Unknown must propagate, not be silently committed.\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![TritWord::unknown(Frame::Science)];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn unknown_value_with_computable_signals_same_frame_returns_hold() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::unknown(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn unknown_in_science_frame_physical_domain_returns_hold() {\n        // Physical domain: Science frame present but Unknown → Hold, not Commit.\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::unknown(Frame::Science),\n            TritWord::tru(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n}\n","traces":[{"line":45,"address":[],"length":0,"stats":{"Line":6989586621679009792}},{"line":46,"address":[],"length":0,"stats":{"Line":6989586621679009792}},{"line":54,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":55,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":56,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":66,"address":[],"length":0,"stats":{"Line":6917529027641081862}},{"line":67,"address":[],"length":0,"stats":{"Line":6917529027641081874}},{"line":68,"address":[],"length":0,"stats":{"Line":13835058055282163724}},{"line":69,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":71,"address":[],"length":0,"stats":{"Line":2089670227099910162}},{"line":72,"address":[],"length":0,"stats":{"Line":13474770085092524044}},{"line":74,"address":[],"length":0,"stats":{"Line":6485183463413514246}},{"line":75,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":77,"address":[],"length":0,"stats":{"Line":10664523917613334528}},{"line":79,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":80,"address":[],"length":0,"stats":{"Line":4035225266123964416}},{"line":82,"address":[],"length":0,"stats":{"Line":144115188075855874}},{"line":86,"address":[],"length":0,"stats":{"Line":4323455642275676166}},{"line":87,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":89,"address":[],"length":0,"stats":{"Line":7421932185906577408}},{"line":91,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":92,"address":[],"length":0,"stats":{"Line":2738188573441261568}},{"line":94,"address":[],"length":0,"stats":{"Line":72057594037927938}},{"line":97,"address":[],"length":0,"stats":{"Line":1657324662872342530}},{"line":98,"address":[],"length":0,"stats":{"Line ord]) -\u003e Self {\n        let mut mask = 0u8;\n        for t in inputs {\n            mask |= match t.frame() {\n                Frame::Science =\u003e Self::SCIENCE,\n                Frame::Individual =\u003e Self::INDIVIDUAL,\n                Frame::Consensus =\u003e Self::CONSENSUS,\n                Frame::Absolute =\u003e Self::ABSOLUTE,\n                Frame::Meta =\u003e Self::META,\n                Frame::FirstPerson =\u003e Self::FIRST_PERSON,\n                Frame::Embodied =\u003e Self::EMBODIED,\n                Frame::Relational =\u003e Self::RELATIONAL,\n            };\n            if mask == Self::ALL_FRAMES {\n                break; // all frames seen, early exit\n            }\n        }\n        FrameMask(mask)\n    }\n\n    pub(crate) fn has(\u0026self, frame: \u0026Frame) -\u003e bool {\n        let bit = match frame {\n            Frame::Science =\u003e Self::SCIENCE,\n            Frame::Individual =\u003e Self::INDIVIDUAL,\n            Frame::Consensus =\u003e Self::CONSENSUS,\n            Frame::Absolute =\u003e Self::ABSOLUTE,\n            Frame::Meta =\u003e Self::META,\n            Frame::FirstPerson =\u003e Self::FIRST_PERSON,\n            Frame::Embodied =\u003e Self::EMBODIED,\n            Frame::Relational =\u003e Self::RELATIONAL,\n        };\n        (self.0 \u0026 bit) != 0\n    }\n\n    pub(crate) fn count(\u0026self) -\u003e u32 {\n        self.0.count_ones()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn empty_mask_has_nothing() {\n        let mask = FrameMask::from_inputs(\u0026[]);\n        assert!(!mask.has(\u0026Frame::Science));\n        assert_eq!(mask.count(), 0);\n    }\n\n    #[test]\n    fn single_frame_detected() {\n        let inputs = [TritWord::tru(Frame::Science)];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(!mask.has(\u0026Frame::Individual));\n        assert_eq!(mask.count(), 1);\n    }\n\n    #[test]\n    fn multiple_frames_counted() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n            TritWord::hold(Frame::Consensus),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(mask.has(\u0026Frame::Individual));\n        assert!(mask.has(\u0026Frame::Consensus));\n        assert!(!mask.has(\u0026Frame::Absolute));\n        assert_eq!(mask.count(), 3);\n    }\n\n    #[test]\n    fn duplicates_do_not_increase_count() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert_eq!(mask.count(), 1);\n    }\n\n    #[test]\n    fn all_frames_detected() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::tru(Frame::Individual),\n            TritWord::tru(Frame::Consensus),\n            TritWord::absolute(),\n            TritWord::hold(Frame::Meta),\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::tru(Frame::Embodied),\n            TritWord::tru(Frame::Relational),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(mask.has(\u0026Frame::Individual));\n        assert!(mask.has(\u0026Frame::Consensus));\n        assert!(mask.has(\u0026Frame::Absolute));\n        assert!(mask.has(\u0026Frame::Meta));\n        assert!(mask.has(\u0026Frame::FirstPerson));\n        assert!(mask.has(\u0026Frame::Embodied));\n        assert!(mask.has(\u0026Frame::Relational));\n        assert_eq!(mask.count(), 8);\n    }\n}\n","traces":[{"line":19,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":20,"address":[],"length":0,"stats":{"Line":14411518807585587200}},{"line":21,"address":[],"l
