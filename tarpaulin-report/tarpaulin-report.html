8806316530991104}},{"line":159,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":160,"address":[],"length":0,"stats":{"Line":0}},{"line":161,"address":[],"length":0,"stats":{"Line":0}},{"line":162,"address":[],"length":0,"stats":{"Line":0}},{"line":163,"address":[],"length":0,"stats":{"Line":288230376151711746}}],"covered":41,"coverable":46},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","reflexive","auditor.rs"],"content":"//! Reflexive audit: a slow half-beat self-check after each decision.\n//!\n//! The reflexive auditor looks back at the decision path and asks:\n//!\n//! 1. How was this output assembled?\n//! 2. Was any step driven by an \"explanation impulse\" rather than evidence?\n//! 3. Could a Hold have been chosen instead of a forced collapse?\n//!\n//! This is the algorithmic form of \"knowing oneself\" — the system inspects\n//! its own conflict trace before finalizing an answer.\n\nuse chrono::Utc;\n\nuse crate::core::frame::Frame;\nuse crate::core::word::TritWord;\nuse crate::meta::{ConflictType, MetaInterrupt};\nuse crate::sandbox::output::SandboxOutput;\n\n/// A single attention event in the decision trace.\n#[derive(Debug, Clone, PartialEq)]\npub struct AttentionEvent {\n    /// Human-readable label for what held attention at this moment.\n    pub label: String,\n    /// Timestamp in UTC.\n    pub timestamp: chrono::DateTime\u003cUtc\u003e,\n}\n\nimpl AttentionEvent {\n    /// Create a new attention event.\n    pub fn new(label: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            label: label.into(),\n            timestamp: Utc::now(),\n        }\n    }\n}\n\n/// A recorded phase shift in the decision trace.\n#[derive(Debug, Clone, Copy, PartialEq)]\npub struct PhaseShift {\n    /// Phase value before the shift.\n    pub from: f64,\n    /// Phase value after the shift.\n    pub to: f64,\n    /// Human-readable reason for the shift.\n    pub reason: \u0026'static str,\n}\n\nimpl PhaseShift {\n    /// Create a new phase shift record.\n    pub fn new(from: f64, to: f64, reason: \u0026'static str) -\u003e Self {\n        Self { from, to, reason }\n    }\n}\n\n/// Outcome of a reflexive audit.\n#[derive(Debug, Clone, PartialEq)]\npub enum AuditReport {\n    /// The decision path is clean: no unresolved conflicts were collapsed.\n    Clean,\n    /// The decision collapsed a conflict that could have been held.\n    ForcedCollapse {\n        /// Description of the unresolved conflict.\n        reason: String,\n        /// Recommendation for what should have happened.\n        recommendation: String,\n    },\n    /// The decision was influenced by an attention pattern that looks like\n    /// loop entrainment or explanation impulse.\n    ExplanationImpulse {\n        /// Description of the detected pattern.\n        reason: String,\n    },\n}\n\n/// Alert produced by the reflexive guard when it intervenes in a pipeline.\n#[derive(Debug, Clone, PartialEq)]\npub struct ReflexiveAlert {\n    /// Human-readable reason for the alert.\n    pub reason: String,\n    /// Suggested action.\n    pub recommendation: String,\n}\n\n/// Reflexive auditor that traces decisions and produces post-hoc audits.\n#[derive(Debug, Clone, Default, PartialEq)]\npub struct ReflexiveAuditor {\n    /// Recorded interrupts from the current decision chain.\n    pub decision_chain: Vec\u003cMetaInterrupt\u003e,\n    /// Recorded attention events.\n    pub attention_trace: Vec\u003cAttentionEvent\u003e,\n    /// Recorded phase shifts.\n    pub phase_history: Vec\u003cPhaseShift\u003e,\n}\n\nimpl ReflexiveAuditor {\n    /// Create a new empty auditor.\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// Record an interrupt in the decision chain.\n    pub fn record_interrupt(\u0026mut self, interrupt: MetaInterrupt) {\n        self.decision_chain.push(interrupt);\n    }\n\n    /// Record an attention event.\n    pub fn record_attention(\u0026mut self, event: AttentionEvent) {\n        self.attention_trace.push(event);\n    }\n\n    /// Record a phase shift.\n    pub fn record_phase_shift(\u0026mut self, shift: PhaseShift) {\n        self.phase_history.push(shift);\n    }\n\n    /// Clear all traces. Useful when starting a new decision session.\n    pub fn clear(\u0026mut self) {\n        self.decision_chain.clear();\n        self.attention_trace.clear();\n        self.phase_history.clear();\n    }\n\n    /// Audit the most recent decision path.\n    ///\n    /// Returns `ForcedCollapse` if there are unresolved frame-mismatch\n    /// interrupts but the final output is a forced True/False. Returns\n    /// `ExplanationImpulse` if the attention trace shows rapid back-and-forth\n    /// on the same theme. Otherwise returns `Clean`.\n    pub fn audit_last_decision(\u0026self) -\u003e AuditReport {\n        let unresolved_conflicts: Vec\u003c_\u003e = self\n            .decision_chain\n            .iter()\n            .filter(|i| matches!(i.conflict, ConflictType::FrameMismatch))\n            .collect();\n\n        if !unresolved_conflicts.is_empty() \u0026\u0026 self.has_explanation_impulse() {\n            return AuditReport::ExplanationImpulse {\n                reason: format!(\n                    \"{} unresolved frame conflict(s) co-occur with loop-like attention trace\",\n                    unresolved_conflicts.len()\n                ),\n            };\n        }\n\n        if !unresolved_conflicts.is_empty() {\n            return AuditReport::ForcedCollapse {\n                reason: format!(\n                    \"{} unresolved frame conflict(s) were present in the decision chain\",\n                    unresolved_conflicts.len()\n                ),\n                recommendation: \"Consider returning Hold instead of forcing True/False.\"\n                    .to_string(),\n            };\n        }\n\n        AuditReport::Clean\n    }\n\n    /// Run an automatic post-audit on a concrete sandbox output.\n    ///\n    /// Returns a `MetaInterrupt` if the reflexive guard detects that a\n    /// forced True/False decision was made while unresolved cross-frame\n    /// conflicts remain in the trace. Returns `None` otherwise.\n    pub fn auto_post_audit(\u0026mut self, decision: \u0026SandboxOutput) -\u003e Option\u003cMetaInterrupt\u003e {\n        let unresolved_conflicts = self\n            .decision_chain\n            .iter()\n            .filter(|i| matches!(i.conflict, ConflictType::FrameMismatch))\n            .count();\n\n        let is_forced = decision.final_value_code == 1 || decision.final_value_code == -1;\n\n        if unresolved_conflicts \u003e 0 \u0026\u0026 is_forced {\n            let alert = ReflexiveAlert {\n                reason: format!(\n                    \"Forced {} output with {} unresolved frame conflict(s)\",\n                    decision.final_value, unresolved_conflicts\n                ),\n                recommendation: \"Reflexive guard suggests reviewing for Hold.\".to_string(),\n            };\n            let interrupt = MetaInterrupt::new(\n                ConflictType::PolicyViolation,\n                format!(\"{}: {}\", alert.reason, alert.recommendation),\n            );\n            self.decision_chain.push(interrupt.clone());\n            return Some(interrupt);\n        }\n\n        None\n    }\n\n    /// Build a `TritWord` summarizing the reflexive posture of the auditor.\n    ///\n    /// Useful for downstream attention/knowledge modules.\n    pub fn reflexive_posture(\u0026self) -\u003e TritWord {\n        match self.audit_last_decision() {\n            AuditReport::Clean =\u003e TritWord::tru(Frame::Meta),\n            _ =\u003e TritWord::hold(Frame::Meta),\n        }\n    }\n\n    fn has_explanation_impulse(\u0026self) -\u003e bool {\n        // Simple heuristic: if the same attention label appears more than\n        // twice in the trace, treat it as loop entrainment / explanation impulse.\n        if self.attention_trace.len() \u003c 4 {\n            return false;\n        }\n        let mut counts: std::collections::HashMap\u003c\u0026str, usize\u003e = std::collections::HashMap::new();\n        for event in \u0026self.attention_trace {\n            *counts.entry(event.label.as_str()).or_insert(0) += 1;\n        }\n        counts.values().any(|\u0026c| c \u003e= 3)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::value::TritValue;\n\n    fn sample_output(value: \u0026str, code: i8) -\u003e SandboxOutput {\n        SandboxOutput {\n            scenario_id: \"test\".to_string(),\n            final_value: value.to_string(),\n            final_value_code: code,\n            final_frame: \"Meta\".to_string(),\n            final_phase_raw: 0.5,\n            interrupts: vec![],\n            policy_action: \"Test\".to_string(),\n            reflexive_alert: None,\n            attention_cmd: None,\n            receiver_estimate: None,\n            hold_state: None,\n        }\n    }\n\n    #[test]\n    fn clean_audit_when_no_conflicts() {\n        let auditor = ReflexiveAuditor::new();\n        assert_eq!(auditor.audit_last_decision(), AuditReport::Clean);\n    }\n\n    #[test]\n    fn forced_collapse_detected() {\n        let mut auditor = ReflexiveAuditor::new();\n        auditor.record_interrupt(MetaInterrupt::new(\n            ConflictType::FrameMismatch,\n            \"Science vs Individual\".to_string(),\n        ));\n        let out = sample_output(\"True\", 1);\n        let alert = auditor.auto_post_audit(\u0026out);\n        assert!(alert.is_some());\n        assert!(matches!(\n            auditor.audit_last_decision(),\n            AuditReport::ForcedCollapse { .. }\n        ));\n    }\n\n    #[test]\n    fn hold_output_does_not_trigger_alert() {\n        let mut auditor = ReflexiveAuditor::new();\n        auditor.record_interrupt(MetaInterrupt::new(\n            ConflictType::FrameMismatch,\n            \"conflict\".to_string(),\n        ));\n        let out = sample_output(\"Hold\", 0);\n        assert!(auditor.auto_post_audit(\u0026out).is_none());\n    }\n\n    #[test]\n    fn explanation_impulse_detected() {\n        let mut auditor = ReflexiveAuditor::new();\n        for _ in 0..4 {\n            auditor.record_attention(AttentionEvent::new(\"ruminate\"));\n        }\n        auditor.record_interrupt(MetaInterrupt::new(\n            ConflictType::FrameMismatch,\n            \"conflict\".to_string(),\n        ));\n        assert!(matches!(\n            auditor.audit_last_decision(),\n            AuditReport::ExplanationImpulse { .. }\n        ));\n    }\n\n    #[test]\n    fn reflexive_posture_is_hold_when_audit_fails() {\n        let mut auditor = ReflexiveAuditor::new();\n        auditor.record_interrupt(MetaInterrupt::new(\n            ConflictType::FrameMismatch,\n            \"conflict\".to_string(),\n        ));\n        assert_eq!(auditor.reflexive_posture().value(), TritValue::Hold);\n    }\n\n    #[test]\n    fn reflexive_posture_is_true_when_clean() {\n        let auditor = ReflexiveAuditor::new();\n        assert_eq!(auditor.reflexive_posture().value(), TritValue::True);\n    }\n}\n","traces":[{"line":30,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":32,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":33,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":98,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":99,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":103,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":104,"address":[],"length":0,"stats":{"Line":1513209474796486656}},{"line":108,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":109,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":113,"address":[],"length":0,"stats":{"Line":0}},{"line":114,"address":[],"length":0,"stats":{"Line":0 rbitrationResult, MetaInterrupt};\nuse serde::Serialize;\nuse std::collections::HashMap;\nuse std::time::Instant;\n\n/// Per-stage timing and counters for a single pipeline run.\n#[derive(Debug, Clone, Default, Serialize)]\npub struct SandboxDiagnostics {\n    /// When the pipeline run started.\n    #[serde(with = \"serde_millis\")]\n    pub started_at: Option\u003cInstant\u003e,\n    /// Total elapsed time for the run, in nanoseconds.\n    pub elapsed_ns: u64,\n    /// Number of input signals.\n    pub signal_count: usize,\n    /// Distribution of input signals by frame.\n    pub frame_distribution: HashMap\u003cString, usize\u003e,\n    /// Number of cross-frame interrupts detected.\n    pub interrupt_count: usize,\n    /// Types of interrupts observed.\n    pub interrupt_types: Vec\u003cString\u003e,\n    /// The actual interrupt events (for output construction).\n    #[serde(skip)]\n    pub interrupts: Vec\u003cMetaInterrupt\u003e,\n    /// Name of the policy action taken.\n    pub policy_action: String,\n    /// Whether SafeFallback was triggered.\n    pub safe_fallback_triggered: bool,\n    /// Per-stage timing in nanoseconds.\n    pub stage_timings_ns: HashMap\u003cString, u64\u003e,\n    /// Whether the reflexive guard triggered an alert.\n    pub reflexive_guard_triggered: bool,\n    /// Optional attention command produced during the run.\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub attention_cmd: Option\u003cString\u003e,\n    /// Optional receiver estimate produced by self-knowledge.\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub receiver_estimate: Option\u003ccrate::knowledge::ReceiverEstimate\u003e,\n    /// Optional phase shift trace (when --trace-phase is enabled).\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub phase_trace: Option\u003cVec\u003cf64\u003e\u003e,\n    /// Optional anchor report from Layer 1 checks.\n    #[serde(skip)]\n    pub anchor_report: Option\u003cAnchorReport\u003e,\n    /// Compute depth level used for this run (1–5).\n    ///\n    /// Serialized as a `u8` so consumers can interpret the depth without\n    /// needing the `DepthLevel` enum definition. Values: 1=Minimal,\n    /// 2=Reduced, 3=Standard, 4=Deep, 5=Exhaustive.\n    pub depth_level: u8,\n    /// Clock phase at the time of this run, in `[0.0, 1.0]`.\n    ///\n    /// Derived from the harmonic oscillator via `HarmonicClock::to_phase()`.\n    /// 0.0 = trough, 0.5 = neutral, 1.0 = peak. Serialized as a plain `f64`\n    /// for direct use in downstream telemetry dashboards.\n    pub clock_phase: f64,\n}\n\nimpl SandboxDiagnostics {\n    /// Create a new diagnostics collector and record the start time.\n    pub fn new() -\u003e Self {\n        Self {\n            started_at: Some(Instant::now()),\n            ..Default::default()\n        }\n    }\n\n    /// Record timing for a named stage.\n    pub fn record_stage(\u0026mut self, name: \u0026str, start: Instant) {\n        let elapsed = start.elapsed().as_nanos() as u64;\n        self.stage_timings_ns.insert(name.to_string(), elapsed);\n    }\n\n    /// Record input signal distribution.\n    pub fn record_inputs(\u0026mut self, inputs: \u0026[TritWord]) {\n        self.signal_count = inputs.len();\n        for word in inputs {\n            *self\n                .frame_distribution\n                .entry(format!(\"{}\", word.frame()))\n                .or_insert(0) += 1;\n        }\n    }\n\n    /// Record interrupt summary.\n    pub fn record_interrupts(\u0026mut self, interrupts: \u0026[MetaInterrupt]) {\n        self.interrupt_count = interrupts.len();\n        self.interrupt_types = interrupts\n            .iter()\n            .map(|i| format!(\"{:?}\", i.conflict))\n            .collect();\n    }\n\n    /// Record the policy action.\n    pub fn record_policy_action(\u0026mut self, action: \u0026ArbitrationResult) {\n        self.policy_action = format!(\"{}\", action);\n    }\n\n    /// Mark SafeFallback as triggered.\n    pub fn mark_safe_fallback(\u0026mut self) {\n        self.safe_fallback_triggered = true;\n    }\n\n    /// Mark the reflexive guard as triggered.\n    pub fn mark_reflexive_guard(\u0026mut self) {\n        self.reflexive_guard_triggered = true;\n    }\n\n    /// Record an attention command.\n    pub fn record_attention_cmd(\u0026mut self, cmd: \u0026crate::attention::AttentionCmd) {\n        self.attention_cmd = Some(format!(\"{:?}\", cmd));\n    }\n\n    /// Record a receiver estimate.\n    pub fn record_receiver_estimate(\u0026mut self, estimate: crate::knowledge::ReceiverEstimate) {\n        self.receiver_estimate = Some(estimate);\n    }\n\n    /// Record a phase value in the phase trace.\n    pub fn record_phase(\u0026mut self, phase: f64) {\n        self.phase_trace\n            .get_or_insert_with(Vec::new)\n            .push(phase.clamp(0.0, 1.0));\n    }\n\n    /// Record the compute depth level from the budget.\n    pub fn record_depth_level(\u0026mut self, depth_level: u8) {\n        self.depth_level = depth_level;\n    }\n\n    /// Record the clock phase.\n    pub fn record_clock_phase(\u0026mut self, phase: f64) {\n        self.clock_phase = phase;\n    }\n\n    /// Total elapsed time in microseconds.\n    pub fn elapsed_us(\u0026self) -\u003e u64 {\n        self.elapsed_ns / 1_000\n    }\n\n    /// Finalize timing.\n    pub fn finish(\u0026mut self) {\n        if let Some(start) = self.started_at {\n            self.elapsed_ns = start.elapsed().as_nanos() as u64;\n        }\n    }\n\n    /// Human-readable summary.\n    pub fn summary(\u0026self) -\u003e String {\n        format!(\n            \"signals={}, interrupts={}, fallback={}, depth={}, elapsed={}µs\",\n            self.signal_count,\n            self.interrupt_count,\n            self.safe_fallback_triggered,\n            self.depth_level,\n            self.elapsed_us()\n        )\n    }\n}\n\nmod serde_millis {\n    use serde::{Deserializer, Serializer};\n    use std::time::{Duration, Instant, SystemTime};\n\n    pub fn serialize\u003cS: Serializer\u003e(\n        instant: \u0026Option\u003cInstant\u003e,\n        serializer: S,\n    ) -\u003e Result\u003cS::Ok, S::Error\u003e {\n        if let Some(inst) = instant {\n            // Approximate: elapsed since instant mapped to system time\n            let now = SystemTime::now();\n            let approx = now - inst.elapsed();\n            let millis = approx\n                .duration_since(SystemTime::UNIX_EPOCH)\n                .unwrap_or(Duration::ZERO)\n                .as_millis() as u64;\n            serializer.serialize_some(\u0026millis)\n        } else {\n            serializer.serialize_none()\n        }\n    }\n\n    #[allow(dead_code)]\n    pub fn deserialize\u003c'de, D: Deserializer\u003c'de\u003e\u003e(\n        _deserializer: D,\n    ) -\u003e Result\u003cOption\u003cInstant\u003e, D::Error\u003e {\n        // Instant cannot be deserialized; callers should treat diagnostics as output-only.\n        Ok(None)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::frame::Frame;\n    use crate::core::word::TritWord;\n\n    #[test]\n    fn diagnostics_records_inputs_and_interrupts() {\n        let mut diag = SandboxDiagnostics::new();\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        diag.record_inputs(\u0026inputs);\n        assert_eq!(diag.signal_count, 2);\n        assert_eq!(diag.frame_distribution.get(\"Science\"), Some(\u00261));\n        assert_eq!(diag.frame_distribution.get(\"Individual\"), Some(\u00261));\n    }\n\n    #[test]\n    fn diagnostics_stage_timing_is_monotonic() {\n        let mut diag = SandboxDiagnostics::new();\n        let start = Instant::now();\n        std::thread::sleep(std::time::Duration::from_millis(1));\n        diag.record_stage(\"test\", start);\n        assert!(diag.stage_timings_ns.get(\"test\").copied().unwrap_or(0) \u003e 0);\n    }\n}\n","traces":[{"line":63,"address":[],"length":0,"stats":{"Line":7710162562058289152}},{"line":65,"address":[],"length":0,"stats":{"Line":7710162562058289152}},{"line":71,"address":[],"length":0,"stats":{"Line":9295429630892703744}},{"line":72,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":73,"address":[],"length":0,"stats":{"Line":9583660007044415488}},{"line":77,"address":[],"length":0,"stats":{"Line":7349874591868649475}},{"line":78,"address":[],"length":0,"stats":{"Line":7349874591868649475}},{"line":79,"address":[],"length":0,"stats":{"Line":1873497444986126333}},{"line":80,"address":[],"length":0,"stats":{"Line":12970366926827028474}},{"line":81,"address":[],"length":0,"stats":{"Line":12970366926827028474}},{"line":82,"address":[],"length":0,"stats":{"Line":7493989779944505332}},{"line":83,"address":[],"length":0,"stats":{"Line":15708555500268290045}},{"line":88,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":89,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":90,"address":[],"length":0,"stats":{"Line":14411518807585587200}},{"line":91,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":92,"address":[],"length":0,"stats":{"Line":13690942867206307840}},{"line":93,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":97,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":98,"address":[],"length":0,"stats":{"Line":14411518807585587200}},{"line":102,"address":[],"length":0,"stats":{"Line":1585267068834414592}},{"line":103,"address":[],"length":0,"stats":{"Line":1585267068834414592}},{"line":107,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":108,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":112,"address":[],"length":0,"stats":{"Line":0}},{"line":113,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":118,"address":[],"length":0,"s verable":56},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","sandbox","error.rs"],"content":"use crate::core::word::WordError;\nuse thiserror::Error;\n\n/// Errors that can occur during sandbox execution.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum SandboxError {\n    #[error(\"invalid scenario: {0}\")]\n    InvalidScenario(String),\n    #[error(\"invalid domain '{0}'\")]\n    InvalidDomain(String),\n    #[error(\"invalid frame in signal {index}: {reason}\")]\n    InvalidFrame { index: usize, reason: String },\n    #[error(\"invalid value in signal {index}: {reason}\")]\n    InvalidValue { index: usize, reason: String },\n    #[error(\"invalid phase in signal {index}: {reason}\")]\n    InvalidPhase { index: usize, reason: String },\n    #[error(\"scenario invariant violated: {0}\")]\n    Invariant(String),\n    #[error(\"word construction failed: {0}\")]\n    Word(#[from] WordError),\n    #[error(\"expected behavior mismatch: expected '{expected}', got '{got}'\")]\n    ExpectedBehaviorMismatch { expected: String, got: String },\n    #[error(\"I/O error: {0}\")]\n    Io(String),\n}\n\n/// Error category for observability and user guidance.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum ErrorCategory {\n    /// Input data problem (scenario JSON, signal values, etc.).\n    Input,\n    /// Security / permission problem.\n    Security,\n    /// Internal logic / invariant violation.\n    Internal,\n    /// Expected behavior mismatch.\n    Validation,\n    /// I/O or environment problem.\n    Io,\n}\n\nimpl SandboxError {\n    /// Classify the error for metrics and dashboards.\n    pub fn category(\u0026self) -\u003e ErrorCategory {\n        match self {\n            SandboxError::InvalidScenario(_)\n            | SandboxError::InvalidDomain(_)\n            | SandboxError::InvalidFrame { .. }\n            | SandboxError::InvalidValue { .. }\n            | SandboxError::InvalidPhase { .. } =\u003e ErrorCategory::Input,\n            SandboxError::Invariant(_) | SandboxError::Word(_) =\u003e ErrorCategory::Internal,\n            SandboxError::ExpectedBehaviorMismatch { .. } =\u003e ErrorCategory::Validation,\n            // Security classification is determined by the message prefix set in\n            // the CLI path-traversal guard. Keep this check last so other Io\n            // variants do not accidentally match.\n            SandboxError::Io(msg) if msg.starts_with(\"Security error:\") =\u003e ErrorCategory::Security,\n            SandboxError::Io(_) =\u003e ErrorCategory::Io,\n        }\n    }\n\n    /// Category name for structured logging.\n    pub fn category_name(\u0026self) -\u003e \u0026'static str {\n        match self.category() {\n            ErrorCategory::Input =\u003e \"input\",\n            ErrorCategory::Security =\u003e \"security\",\n            ErrorCategory::Internal =\u003e \"internal\",\n            ErrorCategory::Validation =\u003e \"validation\",\n            ErrorCategory::Io =\u003e \"io\",\n        }\n    }\n\n    /// Return a human-readable help message suggesting how to fix the error.\n    pub fn help(\u0026self) -\u003e String {\n        match self {\n            SandboxError::InvalidScenario(msg) =\u003e format!(\n                \"Check the scenario JSON structure. Common issues: missing fields, wrong types, or malformed data. Details: {}\",\n                msg\n            ),\n            SandboxError::InvalidDomain(msg) =\u003e format!(\n                \"Use a known domain: Physical, Engineering, MedicalEthics, ValueJudgment, General, or Custom(name). Got: {}\",\n                msg\n            ),\n            SandboxError::InvalidFrame { index, reason } =\u003e format!(\n                \"Signal at index {} has an invalid frame. Allowed input frames: Science, Individual, Consensus, Absolute. (Meta is reserved for system-internal use.) {}\",\n                index, reason\n            ),\n            SandboxError::InvalidValue { index, reason } =\u003e format!(\n                \"Signal at index {} has an invalid value. Allowed values: 1 (True), 0 (Hold), -1 (False). {}\",\n                index, reason\n            ),\n            SandboxError::InvalidPhase { index, reason } =\u003e format!(\n                \"Signal at index {} has an invalid phase. Phase must be a finite f64 in [0.0, 1.0]. {}\",\n                index, reason\n            ),\n            SandboxError::Invariant(msg) =\u003e format!(\n                \"A runtime invariant was violated. This is likely a bug. Details: {}\",\n                msg\n            ),\n            SandboxError::Word(e) =\u003e format!(\n                \"Failed to construct a TritWord. Check that frame/value/phase combinations are valid. Details: {}\",\n                e\n            ),\n            SandboxError::ExpectedBehaviorMismatch { expected, got } =\u003e format!(\n                \"The scenario's expected_behavior ('{}') did not match the actual output ('{}'). Update the scenario expectation or inspect the decision pipeline.\",\n                expected, got\n            ),\n            SandboxError::Io(msg) =\u003e format!(\n                \"An I/O error occurred. Check file paths, permissions, and disk space. Details: {}\",\n                msg\n            ),\n        }\n    }\n\n    /// Return a structured error report suitable for logging or CLI output.\n    pub fn report(\u0026self) -\u003e String {\n        format!(\n            \"[{}] {}\\n\\nHelp: {}\",\n            self.category_name(),\n            self,\n            self.help()\n        )\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn error_categories_are_exhaustive() {\n        let errors = vec![\n            SandboxError::InvalidScenario(\"x\".into()),\n            SandboxError::InvalidDomain(\"x\".into()),\n            SandboxError::InvalidFrame {\n                index: 0,\n                reason: \"x\".into(),\n            },\n            SandboxError::InvalidValue {\n                index: 0,\n                reason: \"x\".into(),\n            },\n            SandboxError::InvalidPhase {\n                index: 0,\n                reason: \"x\".into(),\n            },\n            SandboxError::Invariant(\"x\".into()),\n            SandboxError::ExpectedBehaviorMismatch {\n                expected: \"x\".into(),\n                got: \"y\".into(),\n            },\n            SandboxError::Io(\"x\".into()),\n            SandboxError::Io(\"Security error: path traversal denied\".into()),\n        ];\n        for err in errors {\n            assert!(!err.category_name().is_empty());\n            assert!(!err.help().is_empty());\n            assert!(err.report().contains(err.category_name()));\n        }\n    }\n}\n","traces":[{"line":44,"address":[],"length":0,"stats":{"Line":2089670227099910144}},{"line":45,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":50,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":51,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":52,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":56,"address":[],"length":0,"stats":{"Line":2449958197289549824}},{"line":57,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":62,"address":[],"length":0,"stats":{"Line":2089670227099910144}},{"line":63,"address":[],"length":0,"stats":{"Line":2089670227099910144}},{"line":64,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":65,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":66,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":67,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":68,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":73,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":74,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":75,"address":[],"length":0,"stats":{"Lin izer: D) -\u003e Result\u003cSelf, D::Error\u003e\r\n    where\r\n        D: Deserializer\u003c'de\u003e,\r\n    {\r\n        #[derive(Deserialize)]\r\n        struct SandboxOutputRaw {\r\n            scenario_id: String,\r\n            final_value: String,\r\n            final_value_code: i8,\r\n            final_frame: String,\r\n            #[serde(rename = \"final_phase\")]\r\n            final_phase_raw: f64,\r\n            interrupts: Vec\u003cString\u003e,\r\n            policy_action: String,\r\n            #[serde(default)]\r\n            reflexive_alert: Option\u003cString\u003e,\r\n            #[serde(default)]\r\n            attention_cmd: Option\u003cString\u003e,\r\n            #[serde(default)]\r\n            receiver_estimate: Option\u003cReceiverEstimate\u003e,\r\n            #[serde(default)]\r\n            hold_state: Option\u003cHoldState\u003e,\r\n        }\r\n\r\n        let raw = SandboxOutputRaw::deserialize(deserializer)?;\r\n\r\n        // Validate final_phase_raw: must be finite and in [0.0, 1.0]\r\n        if raw.final_phase_raw.is_nan() || raw.final_phase_raw.is_infinite() {\r\n            return Err(serde::de::Error::custom(format!(\r\n                \"final_phase_raw must be finite, got: {}\",\r\n                raw.final_phase_raw\r\n            )));\r\n        }\r\n        if !(0.0..=1.0).contains(\u0026raw.final_phase_raw) {\r\n            return Err(serde::de::Error::custom(format!(\r\n                \"final_phase_raw must be in [0.0, 1.0], got: {}\",\r\n                raw.final_phase_raw\r\n            )));\r\n        }\r\n\r\n        // Validate final_value_code: must be 1, 0, or -1\r\n        if !matches!(raw.final_value_code, -1..=1) {\r\n            return Err(serde::de::Error::custom(format!(\r\n                \"final_value_code must be -1, 0, or 1, got: {}\",\r\n                raw.final_value_code\r\n            )));\r\n        }\r\n\r\n        Ok(SandboxOutput {\r\n            scenario_id: raw.scenario_id,\r\n            final_value: raw.final_value,\r\n            final_value_code: raw.final_value_code,\r\n            final_frame: raw.final_frame,\r\n            final_phase_raw: raw.final_phase_raw,\r\n            interrupts: raw.interrupts,\r\n            policy_action: raw.policy_action,\r\n            reflexive_alert: raw.reflexive_alert,\r\n            attention_cmd: raw.attention_cmd,\r\n            receiver_estimate: raw.receiver_estimate,\r\n            hold_state: raw.hold_state,\r\n        })\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn deserialize_valid_output() {\r\n        let json = r#\"{\r\n            \"scenario_id\": \"test\",\r\n            \"final_value\": \"True\",\r\n            \"final_value_code\": 1,\r\n            \"final_frame\": \"Science\",\r\n            \"final_phase\": 0.8,\r\n            \"interrupts\": [],\r\n            \"policy_action\": \"Commit\"\r\n        }\"#;\r\n        let output: SandboxOutput = serde_json::from_str(json).unwrap();\r\n        assert_eq!(output.final_value_code, 1);\r\n        assert_float_eq!(output.final_phase_raw, 0.8);\r\n        assert_float_eq!(output.final_phase().inner(), 0.8);\r\n    }\r\n\r\n    #[test]\r\n    fn deserialize_rejects_nan_phase() {\r\n        let json = r#\"{\r\n            \"scenario_id\": \"test\",\r\n            \"final_value\": \"Hold\",\r\n            \"final_value_code\": 0,\r\n            \"final_frame\": \"Meta\",\r\n            \"final_phase\": NaN,\r\n            \"interrupts\": [],\r\n            \"policy_action\": \"Hold\"\r\n        }\"#;\r\n        // NaN is not valid JSON, but let's test with a post-deserialization check\r\n        // by constructing manually\r\n        let result = serde_json::from_str::\u003cSandboxOutput\u003e(json);\r\n        assert!(result.is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn deserialize_rejects_out_of_range_phase() {\r\n        let json = r#\"{\r\n            \"scenario_id\": \"test\",\r\n },{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","sandbox","pipeline.rs"],"content":"use std::time::Instant;\n\nuse tracing::{debug, error, info, instrument, trace, warn};\n\nuse crate::anchor::{check_all, AnchorConstraint};\nuse crate::attention::{AttentionCmd, AttentionScheduler, ShiftTarget};\nuse crate::budget::ComputeBudget;\nuse crate::calibration::{CalibrationEntry, CalibrationLog};\nuse crate::clock::HarmonicClock;\nuse crate::core::frame::{Frame, FrameRegistry};\nuse crate::core::hold::{HoldState, HolderConfig};\nuse crate::core::phase::Phase;\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\nuse crate::core::TernaryAlgebra;\nuse crate::knowledge::SelfKnowledge;\nuse crate::meta::{ArbitrationResult, Domain, MetaInterrupt, ResolutionPolicy, SafeFallback};\nuse crate::reflexive::{ReflexiveAlert, ReflexiveAuditor};\nuse crate::sandbox::diagnostic::SandboxDiagnostics;\nuse crate::sandbox::error::SandboxError;\nuse crate::sandbox::input::{ScenarioInput, SignalInput};\nuse crate::sandbox::output::SandboxOutput;\nuse crate::sandbox::validate::{sanitize_log_field, validate_scenario};\n\n/// Standard sandbox pipeline: TAND cascade → policy arbitration → SafeFallback.\n///\n/// When constructed with [`with_registry`](SandboxPipeline::with_registry), all\n/// signal frames are validated against the registry before processing.\n///\n/// Mind-engineering extensions (reflexive audit, attention scheduling,\n/// self-knowledge) are opt-in via builder methods and do not change the\n/// default behavior unless explicitly enabled.\npub struct SandboxPipeline {\n    pub(crate) registry: Option\u003cFrameRegistry\u003e,\n    pub(crate) dry_run: bool,\n    pub(crate) safe_fallback: SafeFallback,\n    pub(crate) reflexive: Option\u003cReflexiveAuditor\u003e,\n    pub(crate) attention: Option\u003cAttentionScheduler\u003e,\n    pub(crate) self_knowledge: Option\u003cSelfKnowledge\u003e,\n    pub(crate) holder_config: Option\u003cHolderConfig\u003e,\n    pub(crate) trace_phase: bool,\n    pub(crate) hold_final: bool,\n    /// Anchor constraints checked before every decision.\n    pub(crate) anchor_constraints: Vec\u003cBox\u003cdyn AnchorConstraint\u003e\u003e,\n    /// Hardware-aware compute budget for depth gating.\n    pub(crate) budget: ComputeBudget,\n    /// Harmonic clock for temporal context.\n    pub(crate) clock: HarmonicClock,\n    /// Calibration log for feedback-driven learning.\n    pub(crate) calibration_log: CalibrationLog,\n}\n\nimpl std::fmt::Debug for SandboxPipeline {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.debug_struct(\"SandboxPipeline\")\n            .field(\"registry\", \u0026self.registry)\n            .field(\"dry_run\", \u0026self.dry_run)\n            .field(\"safe_fallback\", \u0026self.safe_fallback)\n            .field(\"reflexive\", \u0026self.reflexive)\n            .field(\"attention\", \u0026self.attention)\n            .field(\"self_knowledge\", \u0026self.self_knowledge)\n            .field(\"holder_config\", \u0026self.holder_config)\n            .field(\"trace_phase\", \u0026self.trace_phase)\n            .field(\"hold_final\", \u0026self.hold_final)\n            .field(\"anchor_count\", \u0026self.anchor_constraints.len())\n            .field(\"budget\", \u0026self.budget)\n            .field(\"clock\", \u0026self.clock)\n            .field(\"calibration_log\", \u0026self.calibration_log)\n            .finish()\n    }\n}\n\nimpl Default for SandboxPipeline {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl SandboxPipeline {\n    /// Create a new pipeline with an optional frame whitelist.\n    ///\n    /// When a registry is provided, all signal frames must be registered\n    /// before the pipeline processes them — unregistered frames cause a\n    /// `SandboxError::InvalidFrame` error.\n    pub fn new() -\u003e Self {\n        Self {\n            registry: None,\n            dry_run: false,\n            safe_fallback: SafeFallback::new(),\n            reflexive: None,\n            attention: None,\n            self_knowledge: None,\n            holder_config: None,\n            trace_phase: false,\n            hold_final: false,\n            anchor_constraints: Vec::new(),\n            budget: ComputeBudget::conservative(),\n            clock: HarmonicClock::deliberative(),\n            calibration_log: CalibrationLog::default(),\n        }\n    }\n\n    /// Create a pipeline that validates all signal frames against the given registry.\n    pub fn with_registry(registry: FrameRegistry) -\u003e Self {\n        Self {\n            registry: Some(registry),\n            ..Self::new()\n        }\n    }\n\n    /// Enable dry-run mode: build trits and run TAND, but skip arbitration and SafeFallback.\n    pub fn with_dry_run(mut self, dry_run: bool) -\u003e Self {\n        self.dry_run = dry_run;\n        self\n    }\n\n    /// Inject a custom SafeFallback configuration.\n    pub fn with_safe_fallback(mut self, safe_fallback: SafeFallback) -\u003e Self {\n        self.safe_fallback = safe_fallback;\n        self\n    }\n\n    /// Attach a reflexive auditor.\n    pub fn with_reflexive(mut self, auditor: ReflexiveAuditor) -\u003e Self {\n        self.reflexive = Some(auditor);\n        self\n    }\n\n    /// Attach an attention scheduler.\n    pub fn with_attention(mut self, scheduler: AttentionScheduler) -\u003e Self {\n        self.attention = Some(scheduler);\n        self\n    }\n\n    /// Attach a self-knowledge model.\n    pub fn with_self_knowledge(mut self, knowledge: SelfKnowledge) -\u003e Self {\n        self.self_knowledge = Some(knowledge);\n        self\n    }\n\n    /// Attach a holder configuration.\n    pub fn with_holder_config(mut self, config: HolderConfig) -\u003e Self {\n        self.holder_config = Some(config);\n        self\n    }\n\n    /// Enable phase-trace collection.\n    pub fn with_trace_phase(mut self, enabled: bool) -\u003e Self {\n        self.trace_phase = enabled;\n        self\n    }\n\n    /// Treat Hold as the final answer (do not auto-question).\n    pub fn with_hold_final(mut self, enabled: bool) -\u003e Self {\n        self.hold_final = enabled;\n        self\n    }\n\n    /// Attach an anchor constraint (Layer 1). Multiple anchors can be added;\n    /// they are checked in order before every decision is finalized.\n    pub fn with_anchor(mut self, anchor: Box\u003cdyn AnchorConstraint\u003e) -\u003e Self {\n        self.anchor_constraints.push(anchor);\n        self\n    }\n\n    /// Set the compute budget for depth gating.\n    pub fn with_budget(mut self, budget: ComputeBudget) -\u003e Self {\n        self.budget = budget;\n        self\n    }\n\n    /// Set the harmonic clock for temporal context.\n    pub fn with_clock(mut self, clock: HarmonicClock) -\u003e Self {\n        self.clock = clock;\n        self\n    }\n\n    /// Set the calibration log for feedback-driven learning.\n    pub fn with_calibration_log(mut self, log: CalibrationLog) -\u003e Self {\n        self.calibration_log = log;\n        self\n    }\n\n    /// Run the full pipeline on a scenario.\n    ///\n    /// # Errors\n    ///\n    /// Returns `SandboxError` if the scenario is invalid or if any signal\n    /// cannot be converted into a `TritWord`.\n    pub fn run(\u0026mut self, scenario: \u0026ScenarioInput) -\u003e Result\u003cSandboxOutput, SandboxError\u003e {\n        self.run_with_diagnostics(scenario).map(|(out, _)| out)\n    }\n\n    /// Run the full pipeline and return both the output and diagnostic telemetry.\n    ///\n    /// This is the primary observable entry point. It records per-stage timing,\n    /// interrupt counts, frame distribution, and SafeFallback activation.\n    #[instrument(skip_all, fields(scenario_id = %scenario.id, domain = %scenario.domain, signal_count = scenario.signals.len()))]\n    pub fn run_with_diagnostics(\n        \u0026mut self,\n        scenario: \u0026ScenarioInput,\n    ) -\u003e Result\u003c(SandboxOutput, SandboxDiagnostics), SandboxError\u003e {\n        let mut diagnostics = SandboxDiagnostics::new();\n        info!(scenario_id = %scenario.id, \"pipeline started\");\n\n        // Stages 1–4: validate, build policy, build trits, registry check\n        let trits = self.stage_validate_and_build(scenario, \u0026mut diagnostics)?;\n\n        // Stage 5: batch TAND cascade\n        let (current, interrupts) = self.stage_tand_cascade(\u0026trits, \u0026mut diagnostics);\n\n        // Stages 6–8: arbitration, reflexive guard, SafeFallback\n        let (final_word, policy_action_str, reflexive_alert) = self.stage_arbitrate_and_guard(\n            scenario,\n            \u0026trits,\n            \u0026current,\n            interrupts,\n            \u0026mut diagnostics,\n        )?;\n\n        // Stage 8b: sample OS → ComputeBudget.depth_level\n        self.stage_sample_budget(\u0026mut diagnostics);\n\n        // Stages 9–10: attention scheduling, self-knowledge inference\n        // Gated by depth_level \u003e= Standard\n        self.stage_optional_extensions(\u0026trits, \u0026final_word, \u0026mut diagnostics);\n\n        // Stage 10b: clock tick — advance the harmonic oscillator\n        self.stage_tick_clock(\u0026mut diagnostics);\n\n        // Stage 11: phase trace\n        let mut final_word = final_word; // ← make mutable for anchor override\n        if self.trace_phase {\n            diagnostics.record_phase(final_word.phase().inner());\n        }\n\n        // Stage 11b: anchor check (Layer 1)\n        final_word = self.stage_anchor_check(scenario, final_word, \u0026mut diagnostics);\n\n        // Stage 12: build output\n        let output = self.stage_build_output_with_timing(\n            scenario,\n            \u0026final_word,\n            \u0026policy_action_str,\n            reflexive_alert.as_ref(),\n            \u0026mut diagnostics,\n        );\n\n        // Stage 13: calibrate — record entry + update SelfKnowledge patterns\n        self.stage_calibrate(scenario, \u0026final_word, \u0026mut diagnostics);\n\n        diagnostics.finish();\n        info!(\n            scenario_id = %output.scenario_id,\n            final_value = %output.final_value,\n            final_frame = %output.final_frame,\n            elapsed_ns = diagnostics.elapsed_ns,\n            elapsed_us = diagnostics.elapsed_us(),\n            \"pipeline complete\"\n        );\n        Ok((output, diagnostics))\n    }\n\n    /// Stages 1–4: validate scenario, build policy, build trits, registry check.\n    fn stage_validate_and_build(\n        \u0026self,\n        scenario: \u0026ScenarioInput,\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) -\u003e Result\u003cVec\u003cTritWord\u003e, SandboxError\u003e {\n        // Stage 1: validate scenario\n        let stage_start = Instant::now();\n        trace!(\"validating scenario input\");\n        validate_scenario(scenario).map_err(|e| {\n            error!(error = %e, category = %e.category_name(), \"scenario validation failed\");\n            e\n        })?;\n        diagnostics.record_stage(\"validate\", stage_start);\n        debug!(\"scenario input validated\");\n\n        // Stage 2: build policy\n        let stage_start = Instant::now();\n        let _policy = build_policy(\u0026scenario.domain).map_err(|e| {\n            error!(error = %e, category = %e.category_name(), \"policy build failed\");\n            e\n        })?;\n        diagnostics.record_stage(\"build_policy\", stage_start);\n        info!(domain = %scenario.domain, \"policy built\");\n\n        // Stage 3: build trits\n        let stage_start = Instant::now();\n        let trits = build_trits(\u0026scenario.signals).map_err(|e| {\n            error!(error = %e, category = %e.category_name(), \"signal conversion failed\");\n            e\n        })?;\n        diagnostics.record_inputs(\u0026trits);\n        diagnostics.record_stage(\"build_trits\", stage_start);\n        debug!(signal_count = trits.len(), \"trits built\");\n\n        // Stage 4: frame registry validation\n        let stage_start = Instant::now();\n        if let Some(ref reg) = self.registry {\n            trace!(\"validating frames against registry whitelist\");\n            if let Err(unregistered) = reg.validate_all(\u0026trits) {\n                let index = trits\n                    .iter()\n                    .position(|w| w.frame() == unregistered)\n                    .unwrap_or(0);\n                let reason = format!(\n                    \"frame '{}' is not registered in the pipeline frame whitelist\",\n                    unregistered\n                );\n                error!(frame = %unregistered, index, \"frame registry rejection\");\n                return Err(SandboxError::InvalidFrame { index, reason });\n            }\n        }\n        diagnostics.record_stage(\"registry_check\", stage_start);\n        Ok(trits)\n    }\n\n    /// Stage 5: batch TAND cascade over all input trits.\n    fn stage_tand_cascade(\n        \u0026self,\n        trits: \u0026[TritWord],\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) -\u003e (TritWord, Vec\u003cMetaInterrupt\u003e) {\n        let stage_start = Instant::now();\n        trace!(\"running batch TAND cascade\");\n        let (current, interrupts) = TernaryAlgebra::t_and_n(trits);\n        diagnostics.record_interrupts(\u0026interrupts);\n        diagnostics.record_stage(\"t_and_n\", stage_start);\n        info!(\n            result_value = ?current.value(),\n            result_frame = %current.frame(),\n            interrupt_count = interrupts.len(),\n            \"TAND cascade complete\"\n        );\n        (current, interrupts)\n    }\n\n    /// Stages 6–8: policy arbitration, reflexive guard, SafeFallback.\n    fn stage_arbitrate_and_guard(\n        \u0026mut self,\n        scenario: \u0026ScenarioInput,\n        trits: \u0026[TritWord],\n        current: \u0026TritWord,\n        interrupts: Vec\u003cMetaInterrupt\u003e,\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) -\u003e Result\u003c(TritWord, String, Option\u003cReflexiveAlert\u003e), SandboxError\u003e {\n        if self.dry_run {\n            info!(\"dry-run mode: skipping arbitration and SafeFallback\");\n            diagnostics.record_policy_action(\u0026ArbitrationResult::Negotiate);\n            diagnostics.record_stage(\"arbitrate\", Instant::now());\n            diagnostics.record_stage(\"reflexive_guard\", Instant::now());\n            diagnostics.record_stage(\"safe_fallback\", Instant::now());\n            return Ok((*current, \"DryRun\".to_string(), None));\n        }\n\n        // Stage 6: policy arbitration\n        let stage_start = Instant::now();\n        trace!(\"running policy arbitration\");\n        let policy = build_policy(\u0026scenario.domain)?;\n        let policy_result = policy.arbitrate(trits).map_err(|e| {\n            error!(error = %e, \"policy arbitration failed\");\n            SandboxError::InvalidScenario(format!(\"arbitration failed: {e}\"))\n        })?;\n        diagnostics.record_policy_action(\u0026policy_result);\n        diagnostics.record_stage(\"arbitrate\", stage_start);\n        info!(policy_action = %policy_result, \"arbitration complete\");\n\n        let arbitrated_word = self.resolve_arbitrated_word(\u0026policy_result, current);\n\n        // Stage 7: reflexive guard\n        let stage_start = Instant::now();\n        let reflexive_alert =\n            self.stage_reflexive_guard(\u0026policy, \u0026arbitrated_word, \u0026interrupts, diagnostics);\n        diagnostics.record_stage(\"reflexive_guard\", stage_start);\n\n        // Stage 8: SafeFallback\n        let stage_start = Instant::now();\n        let force = matches!(\u0026policy_result, ArbitrationResult::ForceCollapse);\n        let final_word =\n            self.stage_safe_fallback(\u0026policy, \u0026arbitrated_word, force, interrupts, diagnostics);\n        diagnostics.record_stage(\"safe_fallback\", stage_start);\n\n        // If reflexive guard fired and output is still forced True/False, override to Hold\n        let final_word = if reflexive_alert.is_some() \u0026\u0026 final_word.value().is_computable() {\n            TritWord::hold(Frame::Meta)\n        } else {\n            final_word\n        };\n\n        Ok((final_word, format!(\"{}\", policy_result), reflexive_alert))\n    }\n\n    /// Resolve the word to use after arbitration.\n    fn resolve_arbitrated_word(\n        \u0026self,\n        policy_result: \u0026ArbitrationResult,\n        current: \u0026TritWord,\n    ) -\u003e TritWord {\n        match policy_result {\n            ArbitrationResult::Commit(w) =\u003e {\n                // If the TAND cascade detected a conflict that the policy\n                // missed (e.g., Unknown propagation producing Hold), the\n                // cascade result should override the policy's mechanical\n                // Commit. But only when the cascade result is Hold — meaning\n                // TAND detected something the arbitration didn't account for.\n                if current.value() == TritValue::Hold \u0026\u0026 w.value().is_computable() {\n                    TritWord::hold(Frame::Meta)\n                } else {\n                    *w\n                }\n            }\n            // Preserve is an explicit arbitration choice (e.g., FirstPerson\n            // over Science in MedicalEthics). Do not override it with the\n            // TAND cascade result — the policy intentionally chose this frame.\n            ArbitrationResult::Preserve(w) =\u003e *w,\n            // A deliberate Hold result (e.g., ValueJudgment) must not be\n            // overridden by the TAND cascade; otherwise a same-frame input\n            // would accidentally commit to True/False.\n            ArbitrationResult::Hold =\u003e TritWord::hold(Frame::Meta),\n            // ForceCollapse: return Hold to trigger SafeFallback.guard().\n            // Using the TAND cascade result (*current) would bypass SafeFallback\n            // when the cascade produces True/False without interrupts — e.g.,\n            // Engineering domain with all-Individual True signals.\n            ArbitrationResult::ForceCollapse =\u003e TritWord::hold(Frame::Meta),\n            ArbitrationResult::Negotiate =\u003e *current,\n        }\n    }\n\n    /// Stage 7: reflexive guard — check for forced decisions with unresolved conflicts.\n    fn stage_reflexive_guard(\n        \u0026mut self,\n        policy: \u0026ResolutionPolicy,\n        arbitrated_word: \u0026TritWord,\n        interrupts: \u0026[MetaInterrupt],\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) -\u003e Option\u003cReflexiveAlert\u003e {\n        if let Some(ref mut auditor) = self.reflexive {\n            for int in interrupts {\n                auditor.record_interrupt(int.clone());\n            }\n            if self.trace_phase {\n                auditor.record_phase_shift(crate::reflexive::PhaseShift::new(\n                    arbitrated_word.phase().inner(),\n                    arbitrated_word.phase().inner(),\n                    \"arbitration\",\n                ));\n            }\n            let alert = reflexive_guard(\n                auditor,\n                \u0026policy.domain,\n                arbitrated_word,\n                interrupts,\n                \u0026self.safe_fallback,\n            );\n            if alert.is_some() {\n                diagnostics.mark_reflexive_guard();\n            }\n            return alert;\n        }\n        None\n    }\n\n    /// Stage 8: SafeFallback — force False in dangerous domains when uncertain.\n    fn stage_safe_fallback(\n        \u0026self,\n        policy: \u0026ResolutionPolicy,\n        arbitrated_word: \u0026TritWord,\n        force: bool,\n        mut interrupts: Vec\u003cMetaInterrupt\u003e,\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) -\u003e TritWord {\n        trace!(\"running SafeFallback guard\");\n        let (final_word, fb_interrupt) = self.safe_fallback.guard_with_force(\n            \u0026policy.domain,\n            arbitrated_word,\n            interrupts.len(),\n            force,\n        );\n        if let Some(int) = fb_interrupt {\n            warn!(\n                domain = %policy.domain,\n                force,\n                \"SafeFallback triggered: forcing False in dangerous domain\"\n            );\n            diagnostics.mark_safe_fallback();\n            interrupts.push(int);\n        } else {\n            debug!(\"SafeFallback passed through\");\n        }\n        diagnostics.interrupts = interrupts;\n        final_word\n    }\n\n    /// Stages 9–10: attention scheduling and self-knowledge inference.\n    ///\n    /// Gated by `depth_level \u003e= Standard`. When below Standard, both stages\n    /// are skipped — there is not enough compute budget for optional extensions.\n    fn stage_optional_extensions(\n        \u0026mut self,\n        trits: \u0026[TritWord],\n        final_word: \u0026TritWord,\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) {\n        if !self.budget.depth_level.has_extensions() {\n            debug!(\n                depth_level = self.budget.depth_level as u8,\n                \"skipping optional extensions (depth \u003c Standard)\"\n            );\n            diagnostics.record_stage(\"attention\", Instant::now());\n            diagnostics.record_stage(\"self_knowledge\", Instant::now());\n            return;\n        }\n\n        // Stage 9: attention scheduling (with clock phase modulation)\n        let stage_start = Instant::now();\n        if let Some(ref mut scheduler) = self.attention {\n            let cmd = scheduler.suggest_with_budget(\u0026self.budget, trits);\n            // Modulate with clock phase: near peaks bias toward ShiftTo,\n            // near troughs bias toward HoldCurrent.\n            let modulated = modulate_attention_with_clock_phase(cmd, self.clock.to_phase().inner());\n            diagnostics.record_attention_cmd(\u0026modulated);\n            if matches!(modulated, AttentionCmd::HoldCurrent) {\n                info!(\"attention scheduler suggests holding current processing\");\n            }\n        }\n        diagnostics.record_stage(\"attention\", stage_start);\n\n        // Stage 10: self-knowledge inference\n        let stage_start = Instant::now();\n        let receiver_estimate = self.self_knowledge.as_ref().map(|k| {\n            let estimate = k.infer_receiver_state(final_word);\n            diagnostics.record_receiver_estimate(estimate.clone());\n            estimate\n        });\n        diagnostics.record_stage(\"self_knowledge\", stage_start);\n        // receiver_estimate is consumed by stage_build_output via diagnostics\n        let _ = receiver_estimate;\n    }\n\n    /// Stage 8b: sample OS metrics and update the compute budget.\n    ///\n    /// Runs after SafeFallback but before optional extensions, so the\n    /// budget reflects the real system state when deciding whether to run\n    /// attention/self_knowledge/phase_trace.\n    fn stage_sample_budget(\u0026mut self, diagnostics: \u0026mut SandboxDiagnostics) {\n        let stage_start = Instant::now();\n        let fresh_budget = ComputeBudget::sample();\n        self.budget = fresh_budget;\n        diagnostics.record_depth_level(self.budget.depth_level as u8);\n        diagnostics.record_stage(\"sample_os_budget\", stage_start);\n        debug!(\n            depth_level = self.budget.depth_level as u8,\n            cpu_load = self.budget.cpu_load,\n            mem_pressure = self.budget.mem_pressure,\n            \"OS budget sampled\"\n        );\n    }\n\n    /// Stage 10b: advance the harmonic oscillator by elapsed wall-clock time.\n    fn stage_tick_clock(\u0026mut self, diagnostics: \u0026mut SandboxDiagnostics) {\n        let stage_start = Instant::now();\n        let elapsed_secs = diagnostics\n            .started_at\n            .map(|start| start.elapsed().as_secs_f64())\n            .unwrap_or(0.0);\n        self.clock.tick(elapsed_secs);\n        diagnostics.record_clock_phase(self.clock.to_phase().inner());\n        diagnostics.record_stage(\"clock_tick\", stage_start);\n        trace!(\n            clock_phase = self.clock.to_phase().inner(),\n            elapsed_s = elapsed_secs,\n            \"clock ticked\"\n        );\n    }\n\n    /// Stage 11b: anchor check — enforce Layer 1 constraints.\n    ///\n    /// Anchor constraints have veto power: Abort forces Hold,\n    /// DowngradeToHold forces Hold + alert. Returns the (possibly\n    /// overridden) final word.\n    fn stage_anchor_check(\n        \u0026self,\n        scenario: \u0026ScenarioInput,\n        mut final_word: TritWord,\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) -\u003e TritWord {\n        if self.anchor_constraints.is_empty() {\n            return final_word;\n        }\n        let stage_start = Instant::now();\n        let preview = crate::anchor::build_decision_preview(scenario, \u0026final_word);\n        let anchor_report = check_all(\u0026self.anchor_constraints, \u0026preview);\n        if anchor_report.has_violations() {\n            warn!(\n                violation_count = anchor_report.violations.len(),\n                has_abort = anchor_report.has_abort(),\n                \"anchor violations detected\"\n            );\n            diagnostics.anchor_report = Some(anchor_report.clone());\n            final_word = TritWord::hold(Frame::Meta);\n        }\n        diagnostics.record_stage(\"anchor_check\", stage_start);\n        final_word\n    }\n\n    /// Stage 12: build output with timing.\n    fn stage_build_output_with_timing(\n        \u0026self,\n        scenario: \u0026ScenarioInput,\n        final_word: \u0026TritWord,\n        policy_action_str: \u0026str,\n        reflexive_alert: Option\u003c\u0026ReflexiveAlert\u003e,\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) -\u003e SandboxOutput {\n        let stage_start = Instant::now();\n        let output = self.stage_build_output(\n            scenario,\n            final_word,\n            policy_action_str,\n            reflexive_alert,\n            diagnostics,\n        );\n        diagnostics.record_stage(\"build_output\", stage_start);\n        output\n    }\n\n    /// Stage 13: calibrate — record a CalibrationEntry and feed back into SelfKnowledge.\n    fn stage_calibrate(\n        \u0026mut self,\n        scenario: \u0026ScenarioInput,\n        final_word: \u0026TritWord,\n        diagnostics: \u0026mut SandboxDiagnostics,\n    ) {\n        let stage_start = Instant::now();\n\n        let entry = CalibrationEntry {\n            scenario_id: scenario.id.clone(),\n            domain: scenario\n                .domain\n                .parse()\n                .unwrap_or(crate::meta::Domain::General),\n            result: final_word.value(),\n            phase: final_word.phase().inner(),\n            interrupt_count: diagnostics.interrupt_count,\n            elapsed_us: diagnostics.elapsed_us(),\n            depth_level: self.budget.depth_level,\n            attention_cmd: diagnostics\n                .attention_cmd\n                .as_deref()\n                .and_then(parse_attention_cmd),\n        };\n        self.calibration_log.record(entry);\n\n        // Feed back into SelfKnowledge if present\n        if let Some(ref mut knowledge) = self.self_knowledge {\n            knowledge.calibrate_from_result(\n                final_word.frame(),\n                final_word.value(),\n                final_word.phase().inner(),\n                diagnostics.interrupt_count,\n            );\n        }\n\n        diagnostics.record_stage(\"calibrate\", stage_start);\n        trace!(\n            calibration_entries = self.calibration_log.len(),\n            \"calibration recorded\"\n        );\n    }\n\n    /// Stage 12: build the final SandboxOutput.\n    fn stage_build_output(\n        \u0026self,\n        scenario: \u0026ScenarioInput,\n        final_word: \u0026TritWord,\n        policy_action_str: \u0026str,\n        reflexive_alert: Option\u003c\u0026ReflexiveAlert\u003e,\n        diagnostics: \u0026SandboxDiagnostics,\n    ) -\u003e SandboxOutput {\n        let hold_state = if final_word.value() == TritValue::Hold {\n            Some(self.holder_state(\u0026scenario.domain))\n        } else {\n            None\n        };\n        SandboxOutput {\n            scenario_id: sanitize_log_field(\u0026scenario.id),\n            final_value: format!(\"{:?}\", final_word.value()),\n            final_value_code: final_word.value().to_i8(),\n            final_frame: format!(\"{}\", final_word.frame()),\n            final_phase_raw: final_word.phase().inner(),\n            interrupts: diagnostics\n                .interrupts\n                .iter()\n                .map(|i| format!(\"{:?}: {}\", i.conflict, sanitize_log_field(\u0026i.reason)))\n                .collect(),\n            policy_action: policy_action_str.to_string(),\n            reflexive_alert: self\n                .reflexive\n                .as_ref()\n                .and(reflexive_alert)\n                .map(|a| format!(\"{} - {}\", a.reason, a.recommendation)),\n            attention_cmd: diagnostics.attention_cmd.clone(),\n            receiver_estimate: diagnostics.receiver_estimate.clone(),\n            hold_state,\n        }\n    }\n\n    /// Compute the HoldState to attach to a Hold output.\n    fn holder_state(\u0026self, domain: \u0026str) -\u003e HoldState {\n        if self.hold_final {\n            return HoldState::final_hold();\n        }\n        self.holder_config\n            .as_ref()\n            .map(|c| c.hold_state_for(domain))\n            .unwrap_or_else(HoldState::final_hold)\n    }\n\n    /// Access the clock's elapsed time (for integration tests).\n    pub fn clock_elapsed(\u0026self) -\u003e f64 {\n        self.clock.elapsed_time()\n    }\n\n    /// Access the clock's phase (for integration tests).\n    pub fn clock_phase_value(\u0026self) -\u003e f64 {\n        self.clock.to_phase().inner()\n    }\n\n    /// Access the calibration log length (for integration tests).\n    pub fn calibration_log_len(\u0026self) -\u003e usize {\n        self.calibration_log.len()\n    }\n\n    /// Access the self-knowledge model (for integration tests).\n    pub fn self_knowledge_ref(\u0026self) -\u003e Option\u003c\u0026SelfKnowledge\u003e {\n        self.self_knowledge.as_ref()\n    }\n}\n\n/// Parse a serialized attention command string back to an `AttentionCmd`.\nfn parse_attention_cmd(s: \u0026str) -\u003e Option\u003cAttentionCmd\u003e {\n    use crate::attention::ShiftTarget;\n    // Format: \"ShiftTo(Body)\", \"HoldCurrent\", \"Recalibrate\", \"Continue\"\n    match s {\n        \"HoldCurrent\" =\u003e Some(AttentionCmd::HoldCurrent),\n        \"Recalibrate\" =\u003e Some(AttentionCmd::Recalibrate),\n        \"Continue\" =\u003e Some(AttentionCmd::Continue),\n        s if s.starts_with(\"ShiftTo(\") =\u003e {\n            let inner = s.trim_start_matches(\"ShiftTo(\").trim_end_matches(')');\n            let target = match inner {\n                \"Body\" =\u003e ShiftTarget::Body,\n                \"Environment\" =\u003e ShiftTarget::Environment,\n                \"ConflictTrace\" =\u003e ShiftTarget::ConflictTrace,\n                \"Meta\" =\u003e ShiftTarget::Meta,\n                other =\u003e {\n                    // ShiftTo(Frame(...)) or ShiftTo(Label(...)) — not yet\n                    // produced by the scheduler but may be in future versions.\n                    // Try to parse as a Frame name first, then fall back to Label.\n                    if let Ok(frame) = other.parse::\u003ccrate::core::frame::Frame\u003e() {\n                        ShiftTarget::Frame(frame)\n                    } else {\n                        ShiftTarget::Label(other.to_string())\n                    }\n                }\n            };\n            Some(AttentionCmd::ShiftTo(target))\n        }\n        other =\u003e {\n            warn!(cmd = %other, \"unrecognized attention command format; recording as Continue\");\n            None\n        }\n    }\n}\n\n/// Modulate the attention command based on clock phase.\n///\n/// Near phase peaks (0.8–1.0): bias toward `ShiftTo(ConflictTrace)` if the\n/// scheduler would otherwise hold or continue — the system is at peak\n/// temporal energy and should reconsider its focus.\n/// Near phase troughs (0.0–0.2): bias toward `HoldCurrent` — the system\n/// is at minimum temporal energy and should conserve attention.\n/// In between (0.2–0.8): pass through the scheduler's original command.\npub fn modulate_attention_with_clock_phase(cmd: AttentionCmd, clock_phase: f64) -\u003e AttentionCmd {\n    if clock_phase \u003e 0.8 {\n        match \u0026cmd {\n            AttentionCmd::HoldCurrent | AttentionCmd::Continue =\u003e {\n                trace!(\n                    clock_phase,\n                    original_cmd = ?cmd,\n                    \"clock phase peak → shifting to ConflictTrace\"\n                );\n                AttentionCmd::ShiftTo(ShiftTarget::ConflictTrace)\n            }\n            _ =\u003e cmd,\n        }\n    } else if clock_phase \u003c 0.2 {\n        match \u0026cmd {\n            AttentionCmd::ShiftTo(_) | AttentionCmd::Continue =\u003e {\n                trace!(\n                    clock_phase,\n                    original_cmd = ?cmd,\n                    \"clock phase trough → holding current\"\n                );\n                AttentionCmd::HoldCurrent\n            }\n            _ =\u003e cmd,\n        }\n    } else {\n        cmd\n    }\n}\n\n/// Reflexive guard: check whether a forced True/False decision was made\n/// while unresolved cross-frame conflicts remain.\nfn reflexive_guard(\n    _auditor: \u0026mut ReflexiveAuditor,\n    domain: \u0026Domain,\n    decision: \u0026TritWord,\n    interrupts: \u0026[MetaInterrupt],\n    safe_fallback: \u0026SafeFallback,\n) -\u003e Option\u003cReflexiveAlert\u003e {\n    let unresolved_conflicts = interrupts\n        .iter()\n        .filter(|i| matches!(i.conflict, crate::meta::ConflictType::FrameMismatch))\n        .count();\n\n    let is_forced = decision.value() == TritValue::True || decision.value() == TritValue::False;\n\n    if unresolved_conflicts \u003e 0 \u0026\u0026 is_forced {\n        // In dangerous domains the forced output may be required by\n        // SafeFallback; do not second-guess safety overrides.\n        let dangerous = safe_fallback.is_dangerous(domain);\n        if dangerous {\n            return None;\n        }\n        let alert = ReflexiveAlert {\n            reason: format!(\n                \"Forced {:?} output with {} unresolved frame conflict(s)\",\n                decision.value(),\n                unresolved_conflicts\n            ),\n            recommendation: \"Reflexive guard suggests returning Hold.\".to_string(),\n        };\n        return Some(alert);\n    }\n\n    None\n}\n\nfn build_policy(domain_str: \u0026str) -\u003e Result\u003cResolutionPolicy, SandboxError\u003e {\n    let domain = domain_str\n        .parse::\u003cDomain\u003e()\n        .map_err(|e| SandboxError::InvalidDomain(format!(\"{}\", e)))?;\n    Ok(ResolutionPolicy::new(domain))\n}\n\nfn build_trits(signals: \u0026[SignalInput]) -\u003e Result\u003cVec\u003cTritWord\u003e, SandboxError\u003e {\n    signals\n        .iter()\n        .enumerate()\n        .map(|(i, s)| {\n            let frame: Frame = s.frame.parse().map_err(|e| SandboxError::InvalidFrame {\n                index: i,\n                reason: format!(\"{}\", e),\n            })?;\n            let value = TritValue::from(s.value);\n            let phase = Phase::new(s.phase).map_err(|e| SandboxError::InvalidPhase {\n                index: i,\n                reason: format!(\"{}\", e),\n            })?;\n n Err(SandboxError::InvalidScenario(\n            \"At least one signal is required\".to_string(),\n        ));\n    }\n    if scenario.signals.len() \u003e MAX_SIGNALS {\n        return Err(SandboxError::InvalidScenario(format!(\n            \"Too many signals: {} (max {})\",\n            scenario.signals.len(),\n            MAX_SIGNALS\n        )));\n    }\n\n    validate_domain(\u0026scenario.domain)?;\n\n    for (i, signal) in scenario.signals.iter().enumerate() {\n        validate_signal(i, signal)?;\n    }\n\n    Ok(())\n}\n\n/// Validate that the domain string is known.\npub fn validate_domain(domain: \u0026str) -\u003e Result\u003c(), SandboxError\u003e {\n    domain\n        .parse::\u003cDomain\u003e()\n        .map(|_| ())\n        .map_err(|e| SandboxError::InvalidDomain(format!(\"{}\", e)))\n}\n\n/// Validate a single signal.\npub fn validate_signal(index: usize, signal: \u0026SignalInput) -\u003e Result\u003c(), SandboxError\u003e {\n    if signal.phase.is_nan() || signal.phase.is_infinite() || !(0.0..=1.0).contains(\u0026signal.phase) {\n        return Err(SandboxError::InvalidPhase {\n            index,\n            reason: format!(\n                \"phase {} is invalid (must be finite in [0.0, 1.0])\",\n                signal.phase\n            ),\n        });\n    }\n    if !matches!(signal.value, -1..=1) {\n        return Err(SandboxError::InvalidValue {\n            index,\n            reason: format!(\"value {} is invalid (must be 1, 0, or -1)\", signal.value),\n        });\n    }\n    // Meta frame is system-internal (output of cross-frame conflict resolution).\n    // External signal inputs may use concrete decision frames plus the\n    // first-person reference frames introduced by the mind-engineering extension.\n    match signal.frame.as_str() {\n        \"Science\" | \"Individual\" | \"Consensus\" | \"Absolute\" | \"FirstPerson\" | \"Embodied\"\n        | \"Relational\" =\u003e Ok(()),\n        f =\u003e Err(SandboxError::InvalidFrame {\n            index,\n            reason: format!(\"unknown frame '{}'\", f),\n        }),\n    }\n}\n\n/// Sanitize a free-form string for log/output emission.\npub fn sanitize_log_field(s: \u0026str) -\u003e String {\n    s.chars()\n        .map(|c| {\n            if c.is_control() \u0026\u0026 c != ' ' {\n                '\\u{FFFD}'\n            } else {\n                c\n            }\n        })\n        .take(256)\n        .collect()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn signal(frame: \u0026str, value: i8, phase: f64) -\u003e SignalInput {\n        SignalInput {\n            frame: frame.into(),\n            value,\n            phase,\n            sensor: None,\n        }\n    }\n\n    fn scenario(id: \u0026str, domain: \u0026str, signals: Vec\u003cSignalInput\u003e) -\u003e ScenarioInput {\n        ScenarioInput {\n            id: id.into(),\n            description: \"test\".into(),\n            domain: domain.into(),\n            signals,\n            expected_behavior: \"hold\".into(),\n            environmental_context: None,\n        }\n    }\n\n    #[test]\n    fn validate_accepts_valid_scenario() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_ok());\n    }\n\n    #[test]\n    fn validate_rejects_empty_signals() {\n        let s = scenario(\"x\", \"General\", vec![]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_too_many_signals() {\n        let signals: Vec\u003c_\u003e = (0..=MAX_SIGNALS)\n            .map(|_| signal(\"Science\", 1, 0.5))\n            .collect();\n        let s = scenario(\"x\", \"General\", signals);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_invalid_domain() {\n        let s = scenario(\"x\", \"Mystic\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_accepts_custom_domain() {\n        let s = scenario(\"x\", \"Custom(chemistry)\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_ok());\n    }\n\n    #[test]\n    fn validate_rejects_empty_custom_domain() {\n        let s = scenario(\"x\", \"Custom()\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_invalid_phase() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Science\", 1, 1.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_nan_phase() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Science\", 1, f64::NAN)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_invalid_value() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Science\", 2, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_invalid_frame() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Bogus\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_long_id() {\n        let s = scenario(\n            \u0026\"x\".repeat(MAX_STRING_LEN + 1),\n            \"General\",\n            vec![signal(\"Science\", 1, 0.5)],\n        );\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn sanitize_replaces_control_chars() {\n        let sanitized = sanitize_log_field(\"hello\\nworld\");\n        assert!(!sanitized.contains('\\n'));\n        assert!(sanitized.contains(\"hello\"));\n        assert!(sanitized.contains(\"world\"));\n    }\n\n    #[test]\n    fn sanitize_truncates_long_strings() {\n        let long = \"x\".repeat(512);\n        let sanitized = sanitize_log_field(\u0026long);\n        assert_eq!(sanitized.len(), 256);\n    }\n}\n","traces":[{"line":17, alue code must be 0.\n    /// - `\"commit_true\"` → final value code must be 1.\n    /// - `\"commit_false\"` → final value code must be -1.\n    /// - `\"negotiate\"` → policy action must contain `Negotiate`.\n    pub fn validate(output: \u0026SandboxOutput, expected_behavior: \u0026str) -\u003e Result\u003c(), SandboxError\u003e {\n        match expected_behavior {\n            \"hold\" =\u003e {\n                if !output.is_hold() {\n                    return Err(SandboxError::ExpectedBehaviorMismatch {\n                        expected: expected_behavior.into(),\n                        got: output.final_value.clone(),\n                    });\n                }\n            }\n            \"commit_true\" =\u003e {\n                if !output.is_commit_true() {\n                    return Err(SandboxError::ExpectedBehaviorMismatch {\n                        expected: expected_behavior.into(),\n                        got: output.final_value.clone(),\n                    });\n                }\n            }\n            \"commit_false\" =\u003e {\n                if !output.is_commit_false() {\n                    return Err(SandboxError::ExpectedBehaviorMismatch {\n                        expected: expected_behavior.into(),\n                        got: output.final_value.clone(),\n                    });\n                }\n            }\n            \"negotiate\" =\u003e {\n                if !output.policy_action.contains(\"Negotiate\") {\n                    return Err(SandboxError::ExpectedBehaviorMismatch {\n                        expected: expected_behavior.into(),\n                        got: output.policy_action.clone(),\n                    });\n                }\n            }\n            other =\u003e {\n                return Err(SandboxError::InvalidScenario(format!(\n                    \"unknown expected_behavior: '{}'\",\n                    other\n                )))\n            }\n        }\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn output(value_code: i8, policy_action: \u0026str) -\u003e SandboxOutput {\n        SandboxOutput {\n            scenario_id: \"x\".into(),\n            final_value: match value_code {\n                1 =\u003e \"True\".into(),\n                -1 =\u003e \"False\".into(),\n                _ =\u003e \"Hold\".into(),\n            },\n            final_value_code: value_code,\n            final_frame: \"Meta\".into(),\n            final_phase_raw: 0.5,\n            interrupts: vec![],\n            policy_action: policy_action.into(),\n            reflexive_alert: None,\n            attention_cmd: None,\n            receiver_estimate: None,\n            hold_state: None,\n        }\n    }\n\n    #[test]\n    fn validate_hold_ok() {\n        ScenarioValidator::validate(\u0026output(0, \"Hold\"), \"hold\").unwrap();\n    }\n\n    #[test]\n    fn validate_commit_true_ok() {\n        ScenarioValidator::validate(\u0026output(1, \"Commit\"), \"commit_true\").unwrap();\n    }\n\n    #[test]\n    fn validate_commit_false_ok() {\n        ScenarioValidator::validate(\u0026output(-1, \"Commit\"), \"commit_false\").unwrap();\n    }\n\n    #[test]\n    fn validate_negotiate_ok() {\n        ScenarioValidator::validate(\u0026output(0, \"Negotiate\"), \"negotiate\").unwrap();\n    }\n\n    #[test]\n    fn validate_mismatch() {\n        assert!(ScenarioValidator::validate(\u0026output(1, \"Commit\"), \"hold\").is_err());\n    }\n}\n","traces":[{"line":16,"address":[],"length":0,"stats":{"Line":5044031582654955526}},{"line":17,"address":[],"length":0,"stats":{"Line":5044031582654955526}},{"line":18,"address":[],"length":0,"stats":{"Line":5044031582654955526}},{"line":19,"address":[],"length":0,"stats":{"Line":1513209474796486656}},{"line":20,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":21,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":22,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":
