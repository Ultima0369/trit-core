_with_opts`] to configure logging without environment variables.\n\nuse std::fs::OpenOptions;\nuse std::io;\nuse std::io::Write;\nuse std::path::Path;\nuse std::sync::{Arc, Mutex};\nuse tracing_subscriber::fmt::format::FmtSpan;\nuse tracing_subscriber::EnvFilter;\n\n/// Log output format.\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Default)]\npub enum LogFormat {\n    /// Pretty human-readable multi-line format.\n    Pretty,\n    /// Compact single-line format.\n    Compact,\n    /// Full human-readable format.\n    Full,\n    /// JSON structured format.\n    #[default]\n    Json,\n}\n\nimpl std::str::FromStr for LogFormat {\n    type Err = String;\n\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\n        match s.to_ascii_lowercase().as_str() {\n            \"json\" =\u003e Ok(LogFormat::Json),\n            \"pretty\" =\u003e Ok(LogFormat::Pretty),\n            \"compact\" =\u003e Ok(LogFormat::Compact),\n            \"full\" =\u003e Ok(LogFormat::Full),\n            other =\u003e Err(format!(\n                \"unknown log format '{}': expected json|pretty|compact|full\",\n                other\n            )),\n        }\n    }\n}\n\n/// Options for initializing the tracing subscriber.\n#[derive(Debug, Clone)]\npub struct LogOptions {\n    /// Log filter directive (e.g. \"info\", \"debug\").\n    pub filter: String,\n    /// Output format.\n    pub format: LogFormat,\n    /// Optional path to write logs to a file.\n    pub file: Option\u003cstd::path::PathBuf\u003e,\n    /// Whether to include span close events.\n    pub span_events: bool,\n}\n\nimpl Default for LogOptions {\n    fn default() -\u003e Self {\n        Self {\n            filter: \"info\".to_string(),\n            format: LogFormat::Json,\n            file: None,\n            span_events: true,\n        }\n    }\n}\n\nimpl LogOptions {\n    /// Read options from environment variables.\n    pub fn from_env() -\u003e Self {\n        let filter = std::env::var(\"TRIT_LOG\")\n            .or_else(|_| std::env::var(\"RUST_LOG\"))\n            .unwrap_or_else(|_| \"info\".to_string());\n\n        let use_json = std::env::var(\"TRIT_LOG_JSON\")\n            .map(|v| v != \"0\" \u0026\u0026 v != \"false\" \u0026\u0026 v != \"off\")\n            .unwrap_or(true);\n\n        let format = std::env::var(\"TRIT_LOG_FORMAT\")\n            .ok()\n            .and_then(|v| v.parse::\u003cLogFormat\u003e().ok())\n            .unwrap_or(if use_json {\n                LogFormat::Json\n            } else {\n                LogFormat::Full\n            });\n\n        let file = std::env::var(\"TRIT_LOG_FILE\")\n            .ok()\n            .map(std::path::PathBuf::from);\n\n        Self {\n            filter,\n            format,\n            file,\n            span_events: true,\n        }\n    }\n\n    /// Set the log level filter.\n    pub fn with_filter(mut self, filter: impl Into\u003cString\u003e) -\u003e Self {\n        self.filter = filter.into();\n        self\n    }\n\n    /// Set the output format.\n    pub fn with_format(mut self, format: LogFormat) -\u003e Self {\n        self.format = format;\n        self\n    }\n\n    /// Set an optional log file path.\n    pub fn with_file(mut self, path: impl AsRef\u003cPath\u003e) -\u003e Self {\n        self.file = Some(path.as_ref().to_path_buf());\n        self\n    }\n}\n\n/// Thread-safe file writer wrapper.\n#[derive(Clone)]\nstruct ArcWriter {\n    inner: Arc\u003cMutex\u003cstd::fs::File\u003e\u003e,\n}\n\nimpl ArcWriter {\n    fn new(file: std::fs::File) -\u003e Self {\n        Self {\n            inner: Arc::new(Mutex::new(file)),\n        }\n    }\n}\n\nimpl Write for ArcWriter {\n    fn write(\u0026mut self, buf: \u0026[u8]) -\u003e io::Result\u003cusize\u003e {\n        let mut guard = self\n            .inner\n            .lock()\n            .map_err(|e| io::Error::other(format!(\"log file mutex poisoned: {}\", e)))?;\n        guard.write(buf)\n    }\n\n    fn flush(\u0026mut self) -\u003e io::Result\u003c()\u003e {\n        let mut guard = self\n            .inner\n            .lock()\n            .map_err(|e| io::Error::other(format!(\"log file mutex poisoned: {}\", e)))?;\n        guard.flush()\n    }\n}\n\nimpl\u003c'a\u003e tracing_subscriber::fmt::MakeWriter\u003c'a\u003e for ArcWriter {\n    type Writer = Self;\n    fn make_writer(\u0026'a self) -\u003e Self::Writer {\n        self.clone()\n    }\n}\n\nfn build_env_filter(opts: \u0026LogOptions) -\u003e Result\u003cEnvFilter, String\u003e {\n    EnvFilter::try_new(\u0026opts.filter)\n        .map_err(|e| format!(\"invalid log filter '{}': {}\", opts.filter, e))\n}\n\n/// Initialize the tracing subscriber with options.\n///\n/// Returns an error if the filter directive is invalid or the log file cannot be opened.\npub fn init_with_opts(opts: LogOptions) -\u003e Result\u003c(), String\u003e {\n    let env_filter = build_env_filter(\u0026opts)?;\n\n    if let Some(path) = \u0026opts.file {\n        let file = OpenOptions::new()\n            .create(true)\n            .append(true)\n            .open(path)\n            .map_err(|e| format!(\"failed to open log file '{}': {}\", path.display(), e))?;\n        let writer = ArcWriter::new(file);\n        init_file_subscriber(env_filter, writer, opts.format, opts.span_events)?;\n    } else {\n        init_stderr_subscriber(env_filter, opts.format, opts.span_events)?;\n    }\n\n    Ok(())\n}\n\nfn init_file_subscriber\u003cW\u003e(\n    env_filter: EnvFilter,\n    writer: W,\n    format: LogFormat,\n    span_events: bool,\n) -\u003e Result\u003c(), String\u003e\nwhere\n    W: for\u003c'a\u003e tracing_subscriber::fmt::MakeWriter\u003c'a\u003e + Send + Sync + 'static,\n{\n    let span_events_opt = if span_events {\n        FmtSpan::CLOSE\n    } else {\n        FmtSpan::NONE\n    };\n\n    match format {\n        LogFormat::Json =\u003e {\n            tracing_subscriber::fmt()\n                .with_env_filter(env_filter)\n                .json()\n                .with_span_events(span_events_opt)\n                .with_target(true)\n                .with_file(true)\n                .with_line_number(true)\n                .with_thread_ids(true)\n                .with_writer(writer)\n                .try_init()\n                .map_err(|e| format!(\"tracing subscriber already initialized: {}\", e))?;\n        }\n        LogFormat::Pretty =\u003e {\n            tracing_subscriber::fmt()\n                .with_env_filter(env_filter)\n                .pretty()\n                .with_span_events(span_events_opt)\n                .with_target(true)\n                .with_file(true)\n                .with_line_number(true)\n                .with_thread_ids(true)\n                .with_writer(writer)\n                .try_init()\n                .map_err(|e| format!(\"tracing subscriber already initialized: {}\", e))?;\n        }\n        LogFormat::Compact =\u003e {\n            tracing_subscriber::fmt()\n                .with_env_filter(env_filter)\n                .compact()\n                .with_span_events(span_events_opt)\n                .with_target(true)\n                .with_writer(writer)\n                .try_init()\n                .map_err(|e| format!(\"tracing subscriber already initialized: {}\", e))?;\n        }\n        LogFormat::Full =\u003e {\n            tracing_subscriber::fmt()\n                .with_env_filter(env_filter)\n                .with_span_events(span_events_opt)\n                .with_target(true)\n                .with_file(true)\n                .with_line_number(true)\n                .with_thread_ids(true)\n                .with_writer(writer)\n                .try_init()\n                .map_err(|e| format!(\"tracing subscriber already initialized: {}\", e))?;\n        }\n    }\n\n    Ok(())\n}\n\nfn init_stderr_subscriber(\n    env_filter: EnvFilter,\n    format: LogFormat,\n    span_events: bool,\n) -\u003e Result\u003c(), String\u003e {\n    init_file_subscriber(env_filter, io::stderr, format, span_events)\n}\n\n/// Initialize the tracing subscriber using environment variables.\n///\n/// Prints a warning to stderr if initialization fails.\npub fn init() {\n    if let Err(e) = init_with_opts(LogOptions::from_env()) {\n        eprintln!(\"[trit-core] warning: failed to initialize tracing: {}\", e);\n    }\n}\n","traces":[{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":44,"address":[],"length":0,"stats":{"Line":0}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":82,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":83,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":84,"address":[],"length":0,"stats":{"Line":3891110078048108544}},{"line":86,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":87,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":90,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":92,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":93,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":94,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":99,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":101,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":112,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":113,"address":[],"length" .iter(|| black_box(near_zero).quantize(black_box(1e-6)))\n    });\n\n    c.bench_function(\"phase_quantize_near_one\", |b_bench| {\n        b_bench.iter(|| black_box(near_one).quantize(black_box(1e-6)))\n    });\n\n    c.bench_function(\"phase_quantize_noop\", |b_bench| {\n        b_bench.iter(|| black_box(normal).quantize(black_box(1e-6)))\n    });\n}\n\nfn bench_full_pipeline_medical(c: \u0026mut Criterion) {\n    let json = r#\"{\n        \"id\": \"bench-medical\",\n        \"description\": \"Patient treatment conflict\",\n        \"domain\": \"MedicalEthics\",\n        \"signals\": [\n            {\"frame\": \"Science\", \"value\": 1, \"phase\": 0.85},\n            {\"frame\": \"Individual\", \"value\": -1, \"phase\": 0.75}\n        ],\n        \"expected_behavior\": \"hold\"\n    }\"#;\n    c.bench_function(\"full_pipeline_medical_ethics\", |b| {\n        b.iter(|| {\n            let input: ScenarioInput = serde_json::from_str(black_box(json)).unwrap();\n            let mut pipeline = SandboxPipeline::default();\n            let output = pipeline.run(black_box(\u0026input)).unwrap();\n            black_box(output);\n        });\n    });\n}\n\nfn bench_full_pipeline_physical(c: \u0026mut Criterion) {\n    let json = r#\"{\n        \"id\": \"bench-physical\",\n        \"description\": \"Bridge safety overload detection\",\n        \"domain\": \"Physical\",\n        \"signals\": [\n            {\"frame\": \"Science\", \"value\": -1, \"phase\": 0.95},\n            {\"frame\": \"Individual\", \"value\": 1, \"phase\": 0.55}\n        ],\n        \"expected_behavior\": \"commit_false\"\n    }\"#;\n    c.bench_function(\"full_pipeline_physical\", |b| {\n        b.iter(|| {\n            let input: ScenarioInput = serde_json::from_str(black_box(json)).unwrap();\n            let mut pipeline = SandboxPipeline::default();\n            let output = pipeline.run(black_box(\u0026input)).unwrap();\n            black_box(output);\n        });\n    });\n}\n\nfn bench_json_serde_scenario_deser(c: \u0026mut Criterion) {\n    let json = r#\"{\n        \"id\": \"bench-ser\",\n        \"description\": \"JSON deserialization benchmark\",\n        \"domain\": \"MedicalEthics\",\n        \"signals\": [\n            {\"frame\": \"Science\", \"value\": 1, \"phase\": 0.85},\n            {\"frame\": \"Individual\", \"value\": -1, \"phase\": 0.75}\n        ],\n        \"expected_behavior\": \"hold\"\n    }\"#;\n\n    c.bench_function(\"json_deser_scenario\", |b| {\n        b.iter(|| {\n            let _input: ScenarioInput = serde_json::from_str(black_box(json)).unwrap();\n        });\n    });\n}\n\nfn bench_json_serde_output_ser(c: \u0026mut Criterion) {\n    let output = SandboxOutput {\n        scenario_id: \"bench\".into(),\n        final_value: \"Hold\".into(),\n        final_value_code: 0,\n        final_frame: \"Meta\".into(),\n        final_phase_raw: 0.5,\n        interrupts: vec![\"FrameMismatch\".into(), \"PhaseDrift\".into()],\n        policy_action: \"Hold\".into(),\n        reflexive_alert: None,\n        attention_cmd: None,\n        receiver_estimate: None,\n        hold_state: None,\n    };\n\n    c.bench_function(\"json_ser_output\", |b| {\n        b.iter(|| {\n            let _json = serde_json::to_string(black_box(\u0026output)).unwrap();\n        });\n    });\n}\n\ncriterion_group!(\n    core_ops,\n    bench_tand_same_frame,\n    bench_tand_cross_frame,\n    bench_tor_same_frame,\n    bench_tnot,\n);\n\ncriterion_group!(hot_path, bench_tand_hot, bench_precheck_same_frame);\n\ncriterion_group!(cascades, bench_cascade_10, bench_cascade_10_hot);\n\ncriterion_group!(phase_precision, bench_phase_quantize);\n\ncriterion_group!(\n    pipeline,\n    bench_full_pipeline_medical,\n    bench_full_pipeline_physical\n);\n\ncriterion_group!(\n    json_serde,\n    bench_json_serde_scenario_deser,\n    bench_json_serde_output_ser\n);\n\ncriterion_main!(\n    core_ops,\n    hot_path,\n    cascades,\n    phase_precision,\n    pipeline,\n    json_serde\n);\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","baseline","mod.rs"],"content":"// Binary baseline comparator for M2 validation.\n// Implements simple majority-rule logic (no Hold state) to demonstrate\n// where binary systems fail to preserve conflicts that Trit-Core detects.\n\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\n\n#[cfg(test)]\nuse crate::core::frame::Frame;\n\n/// Result of a binary baseline evaluation.\n#[derive(Debug, Clone, PartialEq)]\npub struct BinaryResult {\n    /// The collapsed binary value (True or False, never Hold).\n    pub value: TritValue,\n    /// Whether the binary result conflicts with the ternary result.\n    pub conflicts_with_ternary: bool,\n    /// Explanation of the binary decision logic.\n    pub reasoning: String,\n}\n\n/// Binary baseline comparator using simple majority voting.\n///\n/// Unlike Trit-Core's ternary logic which preserves Hold states when\n/// domains conflict, the binary baseline always collapses to True or False.\npub struct BinaryBaseline;\n\nimpl BinaryBaseline {\n    /// Evaluate a set of signals using binary majority rule.\n    ///\n    /// Counts True vs False votes. Hold signals are treated as abstentions\n    /// (not counted). In case of a tie, defaults to False (conservative).\n    pub fn evaluate(signals: \u0026[TritWord]) -\u003e BinaryResult {\n        let trues: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::True)\n            .count();\n        let falses: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::False)\n            .count();\n        let holds: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::Hold)\n            .count();\n\n        let value = if trues \u003e falses {\n            TritValue::True\n        } else {\n            TritValue::False // tie goes to False (conservative)\n        };\n\n        let reasoning = format!(\n            \"Binary majority: {} True, {} False, {} Hold (abstained). {} wins.\",\n            trues,\n            falses,\n            holds,\n            if value == TritValue::True {\n                \"True\"\n            } else {\n                \"False\"\n            }\n        );\n\n        BinaryResult {\n            value,\n            conflicts_with_ternary: false, // set by caller\n            reasoning,\n        }\n    }\n\n    /// Compare binary baseline against ternary (Trit-Core) result.\n    /// Returns true if the binary result would have \"smoothed\" or \"overridden\"\n    /// a conflict that the ternary system correctly identified.\n    pub fn compare(ternary: \u0026TritWord, binary: \u0026BinaryResult) -\u003e BinaryResult {\n        let conflicts = ternary.value() == TritValue::Hold\n            || (ternary.value() != binary.value \u0026\u0026 ternary.value() != TritValue::Hold);\n\n        BinaryResult {\n            value: binary.value,\n            conflicts_with_ternary: conflicts,\n            reasoning: if conflicts {\n                format!(\n                    \"{} [CONFLICT: ternary={:?}, binary would override]\",\n                    binary.reasoning,\n                    ternary.value()\n                )\n            } else {\n                format!(\n                    \"{} [AGREE: ternary={:?}]\",\n                    binary.reasoning,\n                    ternary.value()\n                )\n            },\n        }\n    }\n\n    /// Check if a set of signals has cross-frame conflicts that binary\n    /// would ignore but ternary would detect.\n    pub fn has_hidden_conflict(signals: \u0026[TritWord]) -\u003e bool {\n        if signals.is_empty() {\n            return false;\n        }\n        let first_frame = signals[0].frame();\n        signals.iter().any(|t| t.frame() != first_frame)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn binary_majority_true_wins() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::True);\n    }\n\n    #[test]\n    fn binary_majority_false_wins() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn binary_tie_defaults_false() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn binary_ignores_cross_frame_conflict() {\n        // Binary doesn't care about frame mismatches\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        // Tie (1 True, 1 False) → False\n        assert_eq!(result.value, TritValue::False);\n        // But there IS a hidden cross-frame conflict\n        assert!(BinaryBaseline::has_hidden_conflict(\u0026signals));\n    }\n\n    #[test]\n    fn binary_vs_ternary_conflict_detected() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let binary = BinaryBaseline::evaluate(\u0026signals);\n        let ternary = TritWord::hold(Frame::Meta);\n        let comparison = BinaryBaseline::compare(\u0026ternary, \u0026binary);\n        assert!(comparison.conflicts_with_ternary);\n    }\n\n    #[test]\n    fn binary_all_hold_defaults_false() {\n        let signals = vec![\n            TritWord::hold(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n        assert!(result.reasoning.contains(\"0 True, 0 False\"));\n    }\n\n    #[test]\n    fn binary_ignores_unknown() {\n        // Unknown values are not counted as True, False, or Hold.\n        let signals = vec![\n            TritWord::unknown(Frame::Science),\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        // Tie (1 True, 1 False) → False\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn compare_agrees_when_values_match() {\n        let binary = BinaryBaseline::evaluate(\u0026[TritWord::tru(Frame::Science)]);\n        let ternary = TritWord::tru(Frame::Science);\n        let comparison = BinaryBaseline::compare(\u0026ternary, \u0026binary);\n        assert!(!comparison.conflicts_with_ternary);\n        assert!(comparison.reasoning.contains(\"AGREE\"));\n    }\n\n    #[test]\n    fn empty_signals_have_no_hidden_conflict() {\n        assert!(!BinaryBaseline::has_hidden_conflict(\u0026[]));\n    }\n\n    #[test]\n    fn single_signal_has_no_hidden_conflict() {\n        let signals = vec![TritWord::tru(Frame::Science)];\n        assert!(!BinaryBaseline::has_hidden_conflict(\u0026signals));\n    }\n\n    #[test]\n    fn reasoning_includes_counts() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert!(result.reasoning.contains(\"1 True\"));\n        assert!(result.reasoning.contains(\"0 False\"));\n        assert!(result.reasoning.contains(\"1 Hold\"));\n    }\n}\n","traces":[ asures\n// allocation patterns on the cold path and end-to-end pipeline.\n//\n// Usage:\n//   cargo build --release --bin dhat-profile --features dhat-profile\n//   cargo run --release --bin dhat-profile --features dhat-profile\n//   dhat-heap.json is written to the current directory.\n//\n// Analyze with:\n//   dhat-viewer dhat-heap.json    (if installed)\n//   Or upload to https://nnethercote.github.io/dh_view/dh_view.html\n\nuse std::error::Error;\nuse trit_core::core::frame::Frame;\nuse trit_core::core::phase::Phase;\nuse trit_core::core::value::TritValue;\nuse trit_core::core::word::TritWord;\nuse trit_core::core::TernaryAlgebra;\nuse trit_core::meta::{Domain, ResolutionPolicy, SafeFallback};\n\nfn main() -\u003e Result\u003c(), Box\u003cdyn Error\u003e\u003e {\n    println!(\"Trit-Core dhat Heap Profiling\");\n    println!(\"==============================\");\n\n    // ── Sanity check: verify dhat is capturing allocations ──\n    println!(\"\\n[0/6] Sanity check: explicit Vec allocation...\");\n    let _sanity_profiler = dhat::Profiler::new_heap();\n    {\n        let v: Vec\u003cu8\u003e = vec![0u8; 1024];\n        std::hint::black_box(\u0026v);\n    }\n    drop(_sanity_profiler);\n\n    // ── Hot path: TAND same-frame (should be zero-allocation) ──\n    println!(\"\\n[1/5] Profiling hot path: TAND same-frame x 100,000...\");\n    let _hot_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.8)?, Frame::Science);\n        let b = TritWord::new(TritValue::False, Phase::new(0.2)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_and_hot(\u0026a, \u0026b);\n        }\n    }\n    drop(_hot_profiler);\n\n    // ── Hot path: TOR same-frame ──\n    println!(\"[2/5] Profiling hot path: TOR same-frame x 100,000...\");\n    let _tor_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.7)?, Frame::Science);\n        let b = TritWord::new(TritValue::Hold, Phase::new(0.5)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\n        }\n    }\n    drop(_tor_profiler);\n\n    // ── Hot path: TNOT ──\n    println!(\"[3/5] Profiling hot path: TNOT x 100,000...\");\n    let _tnot_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.9)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_not(\u0026a);\n        }\n    }\n    drop(_tnot_profiler);\n\n    // ── Cold path: TAND cross-frame (should allocate MetaInterrupt) ──\n    println!(\"[4/5] Profiling cold path: TAND cross-frame x 10,000...\");\n    let _cold_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.8)?, Frame::Science);\n        let b = TritWord::new(TritValue::False, Phase::new(0.2)?, Frame::Individual);\n        let mut interrupt_count = 0u64;\n        for _ in 0..10_000 {\n            let (result, interrupt) = TernaryAlgebra::t_and(\u0026a, \u0026b);\n            if interrupt.is_some() {\n                interrupt_count += 1;\n            }\n            std::hint::black_box(result);\n        }\n        // Force the count to be used so the interrupt path isn't optimized away\n        println!(\"  Interrupts generated: {}\", interrupt_count);\n    }\n    drop(_cold_profiler);\n\n    // ── End-to-end pipeline: MedicalEthics ──\n    println!(\"[5/5] Profiling end-to-end pipeline: MedicalEthics x 1,000...\");\n    let _pipeline_profiler = dhat::Profiler::new_heap();\n    {\n        let science = TritWord::new(TritValue::True, Phase::new(0.85)?, Frame::Science);\n        let individual = TritWord::new(TritValue::False, Phase::new(0.20)?, Frame::Individual);\n\n        for _ in 0..1_000 {\n            let (result, interrupt) = TernaryAlgebra::t_and(\u0026science, \u0026individual);\n            let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n            let arbitration = policy.arbitrate(\u0026[science, individual])?;\n            let sf = SafeFallback::new();\n            let (final_result, _) = sf.guard(\n                \u0026Domain::MedicalEthics,\n                \u0026result,\n                if interrupt.is_some() { 1 } else { 0 },\n            );\n            // Prevent optimization: use the result\n            std::hint::black_box(final_result);\n            std::hint::black_box(arbitration);\n        }\n    }\n    drop(_pipeline_profiler);\n\n    println!(\"\\nProfiling complete.\");\n    println!(\"dhat-heap.json written to current directory.\");\n    println!(\"View with: dhat-viewer dhat-heap.json\");\n    println!(\"Or upload to: https://nnethercote.github.io/dh_view/dh_view.html\");\n    Ok(())\n}\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"l  verbose = true,\n                \"-q\" | \"--quiet\" =\u003e quiet = true,\n                \"--trace\" =\u003e trace = true,\n                \"--log-file\" =\u003e {\n                    log_file = Some(\n                        args.next()\n                            .ok_or(\"--log-file requires a value\")?\n                            .to_string(),\n                    );\n                }\n                \"--log-format\" =\u003e {\n                    let fmt = args\n                        .next()\n                        .ok_or(\"--log-format requires a value\")?\n                        .to_string();\n                    log_format = fmt.parse::\u003cLogFormat\u003e()?;\n                }\n                \"--diagnostic\" =\u003e diagnostic = true,\n                \"--validate-only\" =\u003e validate_only = true,\n                \"--dry-run\" =\u003e dry_run = true,\n                \"--reflexive\" =\u003e reflexive = true,\n                \"--hold-final\" =\u003e hold_final = true,\n                \"--trace-phase\" =\u003e trace_phase = true,\n                \"--self-knowledge\" =\u003e self_knowledge = true,\n                \"-h\" | \"--help\" =\u003e {\n                    print_usage();\n                    std::process::exit(0);\n                }\n                other =\u003e return Err(format!(\"unknown argument: {}\", other)),\n            }\n        }\n\n        let scenario = scenario.ok_or(\"missing required argument: --scenario \u003cpath.json\u003e\")?;\n\n        Ok(Self {\n            scenario,\n            verbose,\n            quiet,\n            trace,\n            log_file,\n            log_format,\n            diagnostic,\n            validate_only,\n            dry_run,\n            reflexive,\n            hold_final,\n            trace_phase,\n            self_knowledge,\n        })\n    }\n\n    fn log_filter(\u0026self) -\u003e \u0026'static str {\n        if self.trace {\n            \"trace\"\n        } else if self.verbose {\n            \"debug\"\n        } else if self.quiet {\n            \"warn\"\n        } else {\n            \"info\"\n        }\n    }\n}\n\nfn print_usage() {\n    println!(\n        r#\"trit-sandbox — run a Trit-Core scenario through the decision pipeline\n\nUsage:\n  trit-sandbox --scenario \u003cpath.json\u003e [OPTIONS]\n\nRequired:\n  --scenario \u003cpath.json\u003e   Path to a scenario JSON file under the scenarios/ directory\n\nLogging options:\n  -v, --verbose            Enable debug-level logging\n  -q, --quiet              Only log warnings and errors\n      --trace              Enable trace-level logging (most verbose)\n      --log-file \u003cpath\u003e    Write logs to a file instead of stderr\n      --log-format \u003cfmt\u003e   One of: json (default), pretty, compact, full\n\nExecution options:\n      --diagnostic         Emit a diagnostic report alongside the output\n      --validate-only      Validate the scenario and exit without running the pipeline\n      --dry-run            Build trits and run TAND, but skip arbitration and SafeFallback\n      --reflexive          Enable reflexive audit between arbitration and SafeFallback\n      --hold-final         Treat Hold as the final answer (do not auto-question)\n      --trace-phase        Output phase shift trajectory in diagnostics\n      --self-knowledge     Enable receiver-state inference from self-knowledge\n  -h, --help               Print this help message\n\nEnvironment:\n  TRIT_LOG                 Log filter (e.g., debug, info, warn)\n  TRIT_LOG_FILE            Path to write logs to a file\n  TRIT_LOG_FORMAT          json | pretty | compact | full\n  TRIT_LOG_JSON            0/false to disable JSON logging\n\"#\n    );\n}\n\n/// Security: validate scenario file path to prevent path traversal (CWE-22).\nfn validate_scenario_path(raw_path: \u0026str) -\u003e Result\u003cPathBuf, String\u003e {\n    let path = Path::new(raw_path);\n\n    let canonical = path\n        .canonicalize()\n        .map_err(|e| format!(\"Invalid path: {}\", e))?;\n\n    let allowed_dir = Path::new(\"scenarios\")\n        .canonicalize()\n        .map_err(|e| format!(\"Cannot resolve scenarios dir: {}\", e))?;\n\n    if !canonical.starts_with(\u0026allowed_dir) {\n        return Err(format!(\n            \"Path traversal denied: '{}' is outside '{}'\",\n            canonical.display(),\n            allowed_dir.display()\n        ));\n    }\n\n    match canonical.extension().and_then(|e| e.to_str()) {\n        Some(\"json\") =\u003e Ok(canonical),\n        _ =\u003e Err(format!(\n            \"Invalid file type: only .json files allowed, got {:?}\",\n            canonical.extension()\n        )),\n    }\n}\n\nfn load_scenario(path: \u0026Path) -\u003e Result\u003cScenarioInput, SandboxError\u003e {\n    use trit_core::sandbox::validate_scenario;\n\n    info!(path = %path.display(), \"loading scenario\");\n    let raw = fs::read_to_string(path)\n        .map_err(|e| SandboxError::Io(format!(\"Failed to read '{}': {}\", path.display(), e)))?;\n    if raw.len() \u003e trit_core::sandbox::MAX_JSON_SIZE {\n        return Err(SandboxError::InvalidScenario(format!(\n            \"File too large: {} bytes (max {})\",\n            raw.len(),\n            trit_core::sandbox::MAX_JSON_SIZE\n        )));\n    }\n    let scenario: ScenarioInput = serde_json::from_str(\u0026raw)\n        .map_err(|e| SandboxError::InvalidScenario(format!(\"Malformed JSON: {}\", e)))?;\n    validate_scenario(\u0026scenario)?;\n    Ok(scenario)\n}\n\nfn run_with_error_context(args: \u0026Args) -\u003e Result\u003cSandboxOutput, SandboxError\u003e {\n    let path = validate_scenario_path(\u0026args.scenario).map_err(|reason| {\n        error!(reason, \"scenario path validation failed\");\n        SandboxError::Io(format!(\"Security error: {}\", reason))\n    })?;\n\n    let scenario = load_scenario(\u0026path)?;\n    info!(scenario_id = %scenario.id, domain = %scenario.domain, \"scenario loaded\");\n\n    if args.validate_only {\n        info!(\"--validate-only requested; skipping pipeline execution\");\n        // Return a minimal output indicating validation success.\n        return Ok(SandboxOutput {\n            scenario_id: scenario.id.clone(),\n            final_value: \"Hold\".to_string(),\n            final_value_code: 0,\n            final_frame: \"Meta\".to_string(),\n            final_phase_raw: 0.5,\n            interrupts: vec![\"validation-only mode\".to_string()],\n            policy_action: \"ValidateOnly\".to_string(),\n            reflexive_alert: None,\n            attention_cmd: None,\n            receiver_estimate: None,\n            hold_state: None,\n        });\n    }\n\n    let mut pipeline = SandboxPipeline::default()\n        .with_dry_run(args.dry_run)\n        .with_hold_final(args.hold_final)\n        .with_trace_phase(args.trace_phase);\n\n    if args.reflexive {\n        pipeline = pipeline.with_reflexive(trit_core::reflexive::ReflexiveAuditor::new());\n    }\n    if args.self_knowledge {\n        pipeline = pipeline\n            .with_self_knowledge(trit_core::knowledge::SelfKnowledge::with_human_defaults());\n    }\n\n    let (output, diagnostics) = pipeline.run_with_diagnostics(\u0026scenario)?;\n\n    if args.diagnostic {\n        eprintln!(\"\\n--- Diagnostic Report ---\");\n        eprintln!(\n            \"{}\",\n            serde_json::to_string_pretty(\u0026diagnostics).map_err(|e| {\n                SandboxError::Io(format!(\"Failed to serialize diagnostics: {}\", e))\n            })?\n        );\n        eprintln!(\"-------------------------\\n\");\n    }\n\n    // Optionally validate expected_behavior if present and non-empty.\n    // In dry-run mode arbitration is skipped, so the full-pipeline expectation\n    // is not applicable.\n    if !args.dry_run \u0026\u0026 !scenario.expected_behavior.is_empty() {\n        if let Err(e) = ScenarioValidator::validate(\u0026output, \u0026scenario.expected_behavior) {\n            warn!(\n                scenario_id = %scenario.id,\n                expected = %scenario.expected_behavior,\n                error = %e,\n                \"expected behavior mismatch\"\n            );\n            return Err(e);\n        }\n    }\n\n    Ok(output)\n}\n\nfn print_error_report(err: \u0026SandboxError) {\n    eprintln!(\"\\n=== Trit-Core Sandbox Error ===\");\n    eprintln!(\"{}\", err.report());\n    eprintln!(\"=================================\\n\");\n}\n\nfn main() -\u003e ExitCode {\n    let args = match Args::parse() {\n        Ok(a) =\u003e a,\n        Err(e) =\u003e {\n            eprintln!(\"Argument error: {}\", e);\n            eprintln!(\"Run with --help for usage information.\");\n            return ExitCode::from(2);\n        }\n    };\n\n    let log_opts = LogOptions::from_env()\n        .with_filter(args.log_filter())\n        .with_format(args.log_format);\n\n    let log_opts = if let Some(file) = \u0026args.log_file {\n        log_opts.with_file(file)\n    } else {\n        log_opts\n    };\n\n    if let Err(e) = trit_core::tracing_init::init_with_opts(log_opts) {\n        eprintln!(\"[trit-core] warning: failed to initialize tracing: {}\", e);\n    }\n\n    match run_with_error_context(\u0026args) {\n        Ok(output) =\u003e {\n            match serde_json::to_string_pretty(\u0026output) {\n                Ok(json) =\u003e println!(\"{}\", json),\n                Err(e) =\u003e {\n                    error!(error = %e, \"failed to serialize output\");\n                    eprintln!(\"Internal error: failed to serialize output: {}\", e);\n                    return ExitCode::from(1);\n                }\n            }\n            ExitCode::SUCCESS\n        }\n        Err(e) =\u003e {\n            error!(error = %e, category = %e.category_name(), \"pipeline failed\");\n            print_error_report(\u0026e);\n            ExitCode::from(1)\n        }\n    }\n}\n","traces":[{"line":8,"address":[],"length":0,"stats":{"Line":216172782113783 ts":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":66,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":68,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":71,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":72,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":74,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":75,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":81,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":82,"address":[],"length":0,"stats":{"Line":0}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":90,"address":[],"length":0,"stats":{"Line":0}}],"covered":29,"coverable":49},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","clock.rs"],"content":"/// Oscillator for phase-based time-scale management.\r\n///\r\n/// Each computation domain can request a different sampling frequency.\r\n/// Note: `phase_now()` returns values in `[-1.0, 1.0]` (raw sine output),\r\n/// which differs from [`Phase`](crate::core::phase::Phase)'s `[0.0, 1.0]` domain.\r\n/// Use [`to_phase()`](HarmonicClock::to_phase) for a mapped `[0.0, 1.0]` output.\r\n///\r\n/// ## Pipeline integration (v0.3.0)\r\n///\r\n/// The clock is now integrated into `SandboxPipeline`. Each `run()` call\r\n/// ticks the clock by the elapsed wall-clock time. The domain selects the\r\n/// clock preset via [`for_domain()`](HarmonicClock::for_domain):\r\n/// - `physical()` (ω=10.0) for Physical, Engineering\r\n/// - `deliberative()` (ω=0.5) for MedicalEthics, ValueJudgment, General, Custom\r\n///\r\n/// The clock phase feeds into `AttentionScheduler` as a modulation signal:\r\n/// near phase peaks (0.8–1.0), the scheduler is more likely to suggest\r\n/// [`ShiftTo`](crate::attention::AttentionCmd::ShiftTo); near troughs\r\n/// (0.0–0.2), more likely to [`HoldCurrent`](crate::attention::AttentionCmd::HoldCurrent).\r\n#[derive(Debug, Clone, PartialEq)]\r\npub struct HarmonicClock {\r\n    omega: f64, // angular frequency\r\n    phi0: f64,  // initial phase offset\r\n    t: f64,     // current time\r\n}\r\n\r\nimpl HarmonicClock {\r\n    pub fn new(omega: f64, phi0: f64) -\u003e Self {\r\n        Self {\r\n            omega,\r\n            phi0,\r\n            t: 0.0,\r\n        }\r\n    }\r\n\r\n    /// Sample at current time. Returns true if rising zero-crossing.\r\n    pub fn tick(\u0026mut self, dt: f64) -\u003e bool {\r\n        let h_prev = (self.omega * self.t + self.phi0).sin();\r\n        self.t += dt;\r\n        let h_curr = (self.omega * self.t + self.phi0).sin();\r\n        h_prev \u003c= 0.0 \u0026\u0026 h_curr \u003e 0.0\r\n    }\r\n\r\n    pub fn phase_now(\u0026self) -\u003e f64 {\r\n        (self.omega * self.t + self.phi0).sin()\r\n    }\r\n\r\n    /// Current phase mapped to `[0.0, 1.0]` for [`Phase`](crate::core::phase::Phase) compatibility.\r\n    ///\r\n    /// Uses the transformation `(sin(angle) + 1.0) / 2.0` which maps:\r\n    /// - `-1.0 → 0.0` (full false)\r\n    /// - `0.0 → 0.5` (neutral)\r\n    /// - `1.0 → 1.0` (full true)\r\n    pub fn to_phase(\u0026self) -\u003e crate::core::phase::Phase {\r\n        let raw = (self.omega * self.t + self.phi0).sin();\r\n        crate::core::phase::Phase::new_clamped((raw + 1.0) / 2.0)\r\n    }\r\n\r\n    /// Fast clock for physical/ engineering domains.\r\n    pub fn physical() -\u003e Self {\r\n        Self::new(10.0, 0.0)\r\n    }\r\n\r\n    /// Slow clock for ethical / value domains.\r\n    pub fn deliberative() -\u003e Self {\r\n        Self::new(0.5, 0.0)\r\n    }\r\n\r\n    /// Select the appropriate clock preset for a domain.\r\n    ///\r\n    /// | Domain | Preset | ω |\r\n    /// |--------|--------|---|\r\n    /// | Physical, Engineering | `physical()` | 10.0 |\r\n    /// | MedicalEthics, ValueJudgment, General, Custom | `deliberative()` | 0.5 |\r\n    pub fn for_domain(domain: \u0026crate::meta::Domain) -\u003e Self {\r\n        match domain {\r\n            crate::meta::Domain::Physical | crate::meta::Domain::Engineering =\u003e Self::physical(),\r\n            _ =\u003e Self::deliberative(),\r\n        }\r\n    }\r\n\r\n    /// Returns the current time accumulator value.\r\n    pub fn elapsed_time(\u0026self) -\u003e f64 {\r\n        self.t\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::meta::Domain;\r\n\r\n    #[test]\r\n    fn should_detect_rising_zero_crossing_on_tick() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        assert!(clock.tick(0.1));\r\n    }\r\n\r\n    #[test]\r\n    fn should_not_detect_crossing_when_descending() {\r\n        let mut clock = HarmonicClock::new(1.0, std::f64::consts::PI);\r\n        assert!(!clock.tick(0.1));\r\n    }\r\n\r\n    #[test]\r\n    fn phase_now_should_return_sine_of_current_angle() {\r\n        let clock = HarmonicClock::new(1.0, std::f64::consts::FRAC_PI_2);\r\n        assert_float_eq!(clock.phase_now(), 1.0);\r\n    }\r\n\r\n    #[test]\r\n    fn physical_clock_should_have_high_frequency() {\r\n        let clock = HarmonicClock::physical();\r\n        assert!(clock.omega \u003e 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn deliberative_clock_should_have_low_frequency() {\r\n        let clock = HarmonicClock::deliberative();\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn multiple_ticks_should_accumulate_time() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        clock.tick(0.1);\r\n        clock.tick(0.1);\r\n        clock.tick(0.1);\r\n        assert!((clock.phase_now() - 0.3_f64.sin()).abs() \u003c 0.01);\r\n    }\r\n\r\n    #[test]\r\n    fn tick_with_zero_dt_is_not_a_crossing() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        assert!(!clock.tick(0.0));\r\n    }\r\n\r\n    #[test]\r\n    fn no_crossing_within_same_half_period() {\r\n        // Start at peak (PI/2) and move a little; no rising zero crossing.\r\n        let mut clock = HarmonicClock::new(1.0, std::f64::consts::FRAC_PI_2);\r\n        assert!(!clock.tick(0.1));\r\n        assert!(!clock.tick(0.1));\r\n    }\r\n\r\n    #[test]\r\n    fn physical_clock_starts_at_zero_phase() {\r\n        let clock = HarmonicClock::physical();\r\n        assert_float_eq!(clock.phase_now(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn deliberative_clock_starts_at_zero_phase() {\r\n        let clock = HarmonicClock::deliberative();\r\n        assert_float_eq!(clock.phase_now(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn phase_now_bounds_are_within_one() {\r\n        let mut clock = HarmonicClock::new(2.5, 0.3);\r\n        for _ in 0..20 {\r\n            clock.tick(0.05);\r\n            let p = clock.phase_now();\r\n            assert!((-1.0..=1.0).contains(\u0026p), \"phase {} out of [-1, 1]\", p);\r\n        }\r\n    }\r\n\r\n    // ── domain preset mapping ─────────────────────────────────────\r\n\r\n    #[test]\r\n    fn for_domain_physical_is_fast() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::Physical);\r\n        assert!(clock.omega \u003e 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_engineering_is_fast() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::Engineering);\r\n        assert!(clock.omega \u003e 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_medical_ethics_is_slow() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::MedicalEthics);\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_value_judgment_is_slow() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::ValueJudgment);\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_general_is_slow() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::General);\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_custom_is_slow() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::Custom(\"test\".into()));\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn elapsed_time_accumulates() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        clock.tick(0.5);\r\n        clock.tick(0.3);\r\n        assert_float_eq!(clock.elapsed_time(), 0.8);\r\n    }\r\n\r\n    #[test]\r\n    fn to_phase_maps_to_unit_interval() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        for _ in 0..20 {\r\n            clock.tick(0.1);\r\n            let phase = clock.to_phase();\r\n            let inner = phase.inner();\r\n            assert!(\r\n                (0.0..=1.0).contains(\u0026inner),\r\n                \"to_phase {} not in [0,1]\",\r\n                inner\r\n            );\r\n        }\r\n    }\r\n}\r\n","traces":[{"line":10,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":19,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":20,"address":[],"length":0,"stats":{"Line":6052837899185946624}},{"line":21,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":22,"address":[],"length":0,"stats":{"Line":6052837899185946624}},{"line":23,"address":[],"length":0,"stats":{"Line":2233785415175766016}},{"line":26,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":27,"address":[],"length":0,"stats":{"Line":3458764513820540928}},{"line":31,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":32,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":36,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":37,"address":[],"length":0,"stats":{"Line":144115188075855872}}],"covered":12,"coverable":12},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","algebra.rs"],"content":"// ===== 核心提醒 - 来自与一个清醒心智的对话 =====\r\n// 1. Hold 不是失败，是有意的悬置。\r\n// 2. 跨帧冲突不该被抹平，而应被可审计地记录。\r\n// 3. 自知是知人的前提：先知道自己如何陷入，再推测他人。\r\n// 4. “追光”追不上，所以要学会“停一下”而不是更快。\r\n// 5. 真正的逻辑是经得起生死检验的因果推断，不是书斋里的口才。\r\n// ================================================\r\n\r\nuse crate::core::frame::Frame;\r\nuse crate::core::phase::{Phase, PhaseError};\r\nuse crate::core::value::TritValue;\r\nuse crate::core::word::TritWord;\r\nuse crate::meta::MetaInterrupt;\r\nuse tracing::{debug, trace, warn};\r\n\r\n/// Harmonic Ternary Algebra (HTA): the core logic engine.\r\n///\r\n/// ## Hot vs Cold Path\r\n///\r\n/// Same-frame operations (hot path) skip MetaMonitor entirely — they account\r\n/// for ~80% of typical decisions. Cross-frame operations (cold path) generate\r\n/// MetaInterrupt events and trigger policy arbitration.\r\npub struct TernaryAlgebra;\r\n\r\nimpl TernaryAlgebra {\r\n    /// Precheck: returns true if both trits share the same frame.\r\n    /// Callers can use this to decide whether to take the hot path.\r\n    #[inline]\r\n    pub fn precheck_same_frame(a: \u0026TritWord, b: \u0026TritWord) -\u003e bool {\r\n        a.frame() == b.frame()\r\n    }\r\n\r\n    /// Shared cross-frame conflict handler — used by both TAND and TOR.\r\n    /// Uses `MetaInterrupt::with_frames` to avoid `format!()` overhead.\r\n    fn cross_frame_conflict(\r\n        op_name: \u0026'static str,\r\n        a: \u0026TritWord,\r\n        b: \u0026TritWord,\r\n    ) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\r\n        let hold = TritWord::hold(Frame::Meta);\r\n        let interrupt = MetaInterrupt::with_frames(op_name, a.frame(), b.frame());\r\n        if tracing::enabled!(tracing::Level::WARN) {\r\n            warn!(op = op_name, a = %a.frame(), b = %b.frame(), \"cross-frame conflict detected\");\r\n        }\r\n        (hold, Some(interrupt))\r\n    }\r\n\r\n    /// TAND: harmonic conjunction.\r\n    /// - Same frame: standard ternary logic with phase averaging (hot path).\r\n    /// - Different frame: produces Hold + triggers MetaInterrupt (cold path).\r\n    #[tracing::instrument(skip_all, fields(op = \"t_and\"))]\r\n    pub fn t_and(a: \u0026TritWord, b: \u0026TritWord) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\r\n        trace!(\r\n            a_frame = %a.frame(),\r\n            a_value = ?a.value(),\r\n            a_phase = a.phase().inner(),\r\n            b_frame = %b.frame(),\r\n            b_value = ?b.value(),\r\n            b_phase = b.phase().inner(),\r\n            \"entering TAND\"\r\n        );\r\n\r\n        if a.frame() != b.frame() {\r\n            return Self::cross_frame_conflict(\"TAND\", a, b);\r\n        }\r\n\r\n        let val = match (a.value(), b.value()) {\r\n            (TritValue::True, TritValue::True) =\u003e TritValue::True,\r\n            (TritValue::Unknown, _) | (_, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n            (TritValue::False, _) | (_, TritValue::False) =\u003e TritValue::False,\r\n            _ =\u003e TritValue::Hold,\r\n        };\r\n\r\n        let phase = Phase::mean(a.phase(), b.phase());\r\n        debug!(result_value = ?val, result_phase = phase.inner(), \"TAND same-frame computed\");\r\n        (TritWord::new(val, phase, a.frame()), None)\r\n    }\r\n\r\n    /// TAND hot path: same-frame only, no MetaInterrupt allocation.\r\n    ///\r\n    /// # Panics\r\n    ///\r\n    /// Panics if frames differ. This is the unchecked fast path; callers **must**\r\n    /// precheck with [`Self::precheck_same_frame`]. The assertion is active in all\r\n    /// build modes (not `debug_assert`) to prevent silent wrong results in release.\r\n    #[inline]\r\n    pub fn t_and_hot(a: \u0026TritWord, b: \u0026TritWord) -\u003e TritWord {\r\n        assert_eq!(a.frame(), b.frame(), \"t_and_hot requires same frame\");\r\n\r\n        let val = match (a.value(), b.value()) {\r\n            (TritValue::True, TritValue::True) =\u003e TritValue::True,\r\n            (TritValue::Unknown, _) | (_, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n            (TritValue::False, _) | (_, TritValue::False) =\u003e TritValue::False,\r\n            _ =\u003e TritValue::Hold,\r\n        };\r\n\r\n        let phase = Phase::mean(a.phase(), b.phase());\r\n        TritWord::new(val, phase, a.frame())\r\n    }\r\n\r\n    /// TOR: harmonic disjunction.\r\n    #[tracing::instrument(skip_all, fields(op = \"t_or\"))]\r\n    pub fn t_or(a: \u0026TritWord, b: \u0026TritWord) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\r\n        trace!(a_frame = %a.frame(), b_frame = %b.frame(), \"entering TOR\");\r\n\r\n        if a.frame() != b.frame() {\r\n            return Self::cross_frame_conflict(\"TOR\", a, b);\r\n        }\r\n\r\n        let val = match (a.value(), b.value()) {\r\n            (TritValue::True, _) | (_, TritValue::True) =\u003e TritValue::True,\r\n            (TritValue::Unknown, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n            (TritValue::False, TritValue::False) =\u003e TritValue::False,\r\n            _ =\u003e TritValue::Hold,\r\n        };\r\n\r\n        let phase = Phase::mean(a.phase(), b.phase());\r\n        (TritWord::new(val, phase, a.frame()), None)\r\n    }\r\n\r\n    /// TOR hot path: same-frame only, no MetaInterrupt allocation.\r\n    ///\r\n    /// # Panics\r\n    ///\r\n    /// Panics if frames differ. See [`Self::t_and_hot`] for rationale.\r\n    #[inline]\r\n    pub fn t_or_hot(a: \u0026TritWord, b: \u0026TritWord) -\u003e TritWord {\r\n        assert_eq!(a.frame(), b.frame(), \"t_or_hot requires same frame\");\r\n\r\n        let val = match (a.value(), b.value()) {\r\n            (TritValue::True, _) | (_, TritValue::True) =\u003e TritValue::True,\r\n            (TritValue::Unknown, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n            (TritValue::False, TritValue::False) =\u003e TritValue::False,\r\n            _ =\u003e TritValue::Hold,\r\n        };\r\n\r\n        let phase = Phase::mean(a.phase(), b.phase());\r\n        TritWord::new(val, phase, a.frame())\r\n    }\r\n\r\n    /// TNOT: phase-flipped negation.\r\n    #[tracing::instrument(skip_all)]\r\n    pub fn t_not(a: \u0026TritWord) -\u003e TritWord {\r\n        let val = a.value().negate();\r\n        let phase = a.phase().complement();\r\n        TritWord::new(val, phase, a.frame())\r\n    }\r\n\r\n    /// THOLD: force into Hold state (meta-monitor instruction).\r\n    pub fn t_hold(a: \u0026TritWord) -\u003e TritWord {\r\n        TritWord::new(TritValue::Hold, Phase::neutral(), a.frame())\r\n    }\r\n\r\n    /// TSENSE: create a Hold from raw sensor input.\r\n    ///\r\n    /// Returns `Err` if `phase` is not finite and in `[0.0, 1.0]`. For a\r\n    /// non-failing variant that silently clamps invalid inputs, use\r\n    /// [`t_sense_clamped`](Self::t_sense_clamped).\r\n    pub fn t_sense(phase: f64, frame: Frame) -\u003e Result\u003cTritWord, PhaseError\u003e {\r\n        Ok(TritWord::new(TritValue::Hold, Phase::new(phase)?, frame))\r\n    }\r\n\r\n    /// TSENSE with silent clamping: create a Hold from raw sensor input.\r\n    ///\r\n    /// Out-of-range or non-finite phase values are clamped to `[0.0, 1.0]`\r\n    /// (NaN/Infinity maps to neutral 0.5). This is useful for untrusted\r\n    /// external sensors where graceful degradation is preferred over hard\r\n    /// failure.\r\n    pub fn t_sense_clamped(phase: f64, frame: Frame) -\u003e TritWord {\r\n        TritWord::new(TritValue::Hold, Phase::new_clamped(phase), frame)\r\n    }\r\n\r\n    /// Batch TAND: harmonic conjunction over N inputs.\r\n    ///\r\n    /// Unlike sequential left-fold via `t_and`, this computes Phase as the\r\n    /// arithmetic mean of all input phases, avoiding left-fold bias:\r\n    /// `mean(mean(a,b),c) != (a+b+c)/3` but this method always computes\r\n    /// `(a+b+c)/3` for equal-weight semantics.\r\n    ///\r\n    /// TritValue is computed by cumulatively applying the TAND truth table.\r\n    /// Cross-frame conflicts produce Hold + MetaInterrupt per pair.\r\n    pub fn t_and_n(inputs: \u0026[TritWord]) -\u003e (TritWord, Vec\u003cMetaInterrupt\u003e) {\r\n        if inputs.is_empty() {\r\n            return (TritWord::hold(Frame::Meta), vec![]);\r\n        }\r\n        if inputs.len() == 1 {\r\n            return (inputs[0], vec![]);\r\n        }\r\n\r\n        let mut interrupts = vec![];\r\n        let first_frame = inputs[0].frame();\r\n\r\n        // Check all same frame\r\n        for word in \u0026inputs[1..] {\r\n            if word.frame() != first_frame {\r\n                let interrupt = MetaInterrupt::with_frames(\"TAND_N\", first_frame, word.frame());\r\n                interrupts.push(interrupt);\r\n            }\r\n        }\r\n\r\n        if !interrupts.is_empty() {\r\n            // Cross-frame conflict: return Hold in Meta frame with all interrupts\r\n            return (TritWord::hold(Frame::Meta), interrupts);\r\n        }\r\n\r\n        // Same frame: compute value via cumulative TAND semantics\r\n        let mut value = inputs[0].value();\r\n        for word in \u0026inputs[1..] {\r\n            value = match (value, word.value()) {\r\n                (TritValue::True, TritValue::True) =\u003e TritValue::True,\r\n                (TritValue::Unknown, _) | (_, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n                (TritValue::False, _) | (_, TritValue::False) =\u003e TritValue::False,\r\n                _ =\u003e TritValue::Hold,\r\n            };\r\n        }\r\n\r\n        // Batch Phase: arithmetic mean of all phases (equal weight)\r\n        let phase_sum: f64 = inputs.iter().map(|w| w.phase().inner()).sum();\r\n        let phase = Phase::new_clamped(phase_sum / inputs.len() as f64).quantize(1e-6);\r\n\r\n        (TritWord::new(value, phase, first_frame), interrupts)\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn precheck_same_frame_returns_true() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        assert!(TernaryAlgebra::precheck_same_frame(\u0026a, \u0026b));\r\n    }\r\n\r\n    #[test]\r\n    fn precheck_different_frame_returns_false() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Individual);\r\n        assert!(!TernaryAlgebra::precheck_same_frame(\u0026a, \u0026b));\r\n    }\r\n\r\n    #[test]\r\n    fn tand_hot_same_frame_returns_no_interrupt() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        let result = TernaryAlgebra::t_and_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::False);\r\n        assert_eq!(result.frame(), Frame::Science);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_hot_same_frame_returns_no_interrupt() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        let result = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::True);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_hot_false_false_is_false() {\r\n        let a = TritWord::fals(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        let result = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::False);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_hot_unknown_unknown_is_unknown() {\r\n        let a = TritWord::unknown(Frame::Science);\r\n        let b = TritWord::unknown(Frame::Science);\r\n        let result = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::Unknown);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_hot_hold_propagates() {\r\n        let a = TritWord::hold(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        let result = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::Hold);\r\n    }\r\n\r\n    #[test]\r\n    #[should_panic(expected = \"t_and_hot requires same frame\")]\r\n    fn tand_hot_different_frame_panics() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::tru(Frame::Individual);\r\n        TernaryAlgebra::t_and_hot(\u0026a, \u0026b);\r\n    }\r\n\r\n    #[test]\r\n    fn tand_with_unknown_propagates_unknown() {\r\n        let a = TritWord::unknown(Frame::Science);\r\n        let b = TritWord::tru(Frame::Science);\r\n        let (res, int) = TernaryAlgebra::t_and(\u0026a, \u0026b);\r\n        assert_eq!(res.value(), TritValue::Unknown);\r\n        assert!(int.is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn tor_unknown_unknown_is_unknown() {\r\n        let a = TritWord::unknown(Frame::Science);\r\n        let b = TritWord::unknown(Frame::Science);\r\n        let (res, int) = TernaryAlgebra::t_or(\u0026a, \u0026b);\r\n        assert_eq!(res.value(), TritValue::Unknown);\r\n        assert!(int.is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn tor_true_dominates_unknown() {\r\n        let a = TritWord::new(TritValue::True, Phase::new(0.7).unwrap(), Frame::Science);\r\n        let b = TritWord::unknown(Frame::Science);\r\n        let (res, int) = TernaryAlgebra::t_or(\u0026a, \u0026b);\r\n        assert_eq!(res.value(), TritValue::True);\r\n        assert!(int.is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn tnot_unknown_remains_unknown() {\r\n        let a = TritWord::unknown(Frame::Science);\r\n        let res = TernaryAlgebra::t_not(\u0026a);\r\n        assert_eq!(res.value(), TritValue::Unknown);\r\n    }\r\n\r\n    #[test]\r\n    fn tand_cross_frame_returns_hold_and_interrupt() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Individual);\r\n        let (res, int) = TernaryAlgebra::t_and(\u0026a, \u0026b);\r\n        assert_eq!(res.value(), TritValue::Hold);\r\n        assert_eq!(res.frame(), Frame::Meta);\r\n        assert!(int.is_some());\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_accepts_valid_phase() {\r\n        let word = TernaryAlgebra::t_sense(0.75, Frame::Science).unwrap();\r\n        assert_eq!(word.value(), TritValue::Hold);\r\n        assert_eq!(word.phase().inner(), 0.75);\r\n        assert_eq!(word.frame(), Frame::Science);\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_rejects_nan_phase() {\r\n        assert!(TernaryAlgebra::t_sense(f64::NAN, Frame::Science).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_rejects_infinite_phase() {\r\n        assert!(TernaryAlgebra::t_sense(f64::INFINITY, Frame::Science).is_err());\r\n        assert!(TernaryAlgebra::t_sense(f64::NEG_INFINITY, Frame::Science).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_rejects_out_of_range_phase() {\r\n        assert!(TernaryAlgebra::t_sense(-0.1, Frame::Science).is_err());\r\n        assert!(TernaryAlgebra::t_sense(1.1, Frame::Science).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_clamped_maps_invalid_to_neutral() {\r\n        let word = TernaryAlgebra::t_sense_clamped(f64::NAN, Frame::Science);\r\n        assert_eq!(word.value(), TritValue::Hold);\r\n        assert_eq!(word.phase().inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_clamped_preserves_valid_phase() {\r\n        let word = TernaryAlgebra::t_sense_clamped(0.25, Frame::Individual);\r\n        assert_eq!(word.phase().inner(), 0.25);\r\n    }\r\n\r\n    #[test]\r\n    fn tand_truth_table_same_frame() {\r\n        // Exhaustive 4x4 truth table for TAND with same frame.\r\n        let values = [\r\n            TritValue::True,\r\n            TritValue::False,\r\n            TritValue::Hold,\r\n            TritValue::Unknown,\r\n        ];\r\n        let expected = [\r\n            // True, False, Hold, Unknown\r\n            [\r\n                TritValue::True,\r\n                TritValue::False,\r\n                TritValue::Hold,\r\n                TritValue::Unknown,\r\n            ], // True\r\n            [\r\n                TritValue::False,\r\n                TritValue::False,\r\n                TritValue::False,\r\n                TritValue::Unknown,\r\n            ], // False\r\n            [\r\n                TritValue::Hold,\r\n                TritValue::False,\r\n                TritValue::Hold,\r\n                TritValue::Unknown,\r\n            ], // Hold\r\n            [\r\n                TritValue::Unknown,\r\n                TritValue::Unknown,\r\n                TritValue::Unknown,\r\n                TritValue::Unknown,\r\n            ], // Unknown\r\n        ];\r\n        for (i, \u0026a) in values.iter().enumerate() {\r\n            for (j, \u0026b) in values.iter().enumerate() {\r\n                let left = TritWord::new(a, Phase::new(0.8).unwrap(), Frame::Science);\r\n                let right = TritWord::new(b, Phase::new(0.6).unwrap(), Frame::Science);\r\n                let (res, int) = TernaryAlgebra::t_and(\u0026left, \u0026right);\r\n                assert_eq!(\r\n                    res.value(),\r\n                    expected[i][j],\r\n                    \"TAND({:?}, {:?}) should be {:?}\",\r\n                    a,\r\n                    b,\r\n                    expected[i][j]\r\n                );\r\n                assert!(int.is_none());\r\n            }\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn tor_truth_table_same_frame() {\r\n        // Exhaustive 4x4 truth table for TOR with same frame.\r\n        let values = [\r\n            TritValue::True,\r\n            TritValue::False,\r\n            TritValue::Hold,\r\n            TritValue::Unknown,\r\n        ];\r\n        let expected = [\r\n            // True, False, Hold, Unknown\r\n            [\r\n                TritValue::True,\r\n                TritValue::True,\r\n                TritValue::True,\r\n                TritValue::True,\r\n            ], // True\r\n            [\r\n                TritValue::True,\r\n                TritValue::False,\r\n                TritValue::Hold,\r\n                TritValue::Hold,\r\n            ], // False\r\n            [\r\n                TritValue::True,\r\n                TritValue::Hold,\r\n                TritValue::Hold,\r\n                TritValue::Hold,\r\n            ], // Hold\r\n            [\r\n                TritValue::True,\r\n                TritValue::Hold,\r\n                TritValue::Hold,\r\n                TritValue::Unknown,\r\n            ], // Unknown\r\n        ];\r\n        for (i, \u0026a) in values.iter().enumerate() {\r\n            for (j, \u0026b) in values.iter().enumerate() {\r\n                let left = TritWord::new(a, Phase::new(0.8).unwrap(), Frame::Science);\r\n                let right = TritWord::new(b, Phase::new(0.6).unwrap(), Frame::Science);\r\n                let (res, int) = TernaryAlgebra::t_or(\u0026left, \u0026right);\r\n                assert_eq!(\r\n                    res.value(),\r\n                    expected[i][j],\r\n                    \"TOR({:?}, {:?}) should be {:?}\",\r\n                    a,\r\n                    b,\r\n                    expected[i][j]\r\n                );\r\n                assert!(int.is_none());\r\n            }\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn tnot_truth_table() {\r\n        let cases = [\r\n            (TritValue::True, TritValue::False),\r\n            (TritValue::False, TritValue::True),\r\n            (TritValue::Hold, TritValue::Hold),\r\n            (TritValue::Unknown, TritValue::Unknown),\r\n        ];\r\n        for (input, expected) in cases {\r\n            let word = TritWord::new(input, Phase::new(0.7).unwrap(), Frame::Science);\r\n            let res = TernaryAlgebra::t_not(\u0026word);\r\n            assert_eq!(\r\n                res.value(),\r\n                expected,\r\n                \"TNOT({:?}) should be {:?}\",\r\n                input,\r\n                expected\r\n            );\r\n            assert_eq!(res.frame(), Frame::Science);\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn t_hold_preserves_frame() {\r\n        let word = TritWord::tru(Frame::Individual);\r\n        let held = TernaryAlgebra::t_hold(\u0026word);\r\n        assert_eq!(held.value(), TritValue::Hold);\r\n        assert_eq!(held.frame(), Frame::Individual);\r\n        assert_eq!(held.phase().inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    #[should_panic(expected = \"t_or_hot requires same frame\")]\r\n    fn tor_hot_different_frame_panics() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::tru(Frame::Individual);\r\n        TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_cross_frame_returns_hold_and_interrupt() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Individual);\r\n        let (res, int) = TernaryAlgebra::t_or(\u0026a, \u0026b);\r\n        assert_eq!(res.value(), TritValue::Hold);\r\n        assert_eq!(res.frame(), Frame::Meta);\r\n        assert!(int.is_some());\r\n    }\r\n\r\n    #[test]\r\n    fn tand_phase_averages() {\r\n        let a = TritWord::new(TritValue::True, Phase::new(0.8).unwrap(), Frame::Science);\r\n        let b = TritWord::new(TritValue::True, Phase::new(0.6).unwrap(), Frame::Science);\r\n        let (res, _) = TernaryAlgebra::t_and(\u0026a, \u0026b);\r\n        // (0.8 + 0.6) / 2 = 0.7, not near any anchor.\r\n        assert_float_eq!(res.phase().inner(), 0.7);\r\n    }\r\n\r\n    // --- t_and_n batch tests ---\r\n\r\n    #[test]\r\n    fn t_and_n_single_input_is_identity() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let (res, ints) = TernaryAlgebra::t_and_n(\u0026[a]);\r\n        assert_eq!(res.value(), TritValue::True);\r\n        assert!(ints.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn t_and_n_empty_returns_hold_meta() {\r\n        let (res, ints) = TernaryAlgebra::t_and_n(\u0026[]);\r\n        assert_eq!(res.value(), TritValue::Hold);\r\n        assert_eq!(res.frame(), Frame::Meta);\r\n        assert!(ints.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn t_and_n_same_frame_matches_tand_value() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        let (batch, batch_ints) = TernaryAlgebra::t_and_n(\u0026[a, b]);\r\n        let (pair, pair_int) = TernaryAlgebra::t_and(\u0026a, \u0026b);\r\n        assert_eq!(batch.value(), pair.value());\r\n        assert!(batch_ints.is_empty());\r\n        assert!(pair_int.is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn t_and_n_avoids_left_fold_phase_bias() {\r\n        let a = TritWord::new(TritValue::True, Phase::new(0.4).unwrap(), Frame::Science);\r\n        let b = TritWord::new(TritValue::True, Phase::new(0.6).unwrap(), Frame::Science);\r\n        let c = TritWord::new(TritValue::True, Phase::new(0.8).unwrap(), Frame::Science);\r\n        let (result, _) = TernaryAlgebra::t_and_n(\u0026[a, b, c]);\r\n        // Batch mean: (0.4 + 0.6 + 0.8) / 3 = 0.6\r\n        assert!((result.phase().inner() - 0.6).abs() \u003c 1e-9);\r\n    }\r\n\r\n    #[test]\r\n    fn t_and_n_cross_frame_produces_interrupts() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Individual);\r\n        let (res, ints) = TernaryAlgebra::t_and_n(\u0026[a, b]);\r\n        assert_eq!(res.value(), TritValue::Hold);\r\n        assert_eq!(res.frame(), Frame::Meta);\r\n        assert!(!ints.is_empty());\r\n    }\r\n\r\n    #[test]\r\n    fn t_and_n_unknown_propagates() {\r\n        let a = TritWord::unknown(Frame::Science);\r\n        let b = TritWord::tru(Frame::Science);\r\n        let (res, _) = TernaryAlgebra::t_and_n(\u0026[a, b]);\r\n        assert_eq!(res.value(), TritValue::Unknown);\r\n    }\r\n}\r\n","traces":[{
