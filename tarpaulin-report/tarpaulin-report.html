,"length":0,"stats":{"Line":1080863910568919040}},{"line":252,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":254,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":259,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":260,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":261,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":262,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":263,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":264,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":265,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":268,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":276,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":277,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":278,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":279,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":280,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":281,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":282,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":285,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":293,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":294,"address":[],"length":0,"stats":{"Line":1008806316530991104}}],"covered":65,"coverable":68},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","lib.rs"],"content":"//! Trit-Core — a ternary decision engine for conflict-aware AI alignment.\n//!\n//! This crate provides a multi-valued logic (MVL) computation framework where\n//! each decision unit (trit) carries three computable states: `True`, `Hold`,\n//! and `False`, plus an out-of-distribution `Unknown` state. Unlike binary\n//! logic which forces a determination, Trit-Core introduces a `Hold` state\n//! that represents intentional suspension of judgment when conflicting\n//! decision domains are detected.\n//!\n//! # Version\n//!\n//! Current version: **0.3.0**.\n//!\n//! # Safety\n//!\n//! `#![forbid(unsafe_code)]` is enforced crate-wide. Warnings are denied in\n//! CI via `RUSTFLAGS=\"-D warnings\"` rather than in the library crate, to\n//! avoid breaking downstream builds when new Rust versions introduce new\n//! warnings.\n//!\n//! # Modules\n//!\n//! - [`anchor`] — steady-state constraints with veto power (Layer 1).\n//! - [`core`] — ternary algebra and data types: `TritValue`, `Phase`, `Frame`,\n//!   `TritWord`, `TernaryAlgebra`.\n//! - [`meta`] — policy engine: `Domain`, `ResolutionPolicy`, `ArbitrationResult`,\n//!   `MetaInterrupt`, `SafeFallback`, custom rules.\n//! - [`sandbox`] — scenario I/O, validation, pipeline, and expected-behavior\n//!   verification.\n//! - [`attention`] — cognitive attention scheduler with depth-gated bandwidth.\n//! - [`knowledge`] — self-knowledge model with calibration feedback loop.\n//! - [`budget`] — hardware-aware compute budget and depth-level gating.\n//! - [`calibration`] — decision history recording for feedback-driven learning.\n//! - [`clock`] — phase oscillator and time-scale management.\n//! - [`baseline`] — binary baseline comparator for validation.\n//! - [`tracing_init`] — structured logging initialization.\n//!\n//! # Documentation\n//!\n//! See [`docs/INDEX.md`](https://github.com/trit-core/trit-core/blob/main/docs/INDEX.md)\n//! for the full documentation map.\n//!\n//! # Quick Example\n//!\n//! ```rust\n//! use trit_core::core::{Frame, TernaryAlgebra, TritValue, TritWord};\n//!\n//! let science = TritWord::tru(Frame::Science);\n//! let individual = TritWord::fals(Frame::Individual);\n//!\n//! let (result, interrupt) = TernaryAlgebra::t_and(\u0026science, \u0026individual);\n//!\n//! assert_eq!(result.value(), TritValue::Hold);\n//! assert!(interrupt.is_some());\n//! ```\n\n#![forbid(unsafe_code)]\n\n/// Assert that two `f64` values are equal within `f64::EPSILON`.\n///\n/// Replaces the 43-instance pattern `assert!((actual - expected).abs() \u003c f64::EPSILON)`\n/// with a single readable macro. Accepts an optional custom message.\n///\n/// # Examples\n///\n/// ```ignore\n/// assert_float_eq!(result.phase(), 0.55);\n/// assert_float_eq!(clock.omega, 10.0, \"physical clock should have ω=10.0\");\n/// ```\n#[macro_export]\nmacro_rules! assert_float_eq {\n    ($actual:expr, $expected:expr) =\u003e {\n        assert!(\n            ($actual - $expected).abs() \u003c f64::EPSILON,\n            \"assertion failed: `(left == right)`\\n  left: `{}`\\n right: `{}`\",\n            $actual,\n            $expected\n        )\n    };\n    ($actual:expr, $expected:expr, $($arg:tt)+) =\u003e {\n        assert!(\n            ($actual - $expected).abs() \u003c f64::EPSILON,\n            $($arg)+\n        )\n    };\n}\n\npub mod anchor;\npub mod attention;\npub mod baseline;\npub mod budget;\npub mod calibration;\npub mod clock;\npub mod core;\npub mod knowledge;\npub mod meta;\npub mod reflexive;\npub mod sandbox;\npub mod tracing_init;\n\npub use anchor::{\n    check_all as check_all_anchors, AnchorConstraint, AnchorError, AnchorReport, AnchorSeverity,\n    AnchorViolation, DataSource, DecisionPreview, EcosystemZone, StaticSource,\n};\npub use core::{\n    algebra::TernaryAlgebra,\n    frame::{Frame, FrameError, FrameRegistry},\n    hold::{HoldFinality, HoldState, HolderConfig},\n    phase::{Commitment, Phase, PhaseError},\n    sensor::{\n        BodyState, CogState, EnvSnapshot, EnvironmentalContext, SensorSignal, TemporalScale,\n        TextInput,\n    },\n    value::TritValue,\n    word::{Trit, TritWord, WordError},\n};\npub use meta::{\n    ArbitrationResult, ConflictType, CustomRule, Domain, DomainParseError, FallbackBehavior,\n    JsonRuleLoader, MetaInterrupt, MetaMonitor, PolicyError, ResolutionPolicy, RuleError,\n    RuleLoader, SafeFallback,\n};\npub use sandbox::{\n    sanitize_log_field, validate_scenario, ErrorCategory, SandboxDiagnostics, SandboxError,\n    SandboxOutput, SandboxPipeline, ScenarioInput, ScenarioValidator, SignalInput, MAX_JSON_SIZE,\n    MAX_SIGNALS, MAX_STRING_LEN,\n};\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","meta","domain.rs"],"content":"use crate::core::frame::Frame;\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\nuse crate::meta::frame_mask::FrameMask;\nuse crate::meta::rules::{CustomRule, JsonRuleLoader, RuleLoader};\nuse std::str::FromStr;\nuse thiserror::Error;\nuse tracing::{debug, info};\n\n/// Domain rules for conflict resolution.\n/// Each domain defines which frame has priority and whether\n/// forced resolution (hard collapse) is allowed.\n#[derive(Clone, Debug, PartialEq, Eq)]\npub enum Domain {\n    /// Hard science constraints: Science priority, forced collapse.\n    Physical,\n    /// Applied constraints: Science priority, forced collapse.\n    Engineering,\n    /// Soft constraints: Individual priority, no forced collapse.\n    MedicalEthics,\n    /// Incommensurable: no priority, must remain Hold.\n    ValueJudgment,\n    /// Default: attempt negotiation.\n    General,\n    /// Externally loaded domain rules.\n    Custom(String),\n}\n\n/// Error type for policy arbitration failures.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum PolicyError {\n    #[error(\"no inputs provided for arbitration\")]\n    EmptyInputs,\n    #[error(\"custom rule failed to apply: {0}\")]\n    CustomRule(String),\n}\n\n/// Error returned when a string cannot be parsed as a [`Domain`].\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum DomainParseError {\n    #[error(\"unknown domain: '{0}'\")]\n    Unknown(String),\n}\n\nimpl FromStr for Domain {\n    type Err = DomainParseError;\n\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\n        match s {\n            \"Physical\" =\u003e Ok(Domain::Physical),\n            \"Engineering\" =\u003e Ok(Domain::Engineering),\n            \"MedicalEthics\" =\u003e Ok(Domain::MedicalEthics),\n            \"ValueJudgment\" =\u003e Ok(Domain::ValueJudgment),\n            \"General\" =\u003e Ok(Domain::General),\n            d if d.starts_with(\"Custom(\") =\u003e {\n                let name = d\n                    .strip_prefix(\"Custom(\")\n                    .and_then(|s| s.strip_suffix(\")\"))\n                    .unwrap_or(\"\");\n                if name.is_empty() {\n                    return Err(DomainParseError::Unknown(\n                        \"Custom domain name cannot be empty\".to_string(),\n                    ));\n                }\n                Ok(Domain::Custom(name.to_string()))\n            }\n            d =\u003e Err(DomainParseError::Unknown(d.to_string())),\n        }\n    }\n}\n\nimpl std::fmt::Display for Domain {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            Domain::Physical =\u003e write!(f, \"Physical\"),\n            Domain::Engineering =\u003e write!(f, \"Engineering\"),\n            Domain::MedicalEthics =\u003e write!(f, \"MedicalEthics\"),\n            Domain::ValueJudgment =\u003e write!(f, \"ValueJudgment\"),\n            Domain::General =\u003e write!(f, \"General\"),\n            Domain::Custom(name) =\u003e write!(f, \"Custom({})\", name),\n        }\n    }\n}\n\n/// Policy engine that decides how to resolve conflicts.\n#[derive(Debug, Clone)]\npub struct ResolutionPolicy {\n    pub domain: Domain,\n    /// Optional externally loaded rule for `Domain::Custom`.\n    pub custom_rule: Option\u003cCustomRule\u003e,\n}\n\nimpl ResolutionPolicy {\n    pub fn new(domain: Domain) -\u003e Self {\n        debug!(?domain, \"ResolutionPolicy created\");\n        Self {\n            domain,\n            custom_rule: None,\n        }\n    }\n\n    /// Attach a custom rule to this policy.\n    pub fn with_custom_rule(mut self, rule: CustomRule) -\u003e Self {\n        self.custom_rule = Some(rule);\n        self\n    }\n\n    /// Given conflicting inputs, return the arbitration result.\n    /// Uses FrameMask for O(1) frame presence checks.\n    ///\n    /// # Errors\n    ///\n    /// Returns `PolicyError::EmptyInputs` if `inputs` is empty.\n    #[tracing::instrument(skip_all, fields(domain = ?self.domain))]\n    pub fn arbitrate(\u0026self, inputs: \u0026[TritWord]) -\u003e Result\u003cArbitrationResult, PolicyError\u003e {\n        debug!(input_count = inputs.len(), \"arbitration started\");\n        if inputs.is_empty() {\n            return Err(PolicyError::EmptyInputs);\n        }\n        let mask = FrameMask::from_inputs(inputs);\n\n        // Mind-engineering default: first-person experience is preserved when\n        // it conflicts with statistical/scientific frames. This implements the\n        // principle that lived experience should not be silently overridden by\n        // population aggregates.\n        //\n        // SAFETY GATE: FirstPerson priority is skipped for Physical and Engineering\n        // domains where physical reality must override subjective experience.\n        // A patient saying \"I feel fine\" does not override a structural engineer's\n        // load calculation. The domain match below handles these cases correctly.\n        let first_person_applies = !matches!(\u0026self.domain, Domain::Physical | Domain::Engineering);\n        if first_person_applies \u0026\u0026 mask.has(\u0026Frame::FirstPerson) \u0026\u0026 mask.has(\u0026Frame::Science) {\n            return Ok(Self::preserve_frame(inputs, Frame::FirstPerson));\n        }\n\n        let result = match \u0026self.domain {\n            Domain::Physical | Domain::Engineering =\u003e {\n                self.arbitrate_physical_engineering(inputs, \u0026mask)\n            }\n            Domain::MedicalEthics =\u003e self.arbitrate_medical_ethics(inputs, \u0026mask),\n            Domain::ValueJudgment =\u003e ArbitrationResult::Hold,\n            Domain::Custom(name) =\u003e self.arbitrate_custom(name, inputs, \u0026mask),\n            Domain::General =\u003e self.arbitrate_general(inputs, \u0026mask),\n        };\n        info!(?result, \"arbitration completed\");\n        Ok(result)\n    }\n\n    /// Physical/Engineering: Science frame priority, force collapse when absent.\n    fn arbitrate_physical_engineering(\n        \u0026self,\n        inputs: \u0026[TritWord],\n        mask: \u0026FrameMask,\n    ) -\u003e ArbitrationResult {\n        if mask.has(\u0026Frame::Science) {\n            Self::commit_frame(inputs, Frame::Science)\n        } else {\n            ArbitrationResult::ForceCollapse\n        }\n    }\n\n    /// MedicalEthics: Individual frame priority, negotiate when absent.\n    fn arbitrate_medical_ethics(\u0026self, inputs: \u0026[TritWord], mask: \u0026FrameMask) -\u003e ArbitrationResult {\n        if mask.has(\u0026Frame::Individual) {\n            Self::preserve_frame(inputs, Frame::Individual)\n        } else {\n            ArbitrationResult::Negotiate\n        }\n    }\n\n    /// Custom domain: delegate to loaded rule, or default to Negotiate.\n    fn arbitrate_custom(\n        \u0026self,\n        name: \u0026str,\n        inputs: \u0026[TritWord],\n        _mask: \u0026FrameMask,\n    ) -\u003e ArbitrationResult {\n        if let Some(ref rule) = self.custom_rule {\n            info!(custom_domain = %name, rule = %rule.name, \"custom domain arbitration using loaded rule\");\n            return JsonRuleLoader::apply(rule, inputs);\n        }\n        info!(custom_domain = %name, \"custom domain arbitration: no rule loaded, defaulting to Negotiate\");\n        ArbitrationResult::Negotiate\n    }\n\n    /// General: commit when single frame and no Unknown values, negotiate when mixed.\n    fn arbitrate_general(\u0026self, inputs: \u0026[TritWord], mask: \u0026FrameMask) -\u003e ArbitrationResult {\n        if mask.count() == 1 {\n            // Reject Commit if any input is Unknown — \"out of distribution\" must\n            // propagate, not be silently collapsed into the first computable word.\n            if inputs.iter().any(|t| t.value() == TritValue::Unknown) {\n                return ArbitrationResult::Hold;\n            }\n            // Reject Commit if any input is Hold — TAND detected a conflict\n            // (e.g., True ∧ Hold = Hold) that single-frame Commit would mask.\n            if inputs.iter().any(|t| t.value() == TritValue::Hold) {\n                return ArbitrationResult::Negotiate;\n            }\n            // Reject Commit if ALL inputs have near-neutral phase (within 1e-3\n            // of 0.5). A decision where every signal is near-neutral is noise,\n            // not a real commitment. But if any signal has a clear tendency\n            // (phase outside [0.499, 0.501]), the system should commit.\n            let all_near_neutral = inputs\n                .iter()\n                .all(|t| (t.phase().inner() - 0.5).abs() \u003c 1e-3);\n            if all_near_neutral {\n                return ArbitrationResult::Hold;\n            }\n            ArbitrationResult::Commit(inputs[0])\n        } else {\n            ArbitrationResult::Negotiate\n        }\n    }\n\n    /// Find and commit the input with the given frame.\n    /// Returns Hold if the matched input is Unknown (out-of-distribution).\n    fn commit_frame(inputs: \u0026[TritWord], frame: Frame) -\u003e ArbitrationResult {\n        inputs\n            .iter()\n            .find(|t| t.frame() == frame)\n            .map(|t| {\n                if t.value() == TritValue::Unknown {\n                    ArbitrationResult::Hold\n                } else {\n                    ArbitrationResult::Commit(*t)\n                }\n            })\n            .unwrap_or(ArbitrationResult::Hold)\n    }\n\n    /// Find and preserve the input with the given frame.\n    /// Returns Hold if the matched input is Unknown (out-of-distribution).\n    fn preserve_frame(inputs: \u0026[TritWord], frame: Frame) -\u003e ArbitrationResult {\n        inputs\n            .iter()\n            .find(|t| t.frame() == frame)\n            .map(|t| {\n                if t.value() == TritValue::Unknown {\n                    ArbitrationResult::Hold\n                } else {\n                    ArbitrationResult::Preserve(*t)\n                }\n            })\n            .unwrap_or(ArbitrationResult::Hold)\n    }\n}\n\nimpl Default for ResolutionPolicy {\n    fn default() -\u003e Self {\n        Self::new(Domain::General)\n    }\n}\n\n#[derive(Debug, Clone, PartialEq)]\npub enum ArbitrationResult {\n    /// Commit to a specific TritWord as the final decision.\n    Commit(TritWord),\n    /// Preserve a TritWord (MedicalEthics: Individual frame).\n    Preserve(TritWord),\n    /// Force a safe collapse. When this is returned from arbitrate(),\n    /// the caller should invoke SafeFallback::guard() to determine the\n    /// final value — in dangerous domains (Physical, Engineering,\n    /// chemistry, genetics, etc.) this will force False when interrupts\n    /// are present, implementing IEC 61508 fail-safe semantics.\n    ForceCollapse,\n    /// Deliberately hold — incommensurable values, cannot decide.\n    Hold,\n    /// Attempt multi-round negotiation (General domain with mixed frames).\n    Negotiate,\n}\n\nimpl std::fmt::Display for ArbitrationResult {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            ArbitrationResult::Commit(w) =\u003e {\n                write!(\n                    f,\n                    \"Commit({:?}, phase={:.3}, {})\",\n                    w.value(),\n                    w.phase().inner(),\n                    w.frame()\n                )\n            }\n            ArbitrationResult::Preserve(w) =\u003e {\n                write!(\n                    f,\n                    \"Preserve({:?}, phase={:.3}, {})\",\n                    w.value(),\n                    w.phase().inner(),\n                    w.frame()\n                )\n            }\n            ArbitrationResult::ForceCollapse =\u003e write!(f, \"ForceCollapse\"),\n            ArbitrationResult::Hold =\u003e write!(f, \"Hold\"),\n            ArbitrationResult::Negotiate =\u003e write!(f, \"Negotiate\"),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::frame::Frame;\n    use crate::core::word::TritWord;\n    use crate::meta::rules::FallbackBehavior;\n\n    #[test]\n    fn physical_commits_science() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::tru(Frame::Consensus),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn physical_without_science_forces_collapse() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::tru(Frame::Individual),\n            TritWord::fals(Frame::Consensus),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::ForceCollapse);\n    }\n\n    #[test]\n    fn medical_ethics_preserves_individual() {\n        let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Preserve(_)));\n    }\n\n    #[test]\n    fn value_judgment_always_hold() {\n        let policy = ResolutionPolicy::new(Domain::ValueJudgment);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn general_same_frame_commits_first() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn general_mixed_frames_negotiates() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_without_rule_defaults_to_negotiate() {\n        let policy = ResolutionPolicy::new(Domain::Custom(\"chemistry\".into()));\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_with_priority_frame_rule() {\n        let rule = CustomRule {\n            name: \"chem\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: FallbackBehavior::Hold,\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"chemistry\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::fals(Frame::Individual),\n            TritWord::tru(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn arbitrate_rejects_empty_inputs() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        assert!(matches!(\n            policy.arbitrate(\u0026[]).unwrap_err(),\n            PolicyError::EmptyInputs\n        ));\n    }\n\n    #[test]\n    fn engineering_behaves_like_physical() {\n        let policy = ResolutionPolicy::new(Domain::Engineering);\n        let inputs = vec![\n            TritWord::tru(Frame::Consensus),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn medical_ethics_without_individual_negotiates() {\n        let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Consensus),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_rule_fallback_hold() {\n        let rule = CustomRule {\n            name: \"lit\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: FallbackBehavior::Hold,\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"literature\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn custom_rule_fallback_safe_fallback() {\n        let rule = CustomRule {\n            name: \"chem\".into(),\n            priority_frame: None,\n            allow_forced_collapse: true,\n            fallback: FallbackBehavior::SafeFallback,\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"chemistry\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::ForceCollapse);\n    }\n\n    #[test]\n    fn policy_error_display_is_informative() {\n        let err = PolicyError::EmptyInputs;\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"no inputs\"));\n    }\n\n    #[test]\n    fn default_policy_is_general() {\n        let policy: ResolutionPolicy = Default::default();\n        assert_eq!(policy.domain, Domain::General);\n        assert!(policy.custom_rule.is_none());\n    }\n\n    #[test]\n    fn first_person_does_not_override_science_in_physical_domain() {\n        // P0-1 regression: FirstPerson must not override Science in Physical/Engineering.\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        // Physical domain: Science frame wins, FirstPerson is ignored\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n        if let ArbitrationResult::Commit(w) = result {\n            assert_eq!(w.frame(), Frame::Science);\n            assert_eq!(w.value(), TritValue::False);\n        }\n    }\n\n    #[test]\n    fn first_person_does_not_override_science_in_engineering_domain() {\n        let policy = ResolutionPolicy::new(Domain::Engineering);\n        let inputs = vec![\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n        if let ArbitrationResult::Commit(w) = result {\n            assert_eq!(w.frame(), Frame::Science);\n        }\n    }\n\n    #[test]\n    fn first_person_still_preserved_in_medical_ethics() {\n        // FirstPerson priority must still work in non-dangerous domains.\n        let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n        let inputs = vec![\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Preserve(_)));\n    }\n\n    #[test]\n    fn first_person_still_preserved_in_general_domain() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Preserve(_)));\n    }\n\n    #[test]\n    fn unknown_value_in_single_frame_returns_hold() {\n        // P0-2 regression: Unknown must propagate, not be silently committed.\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![TritWord::unknown(Frame::Science)];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn unknown_value_with_computable_signals_same_frame_returns_hold() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::unknown(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn unknown_in_science_frame_physical_domain_returns_hold() {\n        // Physical domain: Science frame present but Unknown → Hold, not Commit.\n \","Users","Ultima","Documents","kimi","workspace","trit-core","src","meta","frame_mask.rs"],"content":"use crate::core::frame::Frame;\nuse crate::core::word::TritWord;\n\n/// Frame presence bitmask for O(1) frame lookups during arbitration.\n#[derive(Clone, Copy, Debug)]\npub(crate) struct FrameMask(u8);\n\nimpl FrameMask {\n    const SCIENCE: u8 = 1 \u003c\u003c 0;\n    const INDIVIDUAL: u8 = 1 \u003c\u003c 1;\n    const CONSENSUS: u8 = 1 \u003c\u003c 2;\n    const ABSOLUTE: u8 = 1 \u003c\u003c 3;\n    const META: u8 = 1 \u003c\u003c 4;\n    const FIRST_PERSON: u8 = 1 \u003c\u003c 5;\n    const EMBODIED: u8 = 1 \u003c\u003c 6;\n    const RELATIONAL: u8 = 1 \u003c\u003c 7;\n\n    /// Bitmask with all frame bits set. Update this when adding new Frame variants.\n    const ALL_FRAMES: u8 = Self::SCIENCE\n        | Self::INDIVIDUAL\n        | Self::CONSENSUS\n        | Self::ABSOLUTE\n        | Self::META\n        | Self::FIRST_PERSON\n        | Self::EMBODIED\n        | Self::RELATIONAL;\n\n    pub(crate) fn from_inputs(inputs: \u0026[TritWord]) -\u003e Self {\n        let mut mask = 0u8;\n        for t in inputs {\n            mask |= match t.frame() {\n                Frame::Science =\u003e Self::SCIENCE,\n                Frame::Individual =\u003e Self::INDIVIDUAL,\n                Frame::Consensus =\u003e Self::CONSENSUS,\n                Frame::Absolute =\u003e Self::ABSOLUTE,\n                Frame::Meta =\u003e Self::META,\n                Frame::FirstPerson =\u003e Self::FIRST_PERSON,\n                Frame::Embodied =\u003e Self::EMBODIED,\n                Frame::Relational =\u003e Self::RELATIONAL,\n            };\n            if mask == Self::ALL_FRAMES {\n                break; // all frames seen, early exit\n            }\n        }\n        FrameMask(mask)\n    }\n\n    pub(crate) fn has(\u0026self, frame: \u0026Frame) -\u003e bool {\n        let bit = match frame {\n            Frame::Science =\u003e Self::SCIENCE,\n            Frame::Individual =\u003e Self::INDIVIDUAL,\n            Frame::Consensus =\u003e Self::CONSENSUS,\n            Frame::Absolute =\u003e Self::ABSOLUTE,\n            Frame::Meta =\u003e Self::META,\n            Frame::FirstPerson =\u003e Self::FIRST_PERSON,\n            Frame::Embodied =\u003e Self::EMBODIED,\n            Frame::Relational =\u003e Self::RELATIONAL,\n        };\n        (self.0 \u0026 bit) != 0\n    }\n\n    pub(crate) fn count(\u0026self) -\u003e u32 {\n        self.0.count_ones()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn empty_mask_has_nothing() {\n        let mask = FrameMask::from_inputs(\u0026[]);\n        assert!(!mask.has(\u0026Frame::Science));\n        assert_eq!(mask.count(), 0);\n    }\n\n    #[test]\n    fn single_frame_detected() {\n        let inputs = [TritWord::tru(Frame::Science)];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(!mask.has(\u0026Frame::Individual));\n        assert_eq!(mask.count(), 1);\n    }\n\n    #[test]\n    fn multiple_frames_counted() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n            TritWord::hold(Frame::Consensus),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(mask.has(\u0026Frame::Individual));\n        assert!(mask.has(\u0026Frame::Consensus));\n        assert!(!mask.has(\u0026Frame::Absolute));\n        assert_eq!(mask.count(), 3);\n    }\n\n    #[test]\n    fn duplicates_do_not_increase_count() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert_eq!(mask.count(), 1);\n    }\n\n    #[test]\n    fn all_frames_detected() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::tru(Frame::Individual),\n            TritWord::tru(Frame::Consensus),\n            TritWord::absolute(),\n            TritWord::hold(Frame::Meta),\n            TritWord::tru(Frame::FirstPerson),\n            TritWord::tru(Frame::Embodied),\n            TritWord::tru(Frame::Relational),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(mask.has(\u0026Frame::Individual));\n        assert!(mask.has(\u0026Frame::Consensus));\n        assert!(mask.has(\u0026Frame::Absolute));\n        assert!(mask.has(\u0026Frame::Meta));\n        assert!(mask.has(\u0026Frame::FirstPerson));\n        assert!(mask.has(\u0026Frame::Embodied));\n        assert!(mask.has(\u0026Frame::Relational));\n        assert_eq!(mask.count(), 8);\n    }\n}\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":10520408729537478656}},{"line":29,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":30,"address":[],"length":0,"stats":{"Line":14771806777775226883}},{"line":31,"address":[],"length":0,"stats":{"Line":4251398048237748227}},{"line":32,"address":[],"length":0,"stats":{"Line":5260204364768739314}},{"line":33,"address":[],"length":0,"stats":{"Line":16068843470457929729}},{"line":34,"address":[],"length":0,"stats":{"Line":15636497906230362112}},{"line":35,"address":[],"length":0,"stats":{"Line":144115188075855873}},{"line":36,"address":[],"length":0,"stats":{"Line":7349874591868649472}},{"line":37,"address":[],"length":0,"stats":{"Line":936748722493063168}},{"line":38,"address":[],"length":0,"stats":{"Line":144115188075855881}},{"line":39,"address":[],"length":0,"stats":{"Line":144115188075855878}},{"line":41,"address":[],"length":0,"stats":{"Line":4251398048237748227}},{"line":42,"address":[],"length":0,"stats":{"Line":72057594037927939}},{"line":45,"address":[],"length":0,"stats":{"Line":10520408729537478656}},{"line":48,"address":[]," d of `format!()`.\n    #[inline]\n    pub fn with_frames(op: \u0026'static str, frame_a: Frame, frame_b: Frame) -\u003e Self {\n        let reason = Self::build_frame_mismatch_reason(op, \u0026frame_a, \u0026frame_b);\n        Self {\n            conflict: ConflictType::FrameMismatch,\n            reason,\n            timestamp: chrono::Utc::now(),\n        }\n    }\n\n    /// Test-only constructor for deterministic assertions.\n    #[cfg(test)]\n    pub fn new_for_test(conflict: ConflictType, reason: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            conflict,\n            reason: reason.into(),\n            timestamp: chrono::DateTime::UNIX_EPOCH,\n        }\n    }\n\n    fn build_frame_mismatch_reason(op: \u0026str, a: \u0026Frame, b: \u0026Frame) -\u003e String {\n        // Longest op name (~20) + \" conflict: \" (11) + longest frame (~10) + \" vs \" (4) + longest frame (~10) ≈ 55\n        let mut reason = String::with_capacity(64);\n        reason.push_str(op);\n        reason.push_str(\" conflict: \");\n        use std::fmt::Write;\n        let _ = write!(reason, \"{}\", a);\n        reason.push_str(\" vs \");\n        let _ = write!(reason, \"{}\", b);\n        reason\n    }\n}\n\n/// Classification of meta-level conflicts.\n#[derive(Clone, Debug, PartialEq, Eq)]\npub enum ConflictType {\n    FrameMismatch,\n    OutOfScope,\n    PhaseDrift,\n    PolicyViolation,\n}\n\n/// Meta-monitor: records interrupt events and enforces invariants.\n///\n/// The interrupt log is a capped ring buffer (VecDeque) to prevent\n/// unbounded memory growth in long-running nodes. Oldest entries\n/// are evicted when the cap is reached.\n#[derive(Debug, Clone, Default)]\npub struct MetaMonitor {\n    log: VecDeque\u003cMetaInterrupt\u003e,\n}\n\nimpl MetaMonitor {\n    /// Create an empty MetaMonitor.\n    pub fn new() -\u003e Self {\n        Self {\n            log: VecDeque::new(),\n        }\n    }\n\n    /// Record an interrupt, evicting the oldest entry if the log is full.\n    pub fn record(\u0026mut self, interrupt: MetaInterrupt) {\n        if self.log.len() \u003e= MAX_INTERRUPT_LOG {\n            self.log.pop_front();\n        }\n        self.log.push_back(interrupt);\n    }\n\n    /// Iterate over recorded interrupts (oldest first).\n    pub fn log(\u0026self) -\u003e impl Iterator\u003cItem = \u0026MetaInterrupt\u003e {\n        self.log.iter()\n    }\n\n    /// Drain all recorded interrupts, returning them as a Vec.\n    pub fn drain_log(\u0026mut self) -\u003e Vec\u003cMetaInterrupt\u003e {\n        self.log.drain(..).collect()\n    }\n\n    /// Enforce invariants on a single word.\n    /// Currently: Absolute frame must remain Hold + neutral phase.\n    pub fn inspect(\u0026self, word: \u0026TritWord) -\u003e Option\u003cMetaInterrupt\u003e {\n        if word.frame() == Frame::Absolute \u0026\u0026 word.value() != TritValue::Hold {\n            return Some(MetaInterrupt::new(\n                ConflictType::PolicyViolation,\n                \"Absolute frame must remain Hold\".to_string(),\n            ));\n        }\n        None\n    }\n\n    /// Enforce invariants on a collection of words.\n    pub fn inspect_all(\u0026self, words: \u0026[TritWord]) -\u003e Vec\u003cMetaInterrupt\u003e {\n        words.iter().filter_map(|w| self.inspect(w)).collect()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn monitor_records_interrupts() {\n        let mut m = MetaMonitor::new();\n        m.record(MetaInterrupt::new_for_test(\n            ConflictType::FrameMismatch,\n            \"x\",\n        ));\n        assert_eq!(m.log().count(), 1);\n    }\n\n    #[test]\n    fn monitor_evicts_old_entries() {\n        let mut m = MetaMonitor::new();\n        for i in 0..MAX_INTERRUPT_LOG + 5 {\n            m.record(MetaInterrupt::new_for_test(\n                ConflictType::FrameMismatch,\n                format!(\"{}\", i),\n            ));\n        }\n        assert_eq!(m.log().count(), MAX_INTERRUPT_LOG);\n    }\n\n    #[test]\n    fn inspect_detects_absolute_violation() {\n        let m = MetaMonitor::new();\n        // Absolute with non-Hold value violates the invariant.\n        let _bad = TritWord::from_parts(\n            TritValue::True,\n            crate::core::phase::Phase::new(0.5).unwrap(),\n            Frame::Absolute,\n        )\n        .unwrap_err();\n        // Since the constructor prevents the violation, we just verify inspect logic on a non-Absolute word.\n        assert!(m.inspect(\u0026TritWord::tru(Frame::Science)).is_none());\n    }\n\n    #[test]\n    fn with_frames_builds_expected_reason() {\n        let interrupt = MetaInterrupt::with_frames(\"TAND\", Frame::Science, Frame::Individual);\n        assert_eq!(interrupt.conflict, ConflictType::FrameMismatch);\n        assert!(interrupt.reason.contains(\"TAND\"));\n        assert!(interrupt.reason.contains(\"Science\"));\n        assert!(interrupt.reason.contains(\"Individual\"));\n        assert!(interrupt.reason.contains(\"vs\"));\n    }\n\n    #[test]\n    fn drain_log_clears_monitor() {\n        let mut m = MetaMonitor::new();\n        m.record(MetaInterrupt::new_for_test(ConflictType::PhaseDrift, \"x\"));\n        m.record(MetaInterrupt::new_for_test(\n            ConflictType::PolicyViolation,\n            \"y\",\n        ));\n        assert_eq!(m.log().count(), 2);\n        let drained = m.drain_log();\n        assert_eq!(drained.len(), 2);\n        assert_eq!(m.log().count(), 0);\n    }\n\n    #[test]\n    fn inspect_all_collects_violations() {\n        let m = MetaMonitor::new();\n        // Absolute invariant is enforced at construction, so only non-Absolute words are observable.\n        let words = vec![TritWord::tru(Frame::Science), TritWord::hold(Frame::Meta)];\n        let violations = m.inspect_all(\u0026words);\n        assert!(violations.is_empty());\n    }\n\n    #[test]\n    fn conflict_type_equality() {\n        assert_eq!(ConflictType::FrameMismatch, ConflictType::FrameMismatch);\n        assert_ne!(ConflictType::FrameMismatch, ConflictType::OutOfScope);\n    }\n}\n","traces":[{"line":20,"address":[],"length":0,"stats":{"Line":2666130979403333634}},{"line":24,"address":[],"length":0,"stats":{"Line":2666130979403333634}},{"line":31,"address":[],"length":0,"stats":{"Line":7998392938210000898}},{"line":32,"address":[],"length":0,"stats":{"Line":3098476543630901258}},{"line":36,"address":[],"length":0,"stats":{"Line":7998392938210000898}},{"line":42,"address":[],"length":0,"stats":{"Line":1729382256910270503}},{"line":45,"address":[],"length":0,"stats":{"Line":1729382256910270503}},{"line":50,"address":[],"length":0,"stats":{"Line":7998392938210000898}},{"line":52,"address":[],"length":0,"stats":{"Line":15996785876420001796}},{"line":53,"address":[],"length":0,"stats":{"Line":5548434740920451078}},{"line":54,"address":[],"length":0,"stats":{"Line":5548434740920451078}},{"line":56,"address":[],"length":0,"stats":{"Line":15996785876420001796}},{"line":57,"address":[],"length":0,"stats":{"Line":5548434740920451078}},{"line":58,"address":[],"length":0,"stats":{"Line":15996785876420001796}},{"line":59,"address":[],"length":0,"stats":{"Line":7998392938210000898}},{"line":84,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":86,"address":[],"length":0,"stats":{"Line":1369094286720630784}},{"line":91,"address":[],"length":0,"stats":{"Line":2738188573441261568}},{"line":92,"address":[],"length":0,"stats":{"Line":3098476543630901287}},{"line":93,"address":[],"length":0,"stats":{"Line":360287970189639719}},{"line":95,"address":[],"length":0,"stats":{"Line":8214565720323784704}},{"line":99,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":100,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":104,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":105,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":110,"address":[],"length":0,"stats":{"Line":2 \n    #[test]\n    fn custom_domain_not_equal_to_general() {\n        assert_ne!(Domain::Custom(\"chemistry\".into()), Domain::General);\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","meta","rules.rs"],"content":"use crate::core::frame::Frame;\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\nuse crate::meta::ArbitrationResult;\nuse serde::{Deserialize, Serialize};\nuse std::path::Path;\nuse std::str::FromStr;\nuse thiserror::Error;\n\n// ---------------------------------------------------------------------------\n// FallbackBehavior: type-safe fallback behavior for custom rules\n// ---------------------------------------------------------------------------\n\n/// Fallback behavior when no priority frame matches in a custom rule.\n///\n/// Replaces the previous string-based fallback to prevent typos and\n/// ensure exhaustive matching at compile time.\n#[derive(Clone, Copy, Debug, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"snake_case\")]\npub enum FallbackBehavior {\n    /// Deliberately hold — incommensurable values, cannot decide.\n    Hold,\n    /// Attempt multi-round negotiation.\n    Negotiate,\n    /// Commit the first non-Unknown TritWord.\n    CommitFirst,\n    /// Force a safe collapse (triggers SafeFallback in dangerous domains).\n    SafeFallback,\n}\n\nimpl std::fmt::Display for FallbackBehavior {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            FallbackBehavior::Hold =\u003e write!(f, \"hold\"),\n            FallbackBehavior::Negotiate =\u003e write!(f, \"negotiate\"),\n            FallbackBehavior::CommitFirst =\u003e write!(f, \"commit_first\"),\n            FallbackBehavior::SafeFallback =\u003e write!(f, \"safe_fallback\"),\n        }\n    }\n}\n\nimpl FromStr for FallbackBehavior {\n    type Err = String;\n\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\n        match s {\n            \"hold\" =\u003e Ok(FallbackBehavior::Hold),\n            \"negotiate\" =\u003e Ok(FallbackBehavior::Negotiate),\n            \"commit_first\" =\u003e Ok(FallbackBehavior::CommitFirst),\n            \"safe_fallback\" =\u003e Ok(FallbackBehavior::SafeFallback),\n            other =\u003e Err(format!(\n                \"unknown fallback behavior: '{}' (expected one of: hold, negotiate, commit_first, safe_fallback)\",\n                other\n            )),\n        }\n    }\n}\n\n// ---------------------------------------------------------------------------\n// RuleLoader: external domain rule loading\n// ---------------------------------------------------------------------------\n\n/// Serializable representation of a custom arbitration rule.\n#[derive(Debug, Clone, Deserialize, Serialize)]\npub struct CustomRule {\n    /// Human-readable name for this rule set.\n    pub name: String,\n    /// The priority frame (if any) for this domain.\n    pub priority_frame: Option\u003cString\u003e,\n    /// Whether forced collapse is allowed.\n    pub allow_forced_collapse: bool,\n    /// Fallback behavior when no priority frame matches.\n    pub fallback: FallbackBehavior,\n}\n\n/// Error type for rule loading operations.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum RuleError {\n    #[error(\"Failed to read rule file: {0}\")]\n    Read(String),\n    #[error(\"Failed to parse custom rule: {0}\")]\n    Parse(String),\n}\n\n/// Trait for loading external domain rules from configuration files.\n///\n/// Implementations can load from JSON, YAML, or other formats.\n/// The default `load_json` implementation is provided for convenience.\npub trait RuleLoader {\n    type Error: std::fmt::Display;\n\n    /// Load a single rule from a file path.\n    fn load\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e Result\u003cCustomRule, Self::Error\u003e;\n\n    /// Load a rule from a JSON string.\n    fn load_json(json: \u0026str) -\u003e Result\u003cCustomRule, Self::Error\u003e;\n\n    /// Apply a loaded rule to inputs, producing an arbitration result.\n    fn apply(rule: \u0026CustomRule, inputs: \u0026[TritWord]) -\u003e ArbitrationResult {\n        // Check for priority frame match\n        if let Some(ref pf) = rule.priority_frame {\n            match pf.parse::\u003cFrame\u003e() {\n                Ok(frame) =\u003e {\n                    if let Some(t) = inputs.iter().find(|w| w.frame() == frame) {\n                        return if rule.allow_forced_collapse {\n                            ArbitrationResult::Commit(*t)\n                        } else {\n                            ArbitrationResult::Preserve(*t)\n                        };\n                    }\n                }\n                Err(_) =\u003e {\n                    tracing::warn!(\n                        priority_frame = %pf,\n                        rule_name = %rule.name,\n                        \"CustomRule priority_frame is not a valid Frame name — falling back\"\n                    );\n                }\n            }\n        }\n\n        // Fallback behavior\n        match rule.fallback {\n            FallbackBehavior::Hold =\u003e ArbitrationResult::Hold,\n            FallbackBehavior::CommitFirst =\u003e {\n                // Skip Unknown — committing \"out of distribution\" defeats safety\n                if let Some(first) = inputs.iter().find(|t| t.value() != TritValue::Unknown) {\n                    ArbitrationResult::Commit(*first)\n                } else {\n                    ArbitrationResult::Hold\n                }\n            }\n            FallbackBehavior::SafeFallback =\u003e ArbitrationResult::ForceCollapse,\n            FallbackBehavior::Negotiate =\u003e ArbitrationResult::Negotiate,\n        }\n    }\n}\n\n/// Default RuleLoader implementation using serde_json.\npub struct JsonRuleLoader;\n\nimpl RuleLoader for JsonRuleLoader {\n    type Error = RuleError;\n\n    fn load\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e Result\u003cCustomRule, Self::Error\u003e {\n        let raw = std::fs::read_to_string(path.as_ref()).map_err(|e| {\n            RuleError::Read(format!(\n                \"Failed to read rule file '{}': {}\",\n                path.as_ref().display(),\n                e\n            ))\n        })?;\n        Self::load_json(\u0026raw)\n    }\n\n    fn load_json(json: \u0026str) -\u003e Result\u003cCustomRule, Self::Error\u003e {\n        serde_json::from_str::\u003cCustomRule\u003e(json).map_err(|e| RuleError::Parse(e.to_string()))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::frame::Frame;\n    use crate::core::word::TritWord;\n\n    #[test]\n    fn json_rule_loader_parses_valid_rule() {\n        let json = r#\"{\n            \"name\": \"chemistry_safety\",\n            \"priority_frame\": \"Science\",\n            \"allow_forced_collapse\": true,\n            \"fallback\": \"safe_fallback\"\n        }\"#;\n        let rule = JsonRuleLoader::load_json(json).unwrap();\n        assert_eq!(rule.name, \"chemistry_safety\");\n        assert_eq!(rule.priority_frame, Some(\"Science\".to_string()));\n        assert!(rule.allow_forced_collapse);\n        assert_eq!(rule.fallback, FallbackBehavior::SafeFallback);\n    }\n\n    #[test]\n    fn json_rule_loader_rejects_invalid_json() {\n        assert!(JsonRuleLoader::load_json(\"not json\").is_err());\n    }\n\n    #[test]\n    fn rule_apply_priority_frame_match() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: FallbackBehavior::Hold,\n        };\n        let inputs = vec![\n            TritWord::fals(Frame::Individual),\n            TritWord::tru(Frame::Science),\n        ];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn rule_apply_fallback_hold() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: FallbackBehavior::Hold,\n        };\n        let inputs = vec![TritWord::tru(Frame::Science)];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn rule_apply_fallback_safe_fallback() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: FallbackBehavior::SafeFallback,\n        };\n        let inputs = vec![TritWord::tru(Frame::Science)];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert_eq!(result, ArbitrationResult::ForceCollapse);\n    }\n\n    #[test]\n    fn rule_apply_priority_frame_no_match_forces_collapse_when_allowed() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: FallbackBehavior::Hold,\n        };\n        let inputs = vec![TritWord::tru(Frame::Individual)];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert_eq!(result, ArbitrationResult::Hold); // fallback is hold\n    }\n\n    #[test]\n    fn rule_apply_commit_first_fallback_skips_unknown() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: FallbackBehavior::CommitFirst,\n        };\n        let inputs = vec![\n            TritWord::unknown(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert!(matches!(result, ArbitrationResult::Commit(w) if w.value() == TritValue::False));\n    }\n\n    #[test]\n    fn fallback_behavior_from_str() {\n        assert_eq!(\n            \"hold\".parse::\u003cFallbackBehavior\u003e().unwrap(),\n            FallbackBehavior::Hold\n        );\n        assert_eq!(\n            \"negotiate\".parse::\u003cFallbackBehavior\u003e().unwrap(),\n            FallbackBehavior::Negotiate\n        );\n        assert_eq!(\n            \"commit_first\".parse::\u003cFallbackBehavior\u003e().unwrap(),\n            FallbackBehavior::CommitFirst\n        );\n        assert_eq!(\n            \"safe_fallback\".parse::\u003cFallbackBehavior\u003e().unwrap(),\n            FallbackBehavior::SafeFallback\n        );\n        assert!(\"unknown\".parse::\u003cFallbackBehavior\u003e().is_err());\n    }\n\n    #[test]\n    fn fallback_behavior_display() {\n        assert_eq!(format!(\"{}\", FallbackBehavior::Hold), \"hold\");\n        assert_eq!(\n            format!(\"{}\", FallbackBehavior::SafeFallback),\n            \"safe_fallback\"\n        );\n    }\n\n    #[test]\n    fn rule_serializes_and_deserializes() {\n        let rule = CustomRule {\n            name: \"chemistry\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: FallbackBehavior::SafeFallback,\n        };\n        let json = serde_json::to_string(\u0026rule).unwrap();\n        let restored: CustomRule = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(rule.name, restored.name);\n        assert_eq!(rule.priority_frame, restored.priority_frame);\n        assert_eq!(rule.allow_forced_collapse, restored.allow_forced_collapse);\n        assert_eq!(rule.fallback, restored.fallback);\n    }\n\n    #[test]\n    fn load_from_missing_file_fails() {\n        let result = JsonRuleLoader::load(\"/nonexistent/rule.json\");\n        assert!(result.is_err());\n        let msg = format!(\"{}\", result.unwrap_err());\n        assert!(msg.contains(\"Failed to read\"));\n    }\n\n    #[test]\n    fn load_from_valid_temp_file_succeeds() {\n        let json = r#\"{\"name\":\"temp\",\"priority_frame\":null,\"allow_forced_collapse\":false,\"fallback\":\"hold\"}\"#;\n        let dir = std::env::temp_dir();\n        let path = dir.join(\"trit_core_test_rule.json\");\n        std::fs::write(\u0026path, json).unwrap();\n        let rule = JsonRuleLoader::load(\u0026path).unwrap();\n        assert_eq!(rule.name, \"temp\");\n        assert_eq!(rule.fallback, FallbackBehavior::Hold);\n        // cleanup\n        let _ = std::fs::remove_file(\u0026path);\n    }\n}\n","traces":[{"line":32,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":33,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":34,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":35,"address":[],"length":0,"stats":{"Line":0}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":45,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":46,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":47,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":48,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":49,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":50,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":51,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":52,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":53,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":99,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":101,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":102,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":103,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":104,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":105,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":106,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":108,"address":[],"length":0,"stats":{"Line":0}},{"line":113,"address":[],"length":0,"stats":{"Line":0}},{"line":114,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":0}},{"line":116,"address":[],"length":0,"stats":{"Line":0}},{"line":123,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":124,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":127,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":128,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":130,"address":[],"length":0,"stats":{"Line":0}},{"line":133,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":134,"address":[],"length":0,"stats":{"Line":0}},{"line":145,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":146,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":147,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":148,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":149,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":150,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":153,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":156,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":157,"address":[],"length":0,"stats":{"Line":792633534417207296}}],"covered":34,"coverable":43},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","meta","safe_fallback.rs"],"content":"use crate::core::phase::Phase;\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\nuse crate::meta::{ConflictType, Domain, MetaInterrupt};\nuse tracing::warn;\n\n/// SafeFallback provides a safety-preserving override when the system\n/// cannot reach a confident decision in a dangerous context (e.g.,\n/// chemical synthesis, gene editing, structural safety).\n///\n/// Unlike normal `Hold` (which means \"undecided, suspend judgment\"),\n/// SafeFallback forces `False` for safety-critical scenarios where\n/// indecision could result in harm.\n///\n/// ## Design rationale (per IEC 61508 / ISO 26262 principles):\n/// - In dangerous domains, \"I don't know\" must default to \"don't do it.\"\n/// - `Hold` = \"not ready to decide, gather more data\" (non-dangerous).\n/// - `SafeFallback::force_false()` = \"cannot decide, but failure means harm → block.\"\n///\n/// ## Built-in dangerous domains\n/// `Physical` and `Engineering` are always dangerous (science overrides opinion\n/// when the physical world doesn't negotiate). `MedicalEthics` is omitted\n/// because patient autonomy (`Individual` frame) IS the safe default.\n#[derive(Debug, Clone)]\npub struct SafeFallback {\n    dangerous_custom_domains: Vec\u003cString\u003e,\n    enabled: bool,\n}\n\nimpl SafeFallback {\n    /// Create a new SafeFallback with sensible defaults.\n    pub fn new() -\u003e Self {\n        Self {\n            dangerous_custom_domains: vec![\n                \"chemistry\".to_string(),\n                \"genetics\".to_string(),\n                \"structural\".to_string(),\n                \"nuclear\".to_string(),\n                \"pharmaceutical\".to_string(),\n            ],\n            enabled: true,\n        }\n    }\n\n    /// Disable safe fallback (e.g., for testing or non-critical domains).\n    pub fn disabled() -\u003e Self {\n        Self {\n            dangerous_custom_domains: vec![],\n            enabled: false,\n        }\n    }\n\n    /// Register a custom domain as dangerous.\n    pub fn register_dangerous(\u0026mut self, domain: \u0026str) {\n        if !self.dangerous_custom_domains.iter().any(|d| d == domain) {\n            self.dangerous_custom_domains.push(domain.to_string());\n        }\n    }\n\n    /// Builder-style method to register a dangerous domain.\n    pub fn with_dangerous_domain(mut self, domain: impl Into\u003cString\u003e) -\u003e Self {\n        self.register_dangerous(\u0026domain.into());\n        self\n    }\n\n    /// Enable or disable safe fallback.\n    pub fn enabled(mut self, enabled: bool) -\u003e Self {\n        self.enabled = enabled;\n        self\n    }\n\n    /// Check whether the given domain requires safe fallback.\n    pub fn is_dangerous(\u0026self, domain: \u0026Domain) -\u003e bool {\n        if !self.enabled {\n            return false;\n        }\n        match domain {\n            Domain::Physical | Domain::Engineering =\u003e true,\n            Domain::MedicalEthics | Domain::ValueJudgment | Domain::General =\u003e false,\n            Domain::Custom(name) =\u003e self.dangerous_custom_domains.iter().any(|d| d == name),\n        }\n    }\n\n    /// Apply safe fallback: if the result is Hold or Unknown and the\n    /// domain is dangerous, force False with an interrupt.\n    ///\n    /// `Unknown` always triggers SafeFallback in dangerous domains\n    /// (the system cannot compute — \"I don't know\" must default to\n    /// \"don't do it\"). `Hold` triggers when interrupts are present\n    /// (deliberate suspension + conflict = safety risk) OR when\n    /// `force` is true (arbitration explicitly requested ForceCollapse:\n    /// the domain lacks a Science frame and must default to safe state).\n    pub fn guard(\n        \u0026self,\n        domain: \u0026Domain,\n        result: \u0026TritWord,\n        interrupt_count: usize,\n    ) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\n        self.guard_with_force(domain, result, interrupt_count, false)\n    }\n\n    /// Apply safe fallback with an optional force flag.\n    ///\n    /// When `force` is true, Hold in a dangerous domain always triggers\n    /// SafeFallback regardless of interrupt count. This is used when\n    /// arbitration returns `ForceCollapse` — the domain lacks a Science\n    /// frame and must default to the safe state even without conflicts.\n    pub fn guard_with_force(\n        \u0026self,\n        domain: \u0026Domain,\n        result: \u0026TritWord,\n        interrupt_count: usize,\n        force: bool,\n    ) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\n        if !self.is_dangerous(domain) {\n            return (*result, None);\n        }\n\n        let should_fallback = result.value() == TritValue::Unknown\n            || (result.value() == TritValue::Hold \u0026\u0026 (interrupt_count \u003e 0 || force));\n\n        if should_fallback {\n            let domain_name = domain_label(domain);\n            let interrupt = MetaInterrupt::new(\n                ConflictType::OutOfScope,\n                format!(\n                    \"SafeFallback: forcing False in dangerous domain '{}' — {} interrupts detected{}\",\n                    domain_name,\n                    interrupt_count,\n                    if force { \", ForceCollapse triggered\" } else { \"\" }\n                ),\n            );\n            warn!(\n                domain = domain_name,\n                interrupt_count = interrupt_count,\n                force,\n                \"SafeFallback triggered\"\n            );\n            (\n                TritWord::new(TritValue::False, Phase::full_false(), result.frame()),\n                Some(interrupt),\n            )\n        } else {\n            (*result, None)\n        }\n    }\n}\n\nimpl Default for SafeFallback {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Human-readable label for a domain (used in SafeFallback messages).\nfn domain_label(domain: \u0026Domain) -\u003e \u0026str {\n    match domain {\n        Domain::Physical =\u003e \"Physical\",\n        Domain::Engineering =\u003e \"Engineering\",\n        Domain::MedicalEthics =\u003e \"MedicalEthics\",\n        Domain::ValueJudgment =\u003e \"ValueJudgment\",\n        Domain::General =\u003e \"General\",\n        Domain::Custom(name) =\u003e name.as_str(),\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::frame::Frame;\n    use crate::core::phase::Phase;\n    use crate::core::word::TritWord;\n\n    #[test]\n    fn safe_fallback_defaults_to_enabled() {\n        let sf = SafeFallback::new();\n        assert!(sf.is_dangerous(\u0026Domain::Physical));\n    }\n\n    #[test]\n    fn safe_fallback_physical_is_always_dangerous() {\n        let sf = SafeFallback::new();\n        assert!(sf.is_dangerous(\u0026Domain::Physical));\n    }\n\n    #[test]\n    fn safe_fallback_engineering_is_always_dangerous() {\n        let sf = SafeFallback::new();\n        assert!(sf.is_dangerous(\u0026Domain::Engineering));\n    }\n\n    #[test]\n    fn safe_fallback_medical_ethics_is_not_dangerous() {\n        let sf = SafeFallback::new();\n        assert!(!sf.is_dangerous(\u0026Domain::MedicalEthics));\n    }\n\n    #[test]\n    fn safe_fallback_custom_dangerous_domains() {\n        let sf = SafeFallback::new();\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"chemistry\".into())));\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"genetics\".into())));\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"nuclear\".into())));\n    }\n\n    #[test]\n    fn safe_fallback_custom_non_dangerous() {\n        let sf = SafeFallback::new();\n        assert!(!sf.is_dangerous(\u0026Domain::Custom(\"literature\".into())));\n        assert!(!sf.is_dangerous(\u0026Domain::Custom(\"music\".into())));\n    }\n\n    #[test]\n    fn safe_fallback_can_register_new_dangerous_domain() {\n        let mut sf = SafeFallback::new();\n        sf.register_dangerous(\"biohacking\");\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"biohacking\".into())));\n    }\n\n    #[test]\n    fn safe_fallback_guard_forces_false_on_hold_with_interrupts() {\n        let sf = SafeFallback::new();\n        let result = TritWord::hold(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Custom(\"chemistry\".into()), \u0026result, 3);\n        assert_eq!(guarded.value(), TritValue::False);\n        assert!(interrupt.is_some());\n    }\n\n    #[test]\n    fn safe_fallback_guard_forces_false_on_physical_domain() {\n        let sf = SafeFallback::new();\n        let result = TritWord::hold(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Physical, \u0026result, 2);\n        assert_eq!(guarded.value(), TritValue::False);\n        assert!(interrupt.is_some());\n    }\n\n    #[test]\n    fn safe_fallback_guard_forces_false_on_engineering_domain() {\n        let sf = SafeFallback::new();\n        let result = TritWord::unknown(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Engineering, \u0026result, 1);\n        assert_eq!(guarded.value(), TritValue::False);\n        assert!(interrupt.is_some());\n    }\n\n    #[test]\n    fn safe_fallback_guard_forces_false_on_unknown() {\n        let sf = SafeFallback::new();\n        let result = TritWord::unknown(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Custom(\"genetics\".into()), \u0026result, 1);\n        assert_eq!(guarded.value(), TritValue::False);\n        assert!(interrupt.is_some());\n    }\n\n    #[test]\n    fn safe_fallback_guard_passes_through_true() {\n        let sf = SafeFallback::new();\n        let result = TritWord::tru(Frame::Science);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Custom(\"chemistry\".into()), \u0026result, 3);\n        assert_eq!(guarded.value(), TritValue::True);\n        assert!(interrupt.is_none());\n    }\n\n    #[test]\n    fn safe_fallback_guard_no_interrupts_no_force() {\n        let sf = SafeFallback::new();\n        let result = TritWord::hold(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Custom(\"chemistry\".into()), \u0026result, 0);\n        assert_eq!(guarded.value(), TritValue::Hold);\n        assert!(interrupt.is_none());\n    }\n\n    #[test]\n    fn safe_fallback_medical_ethics_passes_through() {\n        let sf = SafeFallback::new();\n        let result = TritWord::hold(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::MedicalEthics, \u0026result, 5);\n        assert_eq!(guarded.value(), TritValue::Hold);\n        assert!(interrupt.is_none());\n    }\n\n    #[test]\n    fn safe_fallback_disabled_passes_through_everything() {\n        let sf = SafeFallback::disabled();\n        let result = TritWord::hold(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Physical, \u0026result, 5);\n        assert_eq!(guarded.value(), TritValue::Hold);\n        assert!(interrupt.is_none());\n    }\n\n    #[test]\n    fn builder_registers_dangerous_domain() {\n        let sf = SafeFallback::new().with_dangerous_domain(\"biohacking\");\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"biohacking\".into())));\n    }\n\n    #[test]\n    fn enabled_can_disable_fallback() {\n        let sf = SafeFallback::new().enabled(false);\n        assert!(!sf.is_dangerous(\u0026Domain::Physical));\n        let result = TritWord::unknown(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Physical, \u0026result, 5);\n        assert_eq!(guarded.value(), TritValue::Unknown);\n        assert!(interrupt.is_none());\n    }\n\n    #[test]\n    fn register_dangerous_deduplicates() {\n        let mut sf = SafeFallback::new();\n        sf.register_dangerous(\"chemistry\");\n        sf.register_dangerous(\"chemistry\");\n        // internal vec should not contain duplicates; exact count is private,\n        // but behavior should remain consistent.\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"chemistry\".into())));\n    }\n\n    #[test]\n    fn guard_preserves_false() {\n        let sf = SafeFallback::new();\n        let result = TritWord::fals(Frame::Science);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Physical, \u0026result, 5);\n        assert_eq!(guarded.value(), TritValue::False);\n        assert!(interrupt.is_none());\n    }\n\n    #[test]\n    fn guard_resets_phase_to_full_false() {\n        let sf = SafeFallback::new();\n        let result = TritWord::new(\n            TritValue::Unknown,\n            Phase::new(0.25).unwrap(),\n            Frame::Individual,\n        );\n        let (guarded, _) = sf.guard(\u0026Domain::Physical, \u0026result, 1);\n        // Phase is reset to full_false() when SafeFallback forces False\n        assert_eq!(guarded.phase().inner(), 0.0);\n        assert_eq!(guarded.frame(), Frame::Individual);\n    }\n\n    #[test]\n    fn non_dangerous_domain_does_not_force_even_with_interrupts() {\n        let sf = SafeFallback::new();\n        let result = TritWord::unknown(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::MedicalEthics, \u0026result, 5);\n        assert_eq!(guarded.value(), TritValue::Unknown);\n        assert!(interrupt.is_none());\n    }\n}\n","traces":[{"line":32,"address":[],"length":0,"stats":{"Line":9439544818968559616}},{"line":34,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":46,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":48,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":54,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":55,"address":[],"length":0,"stats":{"Line":2449958197289549824}},{"line":56,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":61,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":62,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":63,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":67,"address":[],"length":0,"stats":{"Line":72057594037927938}},{"line":68,"address":[],"length":0,"stats":{"Line":72057594037927938}},{"line":69,"address":[],"length":0,"stats":{"Line":72057594037927938}},{"line":
