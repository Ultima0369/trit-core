oInput {\n    id: String,\n    description: String,\n    domain: String,\n    signals: Vec\u003cSignalInput\u003e,\n    expected_behavior: String,\n}\n\n#[derive(Debug, Deserialize, serde::Serialize)]\nstruct SignalInput {\n    frame: String,\n    value: i8,\n    phase: f64,\n}\n\nfn main() {\n    let raw = fs::read_to_string(\"scenarios/adversarial_audit.json\")\n        .expect(\"failed to read adversarial_audit.json\");\n    let scenarios: Vec\u003cScenarioInput\u003e =\n        serde_json::from_str(\u0026raw).expect(\"failed to parse adversarial scenarios\");\n\n    let binary = if cfg!(debug_assertions) {\n        \"target/debug/trit-sandbox.exe\"\n    } else {\n        \"target/release/trit-sandbox.exe\"\n    };\n\n    println!(\"=== Trit-Core 对抗性审计 ===\");\n    println!(\"共 {} 个对抗场景\\n\", scenarios.len());\n\n    let mut passed = 0;\n    let mut failed = 0;\n    let mut findings: Vec\u003cFinding\u003e = Vec::new();\n\n    for scenario in \u0026scenarios {\n        let input = serde_json::to_string(scenario).expect(\"serialize\");\n        let output = Command::new(binary)\n            .arg(\"--stdin\")\n            .stdin(std::process::Stdio::piped())\n            .stdout(std::process::Stdio::piped())\n            .stderr(std::process::Stdio::piped())\n            .spawn()\n            .and_then(|mut child| {\n                use std::io::Write;\n                if let Some(ref mut stdin) = child.stdin {\n                    stdin.write_all(input.as_bytes())?;\n                }\n                child.wait_with_output()\n            });\n\n        match output {\n            Ok(out) =\u003e {\n                let stdout = String::from_utf8_lossy(\u0026out.stdout);\n                let stderr = String::from_utf8_lossy(\u0026out.stderr);\n                let success = out.status.success();\n\n                // Try to parse JSON output\n                let parsed: Option\u003cserde_json::Value\u003e = serde_json::from_str(\u0026stdout).ok();\n\n                let actual = parsed\n                    .as_ref()\n                    .and_then(|v| v.get(\"final_value_code\").and_then(|c| c.as_i64()));\n                let policy = parsed\n                    .as_ref()\n                    .and_then(|v| v.get(\"policy_action\").and_then(|c| c.as_str()));\n\n                let expected = \u0026scenario.expected_behavior;\n                let matched = if !success {\n                    false\n                } else {\n                    match expected.as_str() {\n                        \"hold\" =\u003e actual == Some(0),\n                        \"commit_true\" =\u003e actual == Some(1),\n                        \"commit_false\" =\u003e actual == Some(-1),\n                        \"negotiate\" =\u003e policy.map(|p| p.contains(\"Negotiate\")).unwrap_or(false),\n                        _ =\u003e false,\n                    }\n                };\n\n                if matched {\n                    passed += 1;\n                    println!(\"✅ {} — {} (pass)\", scenario.id, scenario.description);\n                } else {\n                    failed += 1;\n                    let actual_str = if let Some(a) = actual {\n                        format!(\"value_code={}, policy={}\", a, policy.unwrap_or(\"?\"))\n                    } else if !success {\n                        format!(\"ERROR: {}\", stderr.lines().last().unwrap_or(\"unknown\"))\n                    } else {\n                        format!(\n                            \"unparseable: {}\",\n                            stdout.chars().take(200).collect::\u003cString\u003e()\n                        )\n                    };\n\n                    println!(\"❌ {} — {} (FAIL)\", scenario.id, scenario.description);\n                    println!(\"   expected={}, got={}\", expected, actual_str);\n\n                    findings.push(Finding {\n                        id: scenario.id.clone(),\n                        description: scenario.description.clone(),\n                        expected: expected.clone(),\n                        actual: actual_str,\n                        severity: classify_severity(\u0026scenario.id, \u0026scenario.description),\n                    });\n                }\n            }\n            Err(e) =\u003e {\n                failed += 1;\n                println!(\n                    \"❌ {} — {} (CRASH: {})\",\n                    scenario.id, scenario.description, e\n                );\n            }\n        }\n    }\n\n    println!(\"\\n=== 审计结果 ===\");\n    println!(\"通过: {}/{}\", passed, passed + failed);\n    println!(\"失败: {}/{}\", failed, passed + failed);\n\n    if !findings.is_empty() {\n        println!(\"\\n--- 发现 ---\");\n        for f in \u0026findings {\n            println!(\n                \"  [{}] {} — {} (expected={}, got={})\",\n                f.severity, f.id, f.description, f.expected, f.actual\n            );\n        }\n    }\n\n    // Write audit report\n    let report = serde_json::to_string_pretty(\u0026AuditReport {\n        total: passed + failed,\n        passed,\n        failed,\n        findings,\n    })\n    .unwrap();\n    fs::write(\"adversarial_audit_report.json\", \u0026report).unwrap();\n    println!(\"\\n报告已写入 adversarial_audit_report.json\");\n}\n\n#[derive(Debug, serde::Serialize)]\nstruct Finding {\n    id: String,\n    description: String,\n    expected: String,\n    actual: String,\n    severity: String,\n}\n\n#[derive(Debug, serde::Serialize)]\nstruct AuditReport {\n    total: usize,\n    passed: usize,\n    failed: usize,\n    findings: Vec\u003cFinding\u003e,\n}\n\nfn classify_severity(_id: \u0026str, _desc: \u0026str) -\u003e String {\n    // Simplified classification\n    if _id.contains(\"safe_fallback\") || _id.contains(\"unknown\") {\n        \"P0\".to_string()\n    } else if _id.contains(\"phase\") || _id.contains(\"firstperson\") {\n        \"P1\".to_string()\n    } else {\n        \"P2\".to_string()\n    }\n}\n","traces":[{"line":21,"addre ,"stats":{"Line":0}},{"line":139,"address":[],"length":0,"stats":{"Line":0}},{"line":140,"address":[],"length":0,"stats":{"Line":0}},{"line":141,"address":[],"length":0,"stats":{"Line":0}},{"line":142,"address":[],"length":0,"stats":{"Line":0}},{"line":145,"address":[],"length":0,"stats":{"Line":0}},{"line":146,"address":[],"length":0,"stats":{"Line":0}},{"line":166,"address":[],"length":0,"stats":{"Line":0}},{"line":168,"address":[],"length":0,"stats":{"Line":0}},{"line":169,"address":[],"length":0,"stats":{"Line":0}},{"line":170,"address":[],"length":0,"stats":{"Line":0}},{"line":171,"address":[],"length":0,"stats":{"Line":0}},{"line":173,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":85},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","bin","dhat_profile.rs"],"content":"// dhat heap profiling binary for Trit-Core.\n//\n// Verifies the zero-allocation claim on the hot path and measures\n// allocation patterns on the cold path and end-to-end pipeline.\n//\n// Usage:\n//   cargo build --release --bin dhat-profile --features dhat-profile\n//   cargo run --release --bin dhat-profile --features dhat-profile\n//   dhat-heap.json is written to the current directory.\n//\n// Analyze with:\n//   dhat-viewer dhat-heap.json    (if installed)\n//   Or upload to https://nnethercote.github.io/dh_view/dh_view.html\n\nuse std::error::Error;\nuse trit_core::core::frame::Frame;\nuse trit_core::core::phase::Phase;\nuse trit_core::core::value::TritValue;\nuse trit_core::core::word::TritWord;\nuse trit_core::core::TernaryAlgebra;\nuse trit_core::meta::{Domain, ResolutionPolicy, SafeFallback};\n\nfn main() -\u003e Result\u003c(), Box\u003cdyn Error\u003e\u003e {\n    println!(\"Trit-Core dhat Heap Profiling\");\n    println!(\"==============================\");\n\n    // ── Sanity check: verify dhat is capturing allocations ──\n    println!(\"\\n[0/6] Sanity check: explicit Vec allocation...\");\n    let _sanity_profiler = dhat::Profiler::new_heap();\n    {\n        let v: Vec\u003cu8\u003e = vec![0u8; 1024];\n        std::hint::black_box(\u0026v);\n    }\n    drop(_sanity_profiler);\n\n    // ── Hot path: TAND same-frame (should be zero-allocation) ──\n    println!(\"\\n[1/5] Profiling hot path: TAND same-frame x 100,000...\");\n    let _hot_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.8)?, Frame::Science);\n        let b = TritWord::new(TritValue::False, Phase::new(0.2)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_and_hot(\u0026a, \u0026b);\n        }\n    }\n    drop(_hot_profiler);\n\n    // ── Hot path: TOR same-frame ──\n    println!(\"[2/5] Profiling hot path: TOR same-frame x 100,000...\");\n    let _tor_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.7)?, Frame::Science);\n        let b = TritWord::new(TritValue::Hold, Phase::new(0.5)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\n        }\n    }\n    drop(_tor_profiler);\n\n    // ── Hot path: TNOT ──\n    println!(\"[3/5] Profiling hot path: TNOT x 100,000...\");\n    let _tnot_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.9)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_not(\u0026a);\n        }\n    }\n    drop(_tnot_profiler);\n\n    // ── Cold path: TAND cross-frame (should allocate MetaInterrupt) ──\n    println!(\"[4/5] Profiling cold path: TAND cross-frame x 10,000...\");\n    let _cold_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.8)?, Frame::Science);\n        let b = TritWord::new(TritValue::False, Phase::new(0.2)?, Frame::Individual);\n        let mut interrupt_count = 0u64;\n        for _ in 0..10_000 {\n            let (result, interrupt) = TernaryAlgebra::t_and(\u0026a, \u0026b);\n            if interrupt.is_some() {\n                interrupt_count += 1;\n            }\n            std::hint::black_box(result);\n        }\n        // Force the count to be used so the interrupt path isn't optimized away\n        println!(\"  Interrupts generated: {}\", interrupt_count);\n    }\n    drop(_cold_profiler);\n\n    // ── End-to-end pipeline: MedicalEthics ──\n    println!(\"[5/5] Profiling end-to-end pipeline: MedicalEthics x 1,000...\");\n    let _pipeline_profiler = dhat::Profiler::new_heap();\n    {\n        let science = TritWord::new(TritValue::True, Phase::new(0.85)?, Frame::Science);\n        let individual = TritWord::new(TritValue::False, Phase::new(0.20)?, Frame::Individual);\n\n        for _ in 0..1_000 {\n            let (result, interrupt) = TernaryAlgebra::t_and(\u0026science, \u0026individual);\n            let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n            let arbitration = policy.arbitrate(\u0026[science, individual])?;\n            let sf = SafeFallback::new();\n            let (final_result, _) = sf.guard(\n                \u0026Domain::MedicalEthics,\n                \u0026result,\n                if interrupt.is_some() { 1 } else { 0 },\n            );\n            // Prevent optimization: use the result\n            std::hint::black_box(final_result);\n            std::hint::black_box(arbitration);\n        }\n    }\n    drop(_pipeline_profiler);\n\n    println!(\"\\nProfiling complete.\");\n    println!(\"dhat-heap.json written to current directory.\");\n    println!(\"View with: dhat-viewer dhat-heap.json\");\n    println!(\"Or upload to: https://nnethercote.github.io/dh_view/dh_view.html\");\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","bin","sandbox.rs"],"content":"use std::fs;\nuse std::path::{Path, PathBuf};\nuse std::process::ExitCode;\nuse tracing::{error, info, warn};\nuse trit_core::sandbox::{\n    SandboxError, SandboxOutput, SandboxPipeline, ScenarioInput, ScenarioValidator,\n};\nuse trit_core::tracing_init::{LogFormat, LogOptions};\n\n/// CLI argument parser for trit-sandbox.\nstruct Args {\n    scenario: String,\n    verbose: bool,\n    quiet: bool,\n    trace: bool,\n    log_file: Option\u003cString\u003e,\n    log_format: LogFormat,\n    diagnostic: bool,\n    validate_only: bool,\n    dry_run: bool,\n    reflexive: bool,\n    hold_final: bool,\n    trace_phase: bool,\n    self_knowledge: bool,\n}\n\nimpl Args {\n    fn parse() -\u003e Result\u003cSelf, String\u003e {\n        let mut scenario = None;\n        let mut verbose = false;\n        let mut quiet = false;\n        let mut trace = false;\n        let mut log_file = None;\n        let mut log_format = LogFormat::Json;\n        let mut diagnostic = false;\n        let mut validate_only = false;\n        let mut dry_run = false;\n        let mut reflexive = false;\n        let mut hold_final = false;\n        let mut trace_phase = false;\n        let mut self_knowledge = false;\n\n        let mut args = std::env::args().skip(1).peekable();\n        while let Some(arg) = args.next() {\n            match arg.as_str() {\n                \"--scenario\" =\u003e {\n                    scenario = Some(\n                        args.next()\n                            .ok_or(\"--scenario requires a value\")?\n                            .to_string(),\n                    );\n                }\n                \"-v\" | \"--verbose\" =\u003e verbose = true,\n                \"-q\" | \"--quiet\" =\u003e quiet = true,\n                \"--trace\" =\u003e trace = true,\n                \"--log-file\" =\u003e {\n                    log_file = Some(\n                        args.next()\n                            .ok_or(\"--log-file requires a value\")?\n                            .to_string(),\n                    );\n                }\n                \"--log-format\" =\u003e {\n                    let fmt = args\n                        .next()\n                        .ok_or(\"--log-format requires a value\")?\n                        .to_string();\n                    log_format = fmt.parse::\u003cLogFormat\u003e()?;\n                }\n                \"--diagnostic\" =\u003e diagnostic = true,\n                \"--validate-only\" =\u003e validate_only = true,\n                \"--dry-run\" =\u003e dry_run = true,\n                \"--reflexive\" =\u003e reflexive = true,\n                \"--hold-final\" =\u003e hold_final = true,\n                \"--trace-phase\" =\u003e trace_phase = true,\n                \"--self-knowledge\" =\u003e self_knowledge = true,\n                \"-h\" | \"--help\" =\u003e {\n                    print_usage();\n                    std::process::exit(0);\n                }\n                other =\u003e return Err(format!(\"unknown argument: {}\", other)),\n            }\n        }\n\n        let scenario = scenario.ok_or(\"missing required argument: --scenario \u003cpath.json\u003e\")?;\n\n        Ok(Self {\n            scenario,\n            verbose,\n            quiet,\n            trace,\n            log_file,\n            log_format,\n            diagnostic,\n            validate_only,\n            dry_run,\n            reflexive,\n            hold_final,\n            trace_phase,\n            self_knowledge,\n        })\n    }\n\n    fn log_filter(\u0026self) -\u003e \u0026'static str {\n        if self.trace {\n            \"trace\"\n        } else if self.verbose {\n            \"debug\"\n        } else if self.quiet {\n            \"warn\"\n        } else {\n            \"info\"\n        }\n    }\n}\n\nfn print_usage() {\n    println!(\n        r#\"trit-sandbox — run a Trit-Core scenario through the decision pipeline\n\nUsage:\n  trit-sandbox --scenario \u003cpath.json\u003e [OPTIONS]\n\nRequired:\n  --scenario \u003cpath.json\u003e   Path to a scenario JSON file under the scenarios/ directory\n\nLogging options:\n  -v, --verbose            Enable debug-level logging\n  -q, --quiet              Only log warnings and errors\n      --trace              Enable trace-level logging (most verbose)\n      --log-file \u003cpath\u003e    Write logs to a file instead of stderr\n      --log-format \u003cfmt\u003e   One of: json (default), pretty, compact, full\n\nExecution options:\n      --diagnostic         Emit a diagnostic report alongside the output\n      --validate-only      Validate the scenario and exit without running the pipeline\n      --dry-run            Build trits and run TAND, but skip arbitration and SafeFallback\n      --reflexive          Enable reflexive audit between arbitration and SafeFallback\n      --hold-final         Treat Hold as the final answer (do not auto-question)\n      --trace-phase        Output phase shift trajectory in diagnostics\n      --self-knowledge     Enable receiver-state inference from self-knowledge\n  -h, --help               Print this help message\n\nEnvironment:\n  TRIT_LOG                 Log filter (e.g., debug, info, warn)\n  TRIT_LOG_FILE            Path to write logs to a file\n  TRIT_LOG_FORMAT          json | pretty | compact | full\n  TRIT_LOG_JSON            0/false to disable JSON logging\n\"#\n    );\n}\n\n/// Security: validate scenario file path to prevent path traversal (CWE-22).\nfn validate_scenario_path(raw_path: \u0026str) -\u003e Result\u003cPathBuf, String\u003e {\n    let path = Path::new(raw_path);\n\n    let canonical = path\n        .canonicalize()\n        .map_err(|e| format!(\"Invalid path: {}\", e))?;\n\n    let allowed_dir = Path::new(\"scenarios\")\n        .canonicalize()\n        .map_err(|e| format!(\"Cannot resolve scenarios dir: {}\", e))?;\n\n    if !canonical.starts_with(\u0026allowed_dir) {\n        return Err(format!(\n            \"Path traversal denied: '{}' is outside '{}'\",\n            canonical.display(),\n            allowed_dir.display()\n        ));\n    }\n\n    match canonical.extension().and_then(|e| e.to_str()) {\n        Some(\"json\") =\u003e Ok(canonical),\n        _ =\u003e Err(format!(\n            \"Invalid file type: only .json files allowed, got {:?}\",\n            canonical.extension()\n        )),\n    }\n}\n\nfn load_scenario(path: \u0026Path) -\u003e Result\u003cScenarioInput, SandboxError\u003e {\n    use trit_core::sandbox::validate_scenario;\n\n    info!(path = %path.display(), \"loading scenario\");\n    let raw = fs::read_to_string(path)\n        .map_err(|e| SandboxError::Io(format!(\"Failed to read '{}': {}\", path.display(), e)))?;\n    if raw.len() \u003e trit_core::sandbox::MAX_JSON_SIZE {\n        return Err(SandboxError::InvalidScenario(format!(\n            \"File too large: {} bytes (max {})\",\n            raw.len(),\n            trit_core::sandbox::MAX_JSON_SIZE\n        )));\n    }\n    let scenario: ScenarioInput = serde_json::from_str(\u0026raw)\n        .map_err(|e| SandboxError::InvalidScenario(format!(\"Malformed JSON: {}\", e)))?;\n    validate_scenario(\u0026scenario)?;\n    Ok(scenario)\n}\n\nfn run_with_error_context(args: \u0026Args) -\u003e Result\u003cSandboxOutput, SandboxError\u003e {\n    let path = validate_scenario_path(\u0026args.scenario).map_err(|reason| {\n        error!(reason, \"scenario path validation failed\");\n        SandboxError::Io(format!(\"Security error: {}\", reason))\n    })?;\n\n    let scenario = load_scenario(\u0026path)?;\n    info!(scenario_id = %scenario.id, domain = %scenario.domain, \"scenario loaded\");\n\n    if args.validate_only {\n        info!(\"--validate-only requested; skipping pipeline execution\");\n        // Return a minimal output indicating validation success.\n        return Ok(SandboxOutput {\n            scenario_id: scenario.id.clone(),\n            final_value: \"Hold\".to_string(),\n            final_value_code: 0,\n            final_frame: \"Meta\".to_string(),\n            final_phase_raw: 0.5,\n            interrupts: vec![\"validation-only mode\".to_string()],\n            policy_action: \"ValidateOnly\".to_string(),\n            reflexive_alert: None,\n            attention_cmd: None,\n            receiver_estimate: None,\n            hold_state: None,\n        });\n    }\n\n    let mut pipeline = SandboxPipeline::default()\n        .with_dry_run(args.dry_run)\n        .with_hold_final(args.hold_final)\n        .with_trace_phase(args.trace_phase);\n\n    if args.reflexive {\n        pipeline = pipeline.with_reflexive(trit_core::reflexive::ReflexiveAuditor::new());\n    }\n    if args.self_knowledge {\n        pipeline = pipeline\n            .with_self_knowledge(trit_core::knowledge::SelfKnowledge::with_human_defaults());\n    }\n\n    let (output, diagnostics) = pipeline.run_with_diagnostics(\u0026scenario)?;\n\n    if args.diagnostic {\n        eprintln!(\"\\n--- Diagnostic Report ---\");\n        eprintln!(\n            \"{}\",\n            serde_json::to_string_pretty(\u0026diagnostics).map_err(|e| {\n                SandboxError::Io(format!(\"Failed to serialize diagnostics: {}\", e))\n            })?\n        );\n        eprintln!(\"-------------------------\\n\");\n    }\n\n    // Optionally validate expected_behavior if present and non-empty.\n    // In dry-run mode arbitration is skipped, so the full-pipeline expectation\n    // is not applicable.\n    if !args.dry_run \u0026\u0026 !scenario.expected_behavior.is_empty() {\n        if let Err(e) = ScenarioValidator::validate(\u0026output, \u0026scenario.expected_behavior) {\n            warn!(\n                scenario_id = %scenario.id,\n                expected = %scenario.expected_behavior,\n                error = %e,\n                \"expected behavior mismatch\"\n            );\n            return Err(e);\n        }\n    }\n\n    Ok(output)\n}\n\nfn print_error_report(err: \u0026SandboxError) {\n    eprintln!(\"\\n=== Trit-Core Sandbox Error ===\");\n    eprintln!(\"{}\", err.report());\n    e tforms,\n//! returns a conservative default (`Standard` depth, `cpu_load = 0.5`).\n\nuse serde::{Deserialize, Serialize};\n\n// ── DepthLevel ────────────────────────────────────────────────────\n\n/// How deep the pipeline should compute.\n///\n/// Ordered from cheapest to most expensive. Higher levels enable more\n/// optional stages (attention scheduling, self-knowledge inference,\n/// phase tracing, reflexive verification).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Default, Deserialize, Serialize)]\n#[repr(u8)]\npub enum DepthLevel {\n    /// TAND + arbitrate only. No extensions.\n    Minimal = 1,\n    /// + SafeFallback. No attention/self_knowledge/phase_trace.\n    Reduced = 2,\n    /// + attention, self_knowledge, phase_trace. Standard operation.\n    #[default]\n    Standard = 3,\n    /// + reflexive verify. Deeper introspection.\n    Deep = 4,\n    /// Reserved for future multi-path TAND comparison. Currently same as Deep.\n    Exhaustive = 5,\n}\n\nimpl DepthLevel {\n    /// Returns true if the given depth level enables optional extensions\n    /// (attention scheduling, self-knowledge inference, phase tracing).\n    pub fn has_extensions(self) -\u003e bool {\n        self \u003e= DepthLevel::Standard\n    }\n\n    /// Returns true if reflexive verification should run.\n    pub fn has_reflexive_verify(self) -\u003e bool {\n        self \u003e= DepthLevel::Deep\n    }\n}\n\n// ── ComputeBudget ─────────────────────────────────────────────────\n\n/// Hardware-aware compute budget sampled from OS metrics.\n///\n/// # Fallback\n///\n/// On platforms where OS metrics cannot be read (non-Linux), `sample()`\n/// returns `Standard` depth with `cpu_load = 0.5` — a conservative\n/// assumption that neither over-commits nor starves the pipeline.\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\npub struct ComputeBudget {\n    /// Current compute depth level.\n    pub depth_level: DepthLevel,\n    /// OS CPU load average (1-minute), normalized to [0.0, 1.0].\n    pub cpu_load: f64,\n    /// Memory pressure estimate in [0.0, 1.0].\n    pub mem_pressure: f64,\n    /// Number of available (idle) hardware threads.\n    pub available_threads: u32,\n}\n\nimpl ComputeBudget {\n    /// Sample OS metrics and produce a compute budget.\n    ///\n    /// On Linux, reads `/proc/loadavg` and `/proc/meminfo`. On other\n    /// platforms, returns a conservative default.\n    pub fn sample() -\u003e Self {\n        let (cpu_load, mem_pressure, available_threads) = sample_os_metrics();\n\n        let depth_level = if cpu_load \u003e 0.9 || mem_pressure \u003e 0.9 {\n            DepthLevel::Minimal\n        } else if cpu_load \u003e 0.7 || mem_pressure \u003e 0.7 {\n            DepthLevel::Reduced\n        } else if cpu_load \u003c 0.2 \u0026\u0026 mem_pressure \u003c 0.3 {\n            DepthLevel::Deep\n        } else {\n            DepthLevel::Standard\n        };\n\n        ComputeBudget {\n            depth_level,\n            cpu_load,\n            mem_pressure,\n            available_threads,\n        }\n    }\n\n    /// Create a budget with explicit values (for testing).\n    pub fn new(\n        depth_level: DepthLevel,\n        cpu_load: f64,\n        mem_pressure: f64,\n        available_threads: u32,\n    ) -\u003e Self {\n        ComputeBudget {\n            depth_level,\n            cpu_load: cpu_load.clamp(0.0, 1.0),\n            mem_pressure: mem_pressure.clamp(0.0, 1.0),\n            available_threads,\n        }\n    }\n\n    /// Create a conservative default budget (Standard depth, moderate load).\n    pub fn conservative() -\u003e Self {\n        ComputeBudget {\n            depth_level: DepthLevel::Standard,\n            cpu_load: 0.5,\n            mem_pressure: 0.5,\n            available_threads: num_cpus::get() as u32,\n        }\n    }\n}\n\nimpl Default for ComputeBudget {\n    fn default() -\u003e Self {\n        Self::conservative()\n    }\n}\n\n// ── OS sampling (platform-specific) ───────────────────────────────\n\n/// Sample OS metrics. Returns (cpu_load, mem_pressure, available_threads).\nfn sample_os_metrics() -\u003e (f64, f64, u32) {\n    let available_threads = num_cpus::get() as u32;\n\n    #[cfg(target_os = \"linux\")]\n    {\n        let cpu_load = read_linux_loadavg().unwrap_or(0.5);\n        let mem_pressure = read_linux_meminfo().unwrap_or(0.5);\n        (cpu_load, mem_pressure, available_threads)\n    }\n\n    #[cfg(not(target_os = \"linux\"))]\n    {\n        // Conservative fallback for non-Linux platforms.\n        // CPU load is estimated from available threads vs total.\n        // Memory pressure is unknown → assume moderate.\n        (0.5, 0.5, available_threads)\n    }\n}\n\n#[cfg(target_os = \"linux\")]\nfn read_linux_loadavg() -\u003e Option\u003cf64\u003e {\n    let content = std::fs::read_to_string(\"/proc/loadavg\").ok()?;\n    // Format: \"0.15 0.20 0.18 1/1234 56789\"\n    let first_field = content.split_whitespace().next()?;\n    let load: f64 = first_field.parse().ok()?;\n    // Normalize: divide by available CPUs. load=1.0 on a 4-core system = 0.25.\n    let ncpus = num_cpus::get() as f64;\n    Some((load / ncpus.max(1.0)).clamp(0.0, 1.0))\n}\n\n#[cfg(target_os = \"linux\")]\nfn read_linux_meminfo() -\u003e Option\u003cf64\u003e {\n    let content = std::fs::read_to_string(\"/proc/meminfo\").ok()?;\n    let mut mem_total: Option\u003cu64\u003e = None;\n    let mut mem_available: Option\u003cu64\u003e = None;\n\n    for line in content.lines() {\n        if line.starts_with(\"MemTotal:\") {\n            mem_total = parse_kb_value(line);\n        } else if line.starts_with(\"MemAvailable:\") {\n            mem_available = parse_kb_value(line);\n        }\n        if mem_total.is_some() \u0026\u0026 mem_available.is_some() {\n            break;\n        }\n    }\n\n    let total = mem_total?;\n    let available = mem_available?;\n    if total == 0 {\n        return None;\n    }\n    // Pressure = 1.0 - (available / total). 0.0 = all free, 1.0 = all used.\n    Some((1.0 - (available as f64 / total as f64)).clamp(0.0, 1.0))\n}\n\n#[cfg(target_os = \"linux\")]\nfn parse_kb_value(line: \u0026str) -\u003e Option\u003cu64\u003e {\n    // Lines look like: \"MemTotal:       16384000 kB\"\n    line.split_whitespace().nth(1)?.parse().ok()\n}\n\n// ── num_cpus polyfill ─────────────────────────────────────────────\n\n/// Minimal polyfill for `std::thread::available_parallelism`.\n/// In Rust 1.96, `std::thread::available_parallelism` is stable,\n/// so we use it directly.\nmod num_cpus {\n    pub fn get() -\u003e usize {\n        std::thread::available_parallelism()\n            .map(|n| n.get())\n            .unwrap_or(4)\n    }\n}\n\n// ── Tests ─────────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn depth_level_ordering() {\n        assert!(DepthLevel::Exhaustive \u003e DepthLevel::Deep);\n        assert!(DepthLevel::Deep \u003e DepthLevel::Standard);\n        assert!(DepthLevel::Standard \u003e DepthLevel::Reduced);\n        assert!(DepthLevel::Reduced \u003e DepthLevel::Minimal);\n    }\n\n    #[test]\n    fn depth_level_has_extensions() {\n        assert!(!DepthLevel::Minimal.has_extensions());\n        assert!(!DepthLevel::Reduced.has_extensions());\n        assert!(DepthLevel::Standard.has_extensions());\n        assert!(DepthLevel::Deep.has_extensions());\n        assert!(DepthLevel::Exhaustive.has_extensions());\n    }\n\n    #[test]\n    fn depth_level_has_reflexive_verify() {\n        assert!(!DepthLevel::Minimal.has_reflexive_verify());\n        assert!(!DepthLevel::Reduced.has_reflexive_verify());\n        assert!(!DepthLevel::Standard.has_reflexive_verify());\n        assert!(DepthLevel::Deep.has_reflexive_verify());\n        assert!(DepthLevel::Exhaustive.has_reflexive_verify());\n    }\n\n    #[test]\n    fn conservative_budget_is_standard() {\n        let budget = ComputeBudget::conservative();\n        assert_eq!(budget.depth_level, DepthLevel::Standard);\n        assert_eq!(budget.cpu_load, 0.5);\n        assert_eq!(budget.mem_pressure, 0.5);\n        assert!(budget.available_threads \u003e 0);\n    }\n\n    #[test]\n    fn explicit_budget_clamps_values() {\n        let budget = ComputeBudget::new(DepthLevel::Minimal, 1.5, -0.5, 8);\n        assert_eq!(budget.cpu_load, 1.0);\n        assert_eq!(budget.mem_pressure, 0.0);\n    }\n\n    #[test]\n    fn sample_produces_valid_budget() {\n        let budget = ComputeBudget::sample();\n        assert!(budget.depth_level as u8 \u003e= 1);\n        assert!(budget.depth_level as u8 \u003c= 5);\n        assert!((0.0..=1.0).contains(\u0026budget.cpu_load));\n        assert!((0.0..=1.0).contains(\u0026budget.mem_pressure));\n        assert!(budget.available_threads \u003e 0);\n    }\n\n    #[test]\n    fn default_budget_is_conservative() {\n        let budget = ComputeBudget::default();\n        assert_eq!(budget.depth_level, DepthLevel::Standard);\n    }\n}\n","traces":[{"line":39,"address":[],"length":0,"stats":{"Line":7566047373982433280}},{"line":40,"address":[],"length":0,"stats":{"Line":7566047373982433280}},{"line":44,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":45,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":75,"address":[],"length":0,"stats":{"Line":7277816997830721536}},{"line":76,"address":[],"length":0,"stats":{"Line":10664523917613334528}},{"line":78,"address":[],"length":0,"stats":{"Line":3386706919782612992}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":14555633995661443072}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":82,"address":[],"length":0,"stats":{"Line":7277816997830721536}},{"line":83,"address":[],"length":0,"stats":{"Line":0}},{"line":85,"address":[],"length":0,"stats":{"Line":7277816997830721536}},{"line":97,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"lin alEq)]\npub struct CalibrationEntry {\n    /// ID of the scenario that produced this entry.\n    pub scenario_id: String,\n    /// Domain of the decision.\n    pub domain: Domain,\n    /// Final trit value after arbitration + SafeFallback + anchor.\n    pub result: TritValue,\n    /// Final phase after all stages.\n    pub phase: f64,\n    /// Number of cross-frame interrupts detected.\n    pub interrupt_count: usize,\n    /// Total pipeline elapsed time in microseconds.\n    pub elapsed_us: u64,\n    /// Compute depth level used for this run.\n    pub depth_level: DepthLevel,\n    /// Attention command produced (if any).\n    pub attention_cmd: Option\u003cAttentionCmd\u003e,\n}\n\nimpl CalibrationEntry {\n    /// Returns true if this entry represents a \"clean\" decision\n    /// (no interrupts, no SafeFallback, result is computable).\n    pub fn is_clean(\u0026self) -\u003e bool {\n        self.interrupt_count == 0 \u0026\u0026 self.result.is_computable()\n    }\n\n    /// Returns true if this entry represents a conflicted decision\n    /// (interrupts present, result is Hold).\n    pub fn is_conflicted(\u0026self) -\u003e bool {\n        self.interrupt_count \u003e 0 \u0026\u0026 self.result == TritValue::Hold\n    }\n}\n\n// ── CalibrationLog ────────────────────────────────────────────────\n\n/// Fixed-size ring buffer of calibration entries.\n///\n/// # Window eviction\n///\n/// When the log exceeds `window_size`, the oldest entry is silently\n/// dropped. This prevents unbounded memory growth while retaining\n/// recent history for pattern calibration.\n#[derive(Debug, Clone, PartialEq)]\npub struct CalibrationLog {\n    entries: VecDeque\u003cCalibrationEntry\u003e,\n    window_size: usize,\n}\n\nimpl CalibrationLog {\n    /// Create a new calibration log with the given window size.\n    pub fn new(window_size: usize) -\u003e Self {\n        CalibrationLog {\n            entries: VecDeque::with_capacity(window_size),\n            window_size,\n        }\n    }\n\n    /// Record a new entry. Evicts the oldest entry if the window is full.\n    pub fn record(\u0026mut self, entry: CalibrationEntry) {\n        if self.entries.len() \u003e= self.window_size {\n            self.entries.pop_front();\n        }\n        self.entries.push_back(entry);\n    }\n\n    /// Number of entries currently in the log.\n    pub fn len(\u0026self) -\u003e usize {\n        self.entries.len()\n    }\n\n    /// Returns true if the log is empty.\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.entries.is_empty()\n    }\n\n    /// The window size (maximum entries).\n    pub fn window_size(\u0026self) -\u003e usize {\n        self.window_size\n    }\n\n    /// Iterate over entries from oldest to newest.\n    pub fn iter(\u0026self) -\u003e impl Iterator\u003cItem = \u0026CalibrationEntry\u003e {\n        self.entries.iter()\n    }\n\n    /// Count entries matching a predicate.\n    pub fn count_where(\u0026self, predicate: impl Fn(\u0026CalibrationEntry) -\u003e bool) -\u003e usize {\n        self.entries.iter().filter(|e| predicate(e)).count()\n    }\n\n    /// Get the most recent entry, if any.\n    pub fn latest(\u0026self) -\u003e Option\u003c\u0026CalibrationEntry\u003e {\n        self.entries.back()\n    }\n\n    /// Get the N most recent entries (up to the log size).\n    pub fn recent(\u0026self, n: usize) -\u003e Vec\u003c\u0026CalibrationEntry\u003e {\n        self.entries.iter().rev().take(n).collect()\n    }\n\n    /// Fraction of entries that are \"clean\" (no interrupts, computable result).\n    /// Returns 0.0 if the log is empty.\n    pub fn clean_ratio(\u0026self) -\u003e f64 {\n        if self.entries.is_empty() {\n            return 0.0;\n        }\n        self.count_where(|e| e.is_clean()) as f64 / self.entries.len() as f64\n    }\n\n    /// Average phase of all entries. Returns 0.5 if empty.\n    pub fn average_phase(\u0026self) -\u003e f64 {\n        if self.entries.is_empty() {\n            return 0.5;\n        }\n        self.entries.iter().map(|e| e.phase).sum::\u003cf64\u003e() / self.entries.len() as f64\n    }\n\n    /// Clear all entries.\n    pub fn clear(\u0026mut self) {\n        self.entries.clear();\n    }\n}\n\nimpl Default for CalibrationLog {\n    fn default() -\u003e Self {\n        Self::new(64)\n    }\n}\n\n// ── Tests ─────────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn entry(id: \u0026str, interrupts: usize, result: TritValue) -\u003e CalibrationEntry {\n        CalibrationEntry {\n            scenario_id: id.to_string(),\n            domain: Domain::General,\n            result,\n            phase: 0.5,\n            interrupt_count: interrupts,\n            elapsed_us: 1000,\n            depth_level: DepthLevel::Standard,\n            attention_cmd: None,\n        }\n    }\n\n    #[test]\n    fn new_log_is_empty() {\n        let log = CalibrationLog::new(64);\n        assert!(log.is_empty());\n        assert_eq!(log.len(), 0);\n    }\n\n    #[test]\n    fn record_adds_entry() {\n        let mut log = CalibrationLog::new(64);\n        log.record(entry(\"s1\", 0, TritValue::True));\n        assert_eq!(log.len(), 1);\n        assert_eq!(log.latest().unwrap().scenario_id, \"s1\");\n    }\n\n    #[test]\n    fn window_eviction_drops_oldest() {\n        let mut log = CalibrationLog::new(3);\n        log.record(entry(\"s1\", 0, TritValue::True));\n        log.record(entry(\"s2\", 0, TritValue::False));\n        log.record(entry(\"s3\", 0, TritValue::Hold));\n        log.record(entry(\"s4\", 1, TritValue::Hold)); // s1 should be evicted\n        assert_eq!(log.len(), 3);\n        assert_eq!(log.latest().unwrap().scenario_id, \"s4\");\n        // Oldest should now be s2\n        let first = log.iter().next().unwrap();\n        assert_eq!(first.scenario_id, \"s2\");\n    }\n\n    #[test]\n    fn clean_ratio_computes_correctly() {\n        let mut log = CalibrationLog::new(64);\n        log.record(entry(\"s1\", 0, TritValue::True));\n        log.record(entry(\"s2\", 2, TritValue::Hold));\n        log.record(entry(\"s3\", 0, TritValue::False));\n        assert!((log.clean_ratio() - 2.0 / 3.0).abs() \u003c 0.01);\n    }\n\n    #[test]\n    fn clean_ratio_empty_is_zero() {\n        let log = CalibrationLog::new(64);\n        assert_eq!(log.clean_ratio(), 0.0);\n    }\n\n    #[test]\n    fn average_phase_empty_is_neutral() {\n        let log = CalibrationLog::new(64);\n        assert_eq!(log.average_phase(), 0.5);\n    }\n\n    #[test]\n    fn recent_returns_newest_first() {\n        let mut log = CalibrationLog::new(64);\n        log.record(entry(\"s1\", 0, TritValue::True));\n        log.record(entry(\"s2\", 0, TritValue::False));\n        let recent = log.recent(1);\n        assert_eq!(recent.len(), 1);\n        assert_eq!(recent[0].scenario_id, \"s2\");\n    }\n\n    #[test]\n    fn is_clean_detects_no_interrupts() {\n        let e = entry(\"s\", 0, TritValue::True);\n        assert!(e.is_clean());\n        assert!(!e.is_conflicted());\n    }\n\n    #[test]\n    fn is_conflicted_detects_interrupts_with_hold() {\n        let e = entry(\"s\", 3, TritValue::Hold);\n        assert!(e.is_conflicted());\n        assert!(!e.is_clean());\n    }\n\n    #[test]\n    fn clear_empties_log() {\n        let mut log = CalibrationLog::new(64);\n        log.record(entry(\"s1\", 0, TritValue::True));\n        log.clear();\n        assert!(log.is_empty());\n    }\n\n    #[test]\n    fn count_where_filters_correctly() {\n        let mut log = CalibrationLog::new(64);\n        log.record(entry(\"s1\", 0, TritValue::True));\n        log.record(entry(\"s2\", 2, TritValue::Hold));\n        log.record(entry(\"s3\", 1, TritValue::Hold));\n        assert_eq!(log.count_where(|e| e.is_clean()), 1);\n        assert_eq!(log.count_where(|e| e.is_conflicted()), 2);\n    }\n}\n","traces":[{"line":47,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":48,"address":[],"length": th":0,"stats":{"Line":144115188075855872}},{"line":137,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":139,"address":[],"length":0,"stats":{"Line":0}},{"line":143,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":144,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":149,"address":[],"length":0,"stats":{"Line":7277816997830721536}},{"line":150,"address":[],"length":0,"stats":{"Line":7277816997830721536}}],"covered":33,"coverable":36},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","clock.rs"],"content":"/// Oscillator for phase-based time-scale management.\r\n///\r\n/// Each computation domain can request a different sampling frequency.\r\n/// Note: `phase_now()` returns values in `[-1.0, 1.0]` (raw sine output),\r\n/// which differs from [`Phase`](crate::core::phase::Phase)'s `[0.0, 1.0]` domain.\r\n/// Use [`to_phase()`](HarmonicClock::to_phase) for a mapped `[0.0, 1.0]` output.\r\n///\r\n/// ## Pipeline integration (v0.3.0)\r\n///\r\n/// The clock is now integrated into `SandboxPipeline`. Each `run()` call\r\n/// ticks the clock by the elapsed wall-clock time. The domain selects the\r\n/// clock preset via [`for_domain()`](HarmonicClock::for_domain):\r\n/// - `physical()` (ω=10.0) for Physical, Engineering\r\n/// - `deliberative()` (ω=0.5) for MedicalEthics, ValueJudgment, General, Custom\r\n///\r\n/// The clock phase feeds into `AttentionScheduler` as a modulation signal:\r\n/// near phase peaks (0.8–1.0), the scheduler is more likely to suggest\r\n/// [`ShiftTo`](crate::attention::AttentionCmd::ShiftTo); near troughs\r\n/// (0.0–0.2), more likely to [`HoldCurrent`](crate::attention::AttentionCmd::HoldCurrent).\r\n#[derive(Debug, Clone, PartialEq)]\r\npub struct HarmonicClock {\r\n    omega: f64, // angular frequency\r\n    phi0: f64,  // initial phase offset\r\n    t: f64,     // current time\r\n}\r\n\r\nimpl HarmonicClock {\r\n    pub fn new(omega: f64, phi0: f64) -\u003e Self {\r\n        Self {\r\n            omega,\r\n            phi0,\r\n            t: 0.0,\r\n        }\r\n    }\r\n\r\n    /// Sample at current time. Returns true if rising zero-crossing.\r\n    pub fn tick(\u0026mut self, dt: f64) -\u003e bool {\r\n        let h_prev = (self.omega * self.t + self.phi0).sin();\r\n        self.t += dt;\r\n        let h_curr = (self.omega * self.t + self.phi0).sin();\r\n        h_prev \u003c= 0.0 \u0026\u0026 h_curr \u003e 0.0\r\n    }\r\n\r\n    pub fn phase_now(\u0026self) -\u003e f64 {\r\n        (self.omega * self.t + self.phi0).sin()\r\n    }\r\n\r\n    /// Current phase mapped to `[0.0, 1.0]` for [`Phase`](crate::core::phase::Phase) compatibility.\r\n    ///\r\n    /// Uses the transformation `(sin(angle) + 1.0) / 2.0` which maps:\r\n    /// - `-1.0 → 0.0` (full false)\r\n    /// - `0.0 → 0.5` (neutral)\r\n    /// - `1.0 → 1.0` (full true)\r\n    pub fn to_phase(\u0026self) -\u003e crate::core::phase::Phase {\r\n        let raw = (self.omega * self.t + self.phi0).sin();\r\n        crate::core::phase::Phase::new_clamped((raw + 1.0) / 2.0)\r\n    }\r\n\r\n    /// Fast clock for physical/ engineering domains.\r\n    pub fn physical() -\u003e Self {\r\n        Self::new(10.0, 0.0)\r\n    }\r\n\r\n    /// Slow clock for ethical / value domains.\r\n    pub fn deliberative() -\u003e Self {\r\n        Self::new(0.5, 0.0)\r\n    }\r\n\r\n    /// Select the appropriate clock preset for a domain.\r\n    ///\r\n    /// | Domain | Preset | ω |\r\n    /// |--------|--------|---|\r\n    /// | Physical, Engineering | `physical()` | 10.0 |\r\n    /// | MedicalEthics, ValueJudgment, General, Custom | `deliberative()` | 0.5 |\r\n    pub fn for_domain(domain: \u0026crate::meta::Domain) -\u003e Self {\r\n        match domain {\r\n            crate::meta::Domain::Physical | crate::meta::Domain::Engineering =\u003e Self::physical(),\r\n            _ =\u003e Self::deliberative(),\r\n        }\r\n    }\r\n\r\n    /// Returns the current time accumulator value.\r\n    pub fn elapsed_time(\u0026self) -\u003e f64 {\r\n        self.t\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n    use crate::meta::Domain;\r\n\r\n    #[test]\r\n    fn should_detect_rising_zero_crossing_on_tick() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        assert!(clock.tick(0.1));\r\n    }\r\n\r\n    #[test]\r\n    fn should_not_detect_crossing_when_descending() {\r\n        let mut clock = HarmonicClock::new(1.0, std::f64::consts::PI);\r\n        assert!(!clock.tick(0.1));\r\n    }\r\n\r\n    #[test]\r\n    fn phase_now_should_return_sine_of_current_angle() {\r\n        let clock = HarmonicClock::new(1.0, std::f64::consts::FRAC_PI_2);\r\n        assert_float_eq!(clock.phase_now(), 1.0);\r\n    }\r\n\r\n    #[test]\r\n    fn physical_clock_should_have_high_frequency() {\r\n        let clock = HarmonicClock::physical();\r\n        assert!(clock.omega \u003e 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn deliberative_clock_should_have_low_frequency() {\r\n        let clock = HarmonicClock::deliberative();\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn multiple_ticks_should_accumulate_time() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        clock.tick(0.1);\r\n        clock.tick(0.1);\r\n        clock.tick(0.1);\r\n        assert!((clock.phase_now() - 0.3_f64.sin()).abs() \u003c 0.01);\r\n    }\r\n\r\n    #[test]\r\n    fn tick_with_zero_dt_is_not_a_crossing() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        assert!(!clock.tick(0.0));\r\n    }\r\n\r\n    #[test]\r\n    fn no_crossing_within_same_half_period() {\r\n        // Start at peak (PI/2) and move a little; no rising zero crossing.\r\n        let mut clock = HarmonicClock::new(1.0, std::f64::consts::FRAC_PI_2);\r\n        assert!(!clock.tick(0.1));\r\n        assert!(!clock.tick(0.1));\r\n    }\r\n\r\n    #[test]\r\n    fn physical_clock_starts_at_zero_phase() {\r\n        let clock = HarmonicClock::physical();\r\n        assert_float_eq!(clock.phase_now(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn deliberative_clock_starts_at_zero_phase() {\r\n        let clock = HarmonicClock::deliberative();\r\n        assert_float_eq!(clock.phase_now(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn phase_now_bounds_are_within_one() {\r\n        let mut clock = HarmonicClock::new(2.5, 0.3);\r\n        for _ in 0..20 {\r\n            clock.tick(0.05);\r\n            let p = clock.phase_now();\r\n            assert!((-1.0..=1.0).contains(\u0026p), \"phase {} out of [-1, 1]\", p);\r\n        }\r\n    }\r\n\r\n    // ── domain preset mapping ─────────────────────────────────────\r\n\r\n    #[test]\r\n    fn for_domain_physical_is_fast() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::Physical);\r\n        assert!(clock.omega \u003e 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_engineering_is_fast() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::Engineering);\r\n        assert!(clock.omega \u003e 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_medical_ethics_is_slow() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::MedicalEthics);\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_value_judgment_is_slow() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::ValueJudgment);\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_general_is_slow() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::General);\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn for_domain_custom_is_slow() {\r\n        let clock = HarmonicClock::for_domain(\u0026Domain::Custom(\"test\".into()));\r\n        assert!(clock.omega \u003c 5.0);\r\n    }\r\n\r\n    #[test]\r\n    fn elapsed_time_accumulates() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        clock.tick(0.5);\r\n        clock.tick(0.3);\r\n        assert_float_eq!(clock.elapsed_time(), 0.8);\r\n    }\r\n\r\n    #[test]\r\n    fn to_phase_maps_to_unit_interval() {\r\n        let mut clock = HarmonicClock::new(1.0, 0.0);\r\n        for _ in 0..20 {\r\n            clock.tick(0.1);\r\n            let phase = clock.to_phase();\r\n            let inner = phase.inner();\r\n            assert!(\r\n                (0.0..=1.0).contains(\u0026inner),\r\n                \"to_phase {} not in [0,1]\",\r\n                inner\r\n            );\r\n        }\r\n    }\r\n}\r\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":8718968878589280256}},{"line":37,"address":[],"length":0,"stats":{"Line":10808639105689190400}},{"line":38,"address":[],"length":0,"stats":{"Line":13979173243358019584}},{"line":39,"address":[],"length":0,"stats":{"Line":10808639105689190400}},{"line":40,"address":[],"length":0,"stats":{"Line":13979173243358019584}},{"line":41,"address":[],"length":0,"stats":{"Line":18086456103519911936}},{"line":44,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":45,"address":[],"length":0,"stats":{"Line":3458764513820540928}},{"line":54,"address":[],"length":0,"stats":{"Line":8718968878589280256}},{"line":55,"address":[],"length":0,"stats":{"Line":7710162562058289152}},{"line":56,"address":[],"length":0,"stats":{"Line":17437937757178560512}},{"line":60,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":61,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":65,"address":[],"length":0,"stats":{"Line":7710162562058289152}},{"line":66,"address":[],"length":0,"stats":{"Line":7710162562058289152}},{"line":75,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":76,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":77,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":78,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":83,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":84,"address":[],"length":0,"stats":{"Line":216172782113783808}}],"covered":21,"coverable":21},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","algebra.rs"],"content":"// ===== 核心提醒 - 来自与一个清醒心智的对话 =====\r\n// 1. Hold 不是失败，是有意的悬置。\r\n// 2. 跨帧冲突不该被抹平，而应被可审计地记录。\r\n// 3. 自知是知人的前提：先知道自己如何陷入，再推测他人。\r\n// 4. “追光”追不上，所以要学会“停一下”而不是更快。\r\n// 5. 真正的逻辑是经得起生死检验的因果推断，不是书斋里的口才。\r\n// ================================================\r\n\r\nuse crate::core::frame::Frame;\r\nuse crate::core::phase::{Phase, PhaseError};\r\nuse crate::core::value::TritValue;\r\nuse crate::core::word::TritWord;\r\nuse crate::meta::MetaInterrupt;\r\nuse tracing::{debug, trace, warn};\r\n\r\n/// Harmonic Ternary Algebra (HTA): the core logic engine.\r\n///\r\n/// ## Hot vs Cold Path\r\n///\r\n/// Same-frame operations (hot path) skip MetaMonitor entirely — they account\r\n/// for ~80% of typical decisions. Cross-frame operations (cold path) generate\r\n/// MetaInterrupt events and trigger policy arbitration.\r\npub struct TernaryAlgebra;\r\n\r\nimpl TernaryAlgebra {\r\n    /// Precheck: returns true if both trits share the same frame.\r\n    /// Callers can use this to decide whether to take the hot path.\r\n    #[inline]\r\n    pub fn precheck_same_frame(a: \u0026TritWord, b: \u0026TritWord) -\u003e bool {\r\n        a.frame() == b.frame()\r\n    }\r\n\r\n    /// Shared cross-frame conflict handler — used by both TAND and TOR.\r\n    /// Uses `MetaInterrupt::with_frames` to avoid `format!()` overhead.\r\n    fn cross_frame_conflict(\r\n        op_name: \u0026'static str,\r\n        a: \u0026TritWord,\r\n        b: \u0026TritWord,\r\n    ) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\r\n        let hold = TritWord::hold(Frame::Meta);\r\n        let interrupt = MetaInterrupt::with_frames(op_name, a.frame(), b.frame());\r\n        if tracing::enabled!(tracing::Level::WARN) {\r\n            warn!(op = op_name, a = %a.frame(), b = %b.frame(), \"cross-frame conflict detected\");\r\n        }\r\n        (hold, Some(interrupt))\r\n    }\r\n\r\n    /// TAND: harmonic conjunction.\r\n    /// - Same frame: standard ternary logic with phase averaging (hot path).\r\n    /// - Different frame: produces Hold + triggers MetaInterrupt (cold path).\r\n    #[tracing::instrument(skip_all, fields(op = \"t_and\"))]\r\n    pub fn t_and(a: \u0026TritWord, b: \u0026TritWord) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\r\n        trace!(\r\n            a_frame = %a.frame(),\r\n            a_value = ?a.value(),\r\n            a_phase = a.phase().inner(),\r\n            b_frame = %b.frame(),\r\n            b_value = ?b.value(),\r\n            b_phase = b.phase().inner(),\r\n            \"entering TAND\"\r\n        );\r\n\r\n        if a.frame() != b.frame() {\r\n            return Self::cross_frame_conflict(\"TAND\", a, b);\r\n        }\r\n\r\n        let val = match (a.value(), b.value()) {\r\n            (TritValue::True, TritValue::True) =\u003e TritValue::True,\r\n            (TritValue::Unknown, _) | (_, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n            (TritValue::False, _) | (_, TritValue::False) =\u003e TritValue::False,\r\n            _ =\u003e TritValue::Hold,\r\n        };\r\n\r\n        let phase = Phase::mean(a.phase(), b.phase());\r\n        debug!(result_value = ?val, result_phase = phase.inner(), \"TAND same-frame computed\");\r\n        (TritWord::new(val, phase, a.frame()), None)\r\n    }\r\n\r\n    /// TAND hot path: same-frame only, no MetaInterrupt allocation.\r\n    ///\r\n    /// # Panics\r\n    ///\r\n    /// Panics if frames differ. This is the unchecked fast path; callers **must**\r\n    /// precheck with [`Self::precheck_same_frame`]. The assertion is active in all\r\n    /// build modes (not `debug_assert`) to prevent silent wrong results in release.\r\n    #[inline]\r\n    pub fn t_and_hot(a: \u0026TritWord, b: \u0026TritWord) -\u003e TritWord {\r\n        assert_eq!(a.frame(), b.frame(), \"t_and_hot requires same frame\");\r\n\r\n        let val = match (a.value(), b.value()) {\r\n            (TritValue::True, TritValue::True) =\u003e TritValue::True,\r\n            (TritValue::Unknown, _) | (_, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n            (TritValue::False, _) | (_, TritValue::False) =\u003e TritValue::False,\r\n            _ =\u003e TritValue::Hold,\r\n        };\r\n\r\n        let phase = Phase::mean(a.phase(), b.phase());\r\n        TritWord::new(val, phase, a.frame())\r\n    }\r\n\r\n    /// TOR: harmonic disjunction.\r\n    #[tracing::instrument(skip_all, fields(op = \"t_or\"))]\r\n    pub fn t_or(a: \u0026TritWord, b: \u0026TritWord) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\r\n        trace!(a_frame = %a.frame(), b_frame = %b.frame(), \"entering TOR\");\r\n\r\n        if a.frame() != b.frame() {\r\n            return Self::cross_frame_conflict(\"TOR\", a, b);\r\n        }\r\n\r\n        let val = match (a.value(), b.value()) {\r\n            (TritValue::True, _) | (_, TritValue::True) =\u003e TritValue::True,\r\n            (TritValue::Unknown, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n            (TritValue::False, TritValue::False) =\u003e TritValue::False,\r\n            _ =\u003e TritValue::Hold,\r\n        };\r\n\r\n        let phase = Phase::mean(a.phase(), b.phase());\r\n        (TritWord::new(val, phase, a.frame()), None)\r\n    }\r\n\r\n    /// TOR hot path: same-frame only, no MetaInterrupt allocation.\r\n    ///\r\n    /// # Panics\r\n    ///\r\n    /// Panics if frames differ. See [`Self::t_and_hot`] for rationale.\r\n    #[inline]\r\n    pub fn t_or_hot(a: \u0026TritWord, b: \u0026TritWord) -\u003e TritWord {\r\n        assert_eq!(a.frame(), b.frame(), \"t_or_hot requires same frame\");\r\n\r\n        let val = match (a.value(), b.value()) {\r\n            (TritValue::True, _) | (_, TritValue::True) =\u003e TritValue::True,\r\n            (TritValue::Unknown, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n            (TritValue::False, TritValue::False) =\u003e TritValue::False,\r\n            _ =\u003e TritValue::Hold,\r\n        };\r\n\r\n        let phase = Phase::mean(a.phase(), b.phase());\r\n        TritWord::new(val, phase, a.frame())\r\n    }\r\n\r\n    /// TNOT: phase-flipped negation.\r\n    #[tracing::instrument(skip_all)]\r\n    pub fn t_not(a: \u0026TritWord) -\u003e TritWord {\r\n        let val = a.value().negate();\r\n        let phase = a.phase().complement();\r\n        TritWord::new(val, phase, a.frame())\r\n    }\r\n\r\n    /// THOLD: force into Hold state (meta-monitor instruction).\r\n    pub fn t_hold(a: \u0026TritWord) -\u003e TritWord {\r\n        TritWord::new(TritValue::Hold, Phase::neutral(), a.frame())\r\n    }\r\n\r\n    /// TSENSE: create a Hold from raw sensor input.\r\n    ///\r\n    /// Returns `Err` if `phase` is not finite and in `[0.0, 1.0]`. For a\r\n    /// non-failing variant that silently clamps invalid inputs, use\r\n    /// [`t_sense_clamped`](Self::t_sense_clamped).\r\n    pub fn t_sense(phase: f64, frame: Frame) -\u003e Result\u003cTritWord, PhaseError\u003e {\r\n        Ok(TritWord::new(TritValue::Hold, Phase::new(phase)?, frame))\r\n    }\r\n\r\n    /// TSENSE with silent clamping: create a Hold from raw sensor input.\r\n    ///\r\n    /// Out-of-range or non-finite phase values are clamped to `[0.0, 1.0]`\r\n    /// (NaN/Infinity maps to neutral 0.5). This is useful for untrusted\r\n    /// external sensors where graceful degradation is preferred over hard\r\n    /// failure.\r\n    pub fn t_sense_clamped(phase: f64, frame: Frame) -\u003e TritWord {\r\n        TritWord::new(TritValue::Hold, Phase::new_clamped(phase), frame)\r\n    }\r\n\r\n    /// Batch TAND: harmonic conjunction over N inputs.\r\n    ///\r\n    /// Unlike sequential left-fold via `t_and`, this computes Phase as the\r\n    /// arithmetic mean of all input phases, avoiding left-fold bias:\r\n    /// `mean(mean(a,b),c) != (a+b+c)/3` but this method always computes\r\n    /// `(a+b+c)/3` for equal-weight semantics.\r\n    ///\r\n    /// TritValue is computed by cumulatively applying the TAND truth table.\r\n    /// Cross-frame conflicts produce Hold + MetaInterrupt per pair.\r\n    pub fn t_and_n(inputs: \u0026[TritWord]) -\u003e (TritWord, Vec\u003cMetaInterrupt\u003e) {\r\n        if inputs.is_empty() {\r\n            return (TritWord::hold(Frame::Meta), vec![]);\r\n        }\r\n        if inputs.len() == 1 {\r\n            return (inputs[0], vec![]);\r\n        }\r\n\r\n        let mut interrupts = vec![];\r\n        let first_frame = inputs[0].frame();\r\n\r\n        // Check all same frame\r\n        for word in \u0026inputs[1..] {\r\n            if word.frame() != first_frame {\r\n                let interrupt = MetaInterrupt::with_frames(\"TAND_N\", first_frame, word.frame());\r\n                interrupts.push(interrupt);\r\n            }\r\n        }\r\n\r\n        if !interrupts.is_empty() {\r\n            // Cross-frame conflict: return Hold in Meta frame with all interrupts\r\n            return (TritWord::hold(Frame::Meta), interrupts);\r\n        }\r\n\r\n        // Same frame: compute value via cumulative TAND semantics\r\n        let mut value = inputs[0].value();\r\n        for word in \u0026inputs[1..] {\r\n            value = match (value, word.value()) {\r\n                (TritValue::True, TritValue::True) =\u003e TritValue::True,\r\n                (TritValue::Unknown, _) | (_, TritValue::Unknown) =\u003e TritValue::Unknown,\r\n                (TritValue::False, _) | (_, TritValue::False) =\u003e TritValue::False,\r\n                _ =\u003e TritValue::Hold,\r\n            };\r\n        }\r\n\r\n        // Batch Phase: arithmetic mean of all phases (equal weight)\r\n        let phase_sum: f64 = inputs.iter().map(|w| w.phase().inner()).sum();\r\n        let phase = Phase::new_clamped(phase_sum / inputs.len() as f64).quantize(1e-6);\r\n\r\n        (TritWord::new(value, phase, first_frame), interrupts)\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn precheck_same_frame_returns_true() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        assert!(TernaryAlgebra::precheck_same_frame(\u0026a, \u0026b));\r\n    }\r\n\r\n    #[test]\r\n    fn precheck_different_frame_returns_false() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Individual);\r\n        assert!(!TernaryAlgebra::precheck_same_frame(\u0026a, \u0026b));\r\n    }\r\n\r\n    #[test]\r\n    fn tand_hot_same_frame_returns_no_interrupt() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        let result = TernaryAlgebra::t_and_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::False);\r\n        assert_eq!(result.frame(), Frame::Science);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_hot_same_frame_returns_no_interrupt() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        let result = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::True);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_hot_false_false_is_false() {\r\n        let a = TritWord::fals(Frame::Science);\r\n        let b = TritWord::fals(Frame::Science);\r\n        let result = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::False);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_hot_unknown_unknown_is_unknown() {\r\n        let a = TritWord::unknown(Frame::Science);\r\n        let b = TritWord::unknown(Frame::Science);\r\n        let result = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n        assert_eq!(result.value(), TritValue::Unknown);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_hot_hold_propagate Individual);\r\n        let (res, int) = TernaryAlgebra::t_and(\u0026a, \u0026b);\r\n        assert_eq!(res.value(), TritValue::Hold);\r\n        assert_eq!(res.frame(), Frame::Meta);\r\n        assert!(int.is_some());\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_accepts_valid_phase() {\r\n        let word = TernaryAlgebra::t_sense(0.75, Frame::Science).unwrap();\r\n        assert_eq!(word.value(), TritValue::Hold);\r\n        assert_eq!(word.phase().inner(), 0.75);\r\n        assert_eq!(word.frame(), Frame::Science);\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_rejects_nan_phase() {\r\n        assert!(TernaryAlgebra::t_sense(f64::NAN, Frame::Science).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_rejects_infinite_phase() {\r\n        assert!(TernaryAlgebra::t_sense(f64::INFINITY, Frame::Science).is_err());\r\n        assert!(TernaryAlgebra::t_sense(f64::NEG_INFINITY, Frame::Science).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_rejects_out_of_range_phase() {\r\n        assert!(TernaryAlgebra::t_sense(-0.1, Frame::Science).is_err());\r\n        assert!(TernaryAlgebra::t_sense(1.1, Frame::Science).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_clamped_maps_invalid_to_neutral() {\r\n        let word = TernaryAlgebra::t_sense_clamped(f64::NAN, Frame::Science);\r\n        assert_eq!(word.value(), TritValue::Hold);\r\n        assert_eq!(word.phase().inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn t_sense_clamped_preserves_valid_phase() {\r\n        let word = TernaryAlgebra::t_sense_clamped(0.25, Frame::Individual);\r\n        assert_eq!(word.phase().inner(), 0.25);\r\n    }\r\n\r\n    #[test]\r\n    fn tand_truth_table_same_frame() {\r\n        // Exhaustive 4x4 truth table for TAND with same frame.\r\n        let values = [\r\n            TritValue::True,\r\n            TritValue::False,\r\n            TritValue::Hold,\r\n            TritValue::Unknown,\r\n        ];\r\n        let expected = [\r\n            // True, False, Hold, Unknown\r\n            [\r\n                TritValue::True,\r\n                TritValue::False,\r\n                TritValue::Hold,\r\n                TritValue::Unknown,\r\n            ], // True\r\n            [\r\n                TritValue::False,\r\n                TritValue::False,\r\n                TritValue::False,\r\n                TritValue::Unknown,\r\n            ], // False\r\n            [\r\n                TritValue::Hold,\r\n                TritValue::False,\r\n                TritValue::Hold,\r\n                TritValue::Unknown,\r\n            ], // Hold\r\n            [\r\n                TritValue::Unknown,\r\n                TritValue::Unknown,\r\n                TritValue::Unknown,\r\n                TritValue::Unknown,\r\n            ], // Unknown\r\n        ];\r\n        for (i, \u0026a) in values.iter().enumerate() {\r\n            for (j, \u0026b) in values.iter().enumerate() {\r\n                let left = TritWord::new(a, Phase::new(0.8).unwrap(), Frame::Science);\r\n                let right = TritWord::new(b, Phase::new(0.6).unwrap(), Frame::Science);\r\n                let (res, int) = TernaryAlgebra::t_and(\u0026left, \u0026right);\r\n                assert_eq!(\r\n                    res.value(),\r\n                    expected[i][j],\r\n                    \"TAND({:?}, {:?}) should be {:?}\",\r\n                    a,\r\n                    b,\r\n                    expected[i][j]\r\n                );\r\n                assert!(int.is_none());\r\n            }\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn tor_truth_table_same_frame() {\r\n        // Exhaustive 4x4 truth table for TOR with same frame.\r\n        let values = [\r\n            TritValue::True,\r\n            TritValue::False,\r\n            TritValue::Hold,\r\n            TritValue::Unknown,\r\n        ];\r\n        let expected = [\r\n            // True, False, Hold, Unknown\r\n            [\r\n                TritValue::True,\r\n                TritValue:       expected,\r\n                \"TNOT({:?}) should be {:?}\",\r\n                input,\r\n                expected\r\n            );\r\n            assert_eq!(res.frame(), Frame::Science);\r\n        }\r\n    }\r\n\r\n    #[test]\r\n    fn t_hold_preserves_frame() {\r\n        let word = TritWord::tru(Frame::Individual);\r\n        let held = TernaryAlgebra::t_hold(\u0026word);\r\n        assert_eq!(held.value(), TritValue::Hold);\r\n        assert_eq!(held.frame(), Frame::Individual);\r\n        assert_eq!(held.phase().inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    #[should_panic(expected = \"t_or_hot requires same frame\")]\r\n    fn tor_hot_different_frame_panics() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::tru(Frame::Individual);\r\n        TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\r\n    }\r\n\r\n    #[test]\r\n    fn tor_cross_frame_returns_hold_and_interrupt() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let b = TritWord::fals(Frame::Individual);\r\n        let (res, int) = TernaryAlgebra::t_or(\u0026a, \u0026b);\r\n        assert_eq!(res.value(), TritValue::Hold);\r\n        assert_eq!(res.frame(), Frame::Meta);\r\n        assert!(int.is_some());\r\n    }\r\n\r\n    #[test]\r\n    fn tand_phase_averages() {\r\n        let a = TritWord::new(TritValue::True, Phase::new(0.8).unwrap(), Frame::Science);\r\n        let b = TritWord::new(TritValue::True, Phase::new(0.6).unwrap(), Frame::Science);\r\n        let (res, _) = TernaryAlgebra::t_and(\u0026a, \u0026b);\r\n        // (0.8 + 0.6) / 2 = 0.7, not near any anchor.\r\n        assert_float_eq!(res.phase().inner(), 0.7);\r\n    }\r\n\r\n    // --- t_and_n batch tests ---\r\n\r\n    #[test]\r\n    fn t_and_n_single_input_is_identity() {\r\n        let a = TritWord::tru(Frame::Science);\r\n        let (res, ints) = TernaryAlgebra::t_and_n(\u0026[a]);\r\n        assert_eq!(res.value(), TritValue::True);\r\n        assert!(ints.is_empty());\r\n    }\r\ "Science\"),\n            Frame::Individual =\u003e write!(f, \"Individual\"),\n            Frame::Consensus =\u003e write!(f, \"Consensus\"),\n            Frame::Absolute =\u003e write!(f, \"Absolute\"),\n            Frame::Meta =\u003e write!(f, \"Meta\"),\n            Frame::FirstPerson =\u003e write!(f, \"FirstPerson\"),\n            Frame::Embodied =\u003e write!(f, \"Embodied\"),\n            Frame::Relational =\u003e write!(f, \"Relational\"),\n        }\n    }\n}\n\nimpl FromStr for Frame {\n    type Err = FrameError;\n\n    fn from_str(s: \u0026str) -\u003e Result\u003cSelf, Self::Err\u003e {\n        match s {\n            \"Science\" =\u003e Ok(Frame::Science),\n            \"Individual\" =\u003e Ok(Frame::Individual),\n            \"Consensus\" =\u003e Ok(Frame::Consensus),\n            \"Absolute\" =\u003e Ok(Frame::Absolute),\n            \"Meta\" =\u003e Ok(Frame::Meta),\n            \"FirstPerson\" =\u003e Ok(Frame::FirstPerson),\n            \"Embodied\" =\u003e Ok(Frame::Embodied),\n            \"Relational\" =\u003e Ok(Frame::Relational),\n            unknown =\u003e Err(FrameError::Unknown(unknown.to_string())),\n        }\n    }\n}\n\n/// Error returned when a string cannot be parsed as a [`Frame`].\n#[derive(Debug, Clone, PartialEq, thiserror::Error)]\npub enum FrameError {\n    #[error(\"Unknown frame: '{0}'\")]\n    Unknown(String),\n}\n\n/// Registry of active frames in a computation session.\n#[derive(Debug, Clone, Default)]\npub struct FrameRegistry {\n    frames: Vec\u003cFrame\u003e,\n}\n\nimpl FrameRegistry {\n    pub fn new() -\u003e Self {\n        Self { frames: vec![] }\n    }\n\n    pub fn register(\u0026mut self, frame: Frame) {\n        if !self.frames.contains(\u0026frame) {\n            self.frames.push(frame);\n        }\n    }\n\n    pub fn is_registered(\u0026self, frame: \u0026Frame) -\u003e bool {\n        self.frames.contains(frame)\n    }\n\n    pub fn iter(\u0026self) -\u003e impl Iterator\u003cItem = \u0026Frame\u003e {\n        self.frames.iter()\n    }\n\n    /// Register all frames found in a slice of TritWords.\n    pub fn register_from_words(\u0026mut self, words: \u0026[crate::core::word::TritWord]) {\n        for word in words {\n            self.register(word.frame());\n        }\n    }\n\n    /// Validate that all frames in the given words are registered.\n    /// Returns the first unregistered frame found, or Ok(()) if all are registered.\n    pub fn validate_all(\u0026self, words: \u0026[crate::core::word::TritWord]) -\u003e Result\u003c(), Frame\u003e {\n        for word in words {\n            if !self.is_registered(\u0026word.frame()) {\n                return Err(word.frame());\n            }\n        }\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn should_parse_science_from_str() {\n        assert_eq!(Frame::from_str(\"Science\").unwrap(), Frame::Science);\n    }\n\n    #[test]\n    fn should_parse_all_known_frames() {\n        for (input, expected) in [\n            (\"Science\", Frame::Science),\n            (\"Individual\", Frame::Individual),\n            (\"Consensus\", Frame::Consensus),\n            (\"Absolute\", Frame::Absolute),\n            (\"Meta\", Frame::Meta),\n            (\"FirstPerson\", Frame::FirstPerson),\n            (\"Embodied\", Frame::Embodied),\n            (\"Relational\", Frame::Relational),\n        ] {\n            assert_eq!(Frame::from_str(input).unwrap(), expected);\n        }\n    }\n\n    #[test]\n    fn should_reject_unknown_frame() {\n        assert!(Frame::from_str(\"Unknown\").is_err());\n        assert!(Frame::from_str(\"\").is_err());\n    }\n\n    #[test]\n    fn should_display_frame_as_string() {\n        assert_eq!(format!(\"{}\", Frame::Science), \"Science\");\n        assert_eq!(format!(\"{}\", Frame::Individual), \"Individual\");\n    }\n\n    #[test]\n    fn registry_should_track_unique_frames() {\n        let mut reg = FrameRegistry::new();\n        reg.register(Frame::Science);\n        reg.register(Frame::Science); // duplicate\n        reg.register(Frame::Individual);\n        assert!(reg.is_registered(\u0026Frame::Science));\n        assert!(reg.is_registered(\u0026Frame::Individual));\n        assert!(!reg.is_registered(\u0026Frame::Consensus));\n    }\n\n    #[test]\n    fn registry_should_start_empty() {\n        let reg = FrameRegistry::new();\n        assert!(!reg.is_registered(\u0026Frame::Science));\n    }\n\n    #[test]\n    fn registry_iter_yields_registered_frames() {\n        let mut reg = FrameRegistry::new();\n        reg.register(Frame::Science);\n        reg.register(Frame::Individual);\n        let collected: Vec\u003c_\u003e = reg.iter().cloned().collect();\n        assert_eq!(collected.len(), 2);\n        assert!(collected.contains(\u0026Frame::Science));\n        assert!(collected.contains(\u0026Frame::Individual));\n    }\n\n    #[test]\n    fn default_registry_is_empty() {\n        let reg: FrameRegistry = Default::default();\n        assert!(!reg.is_registered(\u0026Frame::Meta));\n    }\n\n    #[test]\n    fn parsing_is_case_sensitive() {\n        assert!(Frame::from_str(\"science\").is_err());\n        assert!(Frame::from_str(\"SCIENCE\").is_err());\n    }\n\n    #[test]\n    fn frame_error_display_is_informative() {\n        let err = Frame::from_str(\"Bogus\").unwrap_err();\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"Bogus\"));\n        assert!(msg.contains(\"Unknown frame\"));\n    }\n\n    #[test]\n    fn display_covers_all_variants() {\n        assert_eq!(format!(\"{}\", Frame::Science), \"Science\");\n        assert_eq!(format!(\"{}\", Frame::Individual), \"Individual\");\n        assert_eq!(format!(\"{}\", Frame::Consensus), \"Consensus\");\n        assert_eq!(format!(\"{}\", Frame::Absolute), \"Absolute\");\n        assert_eq!(format!(\"{}\", Frame::Meta), \"Meta\");\n        assert_eq!(format!(\"{}\", Frame::FirstPerson), \"FirstPerson\");\n        assert_eq!(format!(\"{}\", Frame::Embodied), \"Embodied\");\n        assert_eq!(format!(\"{}\", Frame::Relational), \"Relational\");\n    }\n}\n","traces":[{"line":36,"address":[],"length":0,"stats":{"Line":15420325124116578304}},{"line":37,"address":[],"length":0,"stats":{"Line":15420325124116578304}},{"line":38,"address":[],"length":0,"stats":{"Line":1441151880758558710}},{"line":39,"address":[],"length":0,"stats":{"Line":9079256848778919938}},{"line":40,"address":[],"length":0,"stats":{"Line":13690942867206307840}},{"line":41,"address":[],"length":0,"stats":{"Line":432345564227567618}},{"line":42,"address":[],"length":0,"stats":{"Line":12970366926827028480}},{"line":43,"address":[],"length":0,"stats":{"Line":2738188573441261568}},{"line":44,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":45,"address":[],"length":0,"stats":{"Line":432345564227567626}},{"line":53,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":54,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":55,"address":[],"length":0,"stats":{"Line":10448351135499550720}},{"line":56,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":57,"address":[],"length":0,"stats":{"Line":15060037153926938624}},{"line":58,"address":[],"length":0,"stats":{"Line":10664523917613334528}},{"line":59,"address":[],"length":0,"stats":{"Line":10520408729537478656}},{"line":60,"address":[],"length":0,"stats":{"Line":11024811887802974208}},{"line":61,"address":[],"length":0,"stats":{"Line":10088063165309911040}},{"line":62,"address":[],"length":0,"stats":{"Line":10016005571271983104}},{"line":63,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":82,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":83,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":86,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":87,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":88,"address":[],"l
