rive(Debug, Clone, PartialEq, Deserialize, Serialize)]\npub struct HoldState {\n    /// Whether this Hold is final, awaiting a question, or resolvable.\n    pub finality: HoldFinality,\n    /// Window (in milliseconds) within which a follow-up question may\n    /// transition the Hold to a resolved state. `0` means no automatic\n    /// questioning.\n    pub question_window_ms: u64,\n}\n\nimpl HoldState {\n    /// Create a final Hold.\n    pub fn final_hold() -\u003e Self {\n        Self {\n            finality: HoldFinality::Final,\n            question_window_ms: 0,\n        }\n    }\n\n    /// Create a Hold that is awaiting a follow-up question.\n    pub fn awaiting(question_window_ms: u64) -\u003e Self {\n        Self {\n            finality: HoldFinality::AwaitingQuestion,\n            question_window_ms,\n        }\n    }\n\n    /// Create a Hold that is resolvable within the given window.\n    pub fn resolvable(question_window_ms: u64) -\u003e Self {\n        Self {\n            finality: HoldFinality::Resolvable,\n            question_window_ms,\n        }\n    }\n\n    /// Returns true if the Hold decision path can be audited back to the\n    /// conflicts that produced it.\n    pub fn is_auditable(\u0026self) -\u003e bool {\n        true\n    }\n\n    /// Returns true if this Hold is the final answer (not waiting).\n    pub fn is_final(\u0026self) -\u003e bool {\n        self.finality == HoldFinality::Final\n    }\n\n    /// Returns true if the Hold can be questioned / thawed.\n    pub fn can_be_questioned(\u0026self) -\u003e bool {\n        matches!(\n            self.finality,\n            HoldFinality::AwaitingQuestion | HoldFinality::Resolvable\n        )\n    }\n}\n\nimpl Default for HoldState {\n    fn default() -\u003e Self {\n        Self::final_hold()\n    }\n}\n\n/// Configuration for how Hold states are produced across domains.\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\npub struct HolderConfig {\n    /// Domains for which a Hold is treated as final by default.\n    #[serde(default)]\n    pub hold_is_final_by_domain: Vec\u003cString\u003e,\n    /// Default window (in milliseconds) after which an awaiting Hold is\n    /// automatically considered final if no question arrives.\n    #[serde(default)]\n    pub auto_question_after_ms: u64,\n}\n\nimpl HolderConfig {\n    /// Create a config where Hold is final in every domain.\n    pub fn final_everywhere() -\u003e Self {\n        Self {\n            hold_is_final_by_domain: vec![],\n            auto_question_after_ms: 0,\n        }\n    }\n\n    /// Mark Hold as final for the named domain.\n    pub fn with_final_domain(mut self, domain: impl Into\u003cString\u003e) -\u003e Self {\n        let name = domain.into();\n        if !self.hold_is_final_by_domain.contains(\u0026name) {\n            self.hold_is_final_by_domain.push(name);\n        }\n        self\n    }\n\n    /// Returns the HoldState to use for a Hold produced in `domain`.\n    pub fn hold_state_for(\u0026self, domain: \u0026str) -\u003e HoldState {\n        if self.hold_is_final_by_domain.contains(\u0026domain.to_string()) {\n            HoldState::final_hold()\n        } else if self.auto_question_after_ms \u003e 0 {\n            HoldState::awaiting(self.auto_question_after_ms)\n        } else {\n            HoldState::final_hold()\n        }\n    }\n}\n\nimpl Default for HolderConfig {\n    fn default() -\u003e Self {\n        Self::final_everywhere()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn final_hold_is_not_questionable() {\n        let h = HoldState::final_hold();\n        assert!(h.is_auditable());\n        assert!(h.is_final());\n        assert!(!h.can_be_questioned());\n    }\n\n    #[test]\n    fn awaiting_hold_is_questionable() {\n        let h = HoldState::awaiting(500);\n        assert!(!h.is_final());\n        assert!(h.can_be_questioned());\n        assert_eq!(h.question_window_ms, 500);\n    }\n\n    #[test]\n    fn holder_config_final_by_domain() {\n        let cfg = HolderConfig::default().with_final_domain(\"ValueJudgment\");\n        assert!(cfg.hold_state_for(\"ValueJudgment\").is_final());\n        assert!(cfg.hold_state_for(\"General\").is_final());\n    }\n\n    #[test]\n    fn holder_config_awaiting_when_window_set() {\n        let cfg = HolderConfig {\n            hold_is_final_by_domain: vec![],\n            auto_question_after_ms: 1000,\n        };\n        let h = cfg.hold_state_for(\"General\");\n        assert!(!h.is_final());\n        assert!(h.can_be_questioned());\n    }\n}\n","traces":[{"line":36,"address":[],"length":0,"stats":{"Line":3242591731706757120}},{"line":44,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":62,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":66,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":67,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":71,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":72,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":73,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":99,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":101,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":107,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":108,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":109,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":110,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":112,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":116,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":117,"address": Use [`Phase::new`] for strict construction, or [`Phase::new_clamped`]\r\n/// when the caller explicitly wants silent clamping.\r\n#[derive(Clone, Copy, Debug, PartialEq)]\r\npub struct Phase(f64);\r\n\r\nimpl Phase {\r\n    pub const NEUTRAL: f64 = 0.5;\r\n    pub const FULL_TRUE: f64 = 1.0;\r\n    pub const FULL_FALSE: f64 = 0.0;\r\n\r\n    /// Constant neutral phase (0.5).\r\n    pub const fn neutral() -\u003e Self {\r\n        Phase(0.5)\r\n    }\r\n\r\n    /// Constant full-true phase (1.0).\r\n    pub const fn full_true() -\u003e Self {\r\n        Phase(1.0)\r\n    }\r\n\r\n    /// Constant full-false phase (0.0).\r\n    pub const fn full_false() -\u003e Self {\r\n        Phase(0.0)\r\n    }\r\n\r\n    /// Strict constructor: returns `Err` for NaN, infinite, or out-of-range values.\r\n    ///\r\n    /// This is the default way to create a `Phase` in library code, because\r\n    /// invalid phase values usually indicate a programming or input error that\r\n    /// should not be silently hidden.\r\n    pub fn new(v: f64) -\u003e Result\u003cSelf, PhaseError\u003e {\r\n        if v.is_nan() || v.is_infinite() {\r\n            return Err(PhaseError::NotFinite(v));\r\n        }\r\n        if !(0.0..=1.0).contains(\u0026v) {\r\n            return Err(PhaseError::OutOfRange(v));\r\n        }\r\n        Ok(Phase(v))\r\n    }\r\n\r\n    /// Clamping constructor: silently clamps out-of-range values to `[0.0, 1.0]`\r\n    /// and maps NaN/Infinity to `NEUTRAL` (0.5).\r\n    ///\r\n    /// Logs a warning at the tracing layer when clamping occurs.\r\n    /// Prefer [`Phase::new`] unless you explicitly need graceful degradation\r\n    /// for external, untrusted inputs.\r\n    pub fn new_clamped(v: f64) -\u003e Self {\r\n        if v.is_nan() || v.is_infinite() {\r\n            tracing::warn!(value = %v, \"Phase is NaN/Inf, clamping to NEUTRAL (0.5)\");\r\n            return Phase(0.5);\r\n        }\r\n        if !(0.0..=1.0).contains(\u0026v) {\r\n            let clamped = v.clamp(0.0, 1.0);\r\n            tracing::warn!(original = %v, clamped = %clamped, \"Phase out of range, clamped\");\r\n            return Phase(clamped);\r\n        }\r\n        Phase(v)\r\n    }\r\n\r\n    /// Unwrap the underlying finite, in-range `f64`.\r\n    pub fn inner(self) -\u003e f64 {\r\n        self.0\r\n    }\r\n\r\n    /// Arithmetic mean of two phases, auto-quantized to prevent drift.\r\n    pub fn mean(a: Phase, b: Phase) -\u003e Phase {\r\n        // Both values are already validated, so the mean is always valid.\r\n        Phase::new_clamped((a.0 + b.0) / 2.0).quantize(1e-6)\r\n    }\r\n\r\n    /// Complement: 1.0 - phase, auto-quantized.\r\n    pub fn complement(self) -\u003e Phase {\r\n        Phase::new_clamped(1.0 - self.0).quantize(1e-6)\r\n    }\r\n\r\n    /// Quantize to standard values (0.0, 0.5, 1.0) when within epsilon distance.\r\n    /// This prevents phase drift over long cascades where 0.50000001 and\r\n    /// 0.49999999 would be semantically different despite both meaning \"neutral\".\r\n    ///\r\n    /// Anchors are checked in order: 0.5 first (most common), then 0.0, then 1.0.\r\n    ///\r\n    /// If `epsilon` is not a positive finite number, the phase is returned\r\n    /// unchanged. This prevents accidental no-op or nonsensical behavior from\r\n    /// invalid epsilon inputs.\r\n    pub fn quantize(self, epsilon: f64) -\u003e Phase {\r\n        if !epsilon.is_finite() || epsilon \u003c= 0.0 {\r\n            return self;\r\n        }\r\n        let v = self.0;\r\n        if (v - 0.5).abs() \u003c epsilon {\r\n            Phase(0.5)\r\n        } else if v \u003c epsilon {\r\n            Phase(0.0)\r\n        } else if (1.0 - v).abs() \u003c epsilon {\r\n            Phase(1.0)\r\n        } else {\r\n            self\r\n        }\r\n    }\r\n\r\n    /// Determine commitment direction.\r\n    ///\r\n    /// Uses the same epsilon as `quantize` (1e-6) for consistency:\r\n    /// a value that `quantize` considers neutral will also be\r\n    /// classified as `Neutral` by `commitment`.\r\n    pub fn commitment(self) -\u003e Commitment {\r\n        let epsilon = 1e-6;\r\n        if self.0 \u003e 0.5 + epsilon {\r\n            Commitment::TowardTrue\r\n        } else if self.0 \u003c 0.5 - epsilon {\r\n            Commitment::TowardFalse\r\n        } else {\r\n            Commitment::Neutral\r\n        }\r\n    }\r\n}\r\n\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\r\npub enum Commitment {\r\n    TowardTrue,\r\n    TowardFalse,\r\n    Neutral,\r\n}\r\n\r\n/// Error type for strict Phase construction.\r\n#[derive(Debug, Clone, Copy, PartialEq, Error)]\r\npub enum PhaseError {\r\n    #[error(\"Phase must be finite, got: {0}\")]\r\n    NotFinite(f64),\r\n    #[error(\"Phase must be in [0.0, 1.0], got: {0}\")]\r\n    OutOfRange(f64),\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    /// Test helper: create a Phase from a valid f64, panicking on invalid input.\r\n    /// Reduces `Phase::new(x).unwrap()` boilerplate in tests.\r\n    fn p(v: f64) -\u003e Phase {\r\n        Phase::new(v).expect(\"test phase value must be valid\")\r\n    }\r\n\r\n    #[test]\r\n    fn new_rejects_nan() {\r\n        assert!(Phase::new(f64::NAN).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn new_rejects_inf() {\r\n        assert!(Phase::new(f64::INFINITY).is_err());\r\n        assert!(Phase::new(f64::NEG_INFINITY).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn new_rejects_out_of_range() {\r\n        assert!(Phase::new(1.5).is_err());\r\n        assert!(Phase::new(-0.1).is_err());\r\n    }\r\n\r\n    #[test]\r\n    fn new_accepts_valid() {\r\n        assert!(Phase::new(0.0).is_ok());\r\n        assert!(Phase::new(0.5).is_ok());\r\n        assert!(Phase::new(1.0).is_ok());\r\n        assert!(Phase::new(0.73).is_ok());\r\n    }\r\n\r\n    #[test]\r\n    fn new_clamped_maps_nan_to_neutral() {\r\n        assert_eq!(Phase::new_clamped(f64::NAN).inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn new_clamped_clamps_out_of_range() {\r\n        assert_eq!(Phase::new_clamped(1.5).inner(), 1.0);\r\n        assert_eq!(Phase::new_clamped(-0.1).inner(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_snaps_near_neutral() {\r\n        let phase = p(0.5000000001);\r\n        let q = phase.quantize(1e-6);\r\n        assert_float_eq!(q.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_snaps_near_zero() {\r\n        let phase = p(0.0000000001);\r\n        let q = phase.quantize(1e-6);\r\n        assert_float_eq!(q.inner(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_snaps_near_one() {\r\n        let phase = p(0.9999999999);\r\n        let q = phase.quantize(1e-6);\r\n        assert_float_eq!(q.inner(), 1.0);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_preserves_normal_value() {\r\n        let phase = p(0.73);\r\n        let q = phase.quantize(1e-6);\r\n        assert_float_eq!(q.inner(), 0.73);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_neutral_priority_over_extremes() {\r\n        // 0.50000001 is closer to 0.5 than 1.0 but we anchor 0.5 first\r\n        let phase = p(0.50000001);\r\n        let q = phase.quantize(1e-3);\r\n        assert_float_eq!(q.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn mean_auto_quantizes() {\r\n        let a = p(0.3);\r\n        let b = p(0.7);\r\n        let m = Phase::mean(a, b);\r\n        // 0.3 + 0.7 = 1.0 / 2 = 0.5 exactly → should be 0.5\r\n        assert_float_eq!(m.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn complement_auto_quantizes() {\r\n        let phase = p(0.5);\r\n        let c = phase.complement();\r\n        // 1.0 - 0.5 = 0.5 → should be 0.5\r\n        assert_float_eq!(c.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_neutral_at_0_5() {\r\n        assert_eq!(p(0.5).commitment(), Commitment::Neutral);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_neutral_near_0_5_within_epsilon() {\r\n        // 0.5 + 5e-7 is within the 1e-6 epsilon → Neutral\r\n        assert_eq!(p(0.5000005).commitment(), Commitment::Neutral);\r\n        assert_eq!(p(0.4999995).commitment(), Commitment::Neutral);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_toward_true_beyond_epsilon() {\r\n        assert_eq!(p(0.500002).commitment(), Commitment::TowardTrue);\r\n        assert_eq!(p(0.8).commitment(), Commitment::TowardTrue);\r\n        assert_eq!(p(1.0).commitment(), Commitment::TowardTrue);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_toward_false_beyond_epsilon() {\r\n        assert_eq!(p(0.499998).commitment(), Commitment::TowardFalse);\r\n        assert_eq!(p(0.2).commitment(), Commitment::TowardFalse);\r\n        assert_eq!(p(0.0).commitment(), Commitment::TowardFalse);\r\n    }\r\n\r\n    #[test]\r\n    fn commitment_consistent_with_quantize() {\r\n        // A value quantized to neutral must also be commitment-neutral\r\n        let phase = p(0.5000001).quantize(1e-6);\r\n        assert_float_eq!(phase.inner(), 0.5);\r\n        assert_eq!(phase.commitment(), Commitment::Neutral);\r\n    }\r\n\r\n    #[test]\r\n    fn constants_match_expected_values() {\r\n        assert_eq!(Phase::neutral().inner(), 0.5);\r\n        assert_eq!(Phase::full_true().inner(), 1.0);\r\n        assert_eq!(Phase::full_false().inner(), 0.0);\r\n    }\r\n\r\n    #[test]\r\n    fn new_clamped_maps_infinity_to_neutral() {\r\n        assert_eq!(Phase::new_clamped(f64::INFINITY).inner(), 0.5);\r\n        assert_eq!(Phase::new_clamped(f64::NEG_INFINITY).inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn quantize_rejects_invalid_epsilon() {\r\n        let phase = p(0.5000001);\r\n        // Negative, zero, or non-finite epsilon should leave the phase unchanged.\r\n        assert_float_eq!(phase.quantize(-1e-6).inner(), 0.5000001);\r\n        assert_float_eq!(phase.quantize(0.0).inner(), 0.5000001);\r\n        assert_float_eq!(phase.quantize(f64::NAN).inner(), 0.5000001);\r\n        assert_float_eq!(phase.quantize(f64::INFINITY).inner(), 0.5000001);\r\n    }\r\n\r\n    #[test]\r\n    fn mean_of_extremes_is_neutral() {\r\n        let a = Phase::full_false();\r\n        let b = Phase::full_true();\r\n        let m = Phase::mean(a, b);\r\n        assert_float_eq!(m.inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn complement_of_extremes() {\r\n        assert_float_eq!(Phase::full_true().complement().inner(), 0.0);\r\n        assert_float_eq!(Phase::full_false().complement().inner(), 1.0);\r\n        assert_float_eq!(Phase::neutral().complement().inner(), 0.5);\r\n    }\r\n\r\n    #[test]\r\n    fn inner_returns_wrapped_value() {\r\n        let phase = p(0.42);\r\n        assert_eq!(phase.inner(), 0.42);\r\n    }\r\n}\r\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":14843864371813154832}},{"line":23,"address":[],"length":0,"stats":{"Line":14843864371813154832}},{"line":27,"address":[],"length":0,"stats":{"Line":5764607523034234880}},{"line":28,"address":[],"length":0,"stats":{"Line":5764607523034234880}},{"line":32,"address":[],"length":0,"stats":{"Line":5836665117072162817}},{"line":33,"address":[],"length":0,"stats":{"Line":5836665117072162817}},{"line":41,"address":[],"length":0,"stats":{"Line":9079256848778919998}},{"line":42,"address":[],"length":0,"stats":{"Line":17293822569102704888}},{"line":43,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":45,"address":[],"length":0,"stats":{"Line":16861477004875137148}},{"line":46,"address":[],"length":0,"stats":{"Line":648518346341351486}},{"line":48,"address":[],"length":0,"stats":{"Line":7782220156096217088}},{"line":57,"address":[],"length":0,"stats":{"Line":10160120759347838977}},{"line":58,"address":[],"length":0,"stats":{"Line":3314649325744684936}},{"line":59,"address":[],"length":0,"stats":{"Line":360287970189639742}},{"line":60,"address":[],"length":0,"stats":{"Line":360287970189639742}},{"line":62,"address":[],"length":0,"stats":{"Line":1152921504606846854}},{"line":63,"address":[],"length":0,"stats":{"Line":18086456103519911753}},{"lin rable":45},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","sensor.rs"],"content":"//! Sensor-aware input types for mind-engineering extensions.\n//!\n//! Real-world decision systems receive signals from more than text:\n//! body state, environmental snapshots, and cognitive-load estimates all\n//! carry information that can be mapped into the ternary decision space.\n//! This module provides minimal, extensible containers for those signals.\n\nuse serde::{Deserialize, Serialize};\n\n/// A multi-modal sensor signal that can be converted into a [`crate::core::word::TritWord`].\n///\n/// The variants are intentionally coarse: they name the *origin* of the\n/// signal rather than prescribing a specific sensor hardware interface.\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\npub enum SensorSignal {\n    /// Body-state measurement such as heart-rate variability, galvanic skin\n    /// response, or muscle tension.\n    BodyState(BodyState),\n    /// Environmental snapshot such as temperature, luminance, noise level,\n    /// or social density.\n    Environmental(EnvSnapshot),\n    /// Cognitive-state estimate such as attention bandwidth or cognitive load.\n    Cognitive(CogState),\n    /// Original text-based input signal.\n    Text(TextInput),\n}\n\n/// Body-state signal container.\n#[derive(Debug, Clone, PartialEq, Default, Deserialize, Serialize)]\npub struct BodyState {\n    /// Arousal level in `[0.0, 1.0]`. Higher values indicate stronger\n    /// sympathetic activation.\n    pub arousal: f64,\n    /// Readiness / energy level in `[0.0, 1.0]`.\n    pub readiness: f64,\n    /// Optional textual label for the measurement (e.g. \"hrv\", \"gsr\").\n    #[serde(default)]\n    pub source: String,\n}\n\n/// Environmental snapshot container.\n#[derive(Debug, Clone, PartialEq, Default, Deserialize, Serialize)]\npub struct EnvSnapshot {\n    /// Ambient arousal of the environment in `[0.0, 1.0]` (noise, crowding,\n    /// temperature extremes, etc.).\n    pub ambient_arousal: f64,\n    /// Social density in `[0.0, 1.0]`.\n    pub social_density: f64,\n    /// Optional textual label for the environment type.\n    #[serde(default)]\n    pub context_label: String,\n}\n\n/// Cognitive-state estimate container.\n#[derive(Debug, Clone, PartialEq, Default, Deserialize, Serialize)]\npub struct CogState {\n    /// Estimated available attention bandwidth in `[0.0, 1.0]`.\n    pub attention_bandwidth: f64,\n    /// Estimated cognitive load in `[0.0, 1.0]`.\n    pub cognitive_load: f64,\n    /// Optional label for the cognitive mode (e.g. \"deliberative\",\n    /// \"reactive\", \"ruminative\").\n    #[serde(default)]\n    pub mode: String,\n}\n\n/// Text-based input signal, preserving the original external-input origin.\n#[derive(Debug, Clone, PartialEq, Default, Deserialize, Serialize)]\npub struct TextInput {\n    /// Raw text payload.\n    pub text: String,\n    /// Optional sentiment or stance phase in `[0.0, 1.0]`, where `0.5` is\n    /// neutral. When absent, defaults to `0.5`.\n    #[serde(default = \"default_neutral_phase\")]\n    pub phase_hint: f64,\n}\n\nfn default_neutral_phase() -\u003e f64 {\n    0.5\n}\n\n/// Context that persists across a decision session and influences how\n/// sensor signals are interpreted.\n#[derive(Debug, Clone, PartialEq, Default, Deserialize, Serialize)]\npub struct EnvironmentalContext {\n    /// Time scale at which the current decision is being made.\n    #[serde(default)]\n    pub temporal_scale: TemporalScale,\n    /// Social density of the environment in `[0.0, 1.0]`.\n    pub social_density: f64,\n    /// Ambient arousal of the environment in `[0.0, 1.0]`.\n    pub ambient_arousal: f64,\n}\n\n/// Time scale for a decision.\n#[derive(Debug, Clone, Copy, PartialEq, Default, Deserialize, Serialize)]\npub enum TemporalScale {\n    /// Milliseconds — reactive, reflexive decisions.\n    Milliseconds,\n    /// Seconds — immediate action selection.\n    Seconds,\n    /// Minutes — short deliberation.\n    Minutes,\n    /// Hours — planning horizon.\n    Hours,\n    /// Days or longer — strategic reflection.\n    #[default]\n    Days,\n}\n\nimpl SensorSignal {\n    /// Return a human-readable origin label for logging and interrupts.\n    pub fn origin_label(\u0026self) -\u003e \u0026'static str {\n        match self {\n            SensorSignal::BodyState(_) =\u003e \"body\",\n            SensorSignal::Environmental(_) =\u003e \"environment\",\n            SensorSignal::Cognitive(_) =\u003e \"cognitive\",\n            SensorSignal::Text(_) =\u003e \"text\",\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn sensor_signal_origin_labels() {\n        assert_eq!(\n            SensorSignal::Text(TextInput::default()).origin_label(),\n            \"text\"\n        );\n        assert_eq!(\n            SensorSignal::BodyState(BodyState::default()).origin_label(),\n            \"body\"\n        );\n    }\n\n    #[test]\n    fn environmental_context_defaults() {\n        let ctx = EnvironmentalContext::default();\n        assert_eq!(ctx.temporal_scale, TemporalScale::Days);\n        assert_eq!(ctx.social_density, 0.0);\n        assert_eq!(ctx.ambient_arousal, 0.0);\n    }\n}\n","traces":[{"line":78,"address":[],"length":0,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":113,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":114,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":115,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":116,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0,"stats":{"Line":0}},{"line":118,"address":[],"length":0,"stats":{"Line":72057594037927936}}],"covered":4,"coverable":8},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","value.rs"],"content":"/// Ternary logic value: the four discrete states of a TritWord.\n///\n/// Three computable states (`True`, `Hold`, `False`) form the core\n/// ternary logic (MVL-3). A fourth state (`Unknown`) represents\n/// out-of-distribution / unknowable inputs that the system cannot\n/// compute on — semantically distinct from `Hold` (chosen suspension\n/// of judgment) and used only for input-gating and safety fallback.\n///\n/// | State     | Ternary role     | Meaning                        |\n/// |-----------|------------------|--------------------------------|\n/// | `True`    | +1               | Affirmative                    |\n/// | `Hold`    | 0 (neutral)      | Suspended judgment (deliberate)|\n/// | `False`   | -1               | Negative                       |\n/// | `Unknown` | ⊥ (not in MVL-3) | Out-of-distribution, unknowable|\nuse serde::{Deserialize, Serialize};\n\n#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash, Default, Deserialize, Serialize)]\npub enum TritValue {\n    True, // +1\n    #[default]\n    Hold, // 0 — undetermined / suspended\n    False, // -1\n    Unknown, // ⊥ — out-of-distribution / unknowable, distinct from Hold\n}\n\nimpl TritValue {\n    /// Internal discriminant for LUT indexing.\n    /// LLVM optimizes this to a single register load.\n    #[inline]\n    const fn disc(self) -\u003e usize {\n        match self {\n            TritValue::True =\u003e 0,\n            TritValue::Hold =\u003e 1,\n            TritValue::False =\u003e 2,\n            TritValue::Unknown =\u003e 3,\n        }\n    }\n\n    /// Branchless negation via lookup table.\n    const NEGATE_LUT: [TritValue; 4] = [\n        TritValue::False,   // True → False\n        TritValue::Hold,    // Hold → Hold\n        TritValue::True,    // False → True\n        TritValue::Unknown, // Unknown → Unknown\n    ];\n\n    /// Branchless to_i8 via lookup table.\n    const TO_I8_LUT: [i8; 4] = [1, 0, -1, 0];\n\n    /// Branchless discriminant LUT.\n    const DISC_LUT: [u8; 4] = [0, 1, 2, 3];\n\n    /// Flip true/false; Hold and Unknown remain unchanged.\n    #[inline]\n    pub fn negate(self) -\u003e Self {\n        Self::NEGATE_LUT[self.disc()]\n    }\n\n    /// Convert to signed integer for arithmetic use.\n    /// Unknown maps to 0 (same as Hold) for arithmetic compatibility.\n    #[inline]\n    pub fn to_i8(self) -\u003e i8 {\n        Self::TO_I8_LUT[self.disc()]\n    }\n\n    /// Returns true if this value is computable (not Unknown).\n    #[inline]\n    pub fn is_computable(self) -\u003e bool {\n        self != TritValue::Unknown\n    }\n\n    /// Returns a unique numeric discriminant for all four states:\n    /// True→0, Hold→1, False→2, Unknown→3.\n    /// Unlike `to_i8()`, this preserves the Hold/Unknown distinction.\n    #[inline]\n    pub fn discriminant(self) -\u003e u8 {\n        Self::DISC_LUT[self.disc()]\n    }\n}\n\nimpl From\u003ci8\u003e for TritValue {\n    /// Convert i8 to TritValue. Unknown cannot be created from i8 —\n    /// use `TritValue::Unknown` directly when the input is out-of-distribution.\n    fn from(v: i8) -\u003e Self {\n        match v {\n            1 =\u003e TritValue::True,\n            -1 =\u003e TritValue::False,\n            _ =\u003e TritValue::Hold,\n        }\n    }\n}\n\nimpl TritValue {\n    /// Strict conversion from i8: only accepts -1, 0, 1.\n    /// Unlike `From\u003ci8\u003e`, this rejects out-of-range values instead of\n    /// silently collapsing to Hold.\n    pub fn from_i8_strict(v: i8) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        match v {\n            1 =\u003e Ok(TritValue::True),\n            0 =\u003e Ok(TritValue::Hold),\n            -1 =\u003e Ok(TritValue::False),\n            _ =\u003e Err(\"TritValue can only be created from -1, 0, or 1\"),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn should_convert_true_to_i8_positive_one() {\n        assert_eq!(TritValue::True.to_i8(), 1);\n    }\n\n    #[test]\n    fn should_convert_hold_to_i8_zero() {\n        assert_eq!(TritValue::Hold.to_i8(), 0);\n    }\n\n    #[test]\n    fn should_convert_false_to_i8_negative_one() {\n        assert_eq!(TritValue::False.to_i8(), -1);\n    }\n\n    #[test]\n    fn should_create_from_i8_positive_one() {\n        assert_eq!(TritValue::from(1), TritValue::True);\n    }\n\n    #[test]\n    fn should_create_from_i8_negative_one() {\n        assert_eq!(TritValue::from(-1), TritValue::False);\n    }\n\n    #[test]\n    fn should_create_hold_from_any_other_i8() {\n        assert_eq!(TritValue::from(0), TritValue::Hold);\n        assert_eq!(TritValue::from(2), TritValue::Hold);\n        assert_eq!(TritValue::from(-2), TritValue::Hold);\n    }\n\n    #[test]\n    fn negate_should_flip_true_to_false() {\n        assert_eq!(TritValue::True.negate(), TritValue::False);\n    }\n\n    #[test]\n    fn negate_should_flip_false_to_true() {\n        assert_eq!(TritValue::False.negate(), TritValue::True);\n    }\n\n    #[test]\n    fn negate_should_keep_hold() {\n        assert_eq!(TritValue::Hold.negate(), TritValue::Hold);\n    }\n\n    #[test]\n    fn default_should_be_hold() {\n        assert_eq!(TritValue::default(), TritValue::Hold);\n    }\n\n    #[test]\n    fn unknown_is_not_hold() {\n        assert_ne!(TritValue::Unknown, TritValue::Hold);\n    }\n\n    #[test]\n    fn unknown_is_not_computable() {\n        assert!(!TritValue::Unknown.is_computable());\n    }\n\n    #[test]\n    fn true_is_computable() {\n        assert!(TritValue::True.is_computable());\n    }\n\n    #[test]\n    fn hold_is_computable() {\n        // Hold means \"undecided\" but still computable — the system CAN decide, it just hasn't\n        assert!(TritValue::Hold.is_computable());\n    }\n\n    #[test]\n    fn unknown_to_i8_is_zero() {\n        assert_eq!(TritValue::Unknown.to_i8(), 0);\n    }\n\n    #[test]\n    fn negate_keeps_unknown() {\n        assert_eq!(TritValue::Unknown.negate(), TritValue::Unknown);\n    }\n\n    #[test]\n    fn unknown_cannot_be_created_from_i8() {\n        // From\u003ci8\u003e never produces Unknown — you must use it directly\n        for v in -10..=10 {\n            assert_ne!(TritValue::from(v), TritValue::Unknown);\n        }\n    }\n\n    #[test]\n    fn from_i8_strict_rejects_out_of_range() {\n        assert!(TritValue::from_i8_strict(2).is_err());\n        assert!(TritValue::from_i8_strict(-2).is_err());\n        assert!(TritValue::from_i8_strict(127).is_err());\n    }\n\n    #[test]\n    fn from_i8_strict_accepts_valid() {\n        assert_eq!(TritValue::from_i8_strict(1).unwrap(), TritValue::True);\n        assert_eq!(TritValue::from_i8_strict(0).unwrap(), TritValue::Hold);\n        assert_eq!(TritValue::from_i8_strict(-1).unwrap(), TritValue::False);\n    }\n\n    #[test]\n    fn from_i8_strict_error_message() {\n        let err = TritValue::from_i8_strict(2).unwrap_err();\n        assert!(err.contains(\"-1, 0, or 1\"));\n    }\n\n    #[test]\n    fn false_is_computable() {\n        assert!(TritValue::False.is_computable());\n    }\n\n    #[test]\n    fn debug_format_contains_variant_name() {\n        let s = format!(\"{:?}\", TritValue::Hold);\n        assert!(s.contains(\"Hold\"));\n    }\n\n    #[test]\n    fn discriminant_distinguishes_all_four_states() {\n        assert_eq!(TritValue::True.discriminant(), 0);\n        assert_eq!(TritValue::Hold.discriminant(), 1);\n        assert_eq!(TritValue::False.discriminant(), 2);\n        assert_eq!(TritValue::Unknown.discriminant(), 3);\n    }\n\n    #[test]\n    fn discriminant_preserves_hold_unknown_distinction() {\n        // to_i8() conflates Hold and Unknown (both → 0)\n        // discriminant() must preserve the distinction\n        assert_eq!(TritValue::Hold.to_i8(), 0);\n        assert_eq!(TritValue::Unknown.to_i8(), 0);\n        assert_ne!(\n            TritValue::Hold.discriminant(),\n            TritValue::Unknown.discriminant()\n        );\n    }\n}\n","traces":[{"line":30,"address":[],"length":0,"stats":{"Line":15348267530078650369}},{"line":31,"address":[],"l \n/// A ternary word: the fundamental unit of computation in Trit-Core.\n///\n/// Unlike a binary bit (0/1), a trit carries:\n/// - `value`: ternary state {True, Hold, False} + out-of-distribution {Unknown}\n/// - `phase`: continuous tendency 0.0..1.0 (0.5 = neutral)\n/// - `frame`: the decision domain / context this trit belongs to\n///\n/// # Invariants\n///\n/// - `phase` is always finite and within `[0.0, 1.0]`.\n/// - If `frame == Frame::Absolute`, then `value == TritValue::Hold` and\n///   `phase == Phase(0.5)`.\n///\n/// These invariants are enforced by the constructors. Use the `with_*`\n/// methods to transform a word while preserving invariants.\n#[derive(Clone, Copy, Debug, PartialEq)]\npub struct TritWord {\n    value: TritValue,\n    phase: Phase,\n    frame: Frame,\n}\n\n/// Error type for [`TritWord`] construction and transformation.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum WordError {\n    #[error(\"invalid phase: {0}\")]\n    Phase(#[from] PhaseError),\n    #[error(\"invalid frame: {0}\")]\n    Frame(#[from] FrameError),\n    #[error(\"Frame::Absolute requires TritValue::Hold and Phase(0.5)\")]\n    AbsoluteInvariant,\n}\n\nimpl TritWord {\n    /// Construct a `TritWord` from already-validated components.\n    ///\n    /// # Panics\n    ///\n    /// Panics in debug builds if the `Frame::Absolute` invariant is violated.\n    /// In release builds this is a best-effort assertion; prefer\n    /// [`TritWord::try_new`] when constructing from untrusted `f64` input.\n    pub fn new(value: TritValue, phase: Phase, frame: Frame) -\u003e Self {\n        let word = Self {\n            value,\n            phase,\n            frame,\n        };\n        debug_assert!(\n            word.invariant_holds(),\n            \"TritWord invariant violated: Absolute frame must be Hold + neutral phase\"\n        );\n        word\n    }\n\n    /// Construct a `TritWord` from raw `f64` phase, validating everything.\n    pub fn try_new(value: TritValue, phase: f64, frame: \u0026str) -\u003e Result\u003cSelf, WordError\u003e {\n        let frame = frame.parse::\u003cFrame\u003e()?;\n        let phase = Phase::new(phase)?;\n        Self::from_parts(value, phase, frame)\n    }\n\n    /// Construct from validated parts, enforcing the Absolute invariant.\n    pub fn from_parts(value: TritValue, phase: Phase, frame: Frame) -\u003e Result\u003cSelf, WordError\u003e {\n        let word = Self {\n            value,\n            phase,\n            frame,\n        };\n        if !word.invariant_holds() {\n            return Err(WordError::AbsoluteInvariant);\n        }\n        Ok(word)\n    }\n\n    /// Create a neutral hold-state trit.\n    pub fn hold(frame: Frame) -\u003e Self {\n        // Hold with neutral phase is always valid.\n        Self::new(TritValue::Hold, Phase::neutral(), frame)\n    }\n\n    /// Create a fully committed true trit.\n    pub fn tru(frame: Frame) -\u003e Self {\n        Self::new(TritValue::True, Phase::full_true(), frame)\n    }\n\n    /// Create a fully committed false trit.\n    ///\n    /// Named `fals` rather than `false` to avoid collision with the Rust keyword.\n    pub fn fals(frame: Frame) -\u003e Self {\n        Self::new(TritValue::False, Phase::full_false(), frame)\n    }\n\n    /// Create an out-of-distribution trit (unknowable input).\n    pub fn unknown(frame: Frame) -\u003e Self {\n        Self::new(TritValue::Unknown, Phase::neutral(), frame)\n    }\n\n    /// Create the special `Absolute` frame word: always Hold + neutral.\n    pub fn absolute() -\u003e Self {\n        Self::new(TritValue::Hold, Phase::neutral(), Frame::Absolute)\n    }\n\n    /// Read the ternary value.\n    #[inline]\n    pub fn value(\u0026self) -\u003e TritValue {\n        self.value\n    }\n\n    /// Read the phase tendency.\n    #[inline]\n    pub fn phase(\u0026self) -\u003e Phase {\n        self.phase\n    }\n\n    /// Read the frame.\n    #[inline]\n    pub fn frame(\u0026self) -\u003e Frame {\n        self.frame\n    }\n\n    /// Return a new word with the given value, preserving frame and phase.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the new value is not `Hold`\n    /// when the frame is `Absolute`.\n    pub fn with_value(\u0026self, value: TritValue) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(value, self.phase, self.frame)\n    }\n\n    /// Return a new word with the given phase, preserving value and frame.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the frame is `Absolute` and\n    /// the phase is not neutral.\n    pub fn with_phase(\u0026self, phase: Phase) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(self.value, phase, self.frame)\n    }\n\n    /// Return a new word with the given frame, preserving value and phase.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the target frame is\n    /// `Absolute` but value/phase do not match the required Hold/neutral.\n    pub fn with_frame(\u0026self, frame: Frame) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(self.value, self.phase, frame)\n    }\n\n    /// Check whether this word's invariants hold.\n    #[inline]\n    pub fn invariant_holds(\u0026self) -\u003e bool {\n        if self.frame == Frame::Absolute {\n            self.value == TritValue::Hold \u0026\u0026 (self.phase.inner() - 0.5).abs() \u003c f64::EPSILON\n        } else {\n            true\n        }\n    }\n}\n\n/// Type alias kept for backward naming within the 0.2 refactor.\npub type Trit = TritWord;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn constructors_build_valid_words() {\n        let h = TritWord::hold(Frame::Science);\n        assert_eq!(h.value(), TritValue::Hold);\n        assert_eq!(h.frame(), Frame::Science);\n\n        let t = TritWord::tru(Frame::Individual);\n        assert_eq!(t.value(), TritValue::True);\n        assert_eq!(t.phase().inner(), 1.0);\n\n        let f = TritWord::fals(Frame::Consensus);\n        assert_eq!(f.value(), TritValue::False);\n        assert_eq!(f.phase().inner(), 0.0);\n\n        let u = TritWord::unknown(Frame::Meta);\n        assert_eq!(u.value(), TritValue::Unknown);\n    }\n\n    #[test]\n    fn absolute_factory_is_hold_neutral() {\n        let a = TritWord::absolute();\n        assert_eq!(a.value(), TritValue::Hold);\n        assert_eq!(a.phase().inner(), 0.5);\n        assert_eq!(a.frame(), Frame::Absolute);\n    }\n\n    #[test]\n    fn try_new_valid() {\n        let w = TritWord::try_new(TritValue::True, 0.8, \"Science\").unwrap();\n        assert_eq!(w.value(), TritValue::True);\n        assert_eq!(w.frame(), Frame::Science);\n    }\n\n    #[test]\n    fn try_new_rejects_bad_phase() {\n        assert!(TritWord::try_new(TritValue::True, 1.5, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, -0.1, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, f64::NAN, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, f64::INFINITY, \"Science\").is_err());\n    }\n\n    #[test]\n    fn try_new_rejects_unknown_frame() {\n        assert!(TritWord::try_new(TritValue::True, 0.5, \"Bogus\").is_err());\n        assert!(TritWord::try_new(TritValue::True, 0.5, \"\").is_err());\n    }\n\n    #[test]\n    fn new_and_accessors_roundtrip() {\n        let word = TritWord::new(\n            TritValue::Hold,\n            Phase::new(0.25).unwrap(),\n            Frame::Individual,\n        );\n        assert_eq!(word.value(), TritValue::Hold);\n        assert_eq!(word.phase().inner(), 0.25);\n        assert_eq!(word.frame(), Frame::Individual);\n    }\n\n    #[test]\n    fn from_parts_enforces_absolute_invariant() {\n        let bad = TritWord::from_parts(TritValue::True, Phase::new(0.8).unwrap(), Frame::Absolute);\n        assert!(matches!(bad, Err(WordError::AbsoluteInvariant)));\n    }\n\n    #[test]\n    fn from_parts_succeeds_for_valid_word() {\n        let word = TritWord::from_parts(TritValue::True, Phase::new(0.8).unwrap(), Frame::Science)\n            .unwrap();\n        assert_eq!(word.value(), TritValue::True);\n        assert_eq!(word.frame(), Frame::Science);\n    }\n\n    #[test]\n    fn with_value_preserves_invariant() {\n        let a = TritWord::absolute();\n        assert!(matches!(\n            a.with_value(TritValue::True),\n            Err(WordError::AbsoluteInvariant)\n        ));\n        let ok = a.with_value(TritValue::Hold).unwrap();\n        assert_eq!(ok.value(), TritValue::Hold);\n    }\n\n    #[test]\n    fn with_value_succeeds_for_non_absolute() {\n        let h = TritWord::hold(Frame::Science);\n        let t = h.with_value(TritValue::True).unwrap();\n        assert_eq!(t.value(), TritValue::True);\n        assert_eq!(t.frame(), Frame::Science);\n    }\n\n    #[test]\n    fn with_phase_preserves_invariant() {\n        let a = TritWord::absolute();\n        let bad_phase = Phase::new(0.8).unwrap();\n        assert!(matches!(\n            a.with_phase(bad_phase),\n            Err(WordError::AbsoluteInvariant)\n        ));\n    }\n\n    #[test]\n    fn with_phase_succeeds_for_non_absolute() {\n        let h = TritWord::hold(Frame::Science);\n        let p = h.with_phase(Phase::new(0.9).unwrap()).unwrap();\n        assert_eq!(p.phase().inner(), 0.9);\n    }\n\n    #[test]\n    fn with_frame_enforces_absolute_on_target() {\n        let s = TritWord::tru(Frame::Science);\n        assert!(matches!(\n            s.with_frame(Frame::Absolute),\n            Err(WordError::AbsoluteInvariant)\n        ));\n\n        let a = TritWord::absolute();\n        let s2 = a.with_frame(Frame::Science).unwrap();\n        assert_eq!(s2.frame(), Frame::Science);\n    }\n\n    #[test]\n    fn with_frame_succeeds_for_non_absolute_target() {\n        let s = TritWord::tru(Frame::Science);\n        let i = s.with_frame(Frame::Individual).unwrap();\n        assert_eq!(i.frame(), Frame::Individual);\n    }\n\n    #[test]\n    fn invariant_holds_detects_violation_when_bypassed() {\n        // from_parts is the only public way to build a TritWord from raw parts.\n        // It returns an error, so no invalid word can be observed.\n        let bad = TritWord::from_parts(TritValue::True, Phase::new(0.5).unwrap(), Frame::Absolute);\n        assert!(matches!(bad, Err(WordError::AbsoluteInvariant)));\n    }\n\n    #[test]\n    fn error_display_is_informative() {\n        let err = TritWord::try_new(TritValue::True, 1.5, \"Science\").unwrap_err();\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"1.5\") || msg.contains(\"out of range\") || msg.contains(\"Phase\"));\n    }\n}\n","traces":[{"line":47,"address":[],"length":0,"stats":{"Line":10880696699727118336}},{"line":53,"address":[],"length":0,"stats":{"Line":10880696699727118336}},{"line":54,"address":[],"length":0,"stats":{"Line":3314649325744685056}},{"line":57,"address":[],"length":0,"stats":{"Line":10880696699727118397}},{"line":61,"address":[],"length":0,"stats":{"Line":2738188573441261591}},{"line":62,"address":[],"length":0,"stats":{"Line":8214565720323784773}},{"line":63,"address":[],"length":0,"stats":{"Line":7566047373982433349}},{"line":64,"address":[],"length":0,"stats":{"Line":8646911284551352412}},{"line":68,"address":[],"length":0,"stats":{"Line":360287970189639681}},{"line":74,"address":[],"length":0,"stats":{"Line":360287970189639681}},{"line":75,"address":[],"length":0,"stats":{"Line":576460752303423489}},{"line":77,"address":[],"length":0,"stats":{"Line":18230571291595767808}},{"line":81,"address":[],"length":0,"stats":{"Line":10880696699727118336}},{"line":83,"address":[],"length":0,"stats":{"Line":6629298651489370112}},{"line":87,"address":[],"length":0,"stats":{"Line":5548434740920451133}},{"line":88,"address":[],"length":0,"stats":{"Line":3746994889972252916}},{"line":94,"address":[],"length":0,"stats":{"Line":331464932574468 el::{\n    CalibrationEvent, ReceiverEstimate, ResponsePattern, SelfKnowledge, TriggerSignature,\n};\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","knowledge","self_model.rs"],"content":"//! Self-knowledge: \"knowing oneself\" as a precondition for knowing others.\n//!\n//! This module provides [`SelfKnowledge`], a minimal model of the system's\n//! own response patterns. By comparing an incoming signal against known\n//! patterns, the system can estimate the likely state of a receiver that\n//! shares similar cognitive architecture.\n//!\n//! ## Feedback loop (v0.3.0)\n//!\n//! `calibrate()` is now called after each pipeline run. Clean decisions\n//! (no interrupts, computable result) strengthen matching patterns with\n//! a positive phase delta. Conflicted decisions (interrupts + Hold) weaken\n//! patterns with a negative delta. The confidence ceiling in\n//! `infer_receiver_state()` grows with the calibration count, from a\n//! floor of 0.2 up to a ceiling of 0.95.\n\nuse serde::{Deserialize, Serialize};\n\nuse crate::core::frame::Frame;\nuse crate::core::phase::Phase;\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\n\n/// A recorded response pattern: \"when I see X under conditions C, I tend Y\".\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\npub struct ResponsePattern {\n    /// Frame of the input that triggers this pattern.\n    pub frame: Frame,\n    /// Value tendency associated with this pattern.\n    pub value: TritValue,\n    /// Phase tendency.\n    pub phase: f64,\n    /// Context label (e.g. \"stress\", \"rest\", \"conflict\").\n    pub context: String,\n}\n\n/// A trigger signature: a compact description of a stimulus that reliably\n/// evokes a known response.\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\npub struct TriggerSignature {\n    /// Frame involved in the trigger.\n    pub frame: Frame,\n    /// Keywords or labels associated with the trigger.\n    pub labels: Vec\u003cString\u003e,\n    /// Expected phase response.\n    pub phase_response: f64,\n}\n\n/// A calibration event recording how a pattern was updated.\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\npub struct CalibrationEvent {\n    /// Pattern that was updated.\n    pub pattern: ResponsePattern,\n    /// Signed delta applied to the phase.\n    pub phase_delta: f64,\n    /// Human-readable reason.\n    pub reason: String,\n}\n\n/// Estimate of a receiver's likely cognitive state.\n#[derive(Debug, Clone, PartialEq, Deserialize, Serialize)]\npub struct ReceiverEstimate {\n    /// Estimated trit value the receiver would produce.\n    pub estimated_value: TritValue,\n    /// Estimated phase of the receiver.\n    pub estimated_phase: f64,\n    /// Confidence of the estimate in `[0.0, 1.0]`.\n    pub confidence: f64,\n    /// Frames the receiver is likely attending to.\n    pub attended_frames: Vec\u003cFrame\u003e,\n}\n\n/// Self-knowledge model containing the system's own patterns and triggers.\n///\n/// ## Confidence scaling\n///\n/// The confidence ceiling in `infer_receiver_state()` scales with the\n/// number of calibration events recorded:\n///\n/// | Calibrations | Confidence ceiling |\n/// |-------------|-------------------|\n/// | 0           | 0.6               |\n/// | 1–9         | 0.7               |\n/// | 10–49       | 0.8               |\n/// | 50–99       | 0.9               |\n/// | 100+        | 0.95              |\n///\n/// The floor is always 0.2 (when no matching pattern is found).\n#[derive(Debug, Clone, Default, PartialEq, Deserialize, Serialize)]\npub struct SelfKnowledge {\n    /// Known response patterns.\n    pub own_response_patterns: Vec\u003cResponsePattern\u003e,\n    /// Known trigger signatures.\n    pub known_triggers: Vec\u003cTriggerSignature\u003e,\n    /// History of calibrations.\n    pub calibration_history: Vec\u003cCalibrationEvent\u003e,\n}\n\nimpl SelfKnowledge {\n    /// Create an empty self-knowledge model.\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// Create a model seeded with common human-like response patterns.\n    pub fn with_human_defaults() -\u003e Self {\n        Self {\n            own_response_patterns: vec![\n                ResponsePattern {\n                    frame: Frame::Embodied,\n                    value: TritValue::Hold,\n                    phase: 0.5,\n                    context: \"high_arousal\".to_string(),\n                },\n                ResponsePattern {\n                    frame: Frame::FirstPerson,\n                    value: TritValue::True,\n                    phase: 0.7,\n                    context: \"autonomy\".to_string(),\n                },\n                ResponsePattern {\n                    frame: Frame::Relational,\n                    value: TritValue::Hold,\n                    phase: 0.5,\n                    context: \"trust_uncertainty\".to_string(),\n                },\n            ],\n            known_triggers: vec![\n                TriggerSignature {\n                    frame: Frame::Embodied,\n                    labels: vec![\"heart_rate\".to_string(), \"gsr\".to_string()],\n                    phase_response: 0.8,\n                },\n                TriggerSignature {\n                    frame: Frame::Relational,\n                    labels: vec![\"betrayal\".to_string(), \"trust\".to_string()],\n                    phase_response: 0.4,\n                },\n            ],\n            calibration_history: vec![],\n        }\n    }\n\n    /// Add a response pattern.\n    pub fn add_pattern(\u0026mut self, pattern: ResponsePattern) {\n        self.own_response_patterns.push(pattern);\n    }\n\n    /// Add a trigger signature.\n    pub fn add_trigger(\u0026mut self, trigger: TriggerSignature) {\n        self.known_triggers.push(trigger);\n    }\n\n    /// Return the confidence ceiling based on calibration count.\n    ///\n    /// More calibrations → higher confidence that the model's patterns\n    /// are well-tuned to actual decision outcomes.\n    pub fn confidence_ceiling(\u0026self) -\u003e f64 {\n        let n = self.calibration_history.len();\n        if n \u003e= 100 {\n            0.95\n        } else if n \u003e= 50 {\n            0.9\n        } else if n \u003e= 10 {\n            0.8\n        } else if n \u003e= 1 {\n            0.7\n        } else {\n            0.6\n        }\n    }\n\n    /// Infer a receiver's likely state from an input signal.\n    ///\n    /// The heuristic is: \"If I had this same input, what would I do?\"\n    /// The estimate starts from the matching self-pattern, then shifts\n    /// toward the input's actual phase/value proportionally to confidence.\n    ///\n    /// Confidence is clamped to the calibration-derived ceiling, so a\n    /// well-calibrated model can express higher confidence in its estimates.\n    pub fn infer_receiver_state(\u0026self, input: \u0026TritWord) -\u003e ReceiverEstimate {\n        let matching = self\n            .own_response_patterns\n            .iter()\n            .find(|p| p.frame == input.frame());\n\n        let ceiling = self.confidence_ceiling();\n        let raw_confidence = if matching.is_some() { ceiling } else { 0.2 };\n\n        let estimated_value = matching.map(|p| p.value).unwrap_or_else(|| input.value());\n\n        let estimated_phase = matching\n            .map(|p| (p.phase + input.phase().inner()) / 2.0)\n            .unwrap_or_else(|| input.phase().inner());\n\n        let attended_frames = vec![input.frame()];\n\n        ReceiverEstimate {\n            estimated_value,\n            estimated_phase: Phase::new(estimated_phase)\n                .unwrap_or(Phase::neutral())\n                .inner(),\n            confidence: raw_confidence,\n            attended_frames,\n        }\n    }\n\n    /// Record a calibration event.\n    ///\n    /// The `phase_delta` is applied to the matching pattern's phase tendency:\n    /// - Positive delta (+0.05): the pattern produced a clean result → strengthen.\n    /// - Negative delta (-0.05): the pattern produced conflict → weaken.\n    pub fn calibrate(\u0026mut self, pattern: ResponsePattern, phase_delta: f64, reason: String) {\n        // Apply the delta to the matching pattern in our store.\n        if let Some(existing) = self\n            .own_response_patterns\n            .iter_mut()\n            .find(|p| p.frame == pattern.frame \u0026\u0026 p.context == pattern.context)\n        {\n            existing.phase = (existing.phase + phase_delta).clamp(0.0, 1.0);\n        }\n\n        self.calibration_history.push(CalibrationEvent {\n            pattern,\n            phase_delta,\n            reason,\n        });\n    }\n\n    /// Calibrate from a pipeline result.\n    ///\n    /// This is the primary feedback entry point:\n    /// - If the result was a clean Commit (no interrupts, computable value),\n    ///   the matching pattern is strengthened with a positive delta.\n    /// - If the result was Hold with interrupts, the matching pattern is\n    ///   weakened with a negative delta.\n    /// - Otherwise, no calibration is performed.\n    ///\n    /// Returns `true` if a calibration event was recorded.\n    pub fn calibrate_from_result(\n        \u0026mut self,\n        frame: Frame,\n        result: TritValue,\n        phase: f64,\n        interrupt_count: usize,\n    ) -\u003e bool {\n        if result.is_computable() \u0026\u0026 result != TritValue::Hold \u0026\u0026 interrupt_count == 0 {\n            self.calibrate_clean(frame, result, phase);\n            true\n        } else if result == TritValue::Hold \u0026\u0026 interrupt_count \u003e 0 {\n            self.calibrate_conflicted(frame, phase, interrupt_count);\n            true\n        } else {\n            false\n        }\n    }\n\n    /// Strengthen: clean decision with no interrupts.\n    fn calibrate_clean(\u0026mut self, frame: Frame, result: TritValue, phase: f64) {\n        self.calibrate(\n            ResponsePattern {\n                frame,\n                value: result,\n                phase,\n                context: \"calibrated\".into(),\n            },\n            0.05,\n            format!(\n                \"clean {:?} decision with phase {:.3}, no interrupts\",\n                result, phase\n            ),\n        );\n    }\n\n    /// Weaken: conflicted Hold with interrupts present.\n    fn calibrate_conflicted(\u0026mut self, frame: Frame, phase: f64, interrupt_count: usize) {\n        self.calibrate(\n            ResponsePattern {\n                frame,\n                value: TritValue::Hold,\n                phase,\n                context: \"calibrated\".into(),\n            },\n            -0.05,\n            format!(\n                \"conflicted Hold with {} interrupts, phase {:.3}\",\n                interrupt_count, phase\n            ),\n        );\n    }\n\n    /// Number of calibration events recorded.\n    pub fn calibration_count(\u0026self) -\u003e usize {\n        self.calibration_history.len()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn human_defaults_have_patterns() {\n        let knowledge = SelfKnowledge::with_human_defaults();\n        assert!(!knowledge.own_response_patterns.is_empty());\n        assert!(!knowledge.known_triggers.is_empty());\n    }\n\n    #[test]\n    fn infer_receiver_from_first_person() {\n        let knowledge = SelfKnowledge::with_human_defaults();\n        let input = TritWord::tru(Frame::FirstPerson);\n        let estimate = knowledge.infer_receiver_state(\u0026input);\n        assert_eq!(estimate.estimated_value, TritValue::True);\n        assert!(estimate.confidence \u003e 0.5);\n        assert!(estimate.attended_frames.contains(\u0026Frame::FirstPerson));\n    }\n\n    #[test]\n    fn infer_receiver_without_pattern_uses_input() {\n        let knowledge = SelfKnowledge::new();\n        let input = TritWord::fals(Frame::Science);\n        let estimate = knowledge.infer_receiver_state(\u0026input);\n        assert_eq!(estimate.estimated_value, TritValue::False);\n        assert!(estimate.confidence \u003c 0.5);\n    }\n\n    // ── confidence ceiling ────────────────────────────────────────\n\n    #[test]\n    fn confidence_ceiling_zero_calibrations() {\n        let knowledge = SelfKnowledge::new();\n        assert_float_eq!(knowledge.confidence_ceiling(), 0.6);\n    }\n\n    #[test]\n    fn confidence_ceiling_grows_with_calibrations() {\n        let mut knowledge = SelfKnowledge::new();\n        // 0 → 0.6\n        assert_float_eq!(knowledge.confidence_ceiling(), 0.6);\n\n        // 1 calibration → 0.7\n        knowledge.calibrate(\n            ResponsePattern {\n                frame: Frame::Science,\n                value: TritValue::True,\n                phase: 0.5,\n                context: \"test\".to_string(),\n            },\n            0.05,\n            \"test\".to_string(),\n        );\n        assert_float_eq!(knowledge.confidence_ceiling(), 0.7);\n\n        // 10 calibrations → 0.8\n        for i in 0..9 {\n            knowledge.calibrate(\n                ResponsePattern {\n                    frame: Frame::Science,\n                    value: TritValue::True,\n                    phase: 0.5,\n                    context: format!(\"test{}\", i),\n                },\n                0.05,\n                \"bulk\".to_string(),\n            );\n        }\n        assert_float_eq!(knowledge.confidence_ceiling(), 0.8);\n    }\n\n    #[test]\n    fn confidence_ceiling_max_is_095() {\n        let mut knowledge = SelfKnowledge::new();\n        for i in 0..100 {\n            knowledge.calibrate(\n                ResponsePattern {\n                    frame: Frame::Science,\n                    value: TritValue::True,\n                    phase: 0.5,\n                    context: format!(\"bulk{}\", i),\n                },\n                0.01,\n                \"bulk\".to_string(),\n            );\n        }\n        assert_float_eq!(knowledge.confidence_ceiling(), 0.95);\n    }\n\n    // ── calibrate_from_result ─────────────────────────────────────\n\n    #[test]\n    fn calibrate_from_clean_result_strengthens() {\n        let mut knowledge = SelfKnowledge::new();\n        knowledge.add_pattern(ResponsePattern {\n            frame: Frame::Science,\n            value: TritValue::True,\n            phase: 0.5,\n            context: \"calibrated\".to_string(),\n        });\n\n        let did_calibrate = knowledge.calibrate_from_result(\n            Frame::Science,\n            TritValue::True,\n            0.8,\n            0, // no interrupts\n        );\n        assert!(did_calibrate);\n        assert_eq!(knowledge.calibration_count(), 1);\n\n        // The matching pattern should have its phase increased by 0.05\n        let pattern = knowledge\n            .own_response_patterns\n            .iter()\n            .find(|p| p.frame == Frame::Science \u0026\u0026 p.context == \"calibrated\")\n            .unwrap();\n        assert_float_eq!(pattern.phase, 0.55);\n    }\n\n    #[test]\n    fn calibrate_from_conflicted_result_weakens() {\n        let mut knowledge = SelfKnowledge::new();\n        knowledge.add_pattern(ResponsePattern {\n            frame: Frame::Individual,\n            value: TritValue::Hold,\n            phase: 0.5,\n            context: \"calibrated\".to_string(),\n        });\n\n        let did_calibrate = knowledge.calibrate_from_result(\n            Frame::Individual,\n            TritValue::Hold,\n            0.3,\n            3, // 3 interrupts\n        );\n        assert!(did_calibrate);\n        assert_eq!(knowledge.calibration_count(), 1);\n\n        // The matching pattern should have its phase decreased by 0.05\n        let pattern = knowledge\n            .own_response_patterns\n            .iter()\n            .find(|p| p.frame == Frame::Individual \u0026\u0026 p.context == \"calibrated\")\n            .unwrap();\n        assert_float_eq!(pattern.phase, 0.45);\n    }\n\n    #[test]\n    fn calibrate_from_neutral_result_skips() {\n        let mut knowledge = SelfKnowledge::new();\n        // Hold with 0 interrupts is neither clean nor conflicted\n        let did_calibrate = knowledge.calibrate_from_result(\n            Frame::Science,\n            TritValue::Hold,\n            0.5,\n            0, // Hold but no interrupts → skip\n        );\n        assert!(!did_calibrate);\n        assert_eq!(knowledge.calibration_count(), 0);\n    }\n\n    #[test]\n    fn calibrate_from_unknown_skips() {\n        let mut knowledge = SelfKnowledge::new();\n        // Unknown is not computable and not Hold → skip\n        let did_calibrate =\n            knowledge.calibrate_from_result(Frame::Science, TritValue::Unknown, 0.5, 0);\n        assert!(!did_calibrate);\n        assert_eq!(knowledge.calibration_count(), 0);\n    }\n\n    #[test]\n    fn calibrate_phase_clamped_to_range() {\n        let mut knowledge = SelfKnowledge::new();\n        knowledge.add_pattern(ResponsePattern {\n            frame: Frame::Science,\n            value: TritValue::True,\n            phase: 0.98,\n            context: \"calibrated\".to_string(),\n        });\n\n        // +0.05 would push to 1.03, should clamp to 1.0\n        knowledge.calibrate_from_result(Frame::Science, TritValue::True, 0.98, 0);\n        let pattern = knowledge\n            .own_response_patterns\n            .iter()\n            .find(|p| p.frame == Frame::Science \u0026\u0026 p.context == \"calibrated\")\n            .unwrap();\n        assert_float_eq!(pattern.phase, 1.0);\n    }\n\n    #[test]\n    fn infer_confidence_scales_with_calibrations() {\n        let mut knowledge = SelfKnowledge::with_human_defaults();\n        // 0 calibrations → ceiling 0.6\n        let est0 = knowledge.infer_receiver_state(\u0026TritWord::tru(Frame::FirstPerson));\n        assert_float_eq!(est0.confidence, 0.6);\n\n        // Add 10 calibrations → ceiling 0.8\n        for i in 0..10 {\n            knowledge.calibrate(\n                ResponsePattern {\n                    frame: Frame::FirstPerson,\n                    value: TritValue::True,\n                    phase: 0.5,\n                    context: format!(\"bulk{}\", i),\n                },\n                0.01,\n                \"bulk\".to_string(),\n            );\n        }\n        let est10 = knowledge.infer_receiver_state(\u0026TritWord::tru(Frame::FirstPerson));\n        assert_float_eq!(est10.confidence, 0.8);\n    }\n}\n","traces":[{"line":101,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":102,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":106,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":108,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":128,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":140,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":145,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":146,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":150,"address":[],"length":0,"stats":{"Line":0}},{"line":151,"address":[],"length":0,"stats":{"Line":0}},{"line":158,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":159,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":160,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":161,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":162,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":163,"address":[],"length":0,"stats":{"Line":0}},{"line":164,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":165,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":166,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":167,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":169,"addr
