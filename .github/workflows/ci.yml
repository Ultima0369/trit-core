name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Check for unsafe code
        shell: bash
        run: |
          if grep -rE "unsafe\s*(\{|fn|impl|trait|static|const|let|use|mod|type|extern|block)" src/; then
            echo "ERROR: unsafe code found in src/"
            exit 1
          fi

  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-features -- --test-threads=2

  scenario-validation:
    name: Scenario Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate all scenario files
        shell: bash
        run: |
          set -e
          for f in scenarios/*.json; do
            echo "Validating $f"
            cargo run --release --bin trit-sandbox -- --scenario "$f"
          done

  dhat-profile:
    name: Heap Profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build dhat profile binary
        run: cargo build --release --bin dhat-profile --features dhat-profile
      - name: Run dhat profile
        run: ./target/release/dhat-profile

  public-api:
    name: Public API Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-public-api
        run: cargo install cargo-public-api
      - name: Check public API against snapshot
        shell: bash
        run: |
          cargo public-api -ss --all-features > /tmp/current-public-api.txt
          diff -u api/public-api.txt /tmp/current-public-api.txt

  build:
    name: Build Release (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Build dhat profile binary
        run: cargo build --release --bin dhat-profile --features dhat-profile
      - name: Run CLI smoke test
        run: cargo run --release --bin trit-sandbox -- --scenario scenarios/medical_conflict_01.json

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --out Xml --output-dir ./coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
