th":0,"stats":{"Line":2017612633061982208}},{"line":118,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":119,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":120,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":121,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":123,"address":[],"length":0,"stats":{"Line":576460752303423488}}],"covered":45,"coverable":45},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","value.rs"],"content":"/// Ternary logic value: the four discrete states of a TritWord.\n///\n/// Three computable states (`True`, `Hold`, `False`) form the core\n/// ternary logic (MVL-3). A fourth state (`Unknown`) represents\n/// out-of-distribution / unknowable inputs that the system cannot\n/// compute on — semantically distinct from `Hold` (chosen suspension\n/// of judgment) and used only for input-gating and safety fallback.\n///\n/// | State     | Ternary role     | Meaning                        |\n/// |-----------|------------------|--------------------------------|\n/// | `True`    | +1               | Affirmative                    |\n/// | `Hold`    | 0 (neutral)      | Suspended judgment (deliberate)|\n/// | `False`   | -1               | Negative                       |\n/// | `Unknown` | ⊥ (not in MVL-3) | Out-of-distribution, unknowable|\n#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash, Default)]\npub enum TritValue {\n    True, // +1\n    #[default]\n    Hold, // 0 — undetermined / suspended\n    False, // -1\n    Unknown, // ⊥ — out-of-distribution / unknowable, distinct from Hold\n}\n\nimpl TritValue {\n    /// Internal discriminant for LUT indexing.\n    /// LLVM optimizes this to a single register load.\n    #[inline]\n    const fn disc(self) -\u003e usize {\n        match self {\n            TritValue::True =\u003e 0,\n            TritValue::Hold =\u003e 1,\n            TritValue::False =\u003e 2,\n            TritValue::Unknown =\u003e 3,\n        }\n    }\n\n    /// Branchless negation via lookup table.\n    const NEGATE_LUT: [TritValue; 4] = [\n        TritValue::False,   // True → False\n        TritValue::Hold,    // Hold → Hold\n        TritValue::True,    // False → True\n        TritValue::Unknown, // Unknown → Unknown\n    ];\n\n    /// Branchless to_i8 via lookup table.\n    const TO_I8_LUT: [i8; 4] = [1, 0, -1, 0];\n\n    /// Branchless discriminant LUT.\n    const DISC_LUT: [u8; 4] = [0, 1, 2, 3];\n\n    /// Flip true/false; Hold and Unknown remain unchanged.\n    #[inline]\n    pub fn negate(self) -\u003e Self {\n        Self::NEGATE_LUT[self.disc()]\n    }\n\n    /// Convert to signed integer for arithmetic use.\n    /// Unknown maps to 0 (same as Hold) for arithmetic compatibility.\n    #[inline]\n    pub fn to_i8(self) -\u003e i8 {\n        Self::TO_I8_LUT[self.disc()]\n    }\n\n    /// Returns true if this value is computable (not Unknown).\n    #[inline]\n    pub fn is_computable(self) -\u003e bool {\n        self != TritValue::Unknown\n    }\n\n    /// Returns a unique numeric discriminant for all four states:\n    /// True→0, Hold→1, False→2, Unknown→3.\n    /// Unlike `to_i8()`, this preserves the Hold/Unknown distinction.\n    #[inline]\n    pub fn discriminant(self) -\u003e u8 {\n        Self::DISC_LUT[self.disc()]\n    }\n}\n\nimpl From\u003ci8\u003e for TritValue {\n    /// Convert i8 to TritValue. Unknown cannot be created from i8 —\n    /// use `TritValue::Unknown` directly when the input is out-of-distribution.\n    fn from(v: i8) -\u003e Self {\n        match v {\n            1 =\u003e TritValue::True,\n            -1 =\u003e TritValue::False,\n            _ =\u003e TritValue::Hold,\n        }\n    }\n}\n\nimpl TritValue {\n    /// Strict conversion from i8: only accepts -1, 0, 1.\n    /// Unlike `From\u003ci8\u003e`, this rejects out-of-range values instead of\n    /// silently collapsing to Hold.\n    pub fn from_i8_strict(v: i8) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        match v {\n            1 =\u003e Ok(TritValue::True),\n            0 =\u003e Ok(TritValue::Hold),\n            -1 =\u003e Ok(TritValue::False),\n            _ =\u003e Err(\"TritValue can only be created from -1, 0, or 1\"),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn should_convert_true_to_i8_positive_one() {\n        assert_eq!(TritValue::True.to_i8(), 1);\n    }\n\n    #[test]\n    fn should_convert_hold_to_i8_zero() {\n        assert_eq!(TritValue::Hold.to_i8(), 0);\n    }\n\n    #[test]\n    fn should_convert_false_to_i8_negative_one() {\n        assert_eq!(TritValue::False.to_i8(), -1);\n    }\n\n    #[test]\n    fn should_create_from_i8_positive_one() {\n        assert_eq!(TritValue::from(1), TritValue::True);\n    }\n\n    #[test]\n    fn should_create_from_i8_negative_one() {\n        assert_eq!(TritValue::from(-1), TritValue::False);\n    }\n\n    #[test]\n    fn should_create_hold_from_any_other_i8() {\n        assert_eq!(TritValue::from(0), TritValue::Hold);\n        assert_eq!(TritValue::from(2), TritValue::Hold);\n        assert_eq!(TritValue::from(-2), TritValue::Hold);\n    }\n\n    #[test]\n    fn negate_should_flip_true_to_false() {\n        assert_eq!(TritValue::True.negate(), TritValue::False);\n    }\n\n    #[test]\n    fn negate_should_flip_false_to_true() {\n        assert_eq!(TritValue::False.negate(), TritValue::True);\n    }\n\n    #[test]\n    fn negate_should_keep_hold() {\n        assert_eq!(TritValue::Hold.negate(), TritValue::Hold);\n    }\n\n    #[test]\n    fn default_should_be_hold() {\n        assert_eq!(TritValue::default(), TritValue::Hold);\n    }\n\n    #[test]\n    fn unknown_is_not_hold() {\n        assert_ne!(TritValue::Unknown, TritValue::Hold);\n    }\n\n    #[test]\n    fn unknown_is_not_computable() {\n        assert!(!TritValue::Unknown.is_computable());\n    }\n\n    #[test]\n    fn true_is_computable() {\n        assert!(TritValue::True.is_computable());\n    }\n\n    #[test]\n    fn hold_is_computable() {\n        // Hold means \"undecided\" but still computable — the system CAN decide, it just hasn't\n        assert!(TritValue::Hold.is_computable());\n    }\n\n    #[test]\n    fn unknown_to_i8_is_zero() {\n        assert_eq!(TritValue::Unknown.to_i8(), 0);\n    }\n\n    #[test]\n    fn negate_keeps_unknown() {\n        assert_eq!(TritValue::Unknown.negate(), TritValue::Unknown);\n    }\n\n    #[test]\n    fn unknown_cannot_be_created_from_i8() {\n        // From\u003ci8\u003e never produces Unknown — you must use it directly\n        for v in -10..=10 {\n            assert_ne!(TritValue::from(v), TritValue::Unknown);\n        }\n    }\n\n    #[test]\n    fn from_i8_strict_rejects_out_of_range() {\n        assert!(TritValue::from_i8_strict(2).is_err());\n        assert!(TritValue::from_i8_strict(-2).is_err());\n        assert!(TritValue::from_i8_strict(127).is_err());\n    }\n\n    #[test]\n    fn from_i8_strict_accepts_valid() {\n        assert_eq!(TritValue::from_i8_strict(1).unwrap(), TritValue::True);\n        assert_eq!(TritValue::from_i8_strict(0).unwrap(), TritValue::Hold);\n        assert_eq!(TritValue::from_i8_strict(-1).unwrap(), TritValue::False);\n    }\n\n    #[test]\n    fn from_i8_strict_error_message() {\n        let err = TritValue::from_i8_strict(2).unwrap_err();\n        assert!(err.contains(\"-1, 0, or 1\"));\n    }\n\n    #[test]\n    fn false_is_computable() {\n        assert!(TritValue::False.is_computable());\n    }\n\n    #[test]\n    fn debug_format_contains_variant_name() {\n        let s = format!(\"{:?}\", TritValue::Hold);\n        assert!(s.contains(\"Hold\"));\n    }\n\n    #[test]\n    fn discriminant_distinguishes_all_four_states() {\n        assert_eq!(TritValue::True.discriminant(), 0);\n        assert_eq!(TritValue::Hold.discriminant(), 1);\n        assert_eq!(TritValue::False.discriminant(), 2);\n        assert_eq!(TritValue::Unknown.discriminant(), 3);\n    }\n\n    #[test]\n    fn discriminant_preserves_hold_unknown_distinction() {\n        // to_i8() conflates Hold and Unknown (both → 0)\n        // discriminant() must preserve the distinction\n        assert_eq!(TritValue::Hold.to_i8(), 0);\n        assert_eq!(TritValue::Unknown.to_i8(), 0);\n        assert_ne!(\n            TritValue::Hold.discriminant(),\n            TritValue::Unknown.discriminant()\n        );\n    }\n}\n","traces":[{"line":28,"address":[],"length":0,"stats":{"Line":10016005571271983104}},{"line":29,"address":[],"length":0,"stats":{"Line":10016005571271983104}},{"line":30,"address":[],"length":0,"stats":{"Line":10232178353385766911}},{"line":31,"address":[],"length":0,"stats":{"Line":15852670688344145920}},{"line":32,"address":[],"length":0,"stats":{"Line":16140901064495857664}},{"line":33,"address":[],"length":0,"stats":{"Line":17654110539292344323}},{"line":53,"address":[],"length":0,"stats":{"Line":5692549928996306945}},{"line":54,"address":[],"length":0,"stats":{"Line":11385099857992613890}},{"line":60,"address":[],"length":0,"stats":{"Line":3891110078048108544}},{"line":61,"address":[],"length":0,"stats":{"Line":7782220156096217088}},{"line":66,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":67,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":74,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":75,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":82,"address":[],"length":0,"stats":{"Line":12826251738751172608}},{"line":83,"address":[],"length":0,"stats":{"Line":12826251738751172608}},{"line":84,"address":[],"length":0,"stats":{"Line":6052837899185946624}},{"line":85,"address":[],"length":0,"stats":{"Line":5188146770730811392}},{"line":86,"address":[],"length":0,"stats":{"Line":1585267068834414592}},{"line":95,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":96,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":97,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":98,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":99,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":100,"address":[],"length":0,"stats":{"Line":288230376151711744}}],"covered":25,"coverable":25},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","word.rs"],"content":"use crate::core::frame::{Frame, FrameError};\nuse crate::core::phase::{Phase, PhaseError};\nuse crate::core::value::TritValue;\nuse thiserror::Error;\n\n/// A ternary word: the fundamental unit of computation in Trit-Core.\n///\n/// Unlike a binary bit (0/1), a trit carries:\n/// - `value`: ternary state {True, Hold, False} + out-of-distribution {Unknown}\n/// - `phase`: continuous tendency 0.0..1.0 (0.5 = neutral)\n/// - `frame`: the decision domain / context this trit belongs to\n///\n/// # Invariants\n///\n/// - `phase` is always finite and within `[0.0, 1.0]`.\n/// - If `frame == Frame::Absolute`, then `value == TritValue::Hold` and\n///   `phase == Phase(0.5)`.\n///\n/// These invariants are enforced by the constructors. Use the `with_*`\n/// methods to transform a word while preserving invariants.\n#[derive(Clone, Debug, PartialEq)]\npub struct TritWord {\n    value: TritValue,\n    phase: Phase,\n    frame: Frame,\n}\n\n/// Error type for [`TritWord`] construction and transformation.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum WordError {\n    #[error(\"invalid phase: {0}\")]\n    Phase(#[from] PhaseError),\n    #[error(\"invalid frame: {0}\")]\n    Frame(#[from] FrameError),\n    #[error(\"Frame::Absolute requires TritValue::Hold and Phase(0.5)\")]\n    AbsoluteInvariant,\n}\n\nimpl TritWord {\n    /// Construct a `TritWord` from already-validated components.\n    ///\n    /// # Panics\n    ///\n    /// Panics in debug builds if the `Frame::Absolute` invariant is violated.\n    /// In release builds this is a best-effort assertion; prefer\n    /// [`TritWord::try_new`] when constructing from untrusted `f64` input.\n    pub fn new(value: TritValue, phase: Phase, frame: Frame) -\u003e Self {\n        let word = Self {\n            value,\n            phase,\n            frame,\n        };\n        debug_assert!(\n            word.invariant_holds(),\n            \"TritWord invariant violated: Absolute frame must be Hold + neutral phase\"\n        );\n        word\n    }\n\n    /// Construct a `TritWord` from raw `f64` phase, validating everything.\n    pub fn try_new(value: TritValue, phase: f64, frame: \u0026str) -\u003e Result\u003cSelf, WordError\u003e {\n        let frame = frame.parse::\u003cFrame\u003e()?;\n        let phase = Phase::new(phase)?;\n        Self::from_parts(value, phase, frame)\n    }\n\n    /// Construct from validated parts, enforcing the Absolute invariant.\n    pub fn from_parts(value: TritValue, phase: Phase, frame: Frame) -\u003e Result\u003cSelf, WordError\u003e {\n        let word = Self {\n            value,\n            phase,\n            frame,\n        };\n        if !word.invariant_holds() {\n            return Err(WordError::AbsoluteInvariant);\n        }\n        Ok(word)\n    }\n\n    /// Create a neutral hold-state trit.\n    pub fn hold(frame: Frame) -\u003e Self {\n        // Hold with neutral phase is always valid.\n        Self::new(TritValue::Hold, Phase::neutral(), frame)\n    }\n\n    /// Create a fully committed true trit.\n    pub fn tru(frame: Frame) -\u003e Self {\n        Self::new(TritValue::True, Phase::full_true(), frame)\n    }\n\n    /// Create a fully committed false trit.\n    pub fn fals(frame: Frame) -\u003e Self {\n        Self::new(TritValue::False, Phase::full_false(), frame)\n    }\n\n    /// Create an out-of-distribution trit (unknowable input).\n    pub fn unknown(frame: Frame) -\u003e Self {\n        Self::new(TritValue::Unknown, Phase::neutral(), frame)\n    }\n\n    /// Create the special `Absolute` frame word: always Hold + neutral.\n    pub fn absolute() -\u003e Self {\n        Self::new(TritValue::Hold, Phase::neutral(), Frame::Absolute)\n    }\n\n    /// Read the ternary value.\n    #[inline]\n    pub fn value(\u0026self) -\u003e TritValue {\n        self.value\n    }\n\n    /// Read the phase tendency.\n    #[inline]\n    pub fn phase(\u0026self) -\u003e Phase {\n        self.phase\n    }\n\n    /// Read the frame.\n    #[inline]\n    pub fn frame(\u0026self) -\u003e \u0026Frame {\n        \u0026self.frame\n    }\n\n    /// Return a new word with the given value, preserving frame and phase.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the new value is not `Hold`\n    /// when the frame is `Absolute`.\n    pub fn with_value(\u0026self, value: TritValue) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(value, self.phase, self.frame.clone())\n    }\n\n    /// Return a new word with the given phase, preserving value and frame.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the frame is `Absolute` and\n    /// the phase is not neutral.\n    pub fn with_phase(\u0026self, phase: Phase) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(self.value, phase, self.frame.clone())\n    }\n\n    /// Return a new word with the given frame, preserving value and phase.\n    ///\n    /// # Errors\n    ///\n    /// Returns `WordError::AbsoluteInvariant` if the target frame is\n    /// `Absolute` but value/phase do not match the required Hold/neutral.\n    pub fn with_frame(\u0026self, frame: Frame) -\u003e Result\u003cSelf, WordError\u003e {\n        Self::from_parts(self.value, self.phase, frame)\n    }\n\n    /// Check whether this word's invariants hold.\n    #[inline]\n    pub fn invariant_holds(\u0026self) -\u003e bool {\n        if self.frame == Frame::Absolute {\n            self.value == TritValue::Hold \u0026\u0026 (self.phase.inner() - 0.5).abs() \u003c f64::EPSILON\n        } else {\n            true\n        }\n    }\n}\n\n/// Type alias kept for backward naming within the 0.2 refactor.\npub type Trit = TritWord;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn constructors_build_valid_words() {\n        let h = TritWord::hold(Frame::Science);\n        assert_eq!(h.value(), TritValue::Hold);\n        assert_eq!(h.frame(), \u0026Frame::Science);\n\n        let t = TritWord::tru(Frame::Individual);\n        assert_eq!(t.value(), TritValue::True);\n        assert_eq!(t.phase().inner(), 1.0);\n\n        let f = TritWord::fals(Frame::Consensus);\n        assert_eq!(f.value(), TritValue::False);\n        assert_eq!(f.phase().inner(), 0.0);\n\n        let u = TritWord::unknown(Frame::Meta);\n        assert_eq!(u.value(), TritValue::Unknown);\n    }\n\n    #[test]\n    fn absolute_factory_is_hold_neutral() {\n        let a = TritWord::absolute();\n        assert_eq!(a.value(), TritValue::Hold);\n        assert_eq!(a.phase().inner(), 0.5);\n        assert_eq!(a.frame(), \u0026Frame::Absolute);\n    }\n\n    #[test]\n    fn try_new_valid() {\n        let w = TritWord::try_new(TritValue::True, 0.8, \"Science\").unwrap();\n        assert_eq!(w.value(), TritValue::True);\n        assert_eq!(w.frame(), \u0026Frame::Science);\n    }\n\n    #[test]\n    fn try_new_rejects_bad_phase() {\n        assert!(TritWord::try_new(TritValue::True, 1.5, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, -0.1, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, f64::NAN, \"Science\").is_err());\n        assert!(TritWord::try_new(TritValue::True, f64::INFINITY, \"Science\").is_err());\n    }\n\n    #[test]\n    fn try_new_rejects_unknown_frame() {\n        assert!(TritWord::try_new(TritValue::True, 0.5, \"Bogus\").is_err());\n        assert!(TritWord::try_new(TritValue::True, 0.5, \"\").is_err());\n    }\n\n    #[test]\n    fn new_and_accessors_roundtrip() {\n        let word = TritWord::new(\n            TritValue::Hold,\n            Phase::new(0.25).unwrap(),\n            Frame::Individual,\n        );\n        assert_eq!(word.value(), TritValue::Hold);\n        assert_eq!(word.phase().inner(), 0.25);\n        assert_eq!(word.frame(), \u0026Frame::Individual);\n    }\n\n    #[test]\n    fn from_parts_enforces_absolute_invariant() {\n        let bad = TritWord::from_parts(TritValue::True, Phase::new(0.8).unwrap(), Frame::Absolute);\n        assert!(matches!(bad, Err(WordError::AbsoluteInvariant)));\n    }\n\n    #[test]\n    fn from_parts_succeeds_for_valid_word() {\n        let word = TritWord::from_parts(\n            TritValue::True,\n            Phase::new(0.8).unwrap(),\n            Frame::Science,\n        )\n        .unwrap();\n        assert_eq!(word.value(), TritValue::True);\n        assert_eq!(word.frame(), \u0026Frame::Science);\n    }\n\n    #[test]\n    fn with_value_preserves_invariant() {\n        let a = TritWord::absolute();\n        assert!(matches!(\n            a.with_value(TritValue::True),\n            Err(WordError::AbsoluteInvariant)\n        ));\n        let ok = a.with_value(TritValue::Hold).unwrap();\n        assert_eq!(ok.value(), TritValue::Hold);\n    }\n\n    #[test]\n    fn with_value_succeeds_for_non_absolute() {\n        let h = TritWord::hold(Frame::Science);\n        let t = h.with_value(TritValue::True).unwrap();\n        assert_eq!(t.value(), TritValue::True);\n        assert_eq!(t.frame(), \u0026Frame::Science);\n    }\n\n    #[test]\n    fn with_phase_preserves_invariant() {\n        let a = TritWord::absolute();\n        let bad_phase = Phase::new(0.8).unwrap();\n        assert!(matches!(\n            a.with_phase(bad_phase),\n            Err(WordError::AbsoluteInvariant)\n        ));\n    }\n\n    #[test]\n    fn with_phase_succeeds_for_non_absolute() {\n        let h = TritWord::hold(Frame::Science);\n        let p = h.with_phase(Phase::new(0.9).unwrap()).unwrap();\n        assert_eq!(p.phase().inner(), 0.9);\n    }\n\n    #[test]\n    fn with_frame_enforces_absolute_on_target() {\n        let s = TritWord::tru(Frame::Science);\n        assert!(matches!(\n            s.with_frame(Frame::Absolute),\n            Err(WordError::AbsoluteInvariant)\n        ));\n\n        let a = TritWord::absolute();\n        let s2 = a.with_frame(Frame::Science).unwrap();\n        assert_eq!(s2.frame(), \u0026Frame::Science);\n    }\n\n    #[test]\n    fn with_frame_succeeds_for_non_absolute_target() {\n        let s = TritWord::tru(Frame::Science);\n        let i = s.with_frame(Frame::Individual).unwrap();\n        assert_eq!(i.frame(), \u0026Frame::Individual);\n    }\n\n    #[test]\n    fn invariant_holds_detects_violation_when_bypassed() {\n        // from_parts is the only public way to build a TritWord from raw parts.\n        // It returns an error, so no invalid word can be observed.\n        let bad = TritWord::from_parts(TritValue::True, Phase::new(0.5).unwrap(), Frame::Absolute);\n        assert!(matches!(bad, Err(WordError::AbsoluteInvariant)));\n    }\n\n    #[test]\n    fn error_display_is_informative() {\n        let err = TritWord::try_new(TritValue::True, 1.5, \"Science\").unwrap_err();\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"1.5\") || msg.contains(\"out of range\") || msg.contains(\"Phase\"));\n    }\n}\n","traces":[{"line":47,"address":[],"length":0,"stats":{"Line":7638104968020361215}},{"line":53,"address":[],"length":0,"stats":{"Line":7638104968020361215}},{"line":54,"address":[],"length":0,"stats":{"Line":15276209936040722430}},{"line":57,"address":[],"length":0,"stats":{"Line":7638104968020361215}},{"line":61,"address":[],"length":0,"stats":{"Line":4899916394579099666}},{"line":62,"address":[],"length":0,"stats":{"Line":14699749183737298998}},{"line":63,"address":[],"length":0,"stats":{"Line":13835058055282163766}},{"line":64,"address":[],"length":0,"stats":{"Line":17005592192950992968}},{"line":68,"address":[],"length":0,"stats":{"Line":1246596376 ,{"line":158,"address":[],"length":0,"stats":{"Line":2522015791327477847}},{"line":160,"address":[],"length":0,"stats":{"Line":72057594037927934}}],"covered":38,"coverable":38},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","lib.rs"],"content":"// Note: `#![deny(warnings)]` is enforced in CI via RUSTFLAGS=\"-D warnings\",\n// not in the library crate itself, to avoid breaking downstream builds\n// when new Rust versions introduce new warnings.\n#![forbid(unsafe_code)]\n\npub mod baseline;\npub mod clock;\npub mod core;\npub mod meta;\npub mod sandbox;\npub mod tracing_init;\n\npub use core::{\n    algebra::TernaryAlgebra,\n    frame::{Frame, FrameError, FrameRegistry},\n    phase::{Commitment, Phase, PhaseError},\n    value::TritValue,\n    word::{Trit, TritWord, WordError},\n};\npub use meta::{\n    ArbitrationResult, ConflictType, CustomRule, Domain, JsonRuleLoader, MetaInterrupt,\n    MetaMonitor, PolicyError, ResolutionPolicy, RuleError, RuleLoader, SafeFallback,\n};\npub use sandbox::{\n    sanitize_log_field, validate_scenario, SandboxError, SandboxOutput, SandboxPipeline,\n    ScenarioInput, ScenarioValidator, SignalInput, MAX_JSON_SIZE, MAX_SIGNALS, MAX_STRING_LEN,\n};\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","meta","domain.rs"],"content":"use crate::core::frame::Frame;\nuse crate::core::word::TritWord;\nuse crate::meta::frame_mask::FrameMask;\nuse crate::meta::rules::{CustomRule, JsonRuleLoader, RuleLoader};\nuse thiserror::Error;\nuse tracing::{debug, info};\n\n/// Domain rules for conflict resolution.\n/// Each domain defines which frame has priority and whether\n/// forced resolution (hard collapse) is allowed.\n#[derive(Clone, Debug, PartialEq, Eq)]\npub enum Domain {\n    /// Hard science constraints: Science priority, forced collapse.\n    Physical,\n    /// Applied constraints: Science priority, forced collapse.\n    Engineering,\n    /// Soft constraints: Individual priority, no forced collapse.\n    MedicalEthics,\n    /// Incommensurable: no priority, must remain Hold.\n    ValueJudgment,\n    /// Default: attempt negotiation.\n    General,\n    /// Externally loaded domain rules.\n    Custom(String),\n}\n\n/// Error type for policy arbitration failures.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum PolicyError {\n    #[error(\"no inputs provided for arbitration\")]\n    EmptyInputs,\n    #[error(\"custom rule failed to apply: {0}\")]\n    CustomRule(String),\n}\n\n/// Policy engine that decides how to resolve conflicts.\n#[derive(Debug, Clone)]\npub struct ResolutionPolicy {\n    pub domain: Domain,\n    /// Optional externally loaded rule for `Domain::Custom`.\n    pub custom_rule: Option\u003cCustomRule\u003e,\n}\n\nimpl ResolutionPolicy {\n    pub fn new(domain: Domain) -\u003e Self {\n        debug!(?domain, \"ResolutionPolicy created\");\n        Self {\n            domain,\n            custom_rule: None,\n        }\n    }\n\n    /// Attach a custom rule to this policy.\n    pub fn with_custom_rule(mut self, rule: CustomRule) -\u003e Self {\n        self.custom_rule = Some(rule);\n        self\n    }\n\n    /// Given conflicting inputs, return the arbitration result.\n    /// Uses FrameMask for O(1) frame presence checks.\n    ///\n    /// # Errors\n    ///\n    /// Returns `PolicyError::EmptyInputs` if `inputs` is empty.\n    #[tracing::instrument(skip_all, fields(domain = ?self.domain))]\n    pub fn arbitrate(\u0026self, inputs: \u0026[TritWord]) -\u003e Result\u003cArbitrationResult, PolicyError\u003e {\n        debug!(input_count = inputs.len(), \"arbitration started\");\n        if inputs.is_empty() {\n            return Err(PolicyError::EmptyInputs);\n        }\n        let mask = FrameMask::from_inputs(inputs);\n        let result = match \u0026self.domain {\n            Domain::Physical | Domain::Engineering =\u003e {\n                if mask.has(\u0026Frame::Science) {\n                    inputs\n                        .iter()\n                        .find(|t| t.frame() == \u0026Frame::Science)\n                        .cloned()\n                        .map(ArbitrationResult::Commit)\n                        .unwrap_or(ArbitrationResult::Hold)\n                } else {\n                    ArbitrationResult::ForceCollapse\n                }\n            }\n            Domain::MedicalEthics =\u003e {\n                if mask.has(\u0026Frame::Individual) {\n                    inputs\n                        .iter()\n                        .find(|t| t.frame() == \u0026Frame::Individual)\n                        .cloned()\n                        .map(ArbitrationResult::Preserve)\n                        .unwrap_or(ArbitrationResult::Hold)\n                } else {\n                    ArbitrationResult::Negotiate\n                }\n            }\n            Domain::ValueJudgment =\u003e ArbitrationResult::Hold,\n            Domain::Custom(name) =\u003e {\n                if let Some(ref rule) = self.custom_rule {\n                    info!(custom_domain = %name, rule = %rule.name, \"custom domain arbitration using loaded rule\");\n                    return Ok(JsonRuleLoader::apply(rule, inputs));\n                }\n                info!(custom_domain = %name, \"custom domain arbitration: no rule loaded, defaulting to Negotiate\");\n                ArbitrationResult::Negotiate\n            }\n            Domain::General =\u003e {\n                if mask.count() == 1 {\n                    // All same frame (single bit set)\n                    ArbitrationResult::Commit(inputs[0].clone())\n                } else {\n                    ArbitrationResult::Negotiate\n                }\n            }\n        };\n        info!(?result, \"arbitration completed\");\n        Ok(result)\n    }\n}\n\nimpl Default for ResolutionPolicy {\n    fn default() -\u003e Self {\n        Self::new(Domain::General)\n    }\n}\n\n#[derive(Debug, Clone, PartialEq)]\npub enum ArbitrationResult {\n    /// Commit to a specific TritWord as the final decision.\n    Commit(TritWord),\n    /// Preserve a TritWord (MedicalEthics: Individual frame).\n    Preserve(TritWord),\n    /// Force a safe collapse. When this is returned from arbitrate(),\n    /// the caller should invoke SafeFallback::guard() to determine the\n    /// final value — in dangerous domains (Physical, Engineering,\n    /// chemistry, genetics, etc.) this will force False when interrupts\n    /// are present, implementing IEC 61508 fail-safe semantics.\n    ForceCollapse,\n    /// Deliberately hold — incommensurable values, cannot decide.\n    Hold,\n    /// Attempt multi-round negotiation (General domain with mixed frames).\n    Negotiate,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::frame::Frame;\n    use crate::core::word::TritWord;\n\n    #[test]\n    fn physical_commits_science() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::tru(Frame::Consensus),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn physical_without_science_forces_collapse() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        let inputs = vec![\n            TritWord::tru(Frame::Individual),\n            TritWord::fals(Frame::Consensus),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::ForceCollapse);\n    }\n\n    #[test]\n    fn medical_ethics_preserves_individual() {\n        let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Preserve(_)));\n    }\n\n    #[test]\n    fn value_judgment_always_hold() {\n        let policy = ResolutionPolicy::new(Domain::ValueJudgment);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn general_same_frame_commits_first() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn general_mixed_frames_negotiates() {\n        let policy = ResolutionPolicy::new(Domain::General);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_without_rule_defaults_to_negotiate() {\n        let policy = ResolutionPolicy::new(Domain::Custom(\"chemistry\".into()));\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_with_priority_frame_rule() {\n        let rule = CustomRule {\n            name: \"chem\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: \"hold\".into(),\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"chemistry\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::fals(Frame::Individual),\n            TritWord::tru(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn arbitrate_rejects_empty_inputs() {\n        let policy = ResolutionPolicy::new(Domain::Physical);\n        assert!(matches!(\n            policy.arbitrate(\u0026[]).unwrap_err(),\n            PolicyError::EmptyInputs\n        ));\n    }\n\n    #[test]\n    fn engineering_behaves_like_physical() {\n        let policy = ResolutionPolicy::new(Domain::Engineering);\n        let inputs = vec![\n            TritWord::tru(Frame::Consensus),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn medical_ethics_without_individual_negotiates() {\n        let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Consensus),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_rule_fallback_hold() {\n        let rule = CustomRule {\n            name: \"lit\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: \"hold\".into(),\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"literature\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn custom_rule_fallback_safe_fallback() {\n        let rule = CustomRule {\n            name: \"chem\".into(),\n            priority_frame: None,\n            allow_forced_collapse: true,\n            fallback: \"safe_fallback\".into(),\n        };\n        let policy =\n            ResolutionPolicy::new(Domain::Custom(\"chemistry\".into())).with_custom_rule(rule);\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::ForceCollapse);\n    }\n\n    #[test]\n    fn policy_error_display_is_informative() {\n        let err = PolicyError::EmptyInputs;\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"no inputs\"));\n    }\n\n    #[test]\n    fn default_policy_is_general() {\n        let policy: ResolutionPolicy = Default::default();\n        assert_eq!(policy.domain, Domain::General);\n        assert!(policy.custom_rule.is_none());\n    }\n}\n","traces":[{"line":45,"address":[],"length":0,"stats":{"Line":6989586621679009792}},{"line":46,"address":[],"length":0,"stats":{"Line":6989586621679009792}},{"line":54,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":55,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":56,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":66,"address":[],"length":0,"stats":{"Line":6917529027641081862}},{"line":67,"address":[],"length":0,"stats":{"Line":6917529027641081874}},{"line":68,"address":[],"length":0,"stats":{"Line":13835058055282163724}},{"line":69,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":71,"address":[],"length":0,"stats":{"Line":2089670227099910162}},{"line":72,"address":[],"length":0,"stats":{"Line":13474770085092524044}},{"line":74,"address":[],"length":0,"stats":{"Line":6485183463413514246}},{"line":75,"address":[],"length":0,"stats":{"Line": presence bitmask for O(1) frame lookups during arbitration.\n#[derive(Clone, Copy, Debug)]\npub(crate) struct FrameMask(u8);\n\nimpl FrameMask {\n    const SCIENCE: u8 = 1 \u003c\u003c 0;\n    const INDIVIDUAL: u8 = 1 \u003c\u003c 1;\n    const CONSENSUS: u8 = 1 \u003c\u003c 2;\n    const ABSOLUTE: u8 = 1 \u003c\u003c 3;\n    const META: u8 = 1 \u003c\u003c 4;\n\n    /// Bitmask with all 5 frame bits set. Update this when adding new Frame variants.\n    const ALL_FRAMES: u8 =\n        Self::SCIENCE | Self::INDIVIDUAL | Self::CONSENSUS | Self::ABSOLUTE | Self::META;\n\n    pub(crate) fn from_inputs(inputs: \u0026[TritWord]) -\u003e Self {\n        let mut mask = 0u8;\n        for t in inputs {\n            mask |= match t.frame() {\n                Frame::Science =\u003e Self::SCIENCE,\n                Frame::Individual =\u003e Self::INDIVIDUAL,\n                Frame::Consensus =\u003e Self::CONSENSUS,\n                Frame::Absolute =\u003e Self::ABSOLUTE,\n                Frame::Meta =\u003e Self::META,\n            };\n            if mask == Self::ALL_FRAMES {\n                break; // all frames seen, early exit\n            }\n        }\n        FrameMask(mask)\n    }\n\n    pub(crate) fn has(\u0026self, frame: \u0026Frame) -\u003e bool {\n        let bit = match frame {\n            Frame::Science =\u003e Self::SCIENCE,\n            Frame::Individual =\u003e Self::INDIVIDUAL,\n            Frame::Consensus =\u003e Self::CONSENSUS,\n            Frame::Absolute =\u003e Self::ABSOLUTE,\n            Frame::Meta =\u003e Self::META,\n        };\n        (self.0 \u0026 bit) != 0\n    }\n\n    pub(crate) fn count(\u0026self) -\u003e u32 {\n        self.0.count_ones()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn empty_mask_has_nothing() {\n        let mask = FrameMask::from_inputs(\u0026[]);\n        assert!(!mask.has(\u0026Frame::Science));\n        assert_eq!(mask.count(), 0);\n    }\n\n    #[test]\n    fn single_frame_detected() {\n        let inputs = [TritWord::tru(Frame::Science)];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(!mask.has(\u0026Frame::Individual));\n        assert_eq!(mask.count(), 1);\n    }\n\n    #[test]\n    fn multiple_frames_counted() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n            TritWord::hold(Frame::Consensus),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(mask.has(\u0026Frame::Individual));\n        assert!(mask.has(\u0026Frame::Consensus));\n        assert!(!mask.has(\u0026Frame::Absolute));\n        assert_eq!(mask.count(), 3);\n    }\n\n    #[test]\n    fn duplicates_do_not_increase_count() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert_eq!(mask.count(), 1);\n    }\n\n    #[test]\n    fn all_frames_detected() {\n        let inputs = [\n            TritWord::tru(Frame::Science),\n            TritWord::tru(Frame::Individual),\n            TritWord::tru(Frame::Consensus),\n            TritWord::absolute(),\n            TritWord::hold(Frame::Meta),\n        ];\n        let mask = FrameMask::from_inputs(\u0026inputs);\n        assert!(mask.has(\u0026Frame::Science));\n        assert!(mask.has(\u0026Frame::Individual));\n        assert!(mask.has(\u0026Frame::Consensus));\n        assert!(mask.has(\u0026Frame::Absolute));\n        assert!(mask.has(\u0026Frame::Meta));\n        assert_eq!(mask.count(), 5);\n    }\n}\n","traces":[{"line":19,"address":[],"length":0,"stats":{"Line":7205759403792793600}},{"line":20,"address":[],"length":0,"stats":{"Line":14411518807585587200}},{"line":21,"address":[],"length":0,"stats":{"Line": ype,\n    pub reason: String,\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n}\n\nimpl MetaInterrupt {\n    /// Create a new interrupt with the current UTC timestamp.\n    pub fn new(conflict: ConflictType, reason: String) -\u003e Self {\n        Self {\n            conflict,\n            reason,\n            timestamp: chrono::Utc::now(),\n        }\n    }\n\n    /// Create a FrameMismatch interrupt from a frame pair.\n    /// Uses pre-sized String allocation instead of `format!()`.\n    #[inline]\n    pub fn with_frames(op: \u0026'static str, frame_a: Frame, frame_b: Frame) -\u003e Self {\n        let reason = Self::build_frame_mismatch_reason(op, \u0026frame_a, \u0026frame_b);\n        Self {\n            conflict: ConflictType::FrameMismatch,\n            reason,\n            timestamp: chrono::Utc::now(),\n        }\n    }\n\n    /// Test-only constructor for deterministic assertions.\n    #[cfg(test)]\n    pub fn new_for_test(conflict: ConflictType, reason: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            conflict,\n            reason: reason.into(),\n            timestamp: chrono::DateTime::UNIX_EPOCH,\n        }\n    }\n\n    fn build_frame_mismatch_reason(op: \u0026str, a: \u0026Frame, b: \u0026Frame) -\u003e String {\n        // Longest op name (~20) + \" conflict: \" (11) + longest frame (~10) + \" vs \" (4) + longest frame (~10) ≈ 55\n        let mut reason = String::with_capacity(64);\n        reason.push_str(op);\n        reason.push_str(\" conflict: \");\n        use std::fmt::Write;\n        let _ = write!(reason, \"{}\", a);\n        reason.push_str(\" vs \");\n        let _ = write!(reason, \"{}\", b);\n        reason\n    }\n}\n\n/// Classification of meta-level conflicts.\n#[derive(Clone, Debug, PartialEq, Eq)]\npub enum ConflictType {\n    FrameMismatch,\n    OutOfScope,\n    PhaseDrift,\n    PolicyViolation,\n}\n\n/// Meta-monitor: records interrupt events and enforces invariants.\n///\n/// The interrupt log is a capped ring buffer (VecDeque) to prevent\n/// unbounded memory growth in long-running nodes. Oldest entries\n/// are evicted when the cap is reached.\n#[derive(Debug, Clone, Default)]\npub struct MetaMonitor {\n    log: VecDeque\u003cMetaInterrupt\u003e,\n}\n\nimpl MetaMonitor {\n    /// Create an empty MetaMonitor.\n    pub fn new() -\u003e Self {\n        Self {\n            log: VecDeque::new(),\n        }\n    }\n\n    /// Record an interrupt, evicting the oldest entry if the log is full.\n    pub fn record(\u0026mut self, interrupt: MetaInterrupt) {\n        if self.log.len() \u003e= MAX_INTERRUPT_LOG {\n            self.log.pop_front();\n        }\n        self.log.push_back(interrupt);\n    }\n\n    /// Iterate over recorded interrupts (oldest first).\n    pub fn log(\u0026self) -\u003e impl Iterator\u003cItem = \u0026MetaInterrupt\u003e {\n        self.log.iter()\n    }\n\n    /// Drain all recorded interrupts, returning them as a Vec.\n    pub fn drain_log(\u0026mut self) -\u003e Vec\u003cMetaInterrupt\u003e {\n        self.log.drain(..).collect()\n    }\n\n    /// Enforce invariants on a single word.\n    /// Currently: Absolute frame must remain Hold + neutral phase.\n    pub fn inspect(\u0026self, word: \u0026TritWord) -\u003e Option\u003cMetaInterrupt\u003e {\n        if word.frame() == \u0026Frame::Absolute \u0026\u0026 word.value() != TritValue::Hold {\n            return Some(MetaInterrupt::new(\n                ConflictType::PolicyViolation,\n                \"Absolute frame must remain Hold\".to_string(),\n            ));\n        }\n        None\n    }\n\n    /// Enforce invariants on a collection of words.\n    pub fn inspect_all(\u0026self, words: \u0026[TritWord]) -\u003e Vec\u003cMetaInterrupt\u003e {\n        words.iter().filter_map(|w| self.inspect(w)).collect()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn monitor_records_interrupts() {\n        let mut m = MetaMonitor::new();\n        m.record(MetaInterrupt::new_for_test(\n            ConflictType::FrameMismatch,\n            \"x\",\n        ));\n        assert_eq!(m.log().count(), 1);\n    }\n\n    #[test]\n    fn monitor_evicts_old_entries() {\n        let mut m = MetaMonitor::new();\n        for i in 0..MAX_INTERRUPT_LOG + 5 {\n            m.record(MetaInterrupt::new_for_test(\n                ConflictType::FrameMismatch,\n                format!(\"{}\", i),\n            ));\n        }\n        assert_eq!(m.log().count(), MAX_INTERRUPT_LOG);\n    }\n\n    #[test]\n    fn inspect_detects_absolute_violation() {\n        let m = MetaMonitor::new();\n        // Absolute with non-Hold value violates the invariant.\n        let _bad = TritWord::from_parts(\n            TritValue::True,\n            crate::core::phase::Phase::new(0.5).unwrap(),\n            Frame::Absolute,\n        )\n        .unwrap_err();\n        // Since the constructor prevents the violation, we just verify inspect logic on a non-Absolute word.\n        assert!(m.inspect(\u0026TritWord::tru(Frame::Science)).is_none());\n    }\n\n    #[test]\n    fn with_frames_builds_expected_reason() {\n        let interrupt = MetaInterrupt::with_frames(\"TAND\", Frame::Science, Frame::Individual);\n        assert_eq!(interrupt.conflict, ConflictType::FrameMismatch);\n        assert!(interrupt.reason.contains(\"TAND\"));\n        assert!(interrupt.reason.contains(\"Science\"));\n        assert!(interrupt.reason.contains(\"Individual\"));\n        assert!(interrupt.reason.contains(\"vs\"));\n    }\n\n    #[test]\n    fn drain_log_clears_monitor() {\n        let mut m = MetaMonitor::new();\n        m.record(MetaInterrupt::new_for_test(ConflictType::PhaseDrift, \"x\"));\n        m.record(MetaInterrupt::new_for_test(ConflictType::PolicyViolation, \"y\"));\n        assert_eq!(m.log().count(), 2);\n        let drained = m.drain_log();\n        assert_eq!(drained.len(), 2);\n        assert_eq!(m.log().count(), 0);\n    }\n\n    #[test]\n    fn inspect_all_collects_violations() {\n        let m = MetaMonitor::new();\n        // Absolute invariant is enforced at construction, so only non-Absolute words are observable.\n        let words = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::hold(Frame::Meta),\n        ];\n        let violations = m.inspect_all(\u0026words);\n        assert!(violations.is_empty());\n    }\n\n    #[test]\n    fn conflict_type_equality() {\n        assert_eq!(ConflictType::FrameMismatch, ConflictType::FrameMismatch);\n        assert_ne!(ConflictType::FrameMismatch, ConflictType::OutOfScope);\n    }\n}\n","traces":[{"line":20,"address":[],"length":0,"stats":{"Line":1008806316530991106}},{"line":24,"address":[],"length":0,"stats":{"Line":1008806316530991106}},{"line":31,"address":[],"length":0,"stats":{"Line":5692549928996306948}},{"line":32,"address":[],"length":0,"stats":{"Line":10016005571271983124}},{"line":36,"address":[],"length":0,"stats":{"Line":5692549928996306948}},{"line":42,"address":[],"length":0,"stats":{"Line":1729382256910270503}},{"line":45,"address":[],"length":0,"stats":{"Line":1729382256910270503}},{"line":50,"address":[],"length":0,"stats":{"Line":5692549928996306946}},{"line":52,"address":[],"length":0,"stats":{"Line":11385099857992613892}},{"line":53,"address":[],"length":0,"stats":{"Line":17077649786988920838}},{"line":54,"address":[],"length":0,"stats":{"Line":17077649786988920838}},{"line":56,"address":[],"length":0,"stats":{"Line":11385099857992613892}},{"line":57,"address":[],"length":0,"stats":{"Line":17077649786988920838}},{"line":58,"address":[],"length":0,"stats":{"Line":11385099857992613892}},{"line":59,"address":[],"length":0,"stats":{"Line":5692549928996306946}},{"line":84,"address":[],"length":0,"stats":{"Line":5548434740920451072}},{"line":86,"address":[],"length":0,"stats":{"Line":5548434740920451072}},{"line":91,"address":[],"length":0,"stats":{"Line":6989586621679009792}},{"line":92,"address":[],"length":0,"stats":{"Line":734987459186864 \n    use crate::core::word::TritWord;\n\n    #[test]\n    fn custom_domain_arbitrates_as_negotiate_by_default() {\n        let policy = ResolutionPolicy::new(Domain::Custom(\"chemistry\".into()));\n        let inputs = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = policy.arbitrate(\u0026inputs).unwrap();\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn custom_domain_not_equal_to_general() {\n        assert_ne!(Domain::Custom(\"chemistry\".into()), Domain::General);\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","meta","rules.rs"],"content":"use crate::core::frame::Frame;\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\nuse crate::meta::ArbitrationResult;\nuse serde::{Deserialize, Serialize};\nuse std::path::Path;\nuse thiserror::Error;\n\n// ---------------------------------------------------------------------------\n// RuleLoader: external domain rule loading\n// ---------------------------------------------------------------------------\n\n/// Serializable representation of a custom arbitration rule.\n#[derive(Debug, Clone, Deserialize, Serialize)]\npub struct CustomRule {\n    /// Human-readable name for this rule set.\n    pub name: String,\n    /// The priority frame (if any) for this domain.\n    pub priority_frame: Option\u003cString\u003e,\n    /// Whether forced collapse is allowed.\n    pub allow_forced_collapse: bool,\n    /// Fallback behavior when no priority frame matches.\n    /// One of: \"hold\", \"negotiate\", \"commit_first\", \"safe_fallback\".\n    pub fallback: String,\n}\n\n/// Error type for rule loading operations.\n#[derive(Debug, Clone, PartialEq, Error)]\npub enum RuleError {\n    #[error(\"Failed to read rule file: {0}\")]\n    Read(String),\n    #[error(\"Failed to parse custom rule: {0}\")]\n    Parse(String),\n}\n\n/// Trait for loading external domain rules from configuration files.\n///\n/// Implementations can load from JSON, YAML, or other formats.\n/// The default `load_json` implementation is provided for convenience.\npub trait RuleLoader {\n    type Error: std::fmt::Display;\n\n    /// Load a single rule from a file path.\n    fn load\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e Result\u003cCustomRule, Self::Error\u003e;\n\n    /// Load a rule from a JSON string.\n    fn load_json(json: \u0026str) -\u003e Result\u003cCustomRule, Self::Error\u003e;\n\n    /// Apply a loaded rule to inputs, producing an arbitration result.\n    fn apply(rule: \u0026CustomRule, inputs: \u0026[TritWord]) -\u003e ArbitrationResult {\n        // Check for priority frame match\n        if let Some(ref pf) = rule.priority_frame {\n            match pf.parse::\u003cFrame\u003e() {\n                Ok(frame) =\u003e {\n                    if let Some(t) = inputs.iter().find(|w| w.frame() == \u0026frame) {\n                        return if rule.allow_forced_collapse {\n                            ArbitrationResult::Commit(t.clone())\n                        } else {\n                            ArbitrationResult::Preserve(t.clone())\n                        };\n                    }\n                }\n                Err(_) =\u003e {\n                    tracing::warn!(\n                        priority_frame = %pf,\n                        rule_name = %rule.name,\n                        \"CustomRule priority_frame is not a valid Frame name — falling back\"\n                    );\n                }\n            }\n        }\n\n        // Fallback behavior\n        match rule.fallback.as_str() {\n            \"hold\" =\u003e ArbitrationResult::Hold,\n            \"commit_first\" =\u003e {\n                // Skip Unknown — committing \"out of distribution\" defeats safety\n                if let Some(first) = inputs.iter().find(|t| t.value() != TritValue::Unknown) {\n                    ArbitrationResult::Commit(first.clone())\n                } else {\n                    ArbitrationResult::Hold\n                }\n            }\n            \"safe_fallback\" =\u003e ArbitrationResult::ForceCollapse,\n            _ =\u003e ArbitrationResult::Negotiate,\n        }\n    }\n}\n\n/// Default RuleLoader implementation using serde_json.\npub struct JsonRuleLoader;\n\nimpl RuleLoader for JsonRuleLoader {\n    type Error = RuleError;\n\n    fn load\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e Result\u003cCustomRule, Self::Error\u003e {\n        let raw = std::fs::read_to_string(path.as_ref()).map_err(|e| {\n            RuleError::Read(format!(\n                \"Failed to read rule file '{}': {}\",\n                path.as_ref().display(),\n                e\n            ))\n        })?;\n        Self::load_json(\u0026raw)\n    }\n\n    fn load_json(json: \u0026str) -\u003e Result\u003cCustomRule, Self::Error\u003e {\n        serde_json::from_str::\u003cCustomRule\u003e(json).map_err(|e| RuleError::Parse(e.to_string()))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::frame::Frame;\n    use crate::core::word::TritWord;\n\n    #[test]\n    fn json_rule_loader_parses_valid_rule() {\n        let json = r#\"{\n            \"name\": \"chemistry_safety\",\n            \"priority_frame\": \"Science\",\n            \"allow_forced_collapse\": true,\n            \"fallback\": \"safe_fallback\"\n        }\"#;\n        let rule = JsonRuleLoader::load_json(json).unwrap();\n        assert_eq!(rule.name, \"chemistry_safety\");\n        assert_eq!(rule.priority_frame, Some(\"Science\".to_string()));\n        assert!(rule.allow_forced_collapse);\n        assert_eq!(rule.fallback, \"safe_fallback\");\n    }\n\n    #[test]\n    fn json_rule_loader_rejects_invalid_json() {\n        assert!(JsonRuleLoader::load_json(\"not json\").is_err());\n    }\n\n    #[test]\n    fn rule_apply_priority_frame_match() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: \"hold\".into(),\n        };\n        let inputs = vec![\n            TritWord::fals(Frame::Individual),\n            TritWord::tru(Frame::Science),\n        ];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert!(matches!(result, ArbitrationResult::Commit(_)));\n    }\n\n    #[test]\n    fn rule_apply_fallback_hold() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: \"hold\".into(),\n        };\n        let inputs = vec![TritWord::tru(Frame::Science)];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert_eq!(result, ArbitrationResult::Hold);\n    }\n\n    #[test]\n    fn rule_apply_fallback_safe_fallback() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: \"safe_fallback\".into(),\n        };\n        let inputs = vec![TritWord::tru(Frame::Science)];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert_eq!(result, ArbitrationResult::ForceCollapse);\n    }\n\n    #[test]\n    fn rule_apply_priority_frame_no_match_forces_collapse_when_allowed() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: \"hold\".into(),\n        };\n        let inputs = vec![TritWord::tru(Frame::Individual)];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert_eq!(result, ArbitrationResult::Hold); // fallback is hold\n    }\n\n    #[test]\n    fn rule_apply_commit_first_fallback_skips_unknown() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: \"commit_first\".into(),\n        };\n        let inputs = vec![\n            TritWord::unknown(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert!(matches!(result, ArbitrationResult::Commit(w) if w.value() == TritValue::False));\n    }\n\n    #[test]\n    fn rule_apply_unknown_fallback_defaults_to_negotiate() {\n        let rule = CustomRule {\n            name: \"test\".into(),\n            priority_frame: None,\n            allow_forced_collapse: false,\n            fallback: \"not_a_fallback\".into(),\n        };\n        let inputs = vec![TritWord::tru(Frame::Science)];\n        let result = JsonRuleLoader::apply(\u0026rule, \u0026inputs);\n        assert_eq!(result, ArbitrationResult::Negotiate);\n    }\n\n    #[test]\n    fn rule_serializes_and_deserializes() {\n        let rule = CustomRule {\n            name: \"chemistry\".into(),\n            priority_frame: Some(\"Science\".into()),\n            allow_forced_collapse: true,\n            fallback: \"safe_fallback\".into(),\n        };\n        let json = serde_json::to_string(\u0026rule).unwrap();\n        let restored: CustomRule = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(rule.name, restored.name);\n        assert_eq!(rule.priority_frame, restored.priority_frame);\n        assert_eq!(rule.allow_forced_collapse, restored.allow_forced_collapse);\n        assert_eq!(rule.fallback, restored.fallback);\n    }\n\n    #[test]\n    fn load_from_missing_file_fails() {\n        let result = JsonRuleLoader::load(\"/nonexistent/rule.json\");\n        assert!(result.is_err());\n        let msg = format!(\"{}\", result.unwrap_err());\n        assert!(msg.contains(\"Failed to read\"));\n    }\n\n    #[test]\n    fn load_from_valid_temp_file_succeeds() {\n        let json = r#\"{\"name\":\"temp\",\"priority_frame\":null,\"allow_forced_collapse\":false,\"fallback\":\"hold\"}\"#;\n        let dir = std::env::temp_dir();\n        let path = dir.join(\"trit_core_test_rule.json\");\n        std::fs::write(\u0026path, json).unwrap();\n        let rule = JsonRuleLoader::load(\u0026path).unwrap();\n        assert_eq!(rule.name, \"temp\");\n        assert_eq!(rule.fallback, \"hold\");\n        // cleanup\n        let _ = std::fs::remove_file(\u0026path);\n    }\n}\n","traces":[{"line":50,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":52,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":53,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":54,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":55,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":56,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":57,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":59,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":0}},{"line":66,"address":[],"length":0,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":74,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":75,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":78,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":79,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":84,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":85,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":96,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":97,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":98,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":99,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":100,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":101,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":104,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":107,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":108,"address":[],"length":0,"stats":{"Line":792633534417207296}}],"covered":22,"coverable":28},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","meta","safe_fallback.rs"],"content":"use crate::core::value::TritValue;\nuse crate::core::word::TritWord;\nuse crate::meta::{ConflictType, Domain, MetaInterrupt};\nuse tracing::warn;\n\n/// SafeFallback provides a safety-preserving override when the system\n/// cannot reach a confident decision in a dangerous context (e.g.,\n/// chemical synthesis, gene editing, structural safety).\n///\n/// Unlike normal `Hold` (which means \"undecided, suspend judgment\"),\n/// SafeFallback forces `False` for safety-critical scenarios where\n/// indecision could result in harm.\n///\n/// ## Design rationale (per IEC 61508 / ISO 26262 principles):\n/// - In dangerous domains, \"I don't know\" must default to \"don't do it.\"\n/// - `Hold` = \"not ready to decide, gather more data\" (non-dangerous).\n/// - `SafeFallback::force_false()` = \"cannot decide, but failure means harm → block.\"\n///\n/// ## Built-in dangerous domains\n/// `Physical` and `Engineering` are always dangerous (science overrides opinion\n/// when the physical world doesn't negotiate). `MedicalEthics` is omitted\n/// because patient autonomy (`Individual` frame) IS the safe default.\n#[derive(Debug, Clone)]\npub struct SafeFallback {\n    dangerous_custom_domains: Vec\u003cString\u003e,\n    enabled: bool,\n}\n\nimpl SafeFallback {\n    /// Create a new SafeFallback with sensible defaults.\n    pub fn new() -\u003e Self {\n        Self {\n            dangerous_custom_domains: vec![\n                \"chemistry\".to_string(),\n                \"genetics\".to_string(),\n                \"structural\".to_string(),\n                \"nuclear\".to_string(),\n                \"pharmaceutical\".to_string(),\n            ],\n            enabled: true,\n        }\n    }\n\n    /// Disable safe fallback (e.g., for testing or non-critical domains).\n    pub fn disabled() -\u003e Self {\n        Self {\n            dangerous_custom_domains: vec![],\n            enabled: false,\n        }\n    }\n\n    /// Register a custom domain as dangerous.\n    pub fn register_dangerous(\u0026mut self, domain: \u0026str) {\n        if !self.dangerous_custom_domains.iter().any(|d| d == domain) {\n            self.dangerous_custom_domains.push(domain.to_string());\n        }\n    }\n\n    /// Builder-style method to register a dangerous domain.\n    pub fn with_dangerous_domain(mut self, domain: impl Into\u003cString\u003e) -\u003e Self {\n        self.register_dangerous(\u0026domain.into());\n        self\n    }\n\n    /// Enable or disable safe fallback.\n    pub fn enabled(mut self, enabled: bool) -\u003e Self {\n        self.enabled = enabled;\n        self\n    }\n\n    /// Check whether the given domain requires safe fallback.\n    pub fn is_dangerous(\u0026self, domain: \u0026Domain) -\u003e bool {\n        if !self.enabled {\n            return false;\n        }\n        match domain {\n            Domain::Physical | Domain::Engineering =\u003e true,\n            Domain::MedicalEthics | Domain::ValueJudgment | Domain::General =\u003e false,\n            Domain::Custom(name) =\u003e self.dangerous_custom_domains.iter().any(|d| d == name),\n        }\n    }\n\n    /// Apply safe fallback: if the result is Hold or Unknown and the\n    /// domain is dangerous, force False with an interrupt.\n    ///\n    /// `Unknown` always triggers SafeFallback in dangerous domains\n    /// (the system cannot compute — \"I don't know\" must default to\n    /// \"don't do it\"). `Hold` triggers only when interrupts are present\n    /// (deliberate suspension + conflict = safety risk).\n    pub fn guard(\n        \u0026self,\n        domain: \u0026Domain,\n        result: \u0026TritWord,\n        interrupt_count: usize,\n    ) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\n        if !self.is_dangerous(domain) {\n            return (result.clone(), None);\n        }\n\n        let should_fallback = result.value() == TritValue::Unknown\n            || (result.value() == TritValue::Hold \u0026\u0026 interrupt_count \u003e 0);\n\n        if should_fallback {\n            let domain_name = domain_label(domain);\n            let interrupt = MetaInterrupt::new(\n                ConflictType::OutOfScope,\n                format!(\n                    \"SafeFallback: forcing False in dangerous domain '{}' — {} interrupts detected\",\n                    domain_name, interrupt_count\n                ),\n            );\n            warn!(\n                domain = domain_name,\n                interrupt_count = interrupt_count,\n                \"SafeFallback triggered\"\n            );\n            (\n                TritWord::new(TritValue::False, result.phase(), result.frame().clone()),\n                Some(interrupt),\n            )\n        } else {\n            (result.clone(), None)\n        }\n    }\n}\n\nimpl Default for SafeFallback {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Human-readable label for a domain (used in SafeFallback messages).\nfn domain_label(domain: \u0026Domain) -\u003e \u0026str {\n    match domain {\n        Domain::Physical =\u003e \"Physical\",\n        Domain::Engineering =\u003e \"Engineering\",\n        Domain::MedicalEthics =\u003e \"MedicalEthics\",\n        Domain::ValueJudgment =\u003e \"ValueJudgment\",\n        Domain::General =\u003e \"General\",\n        Domain::Custom(name) =\u003e name.as_str(),\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::core::frame::Frame;\n    use crate::core::phase::Phase;\n    use crate::core::word::TritWord;\n\n    #[test]\n    fn safe_fallback_defaults_to_enabled() {\n        let sf = SafeFallback::new();\n        assert!(sf.is_dangerous(\u0026Domain::Physical));\n    }\n\n    #[test]\n    fn safe_fallback_physical_is_always_dangerous() {\n        let sf = SafeFallback::new();\n        assert!(sf.is_dangerous(\u0026Domain::Physical));\n    }\n\n    #[test]\n    fn safe_fallback_engineering_is_always_dangerous() {\n        let sf = SafeFallback::new();\n        assert!(sf.is_dangerous(\u0026Domain::Engineering));\n    }\n\n    #[test]\n    fn safe_fallback_medical_ethics_is_not_dangerous() {\n        let sf = SafeFallback::new();\n        assert!(!sf.is_dangerous(\u0026Domain::MedicalEthics));\n    }\n\n    #[test]\n    fn safe_fallback_custom_dangerous_domains() {\n        let sf = SafeFallback::new();\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"chemistry\".into())));\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"genetics\".into())));\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"nuclear\".into())));\n    }\n\n    #[test]\n    fn safe_fallback_custom_non_dangerous() {\n        let sf = SafeFallback::new();\n        assert!(!sf.is_dangerous(\u0026Domain::Custom(\"literature\".into())));\n        assert!(!sf.is_dangerous(\u0026Domain::Custom(\"music\".into())));\n    }\n\n    #[test]\n    fn safe_fallback_can_register_new_dangerous_domain() {\n        let mut sf = SafeFallback::new();\n        sf.register_dangerous(\"biohacking\");\n        assert!(sf.is_dangerous(\u0026Domain::Custom(\"biohacking\".into())));\n    }\n\n    #[test]\n    fn safe_fallback_guard_forces_false_on_hold_with_interrupts() {\n        let sf = SafeFallback::new();\n        let result = TritWord::hold(Frame::Meta);\n        let (guarded, interrupt) = sf.guard(\u0026Domain::Custom(\"chemistry\".into()), \u0026result, 3);\n        assert_eq!(g "content":"//! Sandbox layer: scenario input validation, pipeline execution, and output validation.\n\npub mod error;\npub mod input;\npub mod output;\npub mod pipeline;\npub mod validate;\npub mod validator;\n\npub use error::SandboxError;\npub use input::{ScenarioInput, SignalInput};\npub use output::SandboxOutput;\npub use pipeline::SandboxPipeline;\npub use validate::{\n    sanitize_log_field, validate_scenario, validate_signal, MAX_JSON_SIZE, MAX_SIGNALS,\n    MAX_STRING_LEN,\n};\npub use validator::ScenarioValidator;\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","sandbox","output.rs"],"content":"use serde::{Deserialize, Serialize};\n\n/// Sandbox output record.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct SandboxOutput {\n    pub scenario_id: String,\n    /// The final decision state as a human-readable string.\n    /// One of: \"True\", \"Hold\", \"False\", \"Unknown\".\n    pub final_value: String,\n    /// Numeric representation of the final value (1=True, 0=Hold/Unknown, -1=False).\n    pub final_value_code: i8,\n    pub final_frame: String,\n    pub final_phase: f64,\n    pub interrupts: Vec\u003cString\u003e,\n    pub policy_action: String,\n}\n\nimpl SandboxOutput {\n    /// Returns true if the final value represents a committed True decision.\n    pub fn is_commit_true(\u0026self) -\u003e bool {\n        self.final_value_code == 1\n    }\n\n    /// Returns true if the final value represents a committed False decision.\n    pub fn is_commit_false(\u0026self) -\u003e bool {\n        self.final_value_code == -1\n    }\n\n    /// Returns true if the final value represents Hold (including Unknown).\n    pub fn is_hold(\u0026self) -\u003e bool {\n        self.final_value_code == 0\n    }\n}\n","traces":[{"line":20,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":21,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":25,"addres pts.push(int);\n            }\n            current = result;\n        }\n\n        // Policy arbitration if still in conflict\n        let policy_result = policy\n            .arbitrate(\u0026trits)\n            .map_err(|e| SandboxError::InvalidScenario(format!(\"arbitration failed: {e}\")))?;\n        let arbitrated_word = match \u0026policy_result {\n            ArbitrationResult::Commit(w) | ArbitrationResult::Preserve(w) =\u003e w.clone(),\n            _ =\u003e current.clone(),\n        };\n\n        // SafeFallback: in dangerous domains, Hold + interrupts forces False.\n        let safe_fallback = SafeFallback::new();\n        let (final_word, fb_interrupt) =\n            safe_fallback.guard(\u0026policy.domain, \u0026arbitrated_word, interrupts.len());\n        if let Some(int) = fb_interrupt {\n            monitor.record(int.clone());\n            interrupts.push(int);\n        }\n\n        Ok(SandboxOutput {\n            scenario_id: sanitize_log_field(\u0026scenario.id),\n            final_value: format!(\"{:?}\", final_word.value()),\n            final_value_code: final_word.value().to_i8(),\n            final_frame: format!(\"{}\", final_word.frame()),\n            final_phase: final_word.phase().inner(),\n            interrupts: interrupts\n                .iter()\n                .map(|i| format!(\"{:?}: {}\", i.conflict, sanitize_log_field(\u0026i.reason)))\n                .collect(),\n            policy_action: format!(\"{:?}\", policy_result),\n        })\n    }\n}\n\nfn build_policy(domain_str: \u0026str) -\u003e Result\u003cResolutionPolicy, SandboxError\u003e {\n    let domain = match domain_str {\n        \"Physical\" =\u003e Domain::Physical,\n        \"Engineering\" =\u003e Domain::Engineering,\n        \"MedicalEthics\" =\u003e Domain::MedicalEthics,\n        \"ValueJudgment\" =\u003e Domain::ValueJudgment,\n        \"General\" =\u003e Domain::General,\n        d if d.starts_with(\"Custom(\") =\u003e {\n            let name = d\n                .strip_prefix(\"Custom(\")\n                .and_then(|s| s.strip_suffix(\")\"))\n                .unwrap_or(\"unknown\")\n                .to_string();\n            Domain::Custom(name)\n        }\n        d =\u003e {\n            return Err(SandboxError::InvalidDomain(format!(\n                \"Unknown domain: '{}'\",\n                d\n            )))\n        }\n    };\n    Ok(ResolutionPolicy::new(domain))\n}\n\nfn build_trits(signals: \u0026[SignalInput]) -\u003e Result\u003cVec\u003cTritWord\u003e, SandboxError\u003e {\n    signals\n        .iter()\n        .enumerate()\n        .map(|(i, s)| {\n            let frame: Frame = s.frame.parse().map_err(|e| SandboxError::InvalidFrame {\n                index: i,\n                reason: format!(\"{}\", e),\n            })?;\n            let value = TritValue::from(s.value);\n            let phase = Phase::new(s.phase).map_err(|e| SandboxError::InvalidPhase {\n                index: i,\n                reason: format!(\"{}\", e),\n            })?;\n            TritWord::from_parts(value, phase, frame).map_err(SandboxError::from)\n        })\n        .collect()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn scenario(domain: \u0026str, signals: Vec\u003cSignalInput\u003e) -\u003e ScenarioInput {\n        ScenarioInput {\n            id: \"test\".into(),\n            description: \"test\".into(),\n            domain: domain.into(),\n            signals,\n            expected_behavior: \"hold\".into(),\n        }\n    }\n\n    fn signal(frame: \u0026str, value: i8, phase: f64) -\u003e SignalInput {\n        SignalInput {\n            frame: frame.into(),\n            value,\n            phase,\n        }\n    }\n\n    #[test]\n    fn pipeline_medical_conflict_preserves_individual() {\n        let s = scenario(\n            \"MedicalEthics\",\n            vec![signal(\"Science\", 1, 0.8), signal(\"Individual\", -1, 0.2)],\n        );\n        let out = SandboxPipeline::run(\u0026s).unwrap();\n        assert_eq!(out.final_value_code, -1);\n        assert!(out.policy_action.contains(\"Preserve\"));\n    }\n\n    #[test]\n    fn pipeline_value_judgment_holds() {\n        let s = scenario(\n            \"ValueJudgment\",\n            vec![signal(\"Individual\", -1, 0.3), signal(\"Consensus\", 1, 0.7)],\n        );\n        let out = SandboxPipeline::run(\u0026s).unwrap();\n        assert_eq!(out.final_value_code, 0);\n        assert!(out.policy_action.contains(\"Hold\"));\n    }\n\n    #[test]\n    fn pipeline_engineering_commits_false() {\n        let s = scenario(\n            \"Engineering\",\n            vec![signal(\"Individual\", 1, 0.6), signal(\"Science\", -1, 0.4)],\n        );\n        let out = SandboxPipeline::run(\u0026s).unwrap();\n        assert_eq!(out.final_value_code, -1);\n    }\n\n    #[test]\n    fn pipeline_rejects_invalid_frame() {\n        let s = scenario(\"General\", vec![signal(\"Bogus\", 1, 0.5)]);\n        assert!(SandboxPipeline::run(\u0026s).is_err());\n    }\n\n    #[test]\n    fn pipeline_rejects_invalid_phase() {\n        let s = scenario(\"General\", vec![signal(\"Science\", 1, 1.5)]);\n        assert!(SandboxPipeline::run(\u0026s).is_err());\n    }\n\n    #[test]\n    fn pipeline_rejects_empty_signals() {\n        let s = scenario(\"General\", vec![]);\n        assert!(SandboxPipeline::run(\u0026s).is_err());\n    }\n\n    #[test]\n    fn pipeline_rejects_invalid_domain() {\n        let s = scenario(\"Bogus\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(SandboxPipeline::run(\u0026s).is_err());\n    }\n\n    #[test]\n    fn pipeline_single_signal_commits() {\n        let s = scenario(\"General\", vec![signal(\"Science\", 1, 0.9)]);\n        let out = SandboxPipeline::run(\u0026s).unwrap();\n        assert_eq!(out.final_value_code, 1);\n        assert_eq!(out.final_frame, \"Science\");\n    }\n\n    #[test]\n    fn pipeline_custom_domain_runs() {\n        let s = scenario(\"Custom(literature)\", vec![signal(\"Science\", 1, 0.8), signal(\"Individual\", -1, 0.2)]);\n        let out = SandboxPipeline::run(\u0026s).unwrap();\n        assert!(out.policy_action.contains(\"Negotiate\"));\n    }\n\n    #[test]\n    fn pipeline_output_helpers_work() {\n        let s = scenario(\"General\", vec![signal(\"Science\", 1, 0.9)]);\n        let out = SandboxPipeline::run(\u0026s).unwrap();\n        assert!(out.is_commit_true());\n        assert!(!out.is_commit_false());\n        assert!(!out.is_hold());\n    }\n\n    #[test]\n    fn pipeline_physical_hold_with_interrupts_forces_false() {\n        // Cross-frame conflict with no Science frame produces Hold + interrupts;\n        // SafeFallback forces False in the dangerous Physical domain.\n        let s = scenario(\n            \"Physical\",\n            vec![signal(\"Individual\", 1, 0.9), signal(\"Consensus\", -1, 0.2)],\n        );\n        let out = SandboxPipeline::run(\u0026s).unwrap();\n        assert_eq!(out.final_value_code, -1);\n        assert!(!out.interrupts.is_empty());\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":2233785415175766016}},{"line":26,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":28,"address":[],"length":0,"stats":{"Line":5836665117072162816}},{"line":29,"address":[],"length":0,"stats":{"Line":3891110078048108544}},{"line":30,"address":[],"length":0,"stats":{"Line":5836665117072162816}},{"line":33,"address":[],"length":0,"stats":{"Line":5836665117072162816}},{"line":34,"address":[],"length":0,"stats":{"Line":5836665117072162816}},{"line":36,"address":[],"length":0,"stats":{"Line":4107282860161892352}},{"line":37,"address":[],"length":0,"stats":{"Line":8646911284551352320}},{"line":38,"address":[],"length":0,"stats":{"Line":5908722711110090752}},{"line":39,"address":[],"length":0,"stats":{"Line":9367487224930631680}},{"line":40,"address":[],"length":0,"stats":{"Line":3746994889972252672}},{"line":42,"address":[],"length":0,"stats":{"Line":2161727821137838080}},{"line":4
