ts":{"Line":1297036692682702848}},{"line":84,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":85,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":86,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":88,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":91,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":93,"address":[],"length":0,"stats":{"Line":0}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":96,"address":[],"length":0,"stats":{"Line":0}},{"line":100,"address":[],"length":0,"stats":{"Line":1945555039024054272}},{"line":103,"address":[],"length":0,"stats":{"Line":1945555039024054272}},{"line":104,"address":[],"length":0,"stats":{"Line":1945555039024054272}},{"line":107,"address":[],"length":0,"stats":{"Line":8863084066665136128}},{"line":108,"address":[],"length":0,"stats":{"Line":9223372036854775808}},{"line":109,"address":[],"length":0,"stats":{"Line":0}},{"line":110,"address":[],"length":0,"stats":{"Line":0}},{"line":112,"address":[],"length":0,"stats":{"Line":2305843009213693952}},{"line":113,"address":[],"length":0,"stats":{"Line":9223372036854775808}},{"line":114,"address":[],"length":0,"stats":{"Line":0}},{"line":115,"address":[],"length":0,"stats":{"Line":0}},{"line":117,"address":[],"length":0,"stats":{"Line":16140901064495857664}}],"covered":54,"coverable":62},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","sandbox","validate.rs"],"content":"use crate::sandbox::error::SandboxError;\nuse crate::sandbox::input::{ScenarioInput, SignalInput};\n\n/// Security and sanity limits for scenario inputs.\npub const MAX_JSON_SIZE: usize = 64 * 1024;\npub const MAX_SIGNALS: usize = 100;\npub const MAX_STRING_LEN: usize = 1024;\n\n/// Validate a scenario's content.\n///\n/// Enforces:\n/// - ID / description length limits\n/// - At least one signal, at most `MAX_SIGNALS`\n/// - Known domain\n/// - Per-signal phase, value, and frame validity\npub fn validate_scenario(scenario: \u0026ScenarioInput) -\u003e Result\u003c(), SandboxError\u003e {\n    if scenario.id.len() \u003e MAX_STRING_LEN {\n        return Err(SandboxError::InvalidScenario(format!(\n            \"id too long: {} chars (max {})\",\n            scenario.id.len(),\n            MAX_STRING_LEN\n        )));\n    }\n    if scenario.description.len() \u003e MAX_STRING_LEN * 4 {\n        return Err(SandboxError::InvalidScenario(\n            \"description too long\".to_string(),\n        ));\n    }\n    if scenario.signals.is_empty() {\n        return Err(SandboxError::InvalidScenario(\n            \"At least one signal is required\".to_string(),\n        ));\n    }\n    if scenario.signals.len() \u003e MAX_SIGNALS {\n        return Err(SandboxError::InvalidScenario(format!(\n            \"Too many signals: {} (max {})\",\n            scenario.signals.len(),\n            MAX_SIGNALS\n        )));\n    }\n\n    validate_domain(\u0026scenario.domain)?;\n\n    for (i, signal) in scenario.signals.iter().enumerate() {\n        validate_signal(i, signal)?;\n    }\n\n    Ok(())\n}\n\n/// Validate that the domain string is known.\npub fn validate_domain(domain: \u0026str) -\u003e Result\u003c(), SandboxError\u003e {\n    match domain {\n        \"Physical\" | \"Engineering\" | \"MedicalEthics\" | \"ValueJudgment\" | \"General\" =\u003e Ok(()),\n        d if d.starts_with(\"Custom(\") =\u003e {\n            let inner = d\n                .strip_prefix(\"Custom(\")\n                .and_then(|s| s.strip_suffix(\")\"))\n                .unwrap_or(\"unknown\");\n            if inner.is_empty() {\n                Err(SandboxError::InvalidDomain(\n                    \"Custom domain name cannot be empty\".to_string(),\n                ))\n            } else {\n                Ok(())\n            }\n        }\n        d =\u003e Err(SandboxError::InvalidDomain(format!(\n            \"Unknown domain: '{}'\",\n            d\n        ))),\n    }\n}\n\n/// Validate a single signal.\npub fn validate_signal(index: usize, signal: \u0026SignalInput) -\u003e Result\u003c(), SandboxError\u003e {\n    if signal.phase.is_nan() || signal.phase.is_infinite() || !(0.0..=1.0).contains(\u0026signal.phase) {\n        return Err(SandboxError::InvalidPhase {\n            index,\n            reason: format!(\n                \"phase {} is invalid (must be finite in [0.0, 1.0])\",\n                signal.phase\n            ),\n        });\n    }\n    if !matches!(signal.value, -1..=1) {\n        return Err(SandboxError::InvalidValue {\n            index,\n            reason: format!(\"value {} is invalid (must be 1, 0, or -1)\", signal.value),\n        });\n    }\n    match signal.frame.as_str() {\n        \"Science\" | \"Individual\" | \"Consensus\" | \"Absolute\" =\u003e Ok(()),\n        f =\u003e Err(SandboxError::InvalidFrame {\n            index,\n            reason: format!(\"unknown frame '{}'\", f),\n        }),\n    }\n}\n\n/// Sanitize a free-form string for log/output emission.\npub fn sanitize_log_field(s: \u0026str) -\u003e String {\n    s.chars()\n        .map(|c| {\n            if c.is_control() \u0026\u0026 c != ' ' {\n                '\\u{FFFD}'\n            } else {\n                c\n            }\n        })\n        .take(256)\n        .collect()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn signal(frame: \u0026str, value: i8, phase: f64) -\u003e SignalInput {\n        SignalInput {\n            frame: frame.into(),\n            value,\n            phase,\n        }\n    }\n\n    fn scenario(id: \u0026str, domain: \u0026str, signals: Vec\u003cSignalInput\u003e) -\u003e ScenarioInput {\n        ScenarioInput {\n            id: id.into(),\n            description: \"test\".into(),\n            domain: domain.into(),\n            signals,\n            expected_behavior: \"hold\".into(),\n        }\n    }\n\n    #[test]\n    fn validate_accepts_valid_scenario() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_ok());\n    }\n\n    #[test]\n    fn validate_rejects_empty_signals() {\n        let s = scenario(\"x\", \"General\", vec![]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_too_many_signals() {\n        let signals: Vec\u003c_\u003e = (0..=MAX_SIGNALS).map(|_| signal(\"Science\", 1, 0.5)).collect();\n        let s = scenario(\"x\", \"General\", signals);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_invalid_domain() {\n        let s = scenario(\"x\", \"Mystic\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_accepts_custom_domain() {\n        let s = scenario(\"x\", \"Custom(chemistry)\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_ok());\n    }\n\n    #[test]\n    fn validate_rejects_empty_custom_domain() {\n        let s = scenario(\"x\", \"Custom()\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_invalid_phase() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Science\", 1, 1.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_nan_phase() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Science\", 1, f64::NAN)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_invalid_value() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Science\", 2, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_invalid_frame() {\n        let s = scenario(\"x\", \"General\", vec![signal(\"Bogus\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn validate_rejects_long_id() {\n        let s = scenario(\u0026\"x\".repeat(MAX_STRING_LEN + 1), \"General\", vec![signal(\"Science\", 1, 0.5)]);\n        assert!(validate_scenario(\u0026s).is_err());\n    }\n\n    #[test]\n    fn sanitize_replaces_control_chars() {\n        let sanitized = sanitize_log_field(\"hello\\nworld\");\n        assert!(!sanitized.contains('\\n'));\n        assert!(sanitized.contains(\"hello\"));\n        assert!(sanitized.contains(\"world\"));\n    }\n\n    #[test]\n    fn sanitize_truncates_long_strings() {\n        let long = \"x\".repeat(512);\n        let sanitized = sanitize_log_field(\u0026long);\n        assert_eq!(sanitized.len(), 256);\n    }\n}\n","traces":[{"line":16,"address":[],"length":0,"stats":{"Line":4251398048237748224}},{"line":17,"address":[],"length":0,"stats":{"Line":4251398048237748224}},{"line":18,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":19,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":20,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":21,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":24,"address":[],"length":0,"stats":{"Line":8358680908399640576}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":8358680908399640576}},{"line":30,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":31,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":34,"address":[],"length":0,"stats":{"Line":4035225266123964416}},{"line":35,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":36,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":37,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":38,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":42,"address":[],"l     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/').map(decodeURIComponent);
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
