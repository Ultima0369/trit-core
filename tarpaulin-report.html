<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

tWord::tru(Frame::Science);\n    let b = TritWord::fals(Frame::Science);\n    c.bench_function(\"precheck_same_frame\", |b_bench| {\n        b_bench.iter(|| TernaryAlgebra::precheck_same_frame(black_box(\u0026a), black_box(\u0026b)));\n    });\n}\n\nfn bench_cascade_10(c: \u0026mut Criterion) {\n    let trits: Vec\u003cTritWord\u003e = (0..10)\n        .map(|i| {\n            if i % 2 == 0 {\n                TritWord::tru(Frame::Science)\n            } else {\n                TritWord::tru(Frame::Consensus)\n            }\n        })\n        .collect();\n    c.bench_function(\"tand_cascade_10\", |b_bench| {\n        b_bench.iter(|| {\n            let mut current = trits[0].clone();\n            for next in \u0026trits[1..] {\n                let (res, _) = TernaryAlgebra::t_and(black_box(\u0026current), black_box(next));\n                current = res;\n            }\n            black_box(current);\n        });\n    });\n}\n\nfn bench_cascade_10_hot(c: \u0026mut Criterion) {\n    let trits: Vec\u003cTritWord\u003e = (0..10)\n        .map(|_| TritWord::new(TritValue::True, Phase::new(0.8).unwrap(), Frame::Science))\n        .collect();\n    c.bench_function(\"tand_cascade_10_hot\", |b_bench| {\n        b_bench.iter(|| {\n            let mut current = trits[0].clone();\n            for next in \u0026trits[1..] {\n                current = TernaryAlgebra::t_and_hot(black_box(\u0026current), black_box(next));\n            }\n            black_box(current);\n        });\n    });\n}\n\nfn bench_phase_quantize(c: \u0026mut Criterion) {\n    let near_neutral = Phase::new(0.5000000001).unwrap();\n    let near_zero = Phase::new(0.0000000001).unwrap();\n    let near_one = Phase::new(0.9999999999).unwrap();\n    let normal = Phase::new(0.73).unwrap();\n\n    c.bench_function(\"phase_quantize_near_neutral\", |b_bench| {\n        b_bench.iter(|| black_box(near_neutral).quantize(black_box(1e-6)))\n    });\n\n    c.bench_function(\"phase_quantize_near_zero\", |b_bench| {\n        \"description\": \"JSON deserialization benchmark\",\n        \"domain\": \"MedicalEthics\",\n        \"signals\": [\n            {\"frame\": \"Science\", \"value\": 1, \"phase\": 0.85},\n            {\"frame\": \"Individual\", \"value\": -1, \"phase\": 0.75}\n        ],\n        \"expected_behavior\": \"hold\"\n    }\"#;\n\n    c.bench_function(\"json_deser_scenario\", |b| {\n        b.iter(|| {\n            let _input: ScenarioInput = serde_json::from_str(black_box(json)).unwrap();\n        });\n    });\n}\n\nfn bench_json_serde_output_ser(c: \u0026mut Criterion) {\n    let output = SandboxOutput {\n        scenario_id: \"bench\".into(),\n        final_value: \"Hold\".into(),\n        final_value_code: 0,\n        final_frame: \"Meta\".into(),\n        final_phase: 0.5,\n        interrupts: vec![\"FrameMismatch\".into(), \"PhaseDrift\".into()],\n        policy_action: \"Hold\".into(),\n    };\n\n    c.bench_function(\"json_ser_output\", |b| {\n        b.iter(|| {\n            let _json = serde_json::to_string(black_box(\u0026output)).unwrap();\n        });\n    });\n}\n\ncriterion_group!(\n    core_ops,\n    bench_tand_same_frame,\n    bench_tand_cross_frame,\n    bench_tor_same_frame,\n    bench_tnot,\n);\n\ncriterion_group!(hot_path, bench_tand_hot, bench_precheck_same_frame);\n\ncriterion_group!(cascades, bench_cascade_10, bench_cascade_10_hot);\n\ncriterion_group!(phase_precision, bench_phase_quantize);\n\ncriterion_group!(\n    pipeline,\n    bench_full_pipeline_medical,\n    bench_full_pipeline_physical\n);\n\ncriterion_group!(\n    json_serde,\n    bench_json_serde_scenario_deser,\n    bench_json_serde_output_ser\n);\n\ncriterion_main!(\n    core_ops,\n    hot_path,\n    cascades,\n    phase_precision,\n    pipeline,\n    json_serde\n);\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","baseline","mod.rs"],"content":"// Binary baseline comparator for M2 validation.\n// Implements simple majority-rule logic (no Hold state) to demonstrate\n// where binary systems fail to preserve conflicts that Trit-Core detects.\n\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\n\n#[cfg(test)]\nuse crate::core::frame::Frame;\n\n/// Result of a binary baseline evaluation.\n#[derive(Debug, Clone, PartialEq)]\npub struct BinaryResult {\n    /// The collapsed binary value (True or False, never Hold).\n    pub value: TritValue,\n    /// Whether the binary result conflicts with the ternary result.\n    pub conflicts_with_ternary: bool,\n    /// Explanation of the binary decision logic.\n    pub reasoning: String,\n}\n\n/// Binary baseline comparator using simple majority voting.\n///\n/// Unlike Trit-Core's ternary logic which preserves Hold states when\n/// domains conflict, the binary baseline always collapses to True or False.\npub struct BinaryBaseline;\n\nimpl BinaryBaseline {\n    /// Evaluate a set of signals using binary majority rule.\n    ///\n    /// Counts True vs False votes. Hold signals are treated as abstentions\n    /// (not counted). In case of a tie, defaults to False (conservative).\n    pub fn evaluate(signals: \u0026[TritWord]) -\u003e BinaryResult {\n        let trues: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::True)\n            .count();\n        let falses: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::False)\n            .count();\n        let holds: usize = signals\n            .iter()\n            .filter(|t| t.value() == TritValue::Hold)\n            .count();\n\n        let value = if trues \u003e falses {\n            TritValue::True\n        } else {\n            TritValue::False // tie goes to False (conservative)\n        };\n\n        let reasoning = format!(\n            \"Binary majority: {} True, {} False, {} Hold (abstained). {} wins.\",\n            trues,\n            falses,\n            holds,\n            if value == TritValue::True {\n                \"True\"\n            } else {\n                \"False\"\n            }\n        );\n\n        BinaryResult {\n            value,\n            conflicts_with_ternary: false, // set by caller\n            reasoning,\n        }\n    }\n\n    /// Compare binary baseline against ternary (Trit-Core) result.\n    /// Returns true if the binary result would have \"smoothed\" or \"overridden\"\n    /// a conflict that the ternary system correctly identified.\n    pub fn compare(ternary: \u0026TritWord, binary: \u0026BinaryResult) -\u003e BinaryResult {\n        let conflicts = ternary.value() == TritValue::Hold\n            || (ternary.value() != binary.value \u0026\u0026 ternary.value() != TritValue::Hold);\n\n        BinaryResult {\n            value: binary.value,\n            conflicts_with_ternary: conflicts,\n            reasoning: if conflicts {\n                format!(\n                    \"{} [CONFLICT: ternary={:?}, binary would override]\",\n                    binary.reasoning,\n                    ternary.value()\n                )\n            } else {\n                format!(\n                    \"{} [AGREE: ternary={:?}]\",\n                    binary.reasoning,\n                    ternary.value()\n                )\n            },\n        }\n    }\n\n    /// Check if a set of signals has cross-frame conflicts that binary\n    /// would ignore but ternary would detect.\n    pub fn has_hidden_conflict(signals: \u0026[TritWord]) -\u003e bool {\n        if signals.is_empty() {\n            return false;\n        }\n        let first_frame = signals[0].frame();\n        signals.iter().any(|t| t.frame() != first_frame)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn binary_majority_true_wins() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::True);\n    }\n\n    #[test]\n    fn binary_majority_false_wins() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn binary_tie_defaults_false() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn binary_ignores_cross_frame_conflict() {\n        // Binary doesn't care about frame mismatches\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        // Tie (1 True, 1 False) → False\n        assert_eq!(result.value, TritValue::False);\n        // But there IS a hidden cross-frame conflict\n        assert!(BinaryBaseline::has_hidden_conflict(\u0026signals));\n    }\n\n    #[test]\n    fn binary_vs_ternary_conflict_detected() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Individual),\n        ];\n        let binary = BinaryBaseline::evaluate(\u0026signals);\n        let ternary = TritWord::hold(Frame::Meta);\n        let comparison = BinaryBaseline::compare(\u0026ternary, \u0026binary);\n        assert!(comparison.conflicts_with_ternary);\n    }\n\n    #[test]\n    fn binary_all_hold_defaults_false() {\n        let signals = vec![\n            TritWord::hold(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert_eq!(result.value, TritValue::False);\n        assert!(result.reasoning.contains(\"0 True, 0 False\"));\n    }\n\n    #[test]\n    fn binary_ignores_unknown() {\n        // Unknown values are not counted as True, False, or Hold.\n        let signals = vec![\n            TritWord::unknown(Frame::Science),\n            TritWord::tru(Frame::Science),\n            TritWord::fals(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        // Tie (1 True, 1 False) → False\n        assert_eq!(result.value, TritValue::False);\n    }\n\n    #[test]\n    fn compare_agrees_when_values_match() {\n        let binary = BinaryBaseline::evaluate(\u0026[TritWord::tru(Frame::Science)]);\n        let ternary = TritWord::tru(Frame::Science);\n        let comparison = BinaryBaseline::compare(\u0026ternary, \u0026binary);\n        assert!(!comparison.conflicts_with_ternary);\n        assert!(comparison.reasoning.contains(\"AGREE\"));\n    }\n\n    #[test]\n    fn empty_signals_have_no_hidden_conflict() {\n        assert!(!BinaryBaseline::has_hidden_conflict(\u0026[]));\n    }\n\n    #[test]\n    fn single_signal_has_no_hidden_conflict() {\n        let signals = vec![TritWord::tru(Frame::Science)];\n        assert!(!BinaryBaseline::has_hidden_conflict(\u0026signals));\n    }\n\n    #[test]\n    fn reasoning_includes_counts() {\n        let signals = vec![\n            TritWord::tru(Frame::Science),\n            TritWord::hold(Frame::Science),\n        ];\n        let result = BinaryBaseline::evaluate(\u0026signals);\n        assert!(result.reasoning.contains(\"1 True\"));\n        assert!(result.reasoning.contains(\"0 False\"));\n        assert!(result.reasoning.contains(\"1 Hold\"));\n    }\n}\n","traces":[{"line":33,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":34,"address":[],"length":0,"stats":{"Line":1945555039024054272}},{"line":36,"address":[],"length":0,"stats":{"Line":3530822107858468864}},{"lin file\n//   dhat-heap.json is written to the current directory.\n//\n// Analyze with:\n//   dhat-viewer dhat-heap.json    (if installed)\n//   Or upload to https://nnethercote.github.io/dh_view/dh_view.html\n\nuse std::error::Error;\nuse trit_core::core::frame::Frame;\nuse trit_core::core::phase::Phase;\nuse trit_core::core::value::TritValue;\nuse trit_core::core::word::TritWord;\nuse trit_core::core::TernaryAlgebra;\nuse trit_core::meta::{Domain, ResolutionPolicy, SafeFallback};\n\nfn main() -\u003e Result\u003c(), Box\u003cdyn Error\u003e\u003e {\n    println!(\"Trit-Core dhat Heap Profiling\");\n    println!(\"==============================\");\n\n    // ── Sanity check: verify dhat is capturing allocations ──\n    println!(\"\\n[0/6] Sanity check: explicit Vec allocation...\");\n    let _sanity_profiler = dhat::Profiler::new_heap();\n    {\n        let v: Vec\u003cu8\u003e = vec![0u8; 1024];\n        std::hint::black_box(\u0026v);\n    }\n    drop(_sanity_profiler);\n\n    // ── Hot path: TAND same-frame (should be zero-allocation) ──\n    println!(\"\\n[1/5] Profiling hot path: TAND same-frame x 100,000...\");\n    let _hot_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.8)?, Frame::Science);\n        let b = TritWord::new(TritValue::False, Phase::new(0.2)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_and_hot(\u0026a, \u0026b);\n        }\n    }\n    drop(_hot_profiler);\n\n    // ── Hot path: TOR same-frame ──\n    println!(\"[2/5] Profiling hot path: TOR same-frame x 100,000...\");\n    let _tor_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.7)?, Frame::Science);\n        let b = TritWord::new(TritValue::Hold, Phase::new(0.5)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\n        }\n    }\n    drop(_tor_profiler);\n\n    // ── Hot path: TNOT ──\n    println!(\"[3/5] Profiling hot path: TNOT x 100,000...\");\n    let _tnot_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.9)?, Frame::Science);\n        for _ in 0..100_000 {\n            let _ = TernaryAlgebra::t_not(\u0026a);\n        }\n    }\n    drop(_tnot_profiler);\n\n    // ── Cold path: TAND cross-frame (should allocate MetaInterrupt) ──\n    println!(\"[4/5] Profiling cold path: TAND cross-frame x 10,000...\");\n    let _cold_profiler = dhat::Profiler::new_heap();\n    {\n        let a = TritWord::new(TritValue::True, Phase::new(0.8)?, Frame::Science);\n        let b = TritWord::new(TritValue::False, Phase::new(0.2)?, Frame::Individual);\n        let mut interrupt_count = 0u64;\n        for _ in 0..10_000 {\n            let (result, interrupt) = TernaryAlgebra::t_and(\u0026a, \u0026b);\n            if interrupt.is_some() {\n                interrupt_count += 1;\n            }\n            std::hint::black_box(result);\n        }\n        // Force the count to be used so the interrupt path isn't optimized away\n        println!(\"  Interrupts generated: {}\", interrupt_count);\n    }\n    drop(_cold_profiler);\n\n    // ── End-to-end pipeline: MedicalEthics ──\n    println!(\"[5/5] Profiling end-to-end pipeline: MedicalEthics x 1,000...\");\n    let _pipeline_profiler = dhat::Profiler::new_heap();\n    {\n        let science = TritWord::new(TritValue::True, Phase::new(0.85)?, Frame::Science);\n        let individual = TritWord::new(TritValue::False, Phase::new(0.20)?, Frame::Individual);\n\n        for _ in 0..1_000 {\n            let (result, interrupt) = TernaryAlgebra::t_and(\u0026science, \u0026individual);\n            let policy = ResolutionPolicy::new(Domain::MedicalEthics);\n            let arbitration = policy.arbitrate(\u0026[science.clone(), individual.clone()])?;\n            let sf = SafeFallback::new();\n            let (final_result, _) = sf.guard(\n                \u0026Domain::MedicalEthics,\n                \u0026result,\n                if interrupt.is_some() { 1 } else { 0 },\n            );\n            // Prevent optimization: use the result\n            std::hint::black_box(final_result);\n            std::hint::black_box(arbitration);\n        }\n    }\n    drop(_pipeline_profiler);\n\n    println!(\"\\nProfiling complete.\");\n    println!(\"dhat-heap.json written to current directory.\");\n    println!(\"View with: dhat-viewer dhat-heap.json\");\n    println!(\"Or upload to: https://nnethercote.github.io/dh_view/dh_view.html\");\n    Ok(())\n}\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":25,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":29,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":34,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":0}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":52,"address":[],"length":0,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"a able":61},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","bin","sandbox.rs"],"content":"use std::fs;\nuse std::path::{Path, PathBuf};\nuse trit_core::sandbox::{\n    SandboxError, SandboxOutput, SandboxPipeline, ScenarioInput, ScenarioValidator,\n};\n\n/// Security: validate scenario file path to prevent path traversal (CWE-22).\nfn validate_scenario_path(raw_path: \u0026str) -\u003e Result\u003cPathBuf, String\u003e {\n    let path = Path::new(raw_path);\n\n    let canonical = path\n        .canonicalize()\n        .map_err(|e| format!(\"Invalid path: {}\", e))?;\n\n    let allowed_dir = Path::new(\"scenarios\")\n        .canonicalize()\n        .map_err(|e| format!(\"Cannot resolve scenarios dir: {}\", e))?;\n\n    if !canonical.starts_with(\u0026allowed_dir) {\n        return Err(format!(\n            \"Path traversal denied: '{}' is outside '{}'\",\n            canonical.display(),\n            allowed_dir.display()\n        ));\n    }\n\n    match canonical.extension().and_then(|e| e.to_str()) {\n        Some(\"json\") =\u003e Ok(canonical),\n        _ =\u003e Err(format!(\n            \"Invalid file type: only .json files allowed, got {:?}\",\n            canonical.extension()\n        )),\n    }\n}\n\nfn load_scenario(path: \u0026Path) -\u003e Result\u003cScenarioInput, SandboxError\u003e {\n    let raw = fs::read_to_string(path)\n        .map_err(|e| SandboxError::Io(format!(\"Failed to read '{}': {}\", path.display(), e)))?;\n    if raw.len() \u003e trit_core::sandbox::MAX_JSON_SIZE {\n        return Err(SandboxError::Io(format!(\n            \"File too large: {} bytes (max {})\",\n            raw.len(),\n            trit_core::sandbox::MAX_JSON_SIZE\n        )));\n    }\n    serde_json::from_str(\u0026raw).map_err(|e| SandboxError::Io(format!(\"Malformed JSON: {}\", e)))\n}\n\nfn run_and_print(path: \u0026Path) -\u003e Result\u003cSandboxOutput, SandboxError\u003e {\n    let scenario = load_scenario(path)?;\n    let output = SandboxPipeline::run(\u0026scenario)?;\n\n    // Optionally validate expected_behavior if present and non-empty.\n    if !scenario.expected_behavior.is_empty() {\n        if let Err(e) = ScenarioValidator::validate(\u0026output, \u0026scenario.expected_behavior) {\n            eprintln!(\n                \"Warning: scenario '{}' expected behavior mismatch: {}\",\n                scenario.id, e\n            );\n            return Err(e);\n        }\n    }\n\n    println!(\n        \"{}\",\n        serde_json::to_string_pretty(\u0026output).map_err(|e| SandboxError::Io(e.to_string()))?\n    );\n    Ok(output)\n}\n\nfn main() {\n    trit_core::tracing_init::init();\n\n    let args: Vec\u003cString\u003e = std::env::args().collect();\n    if args.len() \u003c 3 || args[1] != \"--scenario\" {\n        eprintln!(\"Usage: trit-sandbox --scenario \u003cpath.json\u003e\");\n        std::process::exit(1);\n    }\n\n    let path = match validate_scenario_path(\u0026args[2]) {\n        Ok(p) =\u003e p,\n        Err(e) =\u003e {\n            eprintln!(\"Security error: {}\", e);\n            std::process::exit(1);\n        }\n    };\n\n    if let Err(e) = run_and_print(\u0026path) {\n        eprintln!(\"Error: {}\", e);\n        std::process::exit(1);\n    }\n}\n","traces":[{"line":8,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":9,"address":[],"length":0,"stats":{"Line":648518346341351424}},{"line":11,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":13,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":15,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":17,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":19,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":20,"address":[],"length":0,"stats":{"Line":0}},{"line":21,"address":[],"length":0,"stats":{"Line":0}},{"line":22,"address":[],"length":0,"stats":{"Line":0}},{"line":23,"address":[],"length":0,"stats":{ n    fn should_not_detect_crossing_when_descending() {\n        let mut clock = HarmonicClock::new(1.0, std::f64::consts::PI);\n        assert!(!clock.tick(0.1));\n    }\n\n    #[test]\n    fn phase_now_should_return_sine_of_current_angle() {\n        let clock = HarmonicClock::new(1.0, std::f64::consts::FRAC_PI_2);\n        assert!((clock.phase_now() - 1.0).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn physical_clock_should_have_high_frequency() {\n        let clock = HarmonicClock::physical();\n        assert!(clock.omega \u003e 5.0);\n    }\n\n    #[test]\n    fn deliberative_clock_should_have_low_frequency() {\n        let clock = HarmonicClock::deliberative();\n        assert!(clock.omega \u003c 5.0);\n    }\n\n    #[test]\n    fn multiple_ticks_should_accumulate_time() {\n        let mut clock = HarmonicClock::new(1.0, 0.0);\n        clock.tick(0.1);\n        clock.tick(0.1);\n        clock.tick(0.1);\n        assert!((clock.phase_now() - 0.3_f64.sin()).abs() \u003c 0.01);\n    }\n\n    #[test]\n    fn tick_with_zero_dt_is_not_a_crossing() {\n        let mut clock = HarmonicClock::new(1.0, 0.0);\n        assert!(!clock.tick(0.0));\n    }\n\n    #[test]\n    fn no_crossing_within_same_half_period() {\n        // Start at peak (PI/2) and move a little; no rising zero crossing.\n        let mut clock = HarmonicClock::new(1.0, std::f64::consts::FRAC_PI_2);\n        assert!(!clock.tick(0.1));\n        assert!(!clock.tick(0.1));\n    }\n\n    #[test]\n    fn physical_clock_starts_at_zero_phase() {\n        let clock = HarmonicClock::physical();\n        assert!(clock.phase_now().abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn deliberative_clock_starts_at_zero_phase() {\n        let clock = HarmonicClock::deliberative();\n        assert!(clock.phase_now().abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn phase_now_bounds_are_within_one() {\n        let mut clock = HarmonicClock::new(2.5, 0.3);\n        for _ in 0..20 {\n            clock.tick(0.05);\n            let p = clock.phase_now();\n            assert!(p \u003e= -1.0 \u0026\u0026 p \u003c= 1.0, \"phase {} out of [-1, 1]\", p);\n        }\n    }\n}\n","traces":[{"line":10,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":19,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":20,"address":[],"length":0,"stats":{"Line":6052837899185946624}},{"line":21,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":22,"address":[],"length":0,"stats":{"Line":6052837899185946624}},{"line":23,"address":[],"length":0,"stats":{"Line":2233785415175766016}},{"line":26,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":27,"address":[],"length":0,"stats":{"Line":3458764513820540928}},{"line":31,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":32,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":36,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":37,"address":[],"length":0,"stats":{"Line":144115188075855872}}],"covered":12,"coverable":12},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","algebra.rs"],"content":"use crate::core::frame::Frame;\nuse crate::core::phase::{Phase, PhaseError};\nuse crate::core::value::TritValue;\nuse crate::core::word::TritWord;\nuse crate::meta::MetaInterrupt;\nuse tracing::{debug, trace, warn};\n\n/// Harmonic Ternary Algebra (HTA): the core logic engine.\n///\n/// ## Hot vs Cold Path\n///\n/// Same-frame operations (hot path) skip MetaMonitor entirely — they account\n/// for ~80% of typical decisions. Cross-frame operations (cold path) generate\n/// MetaInterrupt events and trigger policy arbitration.\npub struct TernaryAlgebra;\n\nimpl TernaryAlgebra {\n    /// Precheck: returns true if both trits share the same frame.\n    /// Callers can use this to decide whether to take the hot path.\n    #[inline]\n    pub fn precheck_same_frame(a: \u0026TritWord, b: \u0026TritWord) -\u003e bool {\n        a.frame() == b.frame()\n    }\n\n    /// Shared cross-frame conflict handler — used by both TAND and TOR.\n    /// Uses `MetaInterrupt::with_frames` to avoid `format!()` overhead.\n    fn cross_frame_conflict(\n        op_name: \u0026'static str,\n        a: \u0026TritWord,\n        b: \u0026TritWord,\n    ) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\n        let hold = TritWord::hold(Frame::Meta);\n        let interrupt = MetaInterrupt::with_frames(op_name, a.frame().clone(), b.frame().clone());\n        if tracing::enabled!(tracing::Level::WARN) {\n            warn!(op = op_name, a = %a.frame(), b = %b.frame(), \"cross-frame conflict detected\");\n        }\n        (hold, Some(interrupt))\n    }\n\n    /// TAND: harmonic conjunction.\n    /// - Same frame: standard ternary logic with phase averaging (hot path).\n    /// - Different frame: produces Hold + triggers MetaInterrupt (cold path).\n    #[tracing::instrument(skip_all, fields(op = \"t_and\"))]\n    pub fn t_and(a: \u0026TritWord, b: \u0026TritWord) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\n        trace!(\n            a_frame = %a.frame(),\n            a_value = ?a.value(),\n            a_phase = a.phase().inner(),\n            b_frame = %b.frame(),\n            b_value = ?b.value(),\n            b_phase = b.phase().inner(),\n            \"entering TAND\"\n        );\n\n        if a.frame() != b.frame() {\n            return Self::cross_frame_conflict(\"TAND\", a, b);\n        }\n\n        let val = match (a.value(), b.value()) {\n            (TritValue::True, TritValue::True) =\u003e TritValue::True,\n            (TritValue::Unknown, _) | (_, TritValue::Unknown) =\u003e TritValue::Unknown,\n            (TritValue::False, _) | (_, TritValue::False) =\u003e TritValue::False,\n            _ =\u003e TritValue::Hold,\n        };\n\n        let phase = Phase::mean(a.phase(), b.phase());\n        debug!(result_value = ?val, result_phase = phase.inner(), \"TAND same-frame computed\");\n        (TritWord::new(val, phase, a.frame().clone()), None)\n    }\n\n    /// TAND hot path: same-frame only, no MetaInterrupt allocation.\n    ///\n    /// # Panics\n    ///\n    /// Panics if frames differ. This is the unchecked fast path; callers **must**\n    /// precheck with [`Self::precheck_same_frame`]. The assertion is active in all\n    /// build modes (not `debug_assert`) to prevent silent wrong results in release.\n    #[inline]\n    pub fn t_and_hot(a: \u0026TritWord, b: \u0026TritWord) -\u003e TritWord {\n        assert_eq!(a.frame(), b.frame(), \"t_and_hot requires same frame\");\n\n        let val = match (a.value(), b.value()) {\n            (TritValue::True, TritValue::True) =\u003e TritValue::True,\n            (TritValue::Unknown, _) | (_, TritValue::Unknown) =\u003e TritValue::Unknown,\n            (TritValue::False, _) | (_, TritValue::False) =\u003e TritValue::False,\n            _ =\u003e TritValue::Hold,\n        };\n\n        let phase = Phase::mean(a.phase(), b.phase());\n        TritWord::new(val, phase, a.frame().clone())\n    }\n\n    /// TOR: harmonic disjunction.\n    #[tracing::instrument(skip_all, fields(op = \"t_or\"))]\n    pub fn t_or(a: \u0026TritWord, b: \u0026TritWord) -\u003e (TritWord, Option\u003cMetaInterrupt\u003e) {\n        trace!(a_frame = %a.frame(), b_frame = %b.frame(), \"entering TOR\");\n\n        if a.frame() != b.frame() {\n            return Self::cross_frame_conflict(\"TOR\", a, b);\n        }\n\n        let val = match (a.value(), b.value()) {\n            (TritValue::True, _) | (_, TritValue::True) =\u003e TritValue::True,\n            (TritValue::Unknown, TritValue::Unknown) =\u003e TritValue::Unknown,\n            (TritValue::False, TritValue::False) =\u003e TritValue::False,\n            _ =\u003e TritValue::Hold,\n        };\n\n        let phase = Phase::mean(a.phase(), b.phase());\n        (TritWord::new(val, phase, a.frame().clone()), None)\n    }\n\n    /// TOR hot path: same-frame only, no MetaInterrupt allocation.\n    ///\n    /// # Panics\n    ///\n    /// Panics if frames differ. See [`Self::t_and_hot`] for rationale.\n    #[inline]\n    pub fn t_or_hot(a: \u0026TritWord, b: \u0026TritWord) -\u003e TritWord {\n        assert_eq!(a.frame(), b.frame(), \"t_or_hot requires same frame\");\n\n        let val = match (a.value(), b.value()) {\n            (TritValue::True, _) | (_, TritValue::True) =\u003e TritValue::True,\n            (TritValue::Unknown, TritValue::Unknown) =\u003e TritValue::Unknown,\n            (TritValue::False, TritValue::False) =\u003e TritValue::False,\n            _ =\u003e TritValue::Hold,\n        };\n\n        let phase = Phase::mean(a.phase(), b.phase());\n        TritWord::new(val, phase, a.frame().clone())\n    }\n\n    /// TNOT: phase-flipped negation.\n    #[tracing::instrument(skip_all)]\n    pub fn t_not(a: \u0026TritWord) -\u003e TritWord {\n        let val = a.value().negate();\n        let phase = a.phase().complement();\n        TritWord::new(val, phase, a.frame().clone())\n    }\n\n    /// THOLD: force into Hold state (meta-monitor instruction).\n    pub fn t_hold(a: \u0026TritWord) -\u003e TritWord {\n        TritWord::new(TritValue::Hold, Phase::neutral(), a.frame().clone())\n    }\n\n    /// TSENSE: create a Hold from raw sensor input.\n    ///\n    /// Returns `Err` if `phase` is not finite and in `[0.0, 1.0]`. For a\n    /// non-failing variant that silently clamps invalid inputs, use\n    /// [`t_sense_clamped`](Self::t_sense_clamped).\n    pub fn t_sense(phase: f64, frame: Frame) -\u003e Result\u003cTritWord, PhaseError\u003e {\n        Ok(TritWord::new(TritValue::Hold, Phase::new(phase)?, frame))\n    }\n\n    /// TSENSE with silent clamping: create a Hold from raw sensor input.\n    ///\n    /// Out-of-range or non-finite phase values are clamped to `[0.0, 1.0]`\n    /// (NaN/Infinity maps to neutral 0.5). This is useful for untrusted\n    /// external sensors where graceful degradation is preferred over hard\n    /// failure.\n    pub fn t_sense_clamped(phase: f64, frame: Frame) -\u003e TritWord {\n        TritWord::new(TritValue::Hold, Phase::new_clamped(phase), frame)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn precheck_same_frame_returns_true() {\n        let a = TritWord::tru(Frame::Science);\n        let b = TritWord::fals(Frame::Science);\n        assert!(TernaryAlgebra::precheck_same_frame(\u0026a, \u0026b));\n    }\n\n    #[test]\n    fn precheck_different_frame_returns_false() {\n        let a = TritWord::tru(Frame::Science);\n        let b = TritWord::fals(Frame::Individual);\n        assert!(!TernaryAlgebra::precheck_same_frame(\u0026a, \u0026b));\n    }\n\n    #[test]\n    fn tand_hot_same_frame_returns_no_interrupt() {\n        let a = TritWord::tru(Frame::Science);\n        let b = TritWord::fals(Frame::Science);\n        let result = TernaryAlgebra::t_and_hot(\u0026a, \u0026b);\n        assert_eq!(result.value(), TritValue::False);\n        assert_eq!(result.frame(), \u0026Frame::Science);\n    }\n\n    #[test]\n    fn tor_hot_same_frame_returns_no_interrupt() {\n        let a = TritWord::tru(Frame::Science);\n        let b = TritWord::fals(Frame::Science);\n        let result = TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\n        assert_eq!(result.value(), TritValue::True);\n    }\n\n    #[test]\n    #[should_panic(expected = \"t_and_hot requires same frame\")]\n    fn tand_hot_different_frame_panics() {\n        let a = TritWord::tru(Frame::Science);\n        let b = TritWord::tru(Frame::Individual);\n        TernaryAlgebra::t_and_hot(\u0026a, \u0026b);\n    }\n\n    #[test]\n    fn tand_with_unknown_propagates_unknown() {\n        let a = TritWord::unknown(Frame::Science);\n        let b = TritWord::tru(Frame::Science);\n        let (res, int) = TernaryAlgebra::t_and(\u0026a, \u0026b);\n        assert_eq!(res.value(), TritValue::Unknown);\n        assert!(int.is_none());\n    }\n\n    #[test]\n    fn tor_unknown_unknown_is_unknown() {\n        let a = TritWord::unknown(Frame::Science);\n        let b = TritWord::unknown(Frame::Science);\n        let (res, int) = TernaryAlgebra::t_or(\u0026a, \u0026b);\n        assert_eq!(res.value(), TritValue::Unknown);\n        assert!(int.is_none());\n    }\n\n    #[test]\n    fn tor_true_dominates_unknown() {\n        let a = TritWord::new(TritValue::True, Phase::new(0.7).unwrap(), Frame::Science);\n        let b = TritWord::unknown(Frame::Science);\n        let (res, int) = TernaryAlgebra::t_or(\u0026a, \u0026b);\n        assert_eq!(res.value(), TritValue::True);\n        assert!(int.is_none());\n    }\n\n    #[test]\n    fn tnot_unknown_remains_unknown() {\n        let a = TritWord::unknown(Frame::Science);\n        let res = TernaryAlgebra::t_not(\u0026a);\n        assert_eq!(res.value(), TritValue::Unknown);\n    }\n\n    #[test]\n    fn tand_cross_frame_returns_hold_and_interrupt() {\n        let a = TritWord::tru(Frame::Science);\n        let b = TritWord::fals(Frame::Individual);\n        let (res, int) = TernaryAlgebra::t_and(\u0026a, \u0026b);\n        assert_eq!(res.value(), TritValue::Hold);\n        assert_eq!(res.frame(), \u0026Frame::Meta);\n        assert!(int.is_some());\n    }\n\n    #[test]\n    fn t_sense_accepts_valid_phase() {\n        let word = TernaryAlgebra::t_sense(0.75, Frame::Science).unwrap();\n        assert_eq!(word.value(), TritValue::Hold);\n        assert_eq!(word.phase().inner(), 0.75);\n        assert_eq!(word.frame(), \u0026Frame::Science);\n    }\n\n    #[test]\n    fn t_sense_rejects_nan_phase() {\n        assert!(TernaryAlgebra::t_sense(f64::NAN, Frame::Science).is_err());\n    }\n\n    #[test]\n    fn t_sense_rejects_infinite_phase() {\n        assert!(TernaryAlgebra::t_sense(f64::INFINITY, Frame::Science).is_err());\n        assert!(TernaryAlgebra::t_sense(f64::NEG_INFINITY, Frame::Science).is_err());\n    }\n\n    #[test]\n    fn t_sense_rejects_out_of_range_phase() {\n        assert!(TernaryAlgebra::t_sense(-0.1, Frame::Science).is_err());\n        assert!(TernaryAlgebra::t_sense(1.1, Frame::Science).is_err());\n    }\n\n    #[test]\n    fn t_sense_clamped_maps_invalid_to_neutral() {\n        let word = TernaryAlgebra::t_sense_clamped(f64::NAN, Frame::Science);\n        assert_eq!(word.value(), TritValue::Hold);\n        assert_eq!(word.phase().inner(), 0.5);\n    }\n\n    #[test]\n    fn t_sense_clamped_preserves_valid_phase() {\n        let word = TernaryAlgebra::t_sense_clamped(0.25, Frame::Individual);\n        assert_eq!(word.phase().inner(), 0.25);\n    }\n\n    #[test]\n    fn tand_truth_table_same_frame() {\n        // Exhaustive 4x4 truth table for TAND with same frame.\n        let values = [\n            TritValue::True,\n            TritValue::False,\n            TritValue::Hold,\n            TritValue::Unknown,\n        ];\n        let expected = [\n            // True, False, Hold, Unknown\n            [TritValue::True, TritValue::False, TritValue::Hold, TritValue::Unknown], // True\n            [TritValue::False, TritValue::False, TritValue::False, TritValue::Unknown], // False\n            [TritValue::Hold, TritValue::False, TritValue::Hold, TritValue::Unknown], // Hold\n            [TritValue::Unknown, TritValue::Unknown, TritValue::Unknown, TritValue::Unknown], // Unknown\n        ];\n        for (i, \u0026a) in values.iter().enumerate() {\n            for (j, \u0026b) in values.iter().enumerate() {\n                let left = TritWord::new(a, Phase::new(0.8).unwrap(), Frame::Science);\n                let right = TritWord::new(b, Phase::new(0.6).unwrap(), Frame::Science);\n                let (res, int) = TernaryAlgebra::t_and(\u0026left, \u0026right);\n                assert_eq!(\n                    res.value(),\n                    expected[i][j],\n                    \"TAND({:?}, {:?}) should be {:?}\",\n                    a,\n                    b,\n                    expected[i][j]\n                );\n                assert!(int.is_none());\n            }\n        }\n    }\n\n    #[test]\n    fn tor_truth_table_same_frame() {\n        // Exhaustive 4x4 truth table for TOR with same frame.\n        let values = [\n            TritValue::True,\n            TritValue::False,\n            TritValue::Hold,\n            TritValue::Unknown,\n        ];\n        let expected = [\n            // True, False, Hold, Unknown\n            [TritValue::True, TritValue::True, TritValue::True, TritValue::True], // True\n            [TritValue::True, TritValue::False, TritValue::Hold, TritValue::Hold], // False\n            [TritValue::True, TritValue::Hold, TritValue::Hold, TritValue::Hold], // Hold\n            [TritValue::True, TritValue::Hold, TritValue::Hold, TritValue::Unknown], // Unknown\n        ];\n        for (i, \u0026a) in values.iter().enumerate() {\n            for (j, \u0026b) in values.iter().enumerate() {\n                let left = TritWord::new(a, Phase::new(0.8).unwrap(), Frame::Science);\n                let right = TritWord::new(b, Phase::new(0.6).unwrap(), Frame::Science);\n                let (res, int) = TernaryAlgebra::t_or(\u0026left, \u0026right);\n                assert_eq!(\n                    res.value(),\n                    expected[i][j],\n                    \"TOR({:?}, {:?}) should be {:?}\",\n                    a,\n                    b,\n                    expected[i][j]\n                );\n                assert!(int.is_none());\n            }\n        }\n    }\n\n    #[test]\n    fn tnot_truth_table() {\n        let cases = [\n            (TritValue::True, TritValue::False),\n            (TritValue::False, TritValue::True),\n            (TritValue::Hold, TritValue::Hold),\n            (TritValue::Unknown, TritValue::Unknown),\n        ];\n        for (input, expected) in cases {\n            let word = TritWord::new(input, Phase::new(0.7).unwrap(), Frame::Science);\n            let res = TernaryAlgebra::t_not(\u0026word);\n            assert_eq!(res.value(), expected, \"TNOT({:?}) should be {:?}\", input, expected);\n            assert_eq!(res.frame(), \u0026Frame::Science);\n        }\n    }\n\n    #[test]\n    fn t_hold_preserves_frame() {\n        let word = TritWord::tru(Frame::Individual);\n        let held = TernaryAlgebra::t_hold(\u0026word);\n        assert_eq!(held.value(), TritValue::Hold);\n        assert_eq!(held.frame(), \u0026Frame::Individual);\n        assert_eq!(held.phase().inner(), 0.5);\n    }\n\n    #[test]\n    #[should_panic(expected = \"t_or_hot requires same frame\")]\n    fn tor_hot_different_frame_panics() {\n        let a = TritWord::tru(Frame::Science);\n        let b = TritWord::tru(Frame::Individual);\n        TernaryAlgebra::t_or_hot(\u0026a, \u0026b);\n    }\n\n    #[test]\n    fn tor_cross_frame_returns_hold_and_interrupt() {\n        let a = TritWord::tru(Frame::Science);\n        let b = TritWord::fals(Frame::Individual);\n        let (res, int) = TernaryAlgebra::t_or(\u0026a, \u0026b);\n        assert_eq!(res.value(), TritValue::Hold);\n        assert_eq!(res.frame(), \u0026Frame::Meta);\n        assert!(int.is_some());\n    }\n\n    #[test]\n    fn tand_phase_averages() {\n        let a = TritWord::new(TritValue::True, Phase::new(0.8).unwrap(), Frame::Science);\n        let b = TritWord::new(TritValue::True, Phase::new(0.6).unwrap(), Frame::Science);\n        let (res, _) = TernaryAlgebra::t_and(\u0026a, \u0026b);\n        // (0.8 + 0.6) / 2 = 0.7, not near any anchor.\n        assert!((res.phase().inner() - 0.7).abs() \u003c f64::EPSILON);\n    }\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":22,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":27,"address":[],"length":0,"stats":{"Line":5620492334958379008}},{"line":32,"address":[],"length":0,"stats":{"Line":16861477004875137024}},{"line":33,"address":[],"length":0,"stats":{"Line":2449958197289549824}},{"line":34,"address":[],"length":0,"stats"  Clone, PartialEq, thiserror::Error)]\npub enum FrameError {\n    #[error(\"Unknown frame: '{0}'\")]\n    Unknown(String),\n}\n\n/// Registry of active frames in a computation session.\n#[derive(Debug, Clone, Default)]\npub struct FrameRegistry {\n    frames: Vec\u003cFrame\u003e,\n}\n\nimpl FrameRegistry {\n    pub fn new() -\u003e Self {\n        Self { frames: vec![] }\n    }\n\n    pub fn register(\u0026mut self, frame: Frame) {\n        if !self.frames.contains(\u0026frame) {\n            self.frames.push(frame);\n        }\n    }\n\n    pub fn is_registered(\u0026self, frame: \u0026Frame) -\u003e bool {\n        self.frames.contains(frame)\n    }\n\n    pub fn iter(\u0026self) -\u003e impl Iterator\u003cItem = \u0026Frame\u003e {\n        self.frames.iter()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn should_parse_science_from_str() {\n        assert_eq!(Frame::from_str(\"Science\").unwrap(), Frame::Science);\n    }\n\n    #[test]\n    fn should_parse_all_known_frames() {\n        for (input, expected) in [\n            (\"Science\", Frame::Science),\n            (\"Individual\", Frame::Individual),\n            (\"Consensus\", Frame::Consensus),\n            (\"Absolute\", Frame::Absolute),\n            (\"Meta\", Frame::Meta),\n        ] {\n            assert_eq!(Frame::from_str(input).unwrap(), expected);\n        }\n    }\n\n    #[test]\n    fn should_reject_unknown_frame() {\n        assert!(Frame::from_str(\"Unknown\").is_err());\n        assert!(Frame::from_str(\"\").is_err());\n    }\n\n    #[test]\n    fn should_display_frame_as_string() {\n        assert_eq!(format!(\"{}\", Frame::Science), \"Science\");\n        assert_eq!(format!(\"{}\", Frame::Individual), \"Individual\");\n    }\n\n    #[test]\n    fn registry_should_track_unique_frames() {\n        let mut reg = FrameRegistry::new();\n        reg.register(Frame::Science);\n        reg.register(Frame::Science); // duplicate\n        reg.register(Frame::Individual);\n        assert!(reg.is_registered(\u0026Frame::Science));\n        assert!(reg.is_registered(\u0026Frame::Individual));\n        assert!(!reg.is_registered(\u0026Frame::Consensus));\n    }\n\n    #[test]\n    fn registry_should_start_empty() {\n        let reg = FrameRegistry::new();\n        assert!(!reg.is_registered(\u0026Frame::Science));\n    }\n\n    #[test]\n    fn registry_iter_yields_registered_frames() {\n        let mut reg = FrameRegistry::new();\n        reg.register(Frame::Science);\n        reg.register(Frame::Individual);\n        let collected: Vec\u003c_\u003e = reg.iter().cloned().collect();\n        assert_eq!(collected.len(), 2);\n        assert!(collected.contains(\u0026Frame::Science));\n        assert!(collected.contains(\u0026Frame::Individual));\n    }\n\n    #[test]\n    fn default_registry_is_empty() {\n        let reg: FrameRegistry = Default::default();\n        assert!(!reg.is_registered(\u0026Frame::Meta));\n    }\n\n    #[test]\n    fn parsing_is_case_sensitive() {\n        assert!(Frame::from_str(\"science\").is_err());\n        assert!(Frame::from_str(\"SCIENCE\").is_err());\n    }\n\n    #[test]\n    fn frame_error_display_is_informative() {\n        let err = Frame::from_str(\"Bogus\").unwrap_err();\n        let msg = format!(\"{}\", err);\n        assert!(msg.contains(\"Bogus\"));\n        assert!(msg.contains(\"Unknown frame\"));\n    }\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":22,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":23,"address":[],"length":0,"stats":{"Line":16285016252571713536}},{"line":24,"address":[],"length":0,"stats":{"Line":11961560610296037376}},{"line":25,"address":[],"length":0,"stats":{"Line":6341068275337658366}},{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":3746994889972252670}},{"line":35,"address":[],"length":0,"stats":{"Line":12826251738751172608}},{"line":36,"address":[],"length":0,"stats":{"Line":12826251738751172608}},{"line":37,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":38,"address":[],"length":0,"stats":{"Line":10736581511651262464}},{"line":39,"address":[],"length":0,"stats":{"Line":5404319552844595200}},{"line":40,"address":[],"length":0,"stats":{"Line":864691128455135232}},{"line":41,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":42,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":61,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":62,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":65,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":66,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":67,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":71,"address":[],"length":0,"stats":{"Line":360287970189639680}},{"line":72,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":75,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":76,"address":[],"length":0,"stats":{"Line":72057594037927936}}],"covered":23,"coverable":24},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","mod.rs"],"content":"//! Core ternary algebra layer.\n//!\n//! This module contains the foundational types of Trit-Core:\n//! - [`TritValue`]: the four discrete ternary states.\n//! - [`Phase`]: continuous tendency in `[0.0, 1.0]`.\n//! - [`Frame`]: decision domain / reference frame.\n//! - [`TritWord`]: composite ternary word with enforced invariants.\n//! - [`TernaryAlgebra`]: `t_and`, `t_or`, `t_not`, and hot-path variants.\n\npub mod algebra;\npub mod frame;\npub mod phase;\npub mod value;\npub mod word;\n\npub use algebra::TernaryAlgebra;\npub use frame::{Frame, FrameError, FrameRegistry};\npub use phase::{Commitment, Phase, PhaseError};\npub use value::TritValue;\npub use word::{Trit, TritWord, WordError};\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","Ultima","Documents","kimi","workspace","trit-core","src","core","phase.rs"],"content":"use thiserror::Error;\n\n/// Phase: continuous tendency `0.0..1.0`.\n/// `0.5` = perfectly neutral.\n/// `\u003e 0.5` = tendency toward True.\n/// `\u003c 0.5` = tendency toward False.\n///\n/// # Invariant\n///\n/// The wrapped `f64` is always finite and within `[0.0, 1.0]`.\n/// Use [`Phase::new`] for strict construction, or [`Phase::new_clamped`]\n/// when the caller explicitly wants silent clamping.\n#[derive(Clone, Copy, Debug, PartialEq)]\npub struct Phase(f64);\n\nimpl Phase {\n    pub const NEUTRAL: f64 = 0.5;\n    pub const FULL_TRUE: f64 = 1.0;\n    pub const FULL_FALSE: f64 = 0.0;\n\n    /// Constant neutral phase (0.5).\n    pub const fn neutral() -\u003e Self {\n        Phase(0.5)\n    }\n\n    /// Constant full-true phase (1.0).\n    pub const fn full_true() -\u003e Self {\n        Phase(1.0)\n    }\n\n    /// Constant full-false phase (0.0).\n    pub const fn full_false() -\u003e Self {\n        Phase(0.0)\n    }\n\n    /// Strict constructor: returns `Err` for NaN, infinite, or out-of-range values.\n    ///\n    /// This is the default way to create a `Phase` in library code, because\n    /// invalid phase values usually indicate a programming or input error that\n    /// should not be silently hidden.\n    pub fn new(v: f64) -\u003e Result\u003cSelf, PhaseError\u003e {\n        if v.is_nan() || v.is_infinite() {\n            return Err(PhaseError::NotFinite(v));\n        }\n        if !(0.0..=1.0).contains(\u0026v) {\n            return Err(PhaseError::OutOfRange(v));\n        }\n        Ok(Phase(v))\n    }\n\n    /// Clamping constructor: silently clamps out-of-range values to `[0.0, 1.0]`\n    /// and maps NaN/Infinity to `NEUTRAL` (0.5).\n    ///\n    /// Logs a warning at the tracing layer when clamping occurs.\n    /// Prefer [`Phase::new`] unless you explicitly need graceful degradation\n    /// for external, untrusted inputs.\n    pub fn new_clamped(v: f64) -\u003e Self {\n        if v.is_nan() || v.is_infinite() {\n            tracing::warn!(value = %v, \"Phase is NaN/Inf, clamping to NEUTRAL (0.5)\");\n            return Phase(0.5);\n        }\n        if !(0.0..=1.0).contains(\u0026v) {\n            let clamped = v.clamp(0.0, 1.0);\n            tracing::warn!(original = %v, clamped = %clamped, \"Phase out of range, clamped\");\n            return Phase(clamped);\n        }\n        Phase(v)\n    }\n\n    /// Unwrap the underlying finite, in-range `f64`.\n    pub fn inner(self) -\u003e f64 {\n        self.0\n    }\n\n    /// Arithmetic mean of two phases, auto-quantized to prevent drift.\n    pub fn mean(a: Phase, b: Phase) -\u003e Phase {\n        // Both values are already validated, so the mean is always valid.\n        Phase::new_clamped((a.0 + b.0) / 2.0).quantize(1e-6)\n    }\n\n    /// Complement: 1.0 - phase, auto-quantized.\n    pub fn complement(self) -\u003e Phase {\n        Phase::new_clamped(1.0 - self.0).quantize(1e-6)\n    }\n\n    /// Quantize to standard values (0.0, 0.5, 1.0) when within epsilon distance.\n    /// This prevents phase drift over long cascades where 0.50000001 and\n    /// 0.49999999 would be semantically different despite both meaning \"neutral\".\n    ///\n    /// Anchors are checked in order: 0.5 first (most common), then 0.0, then 1.0.\n    ///\n    /// If `epsilon` is not a positive finite number, the phase is returned\n    /// unchanged. This prevents accidental no-op or nonsensical behavior from\n    /// invalid epsilon inputs.\n    pub fn quantize(self, epsilon: f64) -\u003e Phase {\n        if !epsilon.is_finite() || epsilon \u003c= 0.0 {\n            return self;\n        }\n        let v = self.0;\n        if (v - 0.5).abs() \u003c epsilon {\n            Phase(0.5)\n        } else if v \u003c epsilon {\n            Phase(0.0)\n        } else if (1.0 - v).abs() \u003c epsilon {\n            Phase(1.0)\n        } else {\n            self\n        }\n    }\n\n    /// Determine commitment direction.\n    ///\n    /// Uses the same epsilon as `quantize` (1e-6) for consistency:\n    /// a value that `quantize` considers neutral will also be\n    /// classified as `Neutral` by `commitment`.\n    pub fn commitment(self) -\u003e Commitment {\n        let epsilon = 1e-6;\n        if self.0 \u003e 0.5 + epsilon {\n            Commitment::TowardTrue\n        } else if self.0 \u003c 0.5 - epsilon {\n            Commitment::TowardFalse\n        } else {\n            Commitment::Neutral\n        }\n    }\n}\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum Commitment {\n    TowardTrue,\n    TowardFalse,\n    Neutral,\n}\n\n/// Error type for strict Phase construction.\n#[derive(Debug, Clone, Copy, PartialEq, Error)]\npub enum PhaseError {\n    #[error(\"Phase must be finite, got: {0}\")]\n    NotFinite(f64),\n    #[error(\"Phase must be in [0.0, 1.0], got: {0}\")]\n    OutOfRange(f64),\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn new_rejects_nan() {\n        assert!(Phase::new(f64::NAN).is_err());\n    }\n\n    #[test]\n    fn new_rejects_inf() {\n        assert!(Phase::new(f64::INFINITY).is_err());\n        assert!(Phase::new(f64::NEG_INFINITY).is_err());\n    }\n\n    #[test]\n    fn new_rejects_out_of_range() {\n        assert!(Phase::new(1.5).is_err());\n        assert!(Phase::new(-0.1).is_err());\n    }\n\n    #[test]\n    fn new_accepts_valid() {\n        assert!(Phase::new(0.0).is_ok());\n        assert!(Phase::new(0.5).is_ok());\n        assert!(Phase::new(1.0).is_ok());\n        assert!(Phase::new(0.73).is_ok());\n    }\n\n    #[test]\n    fn new_clamped_maps_nan_to_neutral() {\n        assert_eq!(Phase::new_clamped(f64::NAN).inner(), 0.5);\n    }\n\n    #[test]\n    fn new_clamped_clamps_out_of_range() {\n        assert_eq!(Phase::new_clamped(1.5).inner(), 1.0);\n        assert_eq!(Phase::new_clamped(-0.1).inner(), 0.0);\n    }\n\n    #[test]\n    fn quantize_snaps_near_neutral() {\n        let p = Phase::new(0.5000000001).unwrap();\n        let q = p.quantize(1e-6);\n        assert!((q.inner() - 0.5).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn quantize_snaps_near_zero() {\n        let p = Phase::new(0.0000000001).unwrap();\n        let q = p.quantize(1e-6);\n        assert!((q.inner() - 0.0).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn quantize_snaps_near_one() {\n        let p = Phase::new(0.9999999999).unwrap();\n        let q = p.quantize(1e-6);\n        assert!((q.inner() - 1.0).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn quantize_preserves_normal_value() {\n        let p = Phase::new(0.73).unwrap();\n        let q = p.quantize(1e-6);\n        assert!((q.inner() - 0.73).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn quantize_neutral_priority_over_extremes() {\n        // 0.50000001 is closer to 0.5 than 1.0 but we anchor 0.5 first\n        let p = Phase::new(0.50000001).unwrap();\n        let q = p.quantize(1e-3);\n        assert!((q.inner() - 0.5).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn mean_auto_quantizes() {\n        let a = Phase::new(0.3).unwrap();\n        let b = Phase::new(0.7).unwrap();\n        let m = Phase::mean(a, b);\n        // 0.3 + 0.7 = 1.0 / 2 = 0.5 exactly → should be 0.5\n        assert!((m.inner() - 0.5).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn complement_auto_quantizes() {\n        let p = Phase::new(0.5).unwrap();\n        let c = p.complement();\n        // 1.0 - 0.5 = 0.5 → should be 0.5\n        assert!((c.inner() - 0.5).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn commitment_neutral_at_0_5() {\n        assert_eq!(Phase::new(0.5).unwrap().commitment(), Commitment::Neutral);\n    }\n\n    #[test]\n    fn commitment_neutral_near_0_5_within_epsilon() {\n        // 0.5 + 5e-7 is within the 1e-6 epsilon → Neutral\n        assert_eq!(\n            Phase::new(0.5000005).unwrap().commitment(),\n            Commitment::Neutral\n        );\n        assert_eq!(\n            Phase::new(0.4999995).unwrap().commitment(),\n            Commitment::Neutral\n        );\n    }\n\n    #[test]\n    fn commitment_toward_true_beyond_epsilon() {\n        assert_eq!(\n            Phase::new(0.500002).unwrap().commitment(),\n            Commitment::TowardTrue\n        );\n        assert_eq!(\n            Phase::new(0.8).unwrap().commitment(),\n            Commitment::TowardTrue\n        );\n        assert_eq!(\n            Phase::new(1.0).unwrap().commitment(),\n            Commitment::TowardTrue\n        );\n    }\n\n    #[test]\n    fn commitment_toward_false_beyond_epsilon() {\n        assert_eq!(\n            Phase::new(0.499998).unwrap().commitment(),\n            Commitment::TowardFalse\n        );\n        assert_eq!(\n            Phase::new(0.2).unwrap().commitment(),\n            Commitment::TowardFalse\n        );\n        assert_eq!(\n            Phase::new(0.0).unwrap().commitment(),\n            Commitment::TowardFalse\n        );\n    }\n\n    #[test]\n    fn commitment_consistent_with_quantize() {\n        // A value quantized to neutral must also be commitment-neutral\n        let p = Phase::new(0.5000001).unwrap().quantize(1e-6);\n        assert!((p.inner() - 0.5).abs() \u003c f64::EPSILON);\n        assert_eq!(p.commitment(), Commitment::Neutral);\n    }\n\n    #[test]\n    fn constants_match_expected_values() {\n        assert_eq!(Phase::neutral().inner(), 0.5);\n        assert_eq!(Phase::full_true().inner(), 1.0);\n        assert_eq!(Phase::full_false().inner(), 0.0);\n    }\n\n    #[test]\n    fn new_clamped_maps_infinity_to_neutral() {\n        assert_eq!(Phase::new_clamped(f64::INFINITY).inner(), 0.5);\n        assert_eq!(Phase::new_clamped(f64::NEG_INFINITY).inner(), 0.5);\n    }\n\n    #[test]\n    fn quantize_rejects_invalid_epsilon() {\n        let p = Phase::new(0.5000001).unwrap();\n        // Negative, zero, or non-finite epsilon should leave the phase unchanged.\n        assert!((p.quantize(-1e-6).inner() - 0.5000001).abs() \u003c f64::EPSILON);\n        assert!((p.quantize(0.0).inner() - 0.5000001).abs() \u003c f64::EPSILON);\n        assert!((p.quantize(f64::NAN).inner() - 0.5000001).abs() \u003c f64::EPSILON);\n        assert!((p.quantize(f64::INFINITY).inner() - 0.5000001).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn mean_of_extremes_is_neutral() {\n        let a = Phase::full_false();\n        let b = Phase::full_true();\n        let m = Phase::mean(a, b);\n        assert!((m.inner() - 0.5).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn complement_of_extremes() {\n        assert!((Phase::full_true().complement().inner() - 0.0).abs() \u003c f64::EPSILON);\n        assert!((Phase::full_false().complement().inner() - 1.0).abs() \u003c f64::EPSILON);\n        assert!((Phase::neutral().complement().inner() - 0.5).abs() \u003c f64::EPSILON);\n    }\n\n    #[test]\n    fn inner_returns_wrapped_value() {\n        let p = Phase::new(0.42).unwrap();\n        assert_eq!(p.inner(), 0.42);\n    }\n}\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":9079256848778919948}},{"line":23,"address":[],"length":0,"stats":{"Line":9079256848778919948}},{"line":27,"address":[],"length":0,"stats":{"Line":5044031582654955520}},{"line":28,"address":[],"length":0,"stats":{"Line":5044031582654955520}},{"line":32,"address":[],"length":0,"stats":{"Line":2954361355555045378}},{"line":33,"address":[],"length":0,"stats":{"Line":2954361355555045378}},{"line":41,"address":[],"length":0,"stats":{"Line":2305843009213694042}},{"line":42,"address":[],"length":0,"stats":{"Line":8502796096475496808}},{"line":43,"address":[],"length":0,"stats":{"Line":720575940379279360}},{"line":45,"address":[],"length":0,"stats":{"Line":3746994889972252852}},{"line":46,"address":[],"length":0,"stats":{"Line":9511602413006487642}},{"line":48,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":
